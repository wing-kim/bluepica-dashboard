  }

  /* 시트에서 읽은 필지 정보를 계산기가 참조할 수 있도록 저장
     (window._irrSheetData 는 계산 전용 임시 저장소 — 시트 원본 변경 없음) */
  /* 구조에 따라 인덱스 정의 — 구조B는 parseStructureA 변수가 없으므로 -1로 초기화 */
  const _addrIdx    =typeof addrIdx!=='undefined'?addrIdx:-1;
  const _areaIdx    =typeof areaIdx!=='undefined'?areaIdx:-1;
  const _buyPriceIdx=typeof buyPriceIdx!=='undefined'?buyPriceIdx:-1;
  const _loanIdx    =typeof loanIdx!=='undefined'?loanIdx:-1;
  const _depositIdx =typeof depositIdx!=='undefined'?depositIdx:-1;
  const _rentIdx    =typeof rentIdx!=='undefined'?rentIdx:-1;
  const _landPrIdx  =typeof landPrIdx!=='undefined'?landPrIdx:-1;
  const _landTotIdx =typeof landTotIdx!=='undefined'?landTotIdx:-1;
  window._irrSheetData={groups,hdr,
    addrIdx:_addrIdx,areaIdx:_areaIdx,buyPriceIdx:_buyPriceIdx,
    loanIdx:_loanIdx,depositIdx:_depositIdx,rentIdx:_rentIdx,
    landPrIdx:_landPrIdx,landTotIdx:_landTotIdx};
}

/* ════════════════════════════════════════════════════════════
   IRR 계산기 — 보조 함수들
   (renderIRR 와 별도 분리 → 이벤트 핸들러로 사용)
════════════════════════════════════════════════════════════ */

/* 슬라이더 값 표시 업데이트 */
function irrSlider(key,val,unit){
  const el=document.getElementById('lbl_'+key);
  if(!el)return;
  const n=parseFloat(val);
  if(unit==='만')      el.textContent=n.toLocaleString()+'만';
  else if(unit==='%')  el.textContent=n.toFixed(1)+'%';
  else if(unit==='x')  el.textContent=n.toFixed(1)+'x';
  else if(unit==='개월')el.textContent=n+'개월';
  else if(unit==='년') el.textContent=n+'년';
  else                 el.textContent=val+unit;
}

/* 시나리오 프리셋 적용 */
function irrSetScenario(scen,btn){
  /* 시나리오별 값 매핑 (하드코딩이 아니라 상수 테이블) */
  const PRESETS={
    conservative:{priceUp:1,rentUp:1,vacancy:10,newVacancy:15,rateA:4.5,rateB:4.5,constCost:420,designCost:6000,constMo:24,valueMult:1.8,pfRatio:50,pfRate:5.5,newRent:2000,newDep:8000,holdYrs:3,totalYrs:12},
    base:        {priceUp:3,rentUp:2,vacancy:5, newVacancy:10,rateA:3.5,rateB:3.5,constCost:350,designCost:5000,constMo:18,valueMult:2.5,pfRatio:60,pfRate:4.5,newRent:3000,newDep:10000,holdYrs:5,totalYrs:15},
    optimistic:  {priceUp:6,rentUp:3,vacancy:2, newVacancy:5, rateA:3.0,rateB:3.0,constCost:300,designCost:4000,constMo:14,valueMult:3.5,pfRatio:70,pfRate:3.8,newRent:4500,newDep:15000,holdYrs:7,totalYrs:18},
  };
  const p=PRESETS[scen];if(!p)return;

  /* 슬라이더 & 뱃지 일괄 업데이트 */
  const units={priceUp:'%',rentUp:'%',vacancy:'%',newVacancy:'%',rateA:'%',rateB:'%',acqTax:'%',
    constCost:'만',designCost:'만',constMo:'개월',valueMult:'x',
    pfRatio:'%',pfRate:'%',newRent:'만',newDep:'만',holdYrs:'년',totalYrs:'년'};
  Object.entries(p).forEach(([k,v])=>{
    const sl=document.getElementById('sl_'+k);if(sl)sl.value=v;
    irrSlider(k,v,units[k]||'');
  });

  /* 버튼 active 토글 */
  document.querySelectorAll('.calc-scen-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
}

/* ── IRR 계산 실행 ── */
function irrCalcRun(){
  const box=document.getElementById('irr-result-box');
  if(!box)return;

  /* [계산기 상태 레이어] 슬라이더 현재 값 수집 */
  const g=id=>parseFloat(document.getElementById(id)?.value||0);
  const S={
    priceUp    :g('sl_priceUp')/100,
    rentUp     :g('sl_rentUp')/100,
    vacancy    :g('sl_vacancy')/100,       // 임대보유 기간 공실률
    rateA      :g('sl_rateA')/100,
    rateB      :g('sl_rateB')/100,
    acqTax     :g('sl_acqTax')/100,        // 취득세율 — 초기 투자금에 반영됨
    constCost  :g('sl_constCost')*10000,   // 만원→원
    designCost :g('sl_designCost')*10000,
    constMo    :g('sl_constMo'),
    valueMult  :g('sl_valueMult'),
    pfRatio    :g('sl_pfRatio')/100,
    pfRate     :g('sl_pfRate')/100,
    newRent    :g('sl_newRent')*10000,
    newDep     :g('sl_newDep')*10000,
    newVacancy :g('sl_newVacancy')/100||0.10, // 신축 후 공실률 (기본 10%)
    holdYrs    :g('sl_holdYrs'),
    totalYrs   :g('sl_totalYrs'),
  };

  /* [데이터 레이어] 시트 기본값 참조 (원본 불변) */
  const sd=window._irrSheetData;
  if(!sd){box.style.display='block';box.innerHTML=irrErrBox('필수 시트 컬럼 누락 — 시트 데이터를 먼저 로드해주세요');return;}

  const av=(r,i)=>i>=0?parseAmt(r[i]):0;
  const sv=(r,i)=>i>=0?(r[i]||''):'';

  /* 두 필지 합산 ─────────────────────────────────────────────────
     구조B(행=항목, 열=필지): _irrSheetData에 직접값 저장됨 → 우선 사용
     구조A(행=필지, 열=속성): 컬럼 인덱스로 계산 (기존 방식)
  ─────────────────────────────────────────────────────────────── */
  let totalBuy=0,totalLoan=0,totalDep=0,totalRent=0,totalArea=0,totalLandVal=0;

  if(sd._isStructureB){
    /* 구조B: renderIRR에서 미리 계산한 합산값 직접 사용 */
    totalBuy    =sd._totalBuy    ||0;
    totalLoan   =sd._totalLoan   ||0;
    totalDep    =sd._totalDep    ||0;
    totalRent   =sd._totalRent   ||0;
    totalArea   =sd._totalAreaNum||0;
    totalLandVal=sd._totalLandVal||0;
  }else{
    /* 구조A: 컬럼 인덱스 기반 계산 (기존 방식) */
    sd.groups.forEach((g)=>{
      g.rows.forEach(r=>{
        totalBuy   +=av(r,sd.buyPriceIdx);
        totalLoan  +=av(r,sd.loanIdx);
        totalDep   +=av(r,sd.depositIdx);
        totalRent  +=av(r,sd.rentIdx);
        const a=parseFloat(String(sv(r,sd.areaIdx)).replace(/[^0-9.]/g,''))||0;
        totalArea  +=a;
        const lp=av(r,sd.landPrIdx),lt=av(r,sd.landTotIdx);
        totalLandVal+=lt||(lp*a);
      });
    });
  }

  /* 데이터 충분성 검사 */
  const missing=[];
  if(!totalBuy)  missing.push('매입가(시트)');
  if(!totalArea) missing.push('면적(시트)');
  if(missing.length){
    box.style.display='block';
    box.innerHTML=irrErrBox('계산용 값 부족 — 시트에 다음 컬럼을 확인하세요: '+missing.join(', ')+'<br><small>F12 콘솔 → [IRR 시트 구조] 로그를 확인하세요</small>');
    return;
  }

  /* ── [계산 레이어] ──────────────────────────────────────
     현금흐름 배열 구성:
       t=0: 초기 투자 (음수)
       t=1~holdYrs: 임대 보유 기간 연간 현금흐름
       t=holdYrs+1~holdYrs+constMo/12: 공사기간 (임대 없음, 신축비 발생)
       t=holdYrs+constMo/12~totalYrs: 신축 후 임대 현금흐름 + 종료가치
  ─────────────────────────────────────────────────────── */

  const constYrs=S.constMo/12;
  const newLeasYrs=S.totalYrs-S.holdYrs-constYrs;

  /* 취득세 */
  const acqTaxAmt=totalBuy*S.acqTax;

  /* 초기 자기자본 투자 = 매입가 − 대출 − 보증금 + 취득세 */
  const equity=totalBuy-totalLoan-totalDep+acqTaxAmt;
  if(equity<=0){
    box.style.display='block';
    box.innerHTML=irrErrBox('출구가정 부족 — 자기자본이 0 이하입니다. 대출·보증금을 확인하세요');
    return;
  }

  /* 연간 이자 비용 (두 필지 평균 금리 단순화) */
  const avgRate=(S.rateA+S.rateB)/2;
  const annualInterest=totalLoan*avgRate;

  /* 임대 보유 기간 연간 순현금흐름 */
  const cfHold=[];
  for(let yr=1;yr<=S.holdYrs;yr++){
    const rentInc=totalRent*12*Math.pow(1+S.rentUp,yr-1)*(1-S.vacancy);
    const cf=rentInc-annualInterest;
    cfHold.push(cf);
  }

  /* 신축 비용 (면적 × 시공비 + 설계·감리) */
  const constTotalCost=totalArea*S.constCost+S.designCost;
  const pfLoan=constTotalCost*S.pfRatio;
  const equityConst=constTotalCost-pfLoan;  /* 신축 자기자본 */

  /* 공사기간 중 현금흐름 (임대 없음, 신축 자기자본 투입) */
  /* 단순화: 공사기간을 1개 현금흐름 시점으로 처리 */
  const cfConst=-(equityConst);

  /* 신축 후 임대 연간 현금흐름 — newVacancy(신축 공실률) 별도 반영 */
  const newAnnualInterest=pfLoan*S.pfRate;
  const cfNew=[];
  for(let yr=1;yr<=Math.max(1,Math.round(newLeasYrs));yr++){
    /* 신축 임대: newRent에 신축 공실률(newVacancy) 적용 */
    const rentInc=S.newRent*12*Math.pow(1+S.rentUp,yr-1)*(1-S.newVacancy);
    const cf=rentInc-newAnnualInterest;
    cfNew.push(cf);
  }

  /* 종료 가치 (토지 현재가치 × 시세상승 × 신축가치배수) */
  const exitLandVal=totalLandVal||totalBuy;
  const exitVal=exitLandVal*Math.pow(1+S.priceUp,S.totalYrs)*S.valueMult;
  /* 신축대출 상환 후 잔여 */
  const exitNet=exitVal-pfLoan+S.newDep;  /* 신축 보증금 회수 */

  /* 현금흐름 배열 조립 (연 단위, 정수 연도로 단순화) */
  const cashflows=[-equity];
  cfHold.forEach(v=>cashflows.push(v));
  cashflows.push(cfConst);
  cfNew.forEach(v=>cashflows.push(v));
  /* 마지막 연도에 종료가치 추가 */
  cashflows[cashflows.length-1]=(cashflows[cashflows.length-1]||0)+exitNet;

  /* Newton-Raphson IRR 계산 */
  function calcIRR(cfs,guess=0.1,iter=200,tol=1e-8){
    let r=guess;
    for(let i=0;i<iter;i++){
      let npv=0,dnpv=0;
      cfs.forEach((c,t)=>{
        const d=Math.pow(1+r,t);
        npv+=c/d;
        dnpv-=t*c/Math.pow(1+r,t+1);
      });
      if(Math.abs(dnpv)<1e-10)break;
      const r2=r-npv/dnpv;
      if(Math.abs(r2-r)<tol)return r2;
      r=r2;
    }
    return r;
  }

  let irr=null,irrErr='';
  try{
    irr=calcIRR(cashflows);
    if(isNaN(irr)||!isFinite(irr))throw new Error('수렴 실패');
  }catch(e){irrErr='운영기간 데이터 부족 — 현금흐름이 수렴하지 않습니다';}

  /* 누적 임대수익 */
  const cumRent=cfHold.reduce((a,b)=>a+b,0)+cfNew.reduce((a,b)=>a+b,0);
  const totalInvest=equity+equityConst;
  const totalCost=constTotalCost+acqTaxAmt+annualInterest*S.holdYrs+newAnnualInterest*Math.max(1,Math.round(newLeasYrs));
  const netProfit=exitNet+cumRent-totalInvest;

  /* 단순 회수기간 (Payback) */
  let payback=null,cumCF=0;
  for(let i=0;i<cashflows.length;i++){
    cumCF+=cashflows[i];
    if(cumCF>=0&&payback===null)payback=i;
  }

  /* ── 결과 표시 ── */
  box.style.display='block';
  const irrColor=irr&&irr>0?'var(--green)':irr&&irr<0?'var(--red)':'var(--t3)';

  box.innerHTML=`
  <div class="irr-result-card">
    <div class="irr-res-head">
      <div style="font-size:13px;font-weight:600;color:var(--t1)">📊 IRR 시뮬레이션 결과</div>
      <div style="font-size:10px;color:var(--t3)">시트 원본 + 계산기 조정값 기준</div>
    </div>
    <div class="irr-res-body">
      ${irrErr?`<div class="irr-res-warn">⚠️ ${irrErr}</div>`:''}
      <div class="irr-res-big">
        <div class="irr-res-big-lbl">예상 IRR</div>
        <div class="irr-res-big-num" style="color:${irrColor}">${irr?((irr*100).toFixed(2)+'%'):'계산 불가'}</div>
        <div style="font-size:11px;color:var(--t3);margin-top:4px">분석 기간 ${S.totalYrs}년 기준</div>
      </div>
      <div class="irr-res-grid">
        ${resRow('총 자기자본 투자',fmtBig(totalInvest)+'원','red')}
        ${resRow('└ 매입 자기자본',fmtBig(equity)+'원','red')}
        ${resRow('└ 취득세',fmtBig(acqTaxAmt)+'원 ('+((S.acqTax*100).toFixed(1))+'%)','yellow')}
        ${resRow('└ 신축 자기자본',fmtBig(equityConst)+'원','red')}
        ${resRow('신축 PF 대출',fmtBig(pfLoan)+'원','blue')}
        ${resRow('예상 종료가치',fmtBig(exitVal)+'원','green')}
        ${resRow('누적 임대수익',fmtBig(Math.max(0,cumRent))+'원','green')}
        ${resRow('총 비용(추정)',fmtBig(totalCost)+'원','yellow')}
        ${resRow('순 수익(추정)',fmtBig(netProfit)+'원',netProfit>=0?'green':'red')}
        ${payback!==null?resRow('회수기간 참고',payback+'년차'):''}
      </div>
      <div class="irr-res-assumptions">
        <div style="font-size:10px;color:var(--t3);margin-bottom:6px;font-weight:600;letter-spacing:.5px">사용된 주요 가정</div>
        <div class="irr-assum-tags">
          <span>시세상승 ${(S.priceUp*100).toFixed(1)}%/년</span>
          <span>임대인상 ${(S.rentUp*100).toFixed(1)}%/년</span>
          <span>임대보유 공실 ${(S.vacancy*100).toFixed(0)}%</span>
          <span>신축 후 공실 ${(S.newVacancy*100).toFixed(0)}%</span>
          <span>취득세 ${(S.acqTax*100).toFixed(1)}%</span>
          <span>평균금리 ${(avgRate*100).toFixed(1)}%</span>
          <span>시공비 ${(S.constCost/10000).toFixed(0)}만/㎡</span>
          <span>가치배수 ${S.valueMult.toFixed(1)}x</span>
          <span>PF ${(S.pfRatio*100).toFixed(0)}%</span>
          <span>임대보유 ${S.holdYrs}년</span>
        </div>
      </div>
    </div>
  </div>`;
}

/* 결과 행 빌더 */
function resRow(lbl,val,color){
  const c={red:'var(--red)',green:'var(--green)',blue:'var(--blue)',yellow:'var(--yellow)'}[color]||'var(--t1)';
  return`<div class="irr-res-row"><span class="irr-res-key">${lbl}</span><span class="irr-res-val" style="color:${c}">${val}</span></div>`;
}
/* 에러 박스 */
function irrErrBox(msg){
  return`<div class="irr-res-card" style="border-color:rgba(240,56,96,.25)">
    <div class="irr-res-body"><div class="irr-res-warn">⚠️ ${msg}</div></div></div>`;
}

/* ════════════════════════════════════════════════════════════
   3. LEASE — 표 기반 · 건물별 그룹화
   ★ 구글 시트 데이터 100% 실시간 반영 / 하드코딩 없음
════════════════════════════════════════════════════════════ */
function renderLease(rows){
  const sec=document.getElementById('sec-lease');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}
  const hi=findHdrRow(rows);
  const hdr=rows[hi];
  const data=rows.slice(hi+1).filter(r=>r.some(c=>c));

  /* 컬럼 자동 탐색 */
  const addrIdx    =hdr.findIndex(h=>/주소|소재지|위치|물건|건물|부동산/i.test(h));
  const floorIdx   =hdr.findIndex(h=>/층|floor/i.test(h));
  const nameIdx    =hdr.findIndex(h=>/임차인|사용자|회사|성명|이름|name|tenant/i.test(h));
  const rentIdx    =hdr.findIndex(h=>/월세|월임대료|임대료(?!보)/i.test(h));
  const depositIdx =hdr.findIndex(h=>/보증금|deposit/i.test(h));
  const mgmtIdx    =hdr.findIndex(h=>/관리비|관리료|maintenance/i.test(h));
  const landRentIdx=hdr.findIndex(h=>/토지임대료|토지료|지대/i.test(h));
  const statusIdx  =hdr.findIndex(h=>/상태|계약상태|현황|status/i.test(h));
  const startIdx   =hdr.findIndex(h=>/시작|계약시작|임대시작|from|start/i.test(h));
  const endIdx     =hdr.findIndex(h=>/종료|만료|계약종료|to|end/i.test(h));
  const areaIdx    =hdr.findIndex(h=>/면적|평수|㎡|평/i.test(h));
  const useIdx     =hdr.findIndex(h=>/용도|업종|업무/i.test(h));

  function amt(r,idx){return idx>=0?parseAmt(r[idx]):0;}
  function str(r,idx){return idx>=0?(r[idx]||''):'';} 

  function expBadge(r){
    const stTxt=str(r,statusIdx).trim();
    if(stTxt){
      if(/만료|종료|해지/i.test(stTxt))return`<span class="exp-badge exp-done">${stTxt}</span>`;
      if(/예정|임박|주의/i.test(stTxt))return`<span class="exp-badge exp-near">${stTxt}</span>`;
      if(/유효|활성|계약중|진행/i.test(stTxt))return`<span class="exp-badge exp-ok">${stTxt}</span>`;
    }
    const endTxt=str(r,endIdx).trim();
    if(!endTxt)return`<span class="exp-badge exp-none">—</span>`;
    const m=endTxt.match(/(\d{4})/);
    if(!m)return`<span class="exp-badge exp-none">${endTxt}</span>`;
    const yr=parseInt(m[1]),diff=yr-new Date().getFullYear();
    if(diff<0) return`<span class="exp-badge exp-done">만료 (${yr})</span>`;
    if(diff===0)return`<span class="exp-badge exp-near">올해 만료</span>`;
    if(diff===1)return`<span class="exp-badge exp-warn">내년 만료 (${yr})</span>`;
    return`<span class="exp-badge exp-ok">${yr}</span>`;
  }
  function amtCell(v,cls){
    if(!v||v===0)return`<span class="amt-muted">—</span>`;
    return`<span class="${cls||''}">${fmtBig(v)}원</span>`;
  }

  /* 건물별 그룹화 */
  const groupMap=new Map();
  data.forEach(r=>{
    let addr=str(r,addrIdx).trim();
    if(!addr){
      const name=str(r,nameIdx),lrent=amt(r,landRentIdx),rent=amt(r,rentIdx);
      if(/토지/.test(name)||(lrent>0&&rent===0))addr='토지임대';
      else if(/디파이넘버|defynumber/i.test(name))addr='압구정로8길 3';
      else if(/블루피카/i.test(name)&&lrent===0)addr='압구정로8길 3';
      else addr='압구정로 112';
    }
    if(!groupMap.has(addr))groupMap.set(addr,[]);
    groupMap.get(addr).push(r);
  });

  /* 단일 블루 계열 — 투자 보고용 */
  const GRP_ACCENT='#4F7CFF';

  function groupSection(addr,gRows,colorIdx){
    const color=GRP_ACCENT;
    const sumRent=gRows.map(r=>amt(r,rentIdx)).reduce((a,b)=>a+b,0);
    const sumDep=gRows.map(r=>amt(r,depositIdx)).reduce((a,b)=>a+b,0);
    const sumMgmt=gRows.map(r=>amt(r,mgmtIdx)).reduce((a,b)=>a+b,0);
    const sumLrent=gRows.map(r=>amt(r,landRentIdx)).reduce((a,b)=>a+b,0);
    const sumMonth=sumRent+sumMgmt+sumLrent;
    const sumHTML=[
      sumRent?`<div class="ls-sum-item">월임대료 <strong class="green">${fmtBig(sumRent)}원</strong></div>`:'',
      sumLrent?`<div class="ls-sum-item">토지임대료 <strong class="purple">${fmtBig(sumLrent)}원</strong></div>`:'',
      sumDep?`<div class="ls-sum-item">보증금 <strong class="blue">${fmtBig(sumDep)}원</strong></div>`:'',
    ].filter(Boolean).join('');
    const tbody=gRows.map(r=>{
      const rent=amt(r,rentIdx),dep=amt(r,depositIdx),mgmt=amt(r,mgmtIdx),lrent=amt(r,landRentIdx);
      const monthly=rent+mgmt+lrent;
      return`<tr>
        <td class="name">${str(r,nameIdx)||'—'}</td>
        <td class="floor">${str(r,floorIdx)||'—'}</td>
        ${areaIdx>=0?`<td>${str(r,areaIdx)||'—'}</td>`:''}
        <td>${str(r,startIdx)||'—'}</td>
        <td>${str(r,endIdx)||'—'}</td>
        <td>${expBadge(r)}</td>
        <td class="r">${amtCell(dep,'amt-blue')}</td>
        <td class="r">${amtCell(rent,'amt-green')}</td>
        <td class="r">${amtCell(mgmt,'')}</td>
        <td class="r">${amtCell(lrent,'amt-purple')}</td>
        <td class="r">${monthly>0?`<span class="amt-total">${fmtBig(monthly)}원</span>`:`<span class="amt-muted">—</span>`}</td>
      </tr>`;
    }).join('');
    const colSpanBase=areaIdx>=0?6:5;
    const sumRow=`<tr class="sum-row">
      <td colspan="${colSpanBase}">합 계</td>
      <td class="r">${amtCell(sumDep,'amt-blue')}</td>
      <td class="r">${amtCell(sumRent,'amt-green')}</td>
      <td class="r">${amtCell(sumMgmt,'')}</td>
      <td class="r">${amtCell(sumLrent,'amt-purple')}</td>
      <td class="r">${sumMonth>0?`<span class="amt-total">${fmtBig(sumMonth)}원</span>`:`<span class="amt-muted">—</span>`}</td>
    </tr>`;
    /* 섹션 요약 카드 */
    const summaryItems=[
      sumRent?`<div class="ls-summary-item"><span class="ls-si-lbl">월 임대료</span><span class="ls-si-val green">${fmtBig(sumRent)}원</span></div>`:'',
      sumLrent?`<div class="ls-summary-item"><span class="ls-si-lbl">토지임대료</span><span class="ls-si-val purple">${fmtBig(sumLrent)}원</span></div>`:'',
      sumMgmt?`<div class="ls-summary-item"><span class="ls-si-lbl">관리비</span><span class="ls-si-val">${fmtBig(sumMgmt)}원</span></div>`:'',
      sumDep?`<div class="ls-summary-item"><span class="ls-si-lbl">보증금</span><span class="ls-si-val blue">${fmtBig(sumDep)}원</span></div>`:'',
      sumMonth?`<div class="ls-summary-item ls-si-total"><span class="ls-si-lbl">월 합계</span><span class="ls-si-val white">${fmtBig(sumMonth)}원</span></div>`:'',
    ].filter(Boolean).join('');
    return`<div class="ls-section">
      <div class="ls-group-head">
        <div class="ls-group-bar" style="background:${color}"></div>
        <div class="ls-group-title">${addr}</div>
        <div class="ls-group-meta">${gRows.length}건</div>
      </div>
      ${summaryItems?`<div class="ls-summary-row">${summaryItems}</div>`:''}
      <div class="ls-table-wrap"><div style="overflow-x:auto">
        <table class="ls-table">
          <thead><tr>
            <th>임차인</th><th>층</th>${areaIdx>=0?'<th>면적</th>':''}
            <th>계약 시작</th><th>계약 종료</th><th>만료 상태</th>
            <th class="r">보증금</th><th class="r">월 임대료</th>
            <th class="r">관리비</th><th class="r">토지임대료</th><th class="r">월 합계</th>
          </tr></thead>
          <tbody>${tbody}${sumRow}</tbody>
        </table>
      </div></div>
    </div>`;
  }

  const totalRent=data.map(r=>amt(r,rentIdx)).reduce((a,b)=>a+b,0);
  const totalLrent=data.map(r=>amt(r,landRentIdx)).reduce((a,b)=>a+b,0);
  let aC=0,eC=0,wC=0;
  data.forEach(r=>{
    const stTxt=str(r,statusIdx).trim(),endTxt=str(r,endIdx).trim();
    if(/만료|종료|해지/i.test(stTxt)){eC++;return;}
    if(/예정|임박|주의/i.test(stTxt)){wC++;return;}
    if(/유효|활성|계약중|진행/i.test(stTxt)){aC++;return;}
    if(endTxt){const m=endTxt.match(/(\d{4})/);
      if(m){const diff=parseInt(m[1])-new Date().getFullYear();
        if(diff<0){eC++;return;}if(diff<=1){wC++;return;}}aC++;}
  });
  /* 섹션 순서 고정 — 시트 데이터 기준, 합계·빈 그룹 제거 */
  const SECTION_ORDER=['압구정로112','압구정로8길3','토지임대료'];
  /* 합계·건물·빈값 등 무효 그룹 필터 */
  const INVALID_GROUP=/^합계$|^건물$|^\s*$/i;
  const validEntries=[...groupMap.entries()].filter(([a])=>!INVALID_GROUP.test(a));

  /* 고정 순서로 재배열: ORDER에 있는 것 먼저, 나머지 뒤에 */
  function normalizeAddr(a){return a.replace(/\s/g,'').replace(/[가-힣]/g,m=>m);}
  const ordered=[];
  SECTION_ORDER.forEach(key=>{
    const found=validEntries.find(([a])=>normalizeAddr(a).includes(normalizeAddr(key))||normalizeAddr(key).includes(normalizeAddr(a)));
    if(found&&!ordered.includes(found))ordered.push(found);
  });
  validEntries.forEach(e=>{if(!ordered.includes(e))ordered.push(e);});

  const sections=ordered.map(([a,r],i)=>groupSection(a,r,i)).join('');
  const totalDep=data.map(r=>amt(r,depositIdx)).reduce((a,b)=>a+b,0);
  const totalMonth=totalRent+data.map(r=>amt(r,mgmtIdx)).reduce((a,b)=>a+b,0)+totalLrent;
  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 임대차계약현황</div>
    <div class="kpi-row">
      <div class="kpi b"><div class="kpi-lbl">총 계약</div><div class="kpi-val">${data.length}</div><div class="kpi-sub">임대차 건수</div></div>
      ${aC?`<div class="kpi b"><div class="kpi-lbl">계약 유효</div><div class="kpi-val">${aC}</div><div class="kpi-sub">진행중</div></div>`:''}
      ${eC?`<div class="kpi b"><div class="kpi-lbl">만료·종료</div><div class="kpi-val">${eC}</div><div class="kpi-sub">종료</div></div>`:''}
      ${wC?`<div class="kpi b"><div class="kpi-lbl">주의</div><div class="kpi-val">${wC}</div><div class="kpi-sub">곧 만료</div></div>`:''}
      ${totalRent?`<div class="kpi b"><div class="kpi-lbl">월임대료 합계</div><div class="kpi-val">${fmtBig(totalRent)}원</div><div class="kpi-sub">전체 건물</div></div>`:''}
      ${totalLrent?`<div class="kpi b"><div class="kpi-lbl">토지임대료</div><div class="kpi-val">${fmtBig(totalLrent)}원</div><div class="kpi-sub">월 기준</div></div>`:''}
    </div>
    ${sections||`<div class="empty"><div class="empty-i">📭</div>임차인 데이터가 없습니다</div>`}`;
}

/* ════════════════════════════════════════════════════════════
   4. PERSONAL COST — 개인 Cash Flow 분석
   ★ 구글 시트 데이터 100% 실시간 반영
   ★ 수입/지출 요약 + 월별 상세 자동 계산
════════════════════════════════════════════════════════════ */
function renderPersonal(rows){
  const sec=document.getElementById('sec-personal');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}
  const hi=findHdrRow(rows);
  const hdr=rows[hi];
  const data=rows.slice(hi+1).filter(r=>r.some(c=>c));

  /* ══ [데이터 레이어] 컬럼 자동 탐색 ══════════════════════════════
     ★ 시트 컬럼명이 다양할 수 있으므로 광범위 패턴 적용
     ★ 수입/지출 구분: 구분 컬럼 우선 → 없으면 항목명 키워드로 추정
  ════════════════════════════════════════════════════════════════ */
  const itemIdx   =hdr.findIndex(h=>/항목|내용|구분명|name|item|내역/i.test(h));
  /* 구분 컬럼: "구분" 포함 광범위 패턴 */
  const typeIdx   =hdr.findIndex(h=>/구분|type|수입지출|분류|유형/i.test(h));
  /* 금액 컬럼: 월 금액 우선, 없으면 일반 금액 */
  const amtIdx    =hdr.findIndex(h=>/월.*금액|월액|월금|금액(?!합)|amount|monthly/i.test(h));
  /* 총액 컬럼 */
  const totalIdx  =hdr.findIndex(h=>/총액|총합계|total(?!.*type)|sum/i.test(h));
  /* 날짜 컬럼 */
  const startIdx  =hdr.findIndex(h=>/시작|start|from|계약시작|납부시작|수취시작/i.test(h));
  const endIdx    =hdr.findIndex(h=>/종료|end|to|만료|납부종료|수취종료/i.test(h));
  const periodIdx =hdr.findIndex(h=>/기간|period|개월수/i.test(h));
  const noteIdx   =hdr.findIndex(h=>/비고|메모|note|remark/i.test(h));
  const catIdx    =hdr.findIndex(h=>/카테고리|category|대분류/i.test(h));

  /* ══ 헬퍼 ══════════════════════════════════════════════════════ */
  function sv(r,idx){return idx>=0?(r[idx]||''):'';} 
  function av(r,idx){return idx>=0?parseAmt(r[idx]):0;}

  /* ── 금액 컬럼 자동 탐색 보완 (amtIdx 미탐지 시 행에서 직접 탐색) ── */
  function getBestAmt(r){
    if(amtIdx>=0){const v=av(r,amtIdx);if(v)return v;}
    for(let i=0;i<r.length;i++){
      if(i===typeIdx||i===startIdx||i===endIdx||i===periodIdx||i===noteIdx)continue;
      const v=parseAmt(r[i]);
      if(v>1000)return v;
    }
    return 0;
  }

  /* ══ [수입/지출 타입 판별] ══════════════════════════════════════
     우선순위: typeIdx → itemIdx → catIdx
     ★ 실제 시트 항목명 기반 키워드 확장
  ════════════════════════════════════════════════════════════════ */
  function getType(r){
    const t=(sv(r,typeIdx)||'').trim();
    const item=(sv(r,itemIdx)||sv(r,catIdx)||'').trim();
    const combined=(t+' '+item).toLowerCase();
    /* 수입 판별 */
    if(/수입|income|임대료|관리비수입|토지임대|이자수입|월세수입/.test(combined))return'in';
    /* 지출 판별 */
    if(/지출|expense|대출|고정비|비용|상환|납부|환급|세금|이자지출/.test(combined))return'out';
    /* itemIdx 단독 재판별 */
    if(/임대료|관리비|토지/.test(item.toLowerCase()))return'in';
    if(/대출|고정|비용|상환/.test(item.toLowerCase()))return'out';
    return'etc';
  }

  /* ══ [기간(개월) 추출] ════════════════════════════════════════ */
  function getPeriod(r){
    if(periodIdx>=0){
      const p=parseInt(String(sv(r,periodIdx)).replace(/[^0-9]/g,''));
      if(!isNaN(p)&&p>0)return p;
    }
    if(startIdx>=0&&endIdx>=0){
      const s=sv(r,startIdx).trim(),e=sv(r,endIdx).trim();
      const ms=s.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
      const me=e.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
      if(ms&&me){
        const diff=(parseInt(me[1])-parseInt(ms[1]))*12+(parseInt(me[2])-parseInt(ms[2]));
        if(diff>0)return diff+1;
      }
    }
    if(startIdx>=0){
      const s=sv(r,startIdx).trim();
      const ms=s.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
      if(ms)return 12-parseInt(ms[2])+1;
    }
    return 1;
  }

  /* ══ [총액 계산] ════════════════════════════════════════════ */
  function getTotal(r){
    if(totalIdx>=0){const t=av(r,totalIdx);if(t)return t;}
    const m=getBestAmt(r);
    const p=getPeriod(r);
    return m*p;
  }

  /* ══ 기간 범위 파악 (시트 데이터 기반 자동) ══ */
  let minYear=9999,maxYear=0;
  data.forEach(r=>{
    const sy=sv(r,startIdx).match(/(\d{4})/);
    const ey=sv(r,endIdx).match(/(\d{4})/);
    if(sy){const y=parseInt(sy[1]);if(y<minYear)minYear=y;if(y>maxYear)maxYear=y;}
    if(ey){const y=parseInt(ey[1]);if(y>maxYear)maxYear=y;}
  });
  if(minYear===9999||maxYear===0){minYear=new Date().getFullYear();maxYear=minYear+4;}
  maxYear=Math.min(maxYear,minYear+10);

  /* ══ [월별 판별] — 해당 연월에 발생 여부 ═══════════════════ */
  function inMonth(r,y,m){
    const sy=sv(r,startIdx).trim();
    const ey=sv(r,endIdx).trim();
    const msy=sy.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
    const mey=ey.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
    const cur=y*100+m;
    if(msy&&mey){
      const s=parseInt(msy[1])*100+parseInt(msy[2]);
      const e=parseInt(mey[1])*100+parseInt(mey[2]);
      return cur>=s&&cur<=e;
    }
    if(msy){
      const s=parseInt(msy[1])*100+parseInt(msy[2]);
      const sTotal=parseInt(msy[1])*12+parseInt(msy[2])-1;
      const p=getPeriod(r);
      const eTotal=sTotal+p-1;
      const eYear=Math.floor(eTotal/12);
      const eMon=(eTotal%12)+1;
      return cur>=s&&cur<=eYear*100+eMon;
    }
    const p=parseInt(String(sv(r,periodIdx)||'').replace(/[^0-9]/g,''));
    if(!isNaN(p)&&p>0&&y===minYear)return true;
    return false;
  }

  /* ══ 행 분류 ══ */
  const incomeRows =data.filter(r=>getType(r)==='in');
  const expenseRows=data.filter(r=>getType(r)==='out');
  const etcRows    =data.filter(r=>getType(r)==='etc');

  /* ══ 월별 금액 계산 ══ */
  function monthAmt(rowList,y,m){
    return rowList.reduce((sum,r)=>{
      if(!inMonth(r,y,m))return sum;
      const mv=getBestAmt(r);
      if(mv>0)return sum+mv;
      const tot=getTotal(r),per=getPeriod(r);
      return sum+(per>0?tot/per:tot);
    },0);
  }

  /* ══ 월별 배열 계산 ══ */
  const months=[];
  for(let y=minYear;y<=maxYear;y++)
    for(let m=1;m<=12;m++)months.push({y,m});

  let cumInc=0,cumExp=0;
  const incMonthData=[],expMonthData=[];
  const incYrTotals={};
  months.forEach(({y,m})=>{
    const vi=monthAmt(incomeRows,y,m);
    const ve=monthAmt(expenseRows,y,m);
    cumInc+=vi;cumExp+=ve;
    if(vi>0){if(!incYrTotals[y])incYrTotals[y]=0;incYrTotals[y]+=vi;}
    incMonthData.push({y,m,v:vi,cum:cumInc});
    expMonthData.push({y,m,v:ve,cum:cumExp});
  });

  /* ══ 총합 ══ */
  const totalIncome =incomeRows.reduce((a,r)=>a+getTotal(r),0);
  const totalExpense=expenseRows.reduce((a,r)=>a+getTotal(r),0);
  const netCF=totalIncome-totalExpense;

  /* ══ [KPI] 단색 통일 — 블루 계열 ══════════════════════════ */
  const kpiHTML=`<div class="kpi-row">
    <div class="kpi b"><div class="kpi-lbl">총 수입</div>
      <div class="kpi-val" style="color:var(--green)">${fmtBig(totalIncome)}원</div>
      <div class="kpi-sub">${incomeRows.length}건</div></div>
    <div class="kpi b"><div class="kpi-lbl">총 지출</div>
      <div class="kpi-val" style="color:var(--red)">${fmtBig(totalExpense)}원</div>
      <div class="kpi-sub">${expenseRows.length}건</div></div>
    <div class="kpi b"><div class="kpi-lbl">순 현금흐름</div>
      <div class="kpi-val" style="color:${netCF>=0?'var(--blue)':'var(--red)'}">${netCF>=0?'+':''}${fmtBig(netCF)}원</div>
      <div class="kpi-sub">수입 − 지출</div></div>
    <div class="kpi b"><div class="kpi-lbl">총 항목</div>
      <div class="kpi-val">${data.length}</div>
      <div class="kpi-sub">전체 (수입 ${incomeRows.length} · 지출 ${expenseRows.length}${etcRows.length?` · 미분류 ${etcRows.length}`:''})</div></div>
  </div>`;

  /* ══ [섹션 1] 수입·지출 요약 테이블 ═══════════════════════ */
  function summaryRow(r,type){
    const item=sv(r,itemIdx)||sv(r,catIdx)||'(항목없음)';
    const note=sv(r,noteIdx);
    const period=getPeriod(r);
    const monthly=getBestAmt(r);
    const total=getTotal(r);
    const s=sv(r,startIdx),e=sv(r,endIdx);
    const periodStr=s&&e?`${s} ~ ${e}`:period>1?`${period}개월`:'—';
    const badge=type==='in'
      ?`<span class="type-badge type-in">수입</span>`
      :type==='out'?`<span class="type-badge type-out">지출</span>`
      :`<span class="type-badge type-etc">기타</span>`;
    const amtCls=type==='in'?'inc':type==='out'?'exp':'neu';
    return`<tr class="${type==='in'?'income-row':type==='out'?'expense-row':''}">
      <td class="label">${item}${note?`<span style="color:var(--t4);font-size:10px;margin-left:6px">${note}</span>`:''}</td>
      <td>${badge}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--t3)">${periodStr}</td>
      <td class="r">${monthly?`<span class="${amtCls}">${fmtBig(monthly)}원</span>`:`<span class="dim">—</span>`}</td>
      <td class="r"><span class="${amtCls}" style="font-weight:600">${total?fmtBig(total)+'원':'—'}</span></td>
    </tr>`;
  }

  const summaryHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:#4F7CFF"></div>
      <div class="cf-section-title">수입 · 지출 요약</div>
      <div class="cf-section-sub">${data.length}건</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>항목</th><th>구분</th><th>기간</th>
          <th class="r">월 금액</th><th class="r">총 금액</th>
        </tr></thead>
        <tbody>
          ${incomeRows.length
            ?`<tr class="yr-group"><td colspan="5">▸ 수입 항목</td></tr>
              ${incomeRows.map(r=>summaryRow(r,'in')).join('')}
              <tr class="subtotal-row"><td colspan="4">소계 — 수입</td>
                <td class="r"><span class="inc">${fmtBig(totalIncome)}원</span></td></tr>`
            :'<tr><td colspan="5" style="text-align:center;padding:16px;color:var(--t4)">수입 항목 없음 — 시트 "구분" 컬럼을 확인하세요</td></tr>'}
          ${expenseRows.length
            ?`<tr class="yr-group"><td colspan="5">▸ 지출 항목</td></tr>
              ${expenseRows.map(r=>summaryRow(r,'out')).join('')}
              <tr class="subtotal-row"><td colspan="4">소계 — 지출</td>
                <td class="r"><span class="exp">${fmtBig(totalExpense)}원</span></td></tr>`
            :''}
          ${etcRows.length
            ?`<tr class="yr-group"><td colspan="5">▸ 미분류 항목 (시트 구분 컬럼 확인 필요)</td></tr>
              ${etcRows.map(r=>summaryRow(r,'etc')).join('')}`
            :''}
          <tr class="net-row">
            <td colspan="4" style="font-size:13px">순 현금흐름 (수입 − 지출)</td>
            <td class="r" style="font-size:14px;font-weight:700;color:${netCF>=0?'var(--blue)':'var(--red)'}">
              ${netCF>=0?'+':''}${fmtBig(netCF)}원
            </td>
          </tr>
        </tbody>
      </table>
    </div></div>
  </div>`;

  /* ══ [섹션 2/3] 월별 상세 테이블 빌더 ════════════════════ */
  function buildMonthTable(mRows,type){
    if(!mRows.length)return`<tr><td colspan="3" style="text-align:center;padding:30px;color:var(--t4)">
      해당 기간 데이터 없음 — 시트에 시작일/종료일 또는 기간 컬럼을 확인하세요</td></tr>`;
    const amtCls=type==='in'?'inc':'exp';
    let html='',lastY=null,curYrSum=0;
    mRows.forEach(({y,m,v,cum})=>{
      if(y!==lastY){
        if(lastY!==null&&curYrSum>0)
          html+=`<tr class="yr-total">
            <td>${lastY}년 소계</td>
            <td class="r"><span class="${amtCls}">${fmtBig(curYrSum)}원</span></td>
            <td class="r"></td></tr>`;
        html+=`<tr class="yr-group"><td colspan="3">${y}년</td></tr>`;
        lastY=y;curYrSum=0;
      }
      curYrSum+=v;
      html+=`<tr>
        <td class="ym">${y}.${String(m).padStart(2,'0')}</td>
        <td class="r">${v>0?`<span class="${amtCls}">${fmtBig(v)}원</span>`:`<span class="dim">—</span>`}</td>
        <td class="r">${cum>0?`<span class="neu">${fmtBig(cum)}원</span>`:`<span class="dim">—</span>`}</td>
      </tr>`;
    });
    if(lastY&&curYrSum>0)
      html+=`<tr class="yr-total">
        <td>${lastY}년 소계</td>
        <td class="r"><span class="${amtCls}">${fmtBig(curYrSum)}원</span></td>
        <td class="r"></td></tr>`;
    return html;
  }

  const incFiltered=incMonthData.filter(r=>r.v>0);
  const expFiltered=expMonthData.filter(r=>r.v>0);

  const incMonthHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:var(--green)"></div>
      <div class="cf-section-title">수입 월별 상세</div>
      <div class="cf-section-sub">총 ${fmtBig(cumInc)}원</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>연월</th><th class="r">월 수입</th><th class="r">누적 수입</th>
        </tr></thead>
        <tbody>${buildMonthTable(incFiltered,'in')}</tbody>
      </table>
    </div></div>
  </div>`;

  const expMonthHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:var(--red)"></div>
      <div class="cf-section-title">지출 월별 상세</div>
      <div class="cf-section-sub">총 ${fmtBig(cumExp)}원</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>연월</th><th class="r">월 지출</th><th class="r">누적 지출</th>
        </tr></thead>
        <tbody>${buildMonthTable(expFiltered,'out')}</tbody>
      </table>
    </div></div>
  </div>`;

  /* ══ 분류 안내 (미분류 항목이 있을 때만 표시) ══ */
  const classifyNote=etcRows.length>0
    ?`<div class="notice" style="background:rgba(245,188,48,.06);border-color:rgba(245,188,48,.2);color:var(--yellow)">
        ⚠️ ${etcRows.length}건이 수입/지출로 분류되지 않았습니다.
        시트의 "구분" 컬럼 값에 <strong>수입</strong> 또는 <strong>지출</strong>이 포함되어야 합니다.
        <button onclick="var b=document.getElementById('personal-raw');b.style.display=b.style.display==='none'?'block':'none'"
          style="margin-left:10px;background:var(--s3);border:1px solid var(--border2);color:var(--t2);padding:2px 10px;border-radius:4px;cursor:pointer;font-size:11px">
          원본 데이터 확인
        </button>
      </div>`
    :'';

  /* ══ [원본 데이터] 기본 숨김 — 접기/펼치기 ══ */
  CACHE['personal_cfn']=null;
  initTS('personal');TS['personal']={search:'',sortCol:-1,sortAsc:true,page:1};

  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 개인비용 Cash Flow</div>
    ${classifyNote}
    ${kpiHTML}
    ${summaryHTML}
    ${incMonthHTML}
    ${expMonthHTML}
    <div class="cf-section" style="margin-bottom:0">
      <div class="cf-section-head" style="cursor:pointer;user-select:none"
        onclick="var b=document.getElementById('personal-raw');b.style.display=b.style.display==='none'?'block':'none';this.querySelector('.raw-toggle').textContent=b.style.display==='none'?'▶ 펼치기':'▼ 접기'">
        <div class="cf-section-bar" style="background:var(--t4)"></div>
        <div class="cf-section-title" style="color:var(--t3)">원본 데이터
          <span class="raw-toggle" style="font-size:11px;font-weight:400;color:var(--t4);margin-left:6px">▶ 펼치기</span>
        </div>
        <div class="cf-section-sub">${data.length}건 · 클릭하여 열기</div>
      </div>
      <div id="personal-raw" style="display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r)">
        <div id="personal-tbl"></div>
      </div>
    </div>`;
  drawTable('personal',rows,'personal-tbl');
}
/* ════════════════════════════════════════════════════════════
   5. CORP — 법인비용 Cash Flow
   ★ 구글 시트 데이터 100% 실시간 반영 / 하드코딩 없음
   ★ 개인비용 탭과 동일한 UX 구조 (KPI + 요약 + 월별 상세)
════════════════════════════════════════════════════════════ */
function renderCost(k,rows){
  /* personal 은 renderPersonal 로 분기 */
  if(k==='personal'){renderPersonal(rows);return;}
  /* corp 는 renderCorp 로 분기 */
  if(k==='corp'){renderCorp(rows);return;}

  /* 그 외 탭 — 기존 범용 로직 유지 */
  const sec=document.getElementById(`sec-${k}`);
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}
  const hi=findHdrRow(rows);const hdr=rows[hi];const data=rows.slice(hi+1).filter(r=>r.some(c=>c));
  const pc=hdr.map((h,i)=>({h,i})).filter(({h})=>/금액|비용|합계|총액|cost|amount|total/i.test(h));
  const nc=(pc.length?pc:numCols(hdr,data)).slice(0,4);
  const cards=nc.map((c,i)=>{
    const vals=data.map(r=>parseFloat((r[c.i]||'').replace(/[,\s₩원]/g,''))).filter(x=>!isNaN(x));
    if(!vals.length)return'';
    const s=vals.reduce((a,b)=>a+b,0),avg=s/vals.length;
    return`<div class="kpi b"><div class="kpi-lbl">${c.h}</div><div class="kpi-val">${fmtBig(s)}</div><div class="kpi-sub">평균 ${fmtBig(avg)} · ${vals.length}건</div></div>`;
  }).filter(Boolean).join('');
  CACHE[k+'_cfn']=null;initTS(k);TS[k]={search:'',sortCol:-1,sortAsc:true,page:1};
  sec.innerHTML=`<div class="notice">📡 구글 시트 실시간 연동 · ${TABS[k].label}</div>${cards?`<div class="kpi-row">${cards}</div>`:''}<div id="${k}-tbl"></div>`;
  drawTable(k,rows,`${k}-tbl`);
}

/* ════════════════════════════════════════════════════════════
   renderCorp — 법인비용 Cash Flow 전용 렌더러
   ★ 시트 컬럼 자동 탐색 (하드코딩 없음)
   ★ 납부방법(매월/n회 분할/일시) 반영
   ★ 카테고리별 요약 + 월별 상세
════════════════════════════════════════════════════════════ */
function renderCorp(rows){
  const sec=document.getElementById('sec-corp');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}
  const hi=findHdrRow(rows);
  const hdr=rows[hi];
  const data=rows.slice(hi+1).filter(r=>r.some(c=>c));

  /* ══ [데이터 레이어] 컬럼 자동 탐색 ════════════════════════
     ★ 시트 컬럼명이 다양할 수 있으므로 광범위 패턴 사용
     ★ 절대 하드코딩 없음 — 시트 헤더 기반으로만 탐색
  ════════════════════════════════════════════════════════════ */
  const itemIdx  =hdr.findIndex(h=>/항목|내용|내역|name|item|비목/i.test(h));
  const catIdx   =hdr.findIndex(h=>/카테고리|category|구분|분류|대분류|유형/i.test(h));
  const amtIdx   =hdr.findIndex(h=>/금액(?!합)|월금액|단가|amount|cost(?!total)/i.test(h));
  const totalIdx =hdr.findIndex(h=>/총액|합계|total|sum|총계/i.test(h));
  const startIdx =hdr.findIndex(h=>/시작|start|from|착공|착수|계약시작/i.test(h));
  const endIdx   =hdr.findIndex(h=>/종료|end|to|완료|계약종료|납부종료/i.test(h));
  const periodIdx=hdr.findIndex(h=>/기간|period|개월|months/i.test(h));
  const methodIdx=hdr.findIndex(h=>/납부.*방법|지급.*방법|방법|payment|분할|schedule/i.test(h));
  const countIdx =hdr.findIndex(h=>/횟수|회차|분할수|count|times/i.test(h));
  const noteIdx  =hdr.findIndex(h=>/비고|메모|note|remark/i.test(h));
  const stageIdx =hdr.findIndex(h=>/단계|phase|stage|공정/i.test(h));

  /* ══ 헬퍼 ════════════════════════════════════════════════ */
  function sv(r,i){return i>=0?(r[i]||''):'';} 
  function av(r,i){return i>=0?parseAmt(r[i]):0;}

  /* 금액 자동 탐색 보완 */
  function getBestAmt(r){
    if(amtIdx>=0){const v=av(r,amtIdx);if(v)return v;}
    if(totalIdx>=0){const v=av(r,totalIdx);if(v)return v;}
    for(let i=0;i<r.length;i++){
      if([catIdx,itemIdx,startIdx,endIdx,periodIdx,methodIdx,stageIdx,noteIdx].includes(i))continue;
      const v=parseAmt(r[i]);
      if(v>1000)return v;
    }
    return 0;
  }

  /* ══ [카테고리] 탐색 — 컬럼 없으면 항목명으로 추정 ══════ */
  function getCat(r){
    const c=(sv(r,catIdx)||sv(r,itemIdx)||'').trim();
    if(!c)return '기타';
    /* 주요 법인비용 카테고리 정규화 */
    if(/설계/.test(c))return '설계비';
    if(/감리/.test(c))return '감리비';
    if(/공사|시공|건축|인테리어/.test(c))return '공사비';
    if(/토지.*임대|토지료|지대/.test(c))return '토지임대료';
    if(/대출|이자|금융/.test(c))return '금융비용';
    if(/세금|취득|등록|인지/.test(c))return '세금·공과금';
    return c; /* 시트 원본값 그대로 사용 */
  }

  /* ══ [납부 기간/방법] 분석 ════════════════════════════════
     납부방법 컬럼 → 매월/n회 분할/일시 판별
  ════════════════════════════════════════════════════════════ */
  function getPayMethod(r){
    const m=(sv(r,methodIdx)||'').trim().toLowerCase();
    if(/매월|monthly|month|월납/.test(m))return'monthly';
    const n=parseInt(m.replace(/[^0-9]/g,''));
    if(!isNaN(n)&&n>1)return{type:'installment',count:n};
    if(/일시|lump|once|전액/.test(m))return'lump';
    /* countIdx 컬럼으로 판별 */
    if(countIdx>=0){
      const cnt=parseInt(String(sv(r,countIdx)).replace(/[^0-9]/g,''));
      if(!isNaN(cnt)&&cnt>1)return{type:'installment',count:cnt};
      if(cnt===1)return'lump';
    }
    return'monthly'; /* 기본값: 매월 */
  }

  /* ══ [기간(개월)] ══════════════════════════════════════════ */
  function getPeriod(r){
    if(periodIdx>=0){
      const p=parseInt(String(sv(r,periodIdx)).replace(/[^0-9]/g,''));
      if(!isNaN(p)&&p>0)return p;
    }
    if(startIdx>=0&&endIdx>=0){
      const s=sv(r,startIdx).trim(),e=sv(r,endIdx).trim();
      const ms=s.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
      const me=e.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
      if(ms&&me){
        const diff=(parseInt(me[1])-parseInt(ms[1]))*12+(parseInt(me[2])-parseInt(ms[2]));
        if(diff>0)return diff+1;
      }
    }
    if(startIdx>=0){
      const s=sv(r,startIdx).trim();
      const ms=s.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
      if(ms)return 12-parseInt(ms[2])+1;
    }
    return 1;
  }

  /* ══ [총액] ════════════════════════════════════════════════ */
  function getTotal(r){
    if(totalIdx>=0){const t=av(r,totalIdx);if(t)return t;}
    const m=getBestAmt(r),p=getPeriod(r);
    return m&&p?m*p:m;
  }

  /* ══ [시작/종료 파싱] ══════════════════════════════════════ */
  function getDateRange(r){
    const s=sv(r,startIdx).trim();
    const e=sv(r,endIdx).trim();
    const ms=s.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
    const me=e.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
    return{
      hasStart:!!ms,
      hasEnd:!!me,
      sy:ms?parseInt(ms[1]):0,sm:ms?parseInt(ms[2]):1,
      ey:me?parseInt(me[1]):0,em:me?parseInt(me[2]):12,
    };
  }

  /* ══ 기간 범위 파악 (시트 데이터 기반 자동) ═════════════ */
  let minYear=9999,maxYear=0;
  data.forEach(r=>{
    const dr=getDateRange(r);
    if(dr.hasStart){
      if(dr.sy<minYear)minYear=dr.sy;
      if(dr.sy>maxYear)maxYear=dr.sy;
    }
    if(dr.hasEnd&&dr.ey>maxYear)maxYear=dr.ey;
  });
  if(minYear===9999||maxYear===0){minYear=new Date().getFullYear();maxYear=minYear+5;}
  maxYear=Math.min(maxYear,minYear+10);

  /* ══ 월별 배열 ════════════════════════════════════════════ */
  const months=[];
  for(let y=minYear;y<=maxYear;y++)
    for(let m=1;m<=12;m++)months.push({y,m});

  /* ══ [월별 배분 계산] ══════════════════════════════════════
     납부방법에 따라 각 월에 얼마가 배분되는지 계산
  ════════════════════════════════════════════════════════════ */
  function amtInMonth(r,y,m){
    const dr=getDateRange(r);
    const total=getTotal(r);
    const period=getPeriod(r);
    const method=getPayMethod(r);
    const cur=y*100+m;

    /* 시작~종료 범위 계산 */
    let startYM=dr.hasStart?dr.sy*100+dr.sm:minYear*100+1;
    let endYM;
    if(dr.hasEnd){
      endYM=dr.ey*100+dr.em;
    } else {
      /* 기간으로 계산 */
      const totalMo=dr.sy*12+dr.sm-1+period-1;
      endYM=Math.floor(totalMo/12)*100+(totalMo%12+1);
      if(!dr.hasStart){startYM=minYear*100+1;endYM=startYM+period-1;}
    }

    /* 납부방법별 분배 */
    if(method==='lump'){
      /* 일시납: 시작월에만 100% */
      return cur===startYM?total:0;
    }
    if(typeof method==='object'&&method.type==='installment'){
      /* n회 분할: 시작월부터 n개월에 균등 분배 */
      const cnt=method.count;
      const perPay=total/cnt;
      /* 분할 납부 월 계산 */
      const totalMonths=dr.sy*12+dr.sm-1; // 0-based
      for(let i=0;i<cnt;i++){
        const pmTotal=totalMonths+i;
        const py=Math.floor(pmTotal/12),pm=(pmTotal%12)+1;
        if(py===y&&pm===m)return perPay;
      }
      return 0;
    }
    /* 매월 납부: 범위 안에 있으면 월 금액 */
    if(cur>=startYM&&cur<=endYM){
      const mv=getBestAmt(r);
      if(mv>0)return mv;
      return period>0?total/period:total;
    }
    return 0;
  }

  /* ══ 카테고리 목록 수집 (시트 기반 자동, 순서 유지) ═══ */
  const catOrder=[];
  const catMap=new Map();
  data.forEach(r=>{
    const cat=getCat(r);
    if(!catMap.has(cat)){catMap.set(cat,[]);catOrder.push(cat);}
    catMap.get(cat).push(r);
  });

  /* ══ 카테고리별 총액 ════════════════════════════════════ */
  const catTotals=new Map();
  catOrder.forEach(cat=>{
    const t=catMap.get(cat).reduce((a,r)=>a+getTotal(r),0);
    catTotals.set(cat,t);
  });
  const grandTotal=[...catTotals.values()].reduce((a,b)=>a+b,0);

  /* ══ 월별 합계 계산 ══════════════════════════════════════ */
  const monthlyData=months.map(({y,m})=>{
    const bycat={};
    catOrder.forEach(cat=>{
      bycat[cat]=catMap.get(cat).reduce((s,r)=>s+amtInMonth(r,y,m),0);
    });
    const total=Object.values(bycat).reduce((a,b)=>a+b,0);
    return{y,m,bycat,total};
  });
  const monthlyFiltered=monthlyData.filter(d=>d.total>0);

  /* ══ [KPI] 단색 통일 ════════════════════════════════════ */
  const totalItems=data.length;
  const nonZeroMonths=monthlyFiltered.length;
  const avgMonthly=nonZeroMonths>0
    ?monthlyFiltered.reduce((a,d)=>a+d.total,0)/nonZeroMonths:0;
  const maxMonth=monthlyFiltered.reduce((best,d)=>d.total>best.total?d:best,{total:0,y:0,m:0});

  /* 카테고리별 최대 4개 KPI 카드 */
  const topCats=catOrder.slice(0,3);
  const catKpiHTML=topCats.map(cat=>`
    <div class="kpi b">
      <div class="kpi-lbl">${cat}</div>
      <div class="kpi-val" style="color:var(--red)">${fmtBig(catTotals.get(cat))}원</div>
      <div class="kpi-sub">${catMap.get(cat).length}건</div>
    </div>`).join('');

  const kpiHTML=`<div class="kpi-row">
    <div class="kpi b">
      <div class="kpi-lbl">총 법인비용</div>
      <div class="kpi-val" style="color:var(--red)">${fmtBig(grandTotal)}원</div>
      <div class="kpi-sub">${totalItems}건 · ${catOrder.length}개 카테고리</div>
    </div>
    <div class="kpi b">
      <div class="kpi-lbl">평균 월 지출</div>
      <div class="kpi-val">${fmtBig(avgMonthly)}원</div>
      <div class="kpi-sub">지출 발생 ${nonZeroMonths}개월 기준</div>
    </div>
    ${maxMonth.total>0?`<div class="kpi b">
      <div class="kpi-lbl">최대 지출 월</div>
      <div class="kpi-val">${maxMonth.y}.${String(maxMonth.m).padStart(2,'0')}</div>
      <div class="kpi-sub">${fmtBig(maxMonth.total)}원</div>
    </div>`:''}
    ${catKpiHTML}
  </div>`;

  /* ══ [섹션 1] 카테고리별 요약 표 ═══════════════════════ */
  const summaryRows=catOrder.map(cat=>{
    const crows=catMap.get(cat);
    const total=catTotals.get(cat);
    /* 기간 요약 */
    let periodSummary='—';
    const drs=crows.map(r=>getDateRange(r)).filter(d=>d.hasStart);
    if(drs.length>0){
      const minS=drs.reduce((a,d)=>d.sy*100+d.sm<a.sy*100+a.sm?d:a,drs[0]);
      const maxE=drs.filter(d=>d.hasEnd).reduce((a,d)=>d.ey*100+d.em>a.ey*100+a.em?d:a,{ey:0,em:0});
      const sLabel=`${minS.sy}.${String(minS.sm).padStart(2,'0')}`;
      const eLabel=maxE.ey>0?`${maxE.ey}.${String(maxE.em).padStart(2,'0')}`:'진행중';
      periodSummary=`${sLabel} ~ ${eLabel}`;
    }
    /* 납부방법 요약 */
    const methods=crows.map(r=>getPayMethod(r));
    const methodLabels=[...new Set(methods.map(m=>
      m==='lump'?'일시납':
      m==='monthly'?'매월':
      typeof m==='object'?`${m.count}회 분할`:'매월'
    ))].join(' / ');
    return`<tr>
      <td class="label">${cat}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--t3)">${periodSummary}</td>
      <td style="font-size:11px;color:var(--t3)">${methodLabels||'—'}</td>
      <td class="r">${crows.length}건</td>
      <td class="r"><span class="exp" style="font-weight:600">${fmtBig(total)}원</span></td>
    </tr>`;
  }).join('');

  const summaryHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:#4F7CFF"></div>
      <div class="cf-section-title">카테고리별 요약</div>
      <div class="cf-section-sub">${catOrder.length}개 카테고리 · 총 ${fmtBig(grandTotal)}원</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>카테고리</th><th>기간</th><th>납부방법</th>
          <th class="r">건수</th><th class="r">총액</th>
        </tr></thead>
        <tbody>
          ${summaryRows||'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--t4)">데이터 없음</td></tr>'}
          <tr class="subtotal-row">
            <td colspan="4">합 계</td>
            <td class="r"><span class="exp">${fmtBig(grandTotal)}원</span></td>
          </tr>
        </tbody>
      </table>
    </div></div>
  </div>`;

  /* ══ [섹션 2] 항목별 상세 요약 표 ═══════════════════════ */
  const itemRows=data.map(r=>{
    const item=sv(r,itemIdx)||sv(r,catIdx)||'(항목없음)';
    const cat=getCat(r);
    const total=getTotal(r);
    const period=getPeriod(r);
    const dr=getDateRange(r);
    const s=sv(r,startIdx),e=sv(r,endIdx);
    const periodStr=s&&e?`${s} ~ ${e}`:period>1?`${period}개월`:'—';
    const method=getPayMethod(r);
    const methodLabel=method==='lump'?'일시납':method==='monthly'?'매월':
      typeof method==='object'?`${method.count}회 분할`:'매월';
    const note=sv(r,noteIdx);
    return`<tr>
      <td class="label">${item}${note?`<span style="color:var(--t4);font-size:10px;margin-left:6px">${note}</span>`:''}</td>
      <td style="font-size:11px;color:var(--t3)">${cat}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--t3)">${periodStr}</td>
      <td style="font-size:11px;color:var(--t3)">${methodLabel}</td>
      <td class="r"><span class="exp">${total?fmtBig(total)+'원':'—'}</span></td>
    </tr>`;
  }).join('');

  const itemHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:var(--red)"></div>
      <div class="cf-section-title">항목별 상세</div>
      <div class="cf-section-sub">${data.length}건</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>항목</th><th>카테고리</th><th>기간</th>
          <th>납부방법</th><th class="r">총액</th>
        </tr></thead>
        <tbody>
          ${itemRows||'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--t4)">항목 없음</td></tr>'}
          <tr class="subtotal-row">
            <td colspan="4">합 계</td>
            <td class="r"><span class="exp">${fmtBig(grandTotal)}원</span></td>
          </tr>
        </tbody>
      </table>
    </div></div>
  </div>`;

  /* ══ [섹션 3] 월별 상세 테이블 ══════════════════════════
     열: 연월 | 단계 | 카테고리별... | 월 합계 | 누적
  ════════════════════════════════════════════════════════ */
  /* 표시할 카테고리 — 월별 데이터가 있는 것만 */
  const activeCats=catOrder.filter(cat=>
    monthlyData.some(d=>d.bycat[cat]>0)
  );

  let cumTotal=0;
  let monthTableHTML='',lastY=null,yrSum=0;
  monthlyData.forEach(({y,m,bycat,total})=>{
    if(y!==lastY){
      if(lastY!==null&&yrSum>0){
        monthTableHTML+=`<tr class="yr-total">
          <td>${lastY}년 소계</td>
          ${activeCats.map(()=>'<td></td>').join('')}
          <td class="r"><span class="exp">${fmtBig(yrSum)}원</span></td>
          <td class="r"></td>
        </tr>`;
      }
      monthTableHTML+=`<tr class="yr-group"><td colspan="${activeCats.length+3}">${y}년</td></tr>`;
      lastY=y;yrSum=0;
    }
    if(total===0)return; /* 지출 없는 달 생략 */
    yrSum+=total;
    cumTotal+=total;
    /* 진행 단계 — stageIdx 있으면 시트값, 없으면 연도 기반 추정 */
    const stage=stageIdx>=0
      ?data.reduce((best,r)=>{
          const dr=getDateRange(r);
          const cur=y*100+m;
          const inR=dr.hasStart&&dr.hasEnd&&cur>=dr.sy*100+dr.sm&&cur<=dr.ey*100+dr.em;
          return inR?(sv(r,stageIdx)||best):best;
        },'')
      :'';
    monthTableHTML+=`<tr>
      <td class="ym">${y}.${String(m).padStart(2,'0')}</td>
      ${activeCats.map(cat=>`<td class="r">${bycat[cat]>0?`<span class="exp">${fmtBig(bycat[cat])}원</span>`:`<span class="dim">—</span>`}</td>`).join('')}
      <td class="r"><span class="exp" style="font-weight:600">${fmtBig(total)}원</span></td>
      <td class="r"><span class="neu">${fmtBig(cumTotal)}원</span></td>
    </tr>`;
  });
  /* 마지막 연도 소계 */
  if(lastY&&yrSum>0){
    monthTableHTML+=`<tr class="yr-total">
      <td>${lastY}년 소계</td>
      ${activeCats.map(()=>'<td></td>').join('')}
      <td class="r"><span class="exp">${fmtBig(yrSum)}원</span></td>
      <td class="r"></td>
    </tr>`;
  }
  /* 최종 합계 행 */
  if(cumTotal>0){
    monthTableHTML+=`<tr class="subtotal-row">
      <td>전체 합계</td>
      ${activeCats.map(cat=>`<td class="r"><span class="exp">${fmtBig(catTotals.get(cat))}원</span></td>`).join('')}
      <td class="r"><span class="exp" style="font-weight:700">${fmtBig(cumTotal)}원</span></td>
      <td class="r"></td>
    </tr>`;
  }

  const monthHTML=monthlyFiltered.length>0?`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:var(--orange)"></div>
      <div class="cf-section-title">월별 비용 상세</div>
      <div class="cf-section-sub">${minYear}–${maxYear} · 총 ${fmtBig(cumTotal)}원</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>연월</th>
          ${activeCats.map(cat=>`<th class="r">${cat}</th>`).join('')}
          <th class="r">월 합계</th>
          <th class="r">누적</th>
        </tr></thead>
        <tbody>${monthTableHTML||'<tr><td colspan="10" style="text-align:center;padding:30px;color:var(--t4)">월별 배분 데이터 없음 — 시트에 시작일/종료일 또는 기간을 입력해주세요</td></tr>'}</tbody>
      </table>
    </div></div>
  </div>`
  :`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:var(--t4)"></div>
      <div class="cf-section-title">월별 비용 상세</div>
    </div>
    <div class="cf-table-wrap" style="padding:30px;text-align:center;color:var(--t4)">
      시트에 시작일/종료일 또는 기간 컬럼을 입력하면 월별 상세가 자동으로 표시됩니다
    </div>
  </div>`;

  /* ══ [원본 데이터] 기본 숨김 — 접기/펼치기 ══ */
  CACHE['corp_cfn']=null;
  initTS('corp');TS['corp']={search:'',sortCol:-1,sortAsc:true,page:1};

  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 법인비용 Cash Flow</div>
    ${kpiHTML}
    ${summaryHTML}
    ${itemHTML}
    ${monthHTML}
    <div class="cf-section" style="margin-bottom:0">
      <div class="cf-section-head" style="cursor:pointer;user-select:none"
        onclick="var b=document.getElementById('corp-raw');b.style.display=b.style.display==='none'?'block':'none';this.querySelector('.raw-toggle').textContent=b.style.display==='none'?'▶ 펼치기':'▼ 접기'">
        <div class="cf-section-bar" style="background:var(--t4)"></div>
        <div class="cf-section-title" style="color:var(--t3)">원본 데이터
          <span class="raw-toggle" style="font-size:11px;font-weight:400;color:var(--t4);margin-left:6px">▶ 펼치기</span>
        </div>
        <div class="cf-section-sub">${data.length}건 · 클릭하여 열기</div>
      </div>
      <div id="corp-raw" style="display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r)">
        <div id="corp-tbl"></div>
      </div>
    </div>`;
  drawTable('corp',rows,'corp-tbl');
}


/* ══ LOAD / ROUTE ══════════════════════════════════════════ */
function showLoader(id){document.getElementById(id).innerHTML=`<div class="loader"><div class="ring"></div><p>데이터 불러오는 중…</p></div>`;}
function stamp(){document.getElementById('syncTime').textContent=new Date().toLocaleTimeString('ko-KR');}

async function load(k){
  showLoader(`sec-${k}`);
  try{
    const rows=await fetchSheet(k);  /* ← 매번 구글 시트에서 새로 fetch */
    CACHE[k]=rows;
    if(k==='timeline')renderTimeline(rows);
    else if(k==='irr')renderIRR(rows);
    else if(k==='lease')renderLease(rows);
    else renderCost(k,rows);
    stamp();
  }catch(e){document.getElementById(`sec-${k}`).innerHTML=errHTML(e.message);}
}

function go(k,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById(`sec-${k}`).classList.add('on');
  CUR=k;
  if(!LOADED.has(k)){LOADED.add(k);load(k);}
}

async function refreshCurrent(){
  const btn=document.getElementById('btnRef');
  btn.classList.add('spin');
  LOADED.delete(CUR);
  await load(CUR);
  LOADED.add(CUR);
  btn.classList.remove('spin');
}

/* ══ INIT ══════════════════════════════════════════════════ */
LOADED.add('timeline');
load('timeline');
/* 5분마다 현재 탭 자동 갱신 — 구글 시트 변경사항 자동 반영 */
setInterval(()=>{LOADED.delete(CUR);load(CUR);},5*60*1000);
