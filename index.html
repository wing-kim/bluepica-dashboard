<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLUEPIKA Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08090d; --s1:#0f1118; --s2:#151821; --s3:#1c2030;
  --border:#222636; --border2:#2a3050;
  --blue:#3b7fff; --blue-g:linear-gradient(135deg,#3b7fff,#6c48f5);
  --green:#22d186; --yellow:#f5bc30; --orange:#f07830;
  --red:#f03860; --purple:#9060f0;
  --t1:#eef0f8; --t2:#8890aa; --t3:#4a5270; --t4:#2a3050;
  --mono:'DM Mono',monospace; --sans:'Noto Sans KR',sans-serif;
  --display:'Bebas Neue',sans-serif;
  --r:10px; --r2:6px; --sh:0 4px 32px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(59,127,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,127,255,.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:1520px;margin:0 auto;padding:0 28px 80px}

header{display:flex;align-items:center;justify-content:space-between;
  padding:24px 0 20px;border-bottom:1px solid var(--border);margin-bottom:28px}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-name{font-family:var(--display);font-size:28px;letter-spacing:2px;
  background:var(--blue-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:11px;color:var(--t3);letter-spacing:3px;text-transform:uppercase}
.header-r{display:flex;align-items:center;gap:12px}
.sync-badge{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--t3)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:blink 2.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-ref{display:flex;align-items:center;gap:6px;background:var(--s2);
  border:1px solid var(--border2);color:var(--t2);padding:7px 14px;
  border-radius:var(--r2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .18s}
.btn-ref:hover{background:var(--s3);color:var(--t1);border-color:var(--blue)}
.btn-ref .ico{display:inline-block}
.btn-ref.spin .ico{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.tabs{display:flex;gap:2px;margin-bottom:26px;padding:4px;
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow-x:auto}
.tab{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:9px 20px;
  border-radius:7px;border:none;background:transparent;color:var(--t3);
  font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .18s;white-space:nowrap}
.tab:hover{color:var(--t2);background:var(--s2)}
.tab.on{color:var(--t1);background:var(--s3);box-shadow:0 1px 8px rgba(0,0,0,.4)}
.pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.sec{display:none}.sec.on{display:block}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;gap:14px;color:var(--t3)}
.ring{width:38px;height:38px;border:3px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.loader p{font-size:12px}
.err{background:rgba(240,56,96,.07);border:1px solid rgba(240,56,96,.2);
  border-radius:var(--r);padding:18px 22px;color:var(--red);font-size:13px}
.err small{color:var(--t3);display:block;margin-top:6px}

.notice{display:flex;align-items:center;gap:8px;
  background:rgba(59,127,255,.06);border:1px solid rgba(59,127,255,.15);
  border-radius:var(--r2);padding:10px 14px;
  font-size:11px;color:var(--t3);margin-bottom:20px}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:16px}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:9px 14px;position:relative;overflow:hidden;transition:border-color .2s,transform .18s}
.kpi:hover{transform:translateY(-2px)}
/* 상단 컬러 바: 클래스별 단색 구분 — 그라데이션/형광 없음 */
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.b::after{background:#4F7CFF}   /* 블루 */
.kpi.g::after{background:#22c98a}   /* 그린 */
.kpi.y::after{background:#e8a020}   /* 앰버 */
.kpi.p::after{background:#8b5cf6}   /* 퍼플 */
.kpi.r::after{background:#e84040}   /* 레드 */
.kpi.o::after{background:#d97706}   /* 오렌지 */
/* hover시 테두리는 해당 색조 */
.kpi.b:hover{border-color:rgba(79,124,255,.35)}
.kpi.g:hover{border-color:rgba(34,201,138,.35)}
.kpi.y:hover{border-color:rgba(232,160,32,.35)}
.kpi.p:hover{border-color:rgba(139,92,246,.35)}
.kpi.r:hover{border-color:rgba(232,64,64,.35)}
.kpi-lbl{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.kpi-val{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.3px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-sub{font-size:9.5px;color:var(--t4);margin-top:4px;font-weight:400}

.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px}
.chip{background:var(--s3);border:1px solid var(--border2);color:var(--t3);
  font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px}

.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--s2);border-bottom:1px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s}
th:hover{color:var(--t2)}
th.sorted{color:var(--blue)}
td{padding:9px 14px;border-bottom:1px solid rgba(34,38,54,.7);color:var(--t2);
  white-space:nowrap;max-width:240px;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--s2);color:var(--t1)}
td:first-child{color:var(--t1);font-weight:500}
.npos{color:var(--green)!important;font-family:var(--mono)}
.nneg{color:var(--red)!important;font-family:var(--mono)}
.nnum{color:var(--blue)!important;font-family:var(--mono)}
.npct{color:var(--yellow)!important;font-family:var(--mono)}
.ndash{color:var(--t4)!important}

.sbadge{display:inline-flex;align-items:center;gap:4px;
  padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.sb-active{background:rgba(34,209,134,.12);color:var(--green);border:1px solid rgba(34,209,134,.25)}
.sb-expire{background:rgba(240,56,96,.12);color:var(--red);border:1px solid rgba(240,56,96,.25)}
.sb-warn{background:rgba(245,188,48,.12);color:var(--yellow);border:1px solid rgba(245,188,48,.25)}
.sb-neutral{background:rgba(59,127,255,.12);color:var(--blue);border:1px solid rgba(59,127,255,.25)}

.empty{text-align:center;padding:60px;color:var(--t3);font-size:13px}
.empty-i{font-size:36px;margin-bottom:12px}

/* ═══════════════════════════════════════════════════
   TIMELINE — 간트 차트 스타일 (단색 바 + 여유 행간)
═══════════════════════════════════════════════════ */
.tl-wrap{padding:0 24px 24px}
.tl-ruler-row{display:flex;align-items:stretch;padding-bottom:10px;
  border-bottom:1px solid var(--border2);margin-bottom:0}
.tl-ruler-lbl{width:220px;flex-shrink:0;display:flex;align-items:flex-end;
  font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;
  padding-right:16px;padding-bottom:4px}
.tl-ruler-track{flex:1;position:relative;height:30px}
.tl-ruler-years{display:flex;height:100%;position:absolute;inset:0}
.tl-year-seg{flex:1;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;color:var(--t3);
  border-left:1px solid var(--border);position:relative}
.tl-year-seg:first-child{border-left:none}
.tl-year-seg.cur-y{color:var(--blue);font-weight:700}
.tl-dur-head{width:76px;flex-shrink:0;display:flex;align-items:flex-end;
  justify-content:flex-end;font-size:9px;color:var(--t4);text-transform:uppercase;
  letter-spacing:1px;padding-left:10px;padding-bottom:4px}
.tl-now-line{position:absolute;top:0;bottom:-1px;width:2px;
  background:var(--blue);box-shadow:0 0 6px rgba(59,127,255,.5);z-index:10;border-radius:1px}
.tl-now-tag{position:absolute;top:3px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:8px;color:var(--blue);
  background:rgba(8,9,13,.95);padding:1px 5px;border-radius:3px;
  white-space:nowrap;letter-spacing:.5px}
.g-row{display:flex;align-items:center;padding:10px 0;
  border-bottom:1px solid rgba(34,38,54,.5);transition:background .12s;min-height:44px}
.g-row:last-child{border-bottom:none}
.g-row:hover{background:rgba(59,127,255,.03)}
/* [수정4] 항목명 영역 확장 — 긴 이름 한 줄 유지 */
.g-info{width:260px;flex-shrink:0;padding-right:14px;min-width:0}
.g-name{font-size:12.5px;font-weight:500;color:var(--t1);line-height:1.35;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:-.01em}
.g-name[title]{cursor:default}
.g-period-txt{font-family:var(--mono);font-size:9.5px;color:var(--t3);margin-top:2px;
  white-space:nowrap}
/* [수정1] 바 영역 높이 유지 (track 두께로 제어) */
.g-bar-area{flex:1;position:relative;height:38px;display:flex;align-items:center}
.g-vline{position:absolute;top:0;bottom:0;width:1px;
  background:rgba(42,48,80,.32);pointer-events:none}
.g-now-line{position:absolute;top:0;bottom:0;width:2px;
  background:rgba(59,127,255,.2);z-index:4;pointer-events:none;border-radius:1px}
/* [수정1] track 높이 14→16px (+14%) — 둔탁하지 않게 */
.g-track{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  height:16px;background:rgba(18,22,36,.95);border-radius:4px;
  border:1px solid rgba(42,48,80,.5)}
.g-fill{height:100%;border-radius:4px;position:absolute;
  transition:width .8s cubic-bezier(.4,0,.2,1)}
.g-dur{width:72px;flex-shrink:0;text-align:right;padding-left:10px;
  font-family:var(--mono);font-size:11px;color:var(--t3);white-space:nowrap}
/* 단계별 구별 색상 — 절제된 톤, 형광/그라데이션 없음 */
.gc0{background:#4F7CFF}  /* 블루 */
.gc1{background:#22c98a}  /* 에메랄드 */
.gc2{background:#e8a020}  /* 앰버 */
.gc3{background:#8b5cf6}  /* 퍼플 */
.gc4{background:#e84040}  /* 레드 */
.gc5{background:#0ea5e9}  /* 스카이 */
.gc6{background:#d97706}  /* 오렌지 */
.gc7{background:#10b981}  /* 틸 */
.gc8{background:#6366f1}  /* 인디고 */

/* ═══════════════════════════════════════════════════
   TIMELINE 툴팁 — 마우스 호버 날짜 표시
═══════════════════════════════════════════════════ */
.tl-tooltip{position:fixed;pointer-events:none;z-index:9999;
  background:rgba(8,9,13,.95);border:1px solid #2a3050;
  border-radius:5px;padding:5px 10px;
  font-family:var(--mono);font-size:11px;color:#eef0f8;
  white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.5);
  transition:opacity .1s;opacity:0;letter-spacing:.3px}
.tl-tooltip.show{opacity:1}
.g-bar-area{cursor:crosshair}

/* ═══════════════════════════════════════════════════
   TIMELINE HOVER GUIDE LINE — 마우스 hover 세로 기준선
═══════════════════════════════════════════════════ */
.tl-hover-line{
  position:absolute;
  top:0;bottom:0;
  width:1px;
  /* NOW 라인(파란색)과 구분: 청록/시안 계열, 은은하게 */
  background:rgba(34,211,238,.45);
  box-shadow:0 0 5px rgba(34,211,238,.25);
  pointer-events:none;
  z-index:20;
  border-radius:1px;
  opacity:0;
  transition:opacity .12s;
  will-change:left;
}
.tl-hover-line.show{opacity:1}
/* hover line을 담는 컨테이너: 타임라인 전체 rows 높이를 관통 */
.tl-gantt-body{position:relative}

/* ═══════════════════════════════════════════════════
   IRR
═══════════════════════════════════════════════════ */
.irr-addr-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
.irr-addr-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative}
.irr-addr-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.irr-addr-card:first-child::before{background:linear-gradient(90deg,#3b7fff,#6c48f5)}
.irr-addr-card:last-child::before{background:linear-gradient(90deg,#22d186,#3b7fff)}
.irr-addr-head{padding:16px 20px 14px;border-bottom:1px solid var(--border)}
.irr-addr-title{font-size:14px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px}
.irr-addr-tag{font-size:9px;padding:2px 8px;border-radius:20px;border:1px solid;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.tag-a{color:#6c48f5;border-color:rgba(108,72,245,.3);background:rgba(108,72,245,.1)}
.tag-b{color:var(--green);border-color:rgba(34,209,134,.3);background:rgba(34,209,134,.1)}
.irr-addr-sub{font-size:11px;color:var(--t3);margin-top:4px}
.irr-addr-body{padding:18px 20px}
.irr-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.irr-metric{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:13px 15px}
.irr-metric-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.irr-metric-val{font-family:var(--mono);font-size:20px;font-weight:500}
.irr-metric-val.pos{color:var(--green)} .irr-metric-val.neg{color:var(--red)}
.irr-metric-val.neu{color:var(--blue)} .irr-metric-val.ylw{color:var(--yellow)}
.irr-metric-sub{font-size:10px;color:var(--t3);margin-top:3px}
.land-price-box{background:rgba(245,188,48,.05);border:1px solid rgba(245,188,48,.15);
  border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.land-price-lbl{font-size:11px;color:var(--yellow)}
.land-price-val{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--yellow)}
.irr-divider{height:1px;background:var(--border);margin:13px 0}
.irr-rows-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.irr-row-item{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid rgba(34,38,54,.5);font-size:12px}
.irr-row-item:last-child{border-bottom:none}

/* ═══════════════════════════════════════════════════
   LEASE — 슬림 레이아웃 (건물별 그룹화)
   UI 슬림화 + 색상 강화 / 데이터 로직 무수정
═══════════════════════════════════════════════════ */
.ls-section{margin-bottom:18px}

/* 섹션 헤더 — 패딩 축소 */
.ls-group-head{display:flex;align-items:center;gap:10px;padding:9px 16px;
  background:var(--s3);border:1px solid var(--border);
  border-radius:var(--r) var(--r) 0 0;border-bottom:1px solid var(--border2)}
.ls-group-bar{width:3px;height:16px;border-radius:2px;flex-shrink:0;background:#4F7CFF}
.ls-group-title{font-size:12.5px;font-weight:600;color:var(--t1)}
.ls-group-meta{font-size:10.5px;color:var(--t3);margin-left:2px}
.ls-group-sum{margin-left:auto;display:flex;gap:14px;align-items:center}
.ls-sum-item{font-size:10.5px;color:var(--t3)}
.ls-sum-item strong{font-family:var(--mono);font-size:11.5px;font-weight:600}
.ls-sum-item strong.green{color:var(--green)}
.ls-sum-item strong.blue{color:var(--blue)}
.ls-sum-item strong.purple{color:var(--purple)}

/* 테이블 래퍼 */
.ls-table-wrap{border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--r) var(--r);overflow:hidden}

/* 테이블 — row 높이 축소, 정보 밀도 증가 */
.ls-table{width:100%;border-collapse:collapse;font-size:12px}
.ls-table thead tr{background:var(--s2);border-bottom:1px solid var(--border2)}
.ls-table th{padding:7px 12px;text-align:left;font-size:9.5px;font-weight:600;
  color:var(--t3);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.ls-table th.r{text-align:right}
/* td 패딩 축소 — 정보 밀도 핵심 */
.ls-table td{padding:7px 12px;border-bottom:1px solid rgba(34,38,54,.45);
  color:var(--t2);white-space:nowrap;vertical-align:middle}
.ls-table tbody tr:last-child td{border-bottom:none}
.ls-table tbody tr:hover td{background:rgba(59,127,255,.03);color:var(--t1)}
.ls-table tr.sum-row td{background:rgba(22,26,40,.8);border-top:1px solid var(--border2);
  font-weight:600;color:var(--t1);padding:6px 12px}
.ls-table td.r{text-align:right;font-family:var(--mono)}
.ls-table td.name{color:var(--t1);font-weight:500;font-size:12.5px}
.ls-table td.floor{color:var(--t2);font-size:11.5px}

/* 만료 배지 — 컴팩트 */
.exp-badge{display:inline-block;padding:1px 7px;border-radius:3px;
  font-size:10px;font-weight:600;letter-spacing:.2px;white-space:nowrap;border:1px solid}
.exp-ok  {background:rgba(0,184,148,.08);color:#00b894;border-color:rgba(0,184,148,.18)}
.exp-warn{background:rgba(245,188,48,.08);color:#c49a00;border-color:rgba(245,188,48,.18)}
.exp-near{background:rgba(240,112,48,.08);color:#e05a00;border-color:rgba(240,112,48,.18)}
.exp-done{background:rgba(180,60,60,.08);color:#c05050;border-color:rgba(180,60,60,.18)}
.exp-none{background:rgba(74,82,112,.07);color:var(--t3);border-color:rgba(74,82,112,.18)}

/* 금액 색상 */
.amt-green {color:var(--green)!important}
.amt-blue  {color:var(--blue)!important}
.amt-purple{color:var(--purple)!important}
.amt-muted {color:var(--t4)!important}
.amt-total {color:var(--t1)!important;font-weight:600}

/* ═══ LEASE 요약 바 — 슬림화 ═════════════════════════════ */
.ls-summary-row{display:flex;flex-wrap:wrap;gap:0;
  border:1px solid var(--border);border-top:none;border-bottom:1px solid var(--border);
  background:var(--s1)}
/* 패딩 축소: 12px→8px, 폰트 축소 */
.ls-summary-item{display:flex;flex-direction:row;align-items:center;gap:8px;
  padding:5px 14px;border-right:1px solid var(--border);flex:1}
.ls-summary-item:last-child{border-right:none}

<script>
/* ══ CONFIG ═══════════════════════════════════════════════ */
const SID='17lL6O55R56PGODOu-iM5EBH4a6ZbWEJfkypcdWzlGHA';
const TABS={
  timeline:{gid:'835667947', label:'프로젝트 타임라인'},
  irr:     {gid:'1343029023',label:'신축 IRR'},
  lease:   {gid:'0',         label:'임대차계약현황'},
  personal:{gid:'662143448', label:'개인비용'},
  corp:    {gid:'551803703', label:'법인비용'},
};
const PG=50;
const CACHE={},LOADED=new Set(),TS={};
let CUR='timeline';

/* ══ CSV ══════════════════════════════════════════════════ */
async function fetchSheet(k){
  /* ── Google Sheets CSV export
     구글 시트는 export 요청 시 리디렉션이 발생합니다.
     redirect:'follow' + credentials:'omit' 으로 CORS 우회
     시트가 "링크 있는 모든 사용자 · 뷰어" 공유 상태여야 합니다. */
  const url=`https://docs.google.com/spreadsheets/d/${SID}/export?format=csv&gid=${TABS[k].gid}`;
  let r;
  try{
    r=await fetch(url,{redirect:'follow',credentials:'omit'});
  }catch(e){
    /* CORS 차단 시 JSONP-style 우회: exportLinks 엔드포인트 시도 */
    throw new Error(`fetch 실패: ${e.message} — 시트 공유 설정을 확인하세요 (링크 있는 모든 사용자·뷰어)`);
  }
  if(!r.ok) throw new Error(`HTTP ${r.status} — 시트 공유 설정 확인 필요`);
  const txt=await r.text();
  if(!txt||txt.trim().startsWith('<')){
    /* HTML 응답 = 로그인 페이지 → 공유 설정 문제 */
    throw new Error('시트 응답이 HTML입니다 — "링크 있는 모든 사용자" 공유로 설정해주세요');
  }
  return parseCSV(txt);
}
function parseCSV(txt){
  const rows=[];let inQ=false,row=[],cell='';
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){inQ=!inQ;continue;}
    if(!inQ&&c===','){row.push(cell.trim());cell='';continue;}
    if(!inQ&&(c==='\n'||(c==='\r'&&txt[i+1]==='\n'))){
      if(c==='\r')i++;
      row.push(cell.trim());cell='';
      if(row.some(x=>x))rows.push(row);
      row=[];continue;
    }
    cell+=c;
  }
  if(cell||row.length){row.push(cell.trim());if(row.some(x=>x))rows.push(row);}
  return rows;
}

/* ══ FORMAT / UTILS ═══════════════════════════════════════ */
function fc(v){
  if(v===null||v===undefined||v==='') return '<span class="ndash">—</span>';
  const s=String(v).trim();
  if(!s) return '<span class="ndash">—</span>';
  if(s.endsWith('%')){const n=parseFloat(s);if(!isNaN(n)) return `<span class="${n<0?'nneg':'npct'}">${s}</span>`;}
  const clean=s.replace(/[,\s₩원]/g,'');
  if(!isNaN(Number(clean))&&clean!==''&&/^[\d,.\-\+]+$/.test(clean)){
    const n=Number(clean);return `<span class="${n<0?'nneg':n>0?'npos':'nnum'}">${s}</span>`;
  }
  return s;
}
function fmtBig(n){
  if(isNaN(n))return '—';
  if(Math.abs(n)>=1e8)return (n/1e8).toFixed(1)+'억';
  if(Math.abs(n)>=1e4)return Math.round(n/1e4).toLocaleString()+'만';
  if(Math.abs(n)>=1000)return n.toLocaleString();
  return Number(n.toFixed(1)).toString();
}
function findHdrRow(rows){
  for(let i=0;i<Math.min(rows.length,6);i++){if(rows[i].filter(c=>c).length>=2)return i;}
  return 0;
}
function numCols(hdr,data){
  return hdr.map((h,i)=>({h,i})).filter(({h,i})=>{
    if(!h)return false;
    return data.map(r=>parseFloat((r[i]||'').replace(/[,\s₩원%]/g,''))).filter(x=>!isNaN(x)).length>0;
  });
}
function errHTML(msg){return `<div class="err">
  ⚠️ ${msg}
  <small style="display:block;margin-top:8px;line-height:1.6">
    <strong>체크리스트:</strong><br>
    1. 구글 시트 → 공유 → "링크 있는 모든 사용자" → 뷰어 설정<br>
    2. F12 콘솔에서 실제 오류 메시지 확인<br>
    3. CORS 오류라면: 시트를 "파일 → 공유 → 웹에 게시"도 추가로 설정
  </small>
</div>`;}
function parseAmt(v){return parseFloat(String(v||'').replace(/[,\s₩원]/g,''))||0;}

/* ══ TABLE ════════════════════════════════════════════════ */
function initTS(k){if(!TS[k])TS[k]={search:'',sortCol:-1,sortAsc:true,page:1};}
function drawTable(k,rows,cid,customCell){
  const el=document.getElementById(cid);if(!el)return;
  if(!rows||rows.length<2){el.innerHTML=`<div class="empty"><div class="empty-i">📭</div>데이터 없음</div>`;return;}
  initTS(k);
  const hdr=rows[0];let data=rows.slice(1).filter(r=>r.some(c=>c));
  const q=(TS[k].search||'').toLowerCase();
  if(q)data=data.filter(r=>r.some(c=>(c||'').toLowerCase().includes(q)));
  const{sortCol:sc,sortAsc:sa}=TS[k];
  if(sc>=0){data=[...data].sort((a,b)=>{
    const av=(a[sc]||'').replace(/__SB_\w+__/g,''),bv=(b[sc]||'').replace(/__SB_\w+__/g,'');
    const an=parseFloat(av.replace(/[,%\s₩원]/g,'')),bn=parseFloat(bv.replace(/[,%\s₩원]/g,''));
    if(!isNaN(an)&&!isNaN(bn))return sa?an-bn:bn-an;
    return sa?av.localeCompare(bv,'ko'):bv.localeCompare(av,'ko');
  });}
  const total=data.length,p=Math.max(1,Math.min(TS[k].page,Math.ceil(total/PG)||1));
  TS[k].page=p;const totalP=Math.max(1,Math.ceil(total/PG));
  const slice=data.slice((p-1)*PG,p*PG);
  const cfn=customCell||fc;
  const ths=hdr.map((h,i)=>`<th onclick="tSort('${k}','${cid}',${i})" ${sc===i?'class="sorted"':''}>${h||'—'}${sc===i?(sa?' ↑':' ↓'):''}</th>`).join('');
  const tbs=slice.map(r=>`<tr>${hdr.map((_,i)=>`<td>${cfn(r[i])}</td>`).join('')}</tr>`).join('');
  let pgH='';
  if(totalP>1){
    const s=Math.max(1,Math.min(p-2,totalP-4)),e=Math.min(totalP,s+4);
    let btns='';for(let i=s;i<=e;i++)btns+=`<button class="pg${i===p?' on':''}" onclick="tPage('${k}','${cid}',${i})">${i}</button>`;
    pgH=`<div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:10px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--t3)">
      <span>${total}건</span><button class="pg" onclick="tPage('${k}','${cid}',${p-1})" ${p<=1?'disabled':''}>‹</button>${btns}
      <button class="pg" onclick="tPage('${k}','${cid}',${p+1})" ${p>=totalP?'disabled':''}>›</button></div>`;
  }else pgH=`<div style="padding:8px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--t3)">${total}건</div>`;
  el.innerHTML=`<div class="card"><div class="tscroll"><table><thead><tr>${ths}</tr></thead><tbody>${tbs}</tbody></table></div>${pgH}</div>`;
}
function tSort(k,cid,col){initTS(k);if(TS[k].sortCol===col)TS[k].sortAsc=!TS[k].sortAsc;else{TS[k].sortCol=col;TS[k].sortAsc=true;}TS[k].page=1;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}
function tSearch(k,cid,val){initTS(k);TS[k].search=val;TS[k].page=1;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}
function tPage(k,cid,p){initTS(k);TS[k].page=p;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}

/* ════════════════════════════════════════════════════════════
   1. TIMELINE — 컴팩트 + 현재시점 마커
   ★ 구글 시트 데이터 100% 실시간 반영
════════════════════════════════════════════════════════════ */
function renderTimeline(rows){
  const sec=document.getElementById('sec-timeline');
  const hi=findHdrRow(rows);
  const data=rows.slice(hi+1).filter(r=>r.some(c=>c));

  // 컬럼: col1=항목, col2=기간, col3=소요, col4=기타
  const ni=1,pi=2,di=3,oi=4;
  const YEAR_START=2026,YEAR_END=2030;
  const TOTAL_MONTHS=(YEAR_END-YEAR_START+1)*12; // 60개월

  // 현재 시점 계산
  const now=new Date();
  const nowOff=(now.getFullYear()-YEAR_START)*12+now.getMonth();
  const nowPct=Math.max(0,Math.min(100,(nowOff/TOTAL_MONTHS)*100)).toFixed(2);
  const curYear=now.getFullYear();

  function parsePeriod(s){
    if(!s)return null; s=String(s).trim();
    let m=s.match(/(\d{4})[.\s년]?\s*(\d{1,2})[월]?\s*[~\-～–]\s*(\d{4})[.\s년]?\s*(\d{1,2})/);
    if(m)return{sy:+m[1],sm:+m[2],ey:+m[3],em:+m[4]};
    m=s.match(/(\d{4})[.\s년]?\s*(\d{1,2})/);
    if(m)return{sy:+m[1],sm:+m[2],ey:+m[1],em:+m[2]+1};
    return null;
  }
  function parseDur(s){const n=parseInt(String(s||'').replace(/[^0-9]/g,''));return isNaN(n)?0:n;}

  const items=[];
  data.forEach((r,idx)=>{
    const name=r[ni]||'—';
    const period=r[pi]||'';
    const durRaw=r[di]||'';
    const parsed=parsePeriod(period);
    const durMo=parseDur(durRaw);
    let startOff=0,barWidth=0,startLabel='',endLabel='';
    if(parsed){
      startOff=(parsed.sy-YEAR_START)*12+(parsed.sm-1);
      const endOff=(parsed.ey-YEAR_START)*12+(parsed.em-1);
      barWidth=Math.max(endOff-startOff,1);
      startLabel=`${parsed.sy}.${String(parsed.sm).padStart(2,'0')}`;
      endLabel=`${parsed.ey}.${String(parsed.em).padStart(2,'0')}`;
    }else if(durMo>0){
      const prev=idx>0?items[idx-1]:null;
      startOff=prev?(prev.startOff+prev.barWidth):0;
      barWidth=durMo;
    }
    startOff=Math.max(0,Math.min(startOff,TOTAL_MONTHS-1));
    barWidth=Math.max(1,Math.min(barWidth,TOTAL_MONTHS-startOff));
    const leftPct=(startOff/TOTAL_MONTHS*100).toFixed(2);
    const widthPct=(barWidth/TOTAL_MONTHS*100).toFixed(2);
    const durLabel=durMo?`${durMo}개월`:(barWidth?`${barWidth}개월`:durRaw||'—');
    const periodTxt=startLabel?`${startLabel} → ${endLabel}`:period;
    items.push({name,periodTxt,durLabel,startOff,barWidth,leftPct,widthPct,colorIdx:idx});
  });

  const totalM=items.reduce((a,b)=>a+(b.barWidth||0),0);

  // 연도 세그먼트
  const yearSegs=[];
  for(let y=YEAR_START;y<=YEAR_END;y++)
    yearSegs.push(`<div class="tl-year-seg${y===curYear?' cur-y':''}">${y}</div>`);

  // 연도별 세로선 위치 (2027~2030 시작점)
  const vLinePcts=[];
  for(let y=YEAR_START+1;y<=YEAR_END;y++)
    vLinePcts.push(((y-YEAR_START)*12/TOTAL_MONTHS*100).toFixed(2));

  function makeOverlays(){
    return vLinePcts.map(p=>`<div class="g-vline" style="left:${p}%"></div>`).join('')
      +`<div class="g-now-line" style="left:${nowPct}%"></div>`;
  }

  // 눈금 헤더
  const rulerHTML=`<div class="tl-ruler-row">
    <div class="tl-ruler-lbl">연도</div>
    <div class="tl-ruler-track">
      <div class="tl-ruler-years">${yearSegs.join('')}</div>
      <div class="tl-now-line" style="left:${nowPct}%">
        <div class="tl-now-tag">NOW</div>
      </div>
    </div>
    <div class="tl-dur-head">기간</div>
  </div>`;

  // Gantt rows
  const gRows=items.map(it=>`<div class="g-row">
    <div class="g-info">
      <div class="g-name" title="${it.name}">${it.name}</div>
      ${it.periodTxt?`<div class="g-period-txt">${it.periodTxt}</div>`:''}
    </div>
    <div class="g-bar-area">
      ${makeOverlays()}
      <div class="g-track">
        <div class="g-fill gc${it.colorIdx%9}" style="left:${it.leftPct}%;width:0" data-w="${it.widthPct}"></div>
      </div>
    </div>
    <div class="g-dur">${it.durLabel}</div>
  </div>`).join('');

  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 프로젝트 타임라인</div>
    <div class="kpi-row">
      <div class="kpi b"><div class="kpi-lbl">총 단계</div><div class="kpi-val">${data.length}</div><div class="kpi-sub">프로젝트 항목</div></div>
      <div class="kpi g"><div class="kpi-lbl">총 소요 기간</div><div class="kpi-val">${totalM}개월</div><div class="kpi-sub">예상 전체 기간</div></div>
      <div class="kpi y"><div class="kpi-lbl">타임라인 범위</div><div class="kpi-val">${YEAR_START}–${YEAR_END}</div><div class="kpi-sub">5개년 계획</div></div>
      <div class="kpi p"><div class="kpi-lbl">착공 예정</div><div class="kpi-val">2029</div><div class="kpi-sub">공사 시작 연도</div></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">프로젝트 타임라인 <span class="chip">${data.length}단계</span></div>
        <span style="font-size:10px;color:var(--t3);display:flex;align-items:center;gap:5px">
          <span style="display:inline-block;width:12px;height:2px;background:var(--blue);border-radius:1px;box-shadow:0 0 4px rgba(59,127,255,.8)"></span>현재 시점 (${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')})
        </span>
      </div>
      <div class="tl-wrap">
        ${rulerHTML}
        <div class="tl-gantt-body" id="tl-gantt-body">
          <div class="tl-hover-line" id="tl-hover-line"></div>
          ${gRows}
        </div>
      </div>
    </div>`;

  requestAnimationFrame(()=>{
    sec.querySelectorAll('[data-w]').forEach(el=>{
      setTimeout(()=>{el.style.width=el.dataset.w+'%';},60);
    });
  });

  /* ── [UI 전용] 타임라인 바 마우스 호버 날짜 툴팁 ──────────────
     ★ 데이터 로직(YEAR_START, TOTAL_MONTHS 등) 읽기 전용 참조
     ★ 날짜 계산: 마우스 X 위치 비율 → 연도/월 변환
  ─────────────────────────────────────────────────────────── */
  (()=>{
    /* 툴팁 엘리먼트 (전역 1개, 재사용) */
    let tip=document.getElementById('tl-tip-global');
    if(!tip){
      tip=document.createElement('div');
      tip.id='tl-tip-global';
      tip.className='tl-tooltip';
      document.body.appendChild(tip);
    }

    /* hover 가이드라인 엘리먼트 (tl-gantt-body 내부, 1개 재사용) */
    const ganttBody=sec.querySelector('#tl-gantt-body');
    const hoverLine=sec.querySelector('#tl-hover-line');

    /* 바 영역에서 비율 → 날짜 문자열 */
    function pctToDate(pct){
      const totalMonths=TOTAL_MONTHS;
      const mOff=Math.round(pct/100*totalMonths);
      const y=YEAR_START+Math.floor(mOff/12);
      const m=(mOff%12)+1;
      return y+'년 '+m+'월';
    }

    sec.querySelectorAll('.g-bar-area').forEach((area,rowIdx)=>{
      const item=items[rowIdx];

      area.addEventListener('mousemove',e=>{
        const rect=area.getBoundingClientRect();
        const pct=Math.max(0,Math.min(100,(e.clientX-rect.left)/rect.width*100));
        const dateStr=pctToDate(pct);

        /* 항목 기간 정보도 같이 표시 — 기존 tooltip 유지 */
        const periodInfo=item&&item.periodTxt?` (${item.periodTxt})`:'';
        tip.textContent=dateStr+periodInfo;
        tip.classList.add('show');
        tip.style.left=(e.clientX+14)+'px';
        tip.style.top =(e.clientY-32)+'px';

        /* hover 가이드라인: g-bar-area 기준 X → ganttBody 기준 X로 변환
           모든 행의 bar-area는 동일한 left offset을 가지므로
           첫 번째 bar-area rect를 기준으로 삼아 일관된 좌표 유지 */
        if(hoverLine&&ganttBody){
          const bodyRect=ganttBody.getBoundingClientRect();
          const lineLeft=e.clientX-bodyRect.left;
          hoverLine.style.left=lineLeft+'px';
          hoverLine.classList.add('show');
        }
      });

      area.addEventListener('mouseleave',()=>{
        tip.classList.remove('show');
        if(hoverLine) hoverLine.classList.remove('show');
      });
    });

    /* 스크롤 시 툴팁·가이드라인 숨김 */
    window.addEventListener('scroll',()=>{
      tip.classList.remove('show');
      if(hoverLine) hoverLine.classList.remove('show');
    },{passive:true});
  })();
}

/* ════════════════════════════════════════════════════════════
   2. IRR — 상단: 구글 시트 기반 필지 정보 카드 (자동연동)
             하단: 시나리오 IRR 계산기 (UI state, 하드코딩 없음)
   ★ 데이터 레이어: 절대 수정 금지 (fetch/parse 그대로)
   ★ 계산기 상태는 별도 변수로 관리 (원본 시트 불변)
════════════════════════════════════════════════════════════ */
function renderIRR(rows){
  const sec=document.getElementById('sec-irr');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}

  /* ════════════════════════════════════════════════════════════
     [데이터 레이어] IRR 시트 파싱
     ★ 시트 구조: 행=항목명, 열=필지별값 (매트릭스형)
       헤더: 항목 | 압구정로 112 | 압구정로 8길 3 | 비고
       데이터: 매입연도 | 2021 | 2025 | ...
     ★ 헤더 탐색 실패 시 전체 행 스캔으로 보완
     ★ 절대 하드코딩 없음
  ════════════════════════════════════════════════════════════ */

  const sv=(r,i)=>i>=0?(r[i]||''):'';
  const av=(r,i)=>i>=0?parseAmt(r[i]):0;

  /* ── 공백·괄호 제거 소문자 정규화 ── */
  /* 정규화: 공백·괄호·슬래시·특수문자 제거 + 소문자 */
  function nc(s){return String(s||'').replace(/[\s　\t\(\)（）\-·\/㎡]/g,'').toLowerCase();}

  /* ── 압구정로 112 / 압구정로 8길 3 판별 함수 ── */
  function is112(s){const v=nc(s);return /압구정.*112/.test(v)||/112.*압구정/.test(v);}
  function is8gil(s){const v=nc(s);return /압구정.*8길/.test(v)||/8길.*압구정/.test(v);}

  /* ── rows 전체 스캔으로 헤더 행 찾기 ──────────────────────────
     findHdrRow는 "가장 많은 셀이 채워진 행"을 찾는데
     IRR 시트는 헤더에 필지명이 있으므로 직접 탐색
  ─────────────────────────────────────────────────────────── */
  let irrHdrIdx=-1, irrCol112=-1, irrCol8=-1;

  /* 먼저 각 행을 검사해서 112/8길 컬럼이 있는 행을 헤더로 특정 */
  for(let ri=0;ri<Math.min(rows.length,10);ri++){
    const r=rows[ri];
    const c112=r.findIndex(c=>is112(c));
    const c8  =r.findIndex(c=>is8gil(c));
    if(c112>=0||c8>=0){
      irrHdrIdx=ri;
      irrCol112=c112;
      irrCol8  =c8;
      break;
    }
  }

  /* 헤더를 못 찾으면 findHdrRow 결과로 fallback */
  if(irrHdrIdx<0){
    irrHdrIdx=findHdrRow(rows);
  }

  const irrHdr =rows[irrHdrIdx];
  /* 헤더 이후 실제 데이터 행만 추출
     — 빈 행 제거 + 단일 제목 행(합계/소계/주석 등) 제거 */
  const irrData=rows.slice(irrHdrIdx+1).filter(r=>{
    const filled=r.filter(c=>String(c||'').trim());
    if(filled.length<2) return false; // 유효 셀이 2개 미만이면 제목/빈행
    return true;
  });

  /* 헤더 탐색 이후에도 컬럼을 못 찾았으면 헤더 재스캔 */
  if(irrCol112<0) irrCol112=irrHdr.findIndex(h=>is112(h));
  if(irrCol8  <0) irrCol8  =irrHdr.findIndex(h=>is8gil(h));

  /* 항목명 열: 필지 열이 아닌 첫 번째 유효 열 */
  const irrLabelCol=[0,1,2,3,4].find(i=>
    i!==irrCol112 && i!==irrCol8 &&
    irrHdr[i]!==undefined && irrHdr[i]!==''
  )??0;

  /* 비고 열 */
  const irrNoteCol=irrHdr.findIndex((h,i)=>
    i!==irrCol112&&i!==irrCol8&&i!==irrLabelCol&&
    /비고|메모|note|remark/i.test(h)
  );

  /* 진단 로그 — F12 콘솔에서 확인 */
  console.log('[IRR 시트 파싱]',{
    irrHdrIdx,
    irrCol112,irrCol8,irrLabelCol,irrNoteCol,
    headerRow : irrHdr.map((h,i)=>`[${i}]"${h}"`).join(' | '),
    totalRows : irrData.length,
    sample3   : irrData.slice(0,3).map(r=>r.map((c,i)=>`[${i}]${c}`).join(' | '))
  });

  /* ── 행 라벨 + 열 인덱스로 값 추출 ──────────────────────────
     propPats: 항목명 정규식 배열
     colIdx:   irrCol112 또는 irrCol8
  ─────────────────────────────────────────────────────────── */
  function irrGetVal(propPats, colIdx){
    if(colIdx<0) return '';
    /* irrData에서 항목명이 일치하는 행 탐색
       labelCol과 열0 둘 다 확인 (labelCol 오탐 방지) */
    const row=irrData.find(r=>{
      const lbl0=nc(r[0]||'');
      const lblN=irrLabelCol!==0?nc(r[irrLabelCol]||''):'';
      return propPats.some(p=>p.test(lbl0)||p.test(lblN));
    });
    if(!row) return '';
    return (row[colIdx]||'').toString().trim();
  }
  function irrGetNum(propPats, colIdx){
    const raw=irrGetVal(propPats,colIdx);
    if(!raw||raw==='-'||raw==='') return 0;
    return parseAmt(raw);
  }

  /* ── 필지별 전체 값 추출 ── */
  function irrExtract(colIdx){
    if(colIdx<0) return null;
    return{
      year    : irrGetVal([/매입연도|매입년|취득년|취득일|매입일/],colIdx),
      area    : irrGetVal([/면적/],colIdx),
      buyP    : irrGetNum([/매입총액|매입가|취득가|매매가|매입금액/],colIdx),
      loan    : irrGetNum([/대출(?!금리|이율)/],colIdx),
      deposit : irrGetNum([/보증금/],colIdx),
      rent    : irrGetNum([/월세|월임대료|임대료(?!보)/],colIdx),
      landPr  : irrGetNum([/공시지가(?!기준|합|총|현재)/],colIdx),
      landTot : irrGetNum([/현재가치|공시지가기준|토지가격|공시총액/],colIdx),
      loanRate: irrGetVal([/금리|이율|대출금리/],colIdx),
    };
  }

  const propA=irrExtract(irrCol112);
  const propB=irrExtract(irrCol8);

  console.log('[IRR 필지 추출값]',{
    A:propA, B:propB,
    hint: irrCol112<0||irrCol8<0
      ? '⚠️ 열을 못 찾음 — 헤더 행에 "압구정로 112", "압구정로 8길 3"이 있는지 확인하세요'
      : '✅ 열 탐색 성공'
  });

  /* ── 필지 카드 HTML 빌더 ── */
  function irrBuildCard(addr,p,tagLabel,tagCls,accent){
    if(!p){
      return`<div class="prop-card" style="--accent:${accent}">
        <div class="prop-head">
          <div><div class="prop-addr">${addr}</div></div>
          <span class="irr-addr-tag ${tagCls}">${tagLabel}</span>
        </div>
        <div class="prop-body">
          <div style="padding:18px 0;text-align:center;font-size:12px;color:var(--t4)">
            열 탐색 실패 — 헤더에 필지명 없음<br>
            <span style="font-size:10px">F12 → [IRR 시트 파싱] 확인</span>
          </div>
        </div>
      </div>`;
    }

    const areaNum=parseFloat(String(p.area||'').replace(/[^0-9.]/g,''))||0;
    const landCalc=p.landTot||(p.landPr&&areaNum?p.landPr*areaNum:0);
    const hasData =p.buyP||p.loan||p.deposit||p.rent||p.landPr||landCalc;

    const metaParts=[
      p.year ? `${p.year}년 매입` : '',
      areaNum ? `${areaNum.toLocaleString()}㎡` : (p.area?p.area+'㎡':'')
    ].filter(Boolean);

    const row=(lbl,val,cls='')=>val
      ?`<div class="prop-row"><span class="prop-key">${lbl}</span><span class="prop-val${cls?' '+cls:''}">${val}</span></div>`
      :'';

    return`<div class="prop-card" style="--accent:${accent}">
      <div class="prop-head">
        <div>
          <div class="prop-addr">${addr}</div>
          ${metaParts.length?`<div class="prop-meta">${metaParts.join(' · ')}</div>`:''}
        </div>
        <span class="irr-addr-tag ${tagCls}">${tagLabel}</span>
      </div>
      <div class="prop-body">
        ${hasData?`
          ${row('매입 총액', p.buyP   ?fmtBig(p.buyP)+'원'    :'','pv-red')}
          ${row('대출',      p.loan   ?fmtBig(p.loan)+'원'    :'','pv-blue')}
          ${row('보증금',    p.deposit?fmtBig(p.deposit)+'원' :'')}
          ${row('월 임대료', p.rent   ?fmtBig(p.rent)+'원/월' :'','pv-green')}
          ${p.loanRate?row('대출 금리',p.loanRate):''}
          ${row('공시지가',  p.landPr ?fmtBig(p.landPr)+'원/㎡':'')}
          ${landCalc?`<div class="prop-land-box">
            <span class="prop-land-lbl">🏛️ 현재 토지 가치</span>
            <span class="prop-land-val">${fmtBig(landCalc)}원</span>
          </div>`:''}
        `:`<div style="padding:18px 0;text-align:center;font-size:12px;color:var(--t4)">
          시트에서 값을 읽지 못했습니다<br>
          <span style="font-size:10px">F12 → [IRR 시트 파싱] → sample3 확인</span>
        </div>`}
      </div>
    </div>`;
  }

  const propCardsHTML=[
    irrBuildCard('압구정로 112',  propA,'A필지','tag-a','#4F7CFF'),

/* ════════════════════════════════════════════════════════════
   IRR 계산기 — 보조 함수들
   (renderIRR 와 별도 분리 → 이벤트 핸들러로 사용)
════════════════════════════════════════════════════════════ */

/* 슬라이더 값 표시 업데이트 */
function irrSlider(key,val,unit){
  const el=document.getElementById('lbl_'+key);
  if(!el)return;
  const n=parseFloat(val);
  if(unit==='만')      el.textContent=n.toLocaleString()+'만';
  else if(unit==='%')  el.textContent=n.toFixed(1)+'%';
  else if(unit==='x')  el.textContent=n.toFixed(1)+'x';
  else if(unit==='개월')el.textContent=n+'개월';
  else if(unit==='년') el.textContent=n+'년';
  else                 el.textContent=val+unit;
}

/* 시나리오 프리셋 적용 */
function irrSetScenario(scen,btn){
  /* 시나리오별 값 매핑 (하드코딩이 아니라 상수 테이블) */
  const PRESETS={
    conservative:{priceUp:1,rentUp:1,vacancy:10,newVacancy:15,rateA:4.5,rateB:4.5,constCost:420,designCost:6000,constMo:24,valueMult:1.8,pfRatio:50,pfRate:5.5,newRent:2000,newDep:8000,holdYrs:3,totalYrs:12},
    base:        {priceUp:3,rentUp:2,vacancy:5, newVacancy:10,rateA:3.5,rateB:3.5,constCost:350,designCost:5000,constMo:18,valueMult:2.5,pfRatio:60,pfRate:4.5,newRent:3000,newDep:10000,holdYrs:5,totalYrs:15},
    optimistic:  {priceUp:6,rentUp:3,vacancy:2, newVacancy:5, rateA:3.0,rateB:3.0,constCost:300,designCost:4000,constMo:14,valueMult:3.5,pfRatio:70,pfRate:3.8,newRent:4500,newDep:15000,holdYrs:7,totalYrs:18},
  };
  const p=PRESETS[scen];if(!p)return;

  /* 슬라이더 & 뱃지 일괄 업데이트 */
  const units={priceUp:'%',rentUp:'%',vacancy:'%',newVacancy:'%',rateA:'%',rateB:'%',acqTax:'%',
    constCost:'만',designCost:'만',constMo:'개월',valueMult:'x',
    pfRatio:'%',pfRate:'%',newRent:'만',newDep:'만',holdYrs:'년',totalYrs:'년'};
  Object.entries(p).forEach(([k,v])=>{
    const sl=document.getElementById('sl_'+k);if(sl)sl.value=v;
    irrSlider(k,v,units[k]||'');
  });

  /* 버튼 active 토글 */
  document.querySelectorAll('.calc-scen-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
}

/* ── IRR 계산 실행 ── */
function irrCalcRun(){
  const box=document.getElementById('irr-result-box');
  if(!box)return;

  /* [계산기 상태 레이어] 슬라이더 현재 값 수집 */
  const g=id=>parseFloat(document.getElementById(id)?.value||0);
  const S={
    priceUp    :g('sl_priceUp')/100,
    rentUp     :g('sl_rentUp')/100,
    vacancy    :g('sl_vacancy')/100,       // 임대보유 기간 공실률
    rateA      :g('sl_rateA')/100,
    rateB      :g('sl_rateB')/100,
    acqTax     :g('sl_acqTax')/100,        // 취득세율 — 초기 투자금에 반영됨
    constCost  :g('sl_constCost')*10000,   // 만원→원
    designCost :g('sl_designCost')*10000,
    constMo    :g('sl_constMo'),
    valueMult  :g('sl_valueMult'),
    pfRatio    :g('sl_pfRatio')/100,
    pfRate     :g('sl_pfRate')/100,
    newRent    :g('sl_newRent')*10000,
    newDep     :g('sl_newDep')*10000,
    newVacancy :g('sl_newVacancy')/100||0.10, // 신축 후 공실률 (기본 10%)
    holdYrs    :g('sl_holdYrs'),
    totalYrs   :g('sl_totalYrs'),
  };

  /* [데이터 레이어] 시트 기본값 참조 (원본 불변) */
  const sd=window._irrSheetData;
  if(!sd){box.style.display='block';box.innerHTML=irrErrBox('필수 시트 컬럼 누락 — 시트 데이터를 먼저 로드해주세요');return;}

  const av=(r,i)=>i>=0?parseAmt(r[i]):0;
  const sv=(r,i)=>i>=0?(r[i]||''):'';

  /* 두 필지 합산 ─────────────────────────────────────────────────
     구조B(행=항목, 열=필지): _irrSheetData에 직접값 저장됨 → 우선 사용
     구조A(행=필지, 열=속성): 컬럼 인덱스로 계산 (기존 방식)
  ─────────────────────────────────────────────────────────────── */
  let totalBuy=0,totalLoan=0,totalDep=0,totalRent=0,totalArea=0,totalLandVal=0;

  if(sd._isStructureB){
    /* 구조B: renderIRR에서 미리 계산한 합산값 직접 사용 */
    totalBuy    =sd._totalBuy    ||0;
    totalLoan   =sd._totalLoan   ||0;
    totalDep    =sd._totalDep    ||0;
    totalRent   =sd._totalRent   ||0;
    totalArea   =sd._totalAreaNum||0;
    totalLandVal=sd._totalLandVal||0;
  }else{
    /* 구조A: 컬럼 인덱스 기반 계산 (기존 방식) */
    sd.groups.forEach((g)=>{
      g.rows.forEach(r=>{
        totalBuy   +=av(r,sd.buyPriceIdx);
        totalLoan  +=av(r,sd.loanIdx);
        totalDep   +=av(r,sd.depositIdx);
        totalRent  +=av(r,sd.rentIdx);
        const a=parseFloat(String(sv(r,sd.areaIdx)).replace(/[^0-9.]/g,''))||0;
        totalArea  +=a;
        const lp=av(r,sd.landPrIdx),lt=av(r,sd.landTotIdx);
        totalLandVal+=lt||(lp*a);
      });
    });
  }

  /* 데이터 충분성 검사 */
  const missing=[];
  if(!totalBuy)  missing.push('매입가(시트)');
  if(!totalArea) missing.push('면적(시트)');
  if(missing.length){
    box.style.display='block';
    box.innerHTML=irrErrBox('계산용 값 부족 — 시트에 다음 컬럼을 확인하세요: '+missing.join(', ')+'<br><small>F12 콘솔 → [IRR 시트 구조] 로그를 확인하세요</small>');
    return;
  }

  /* ── [계산 레이어] ──────────────────────────────────────
     현금흐름 배열 구성:
       t=0: 초기 투자 (음수)
       t=1~holdYrs: 임대 보유 기간 연간 현금흐름
       t=holdYrs+1~holdYrs+constMo/12: 공사기간 (임대 없음, 신축비 발생)
       t=holdYrs+constMo/12~totalYrs: 신축 후 임대 현금흐름 + 종료가치
  ─────────────────────────────────────────────────────── */

  const constYrs=S.constMo/12;
  const newLeasYrs=S.totalYrs-S.holdYrs-constYrs;

  /* 취득세 */
  const acqTaxAmt=totalBuy*S.acqTax;

  /* 초기 자기자본 투자 = 매입가 − 대출 − 보증금 + 취득세 */
  const equity=totalBuy-totalLoan-totalDep+acqTaxAmt;
  if(equity<=0){
    box.style.display='block';
    box.innerHTML=irrErrBox('출구가정 부족 — 자기자본이 0 이하입니다. 대출·보증금을 확인하세요');
    return;
  }

  /* 연간 이자 비용 (두 필지 평균 금리 단순화) */
  const avgRate=(S.rateA+S.rateB)/2;
  const annualInterest=totalLoan*avgRate;

  /* 임대 보유 기간 연간 순현금흐름 */
  const cfHold=[];
  for(let yr=1;yr<=S.holdYrs;yr++){
    const rentInc=totalRent*12*Math.pow(1+S.rentUp,yr-1)*(1-S.vacancy);
    const cf=rentInc-annualInterest;
    cfHold.push(cf);
  }

  /* 신축 비용 (면적 × 시공비 + 설계·감리) */
  const constTotalCost=totalArea*S.constCost+S.designCost;
  const pfLoan=constTotalCost*S.pfRatio;
  const equityConst=constTotalCost-pfLoan;  /* 신축 자기자본 */

  /* 공사기간 중 현금흐름 (임대 없음, 신축 자기자본 투입) */
  /* 단순화: 공사기간을 1개 현금흐름 시점으로 처리 */
  const cfConst=-(equityConst);

  /* 신축 후 임대 연간 현금흐름 — newVacancy(신축 공실률) 별도 반영 */
  const newAnnualInterest=pfLoan*S.pfRate;
  const cfNew=[];
  for(let yr=1;yr<=Math.max(1,Math.round(newLeasYrs));yr++){
    /* 신축 임대: newRent에 신축 공실률(newVacancy) 적용 */
    const rentInc=S.newRent*12*Math.pow(1+S.rentUp,yr-1)*(1-S.newVacancy);
    const cf=rentInc-newAnnualInterest;
    cfNew.push(cf);
  }

  /* 종료 가치 (토지 현재가치 × 시세상승 × 신축가치배수) */
  const exitLandVal=totalLandVal||totalBuy;
  const exitVal=exitLandVal*Math.pow(1+S.priceUp,S.totalYrs)*S.valueMult;
  /* 신축대출 상환 후 잔여 */
  const exitNet=exitVal-pfLoan+S.newDep;  /* 신축 보증금 회수 */

  /* 현금흐름 배열 조립 (연 단위, 정수 연도로 단순화) */
  const cashflows=[-equity];
  cfHold.forEach(v=>cashflows.push(v));
  cashflows.push(cfConst);
  cfNew.forEach(v=>cashflows.push(v));
  /* 마지막 연도에 종료가치 추가 */
  cashflows[cashflows.length-1]=(cashflows[cashflows.length-1]||0)+exitNet;

  /* Newton-Raphson IRR 계산 */
  function calcIRR(cfs,guess=0.1,iter=200,tol=1e-8){
    let r=guess;
    for(let i=0;i<iter;i++){
      let npv=0,dnpv=0;
      cfs.forEach((c,t)=>{
        const d=Math.pow(1+r,t);
        npv+=c/d;
        dnpv-=t*c/Math.pow(1+r,t+1);
      });
      if(Math.abs(dnpv)<1e-10)break;
      const r2=r-npv/dnpv;
      if(Math.abs(r2-r)<tol)return r2;
      r=r2;
    }
    return r;
  }

  let irr=null,irrErr='';
  try{
    irr=calcIRR(cashflows);
    if(isNaN(irr)||!isFinite(irr))throw new Error('수렴 실패');
  }catch(e){irrErr='운영기간 데이터 부족 — 현금흐름이 수렴하지 않습니다';}

  /* 누적 임대수익 */
  const cumRent=cfHold.reduce((a,b)=>a+b,0)+cfNew.reduce((a,b)=>a+b,0);
  const totalInvest=equity+equityConst;
  const totalCost=constTotalCost+acqTaxAmt+annualInterest*S.holdYrs+newAnnualInterest*Math.max(1,Math.round(newLeasYrs));
  const netProfit=exitNet+cumRent-totalInvest;

  /* 단순 회수기간 (Payback) */
  let payback=null,cumCF=0;
  for(let i=0;i<cashflows.length;i++){
    cumCF+=cashflows[i];
    if(cumCF>=0&&payback===null)payback=i;
  }

  /* ── 결과 표시 ── */
  box.style.display='block';
  const irrColor=irr&&irr>0?'var(--green)':irr&&irr<0?'var(--red)':'var(--t3)';

  box.innerHTML=`
  <div class="irr-result-card">
    <div class="irr-res-head">
      <div style="font-size:13px;font-weight:600;color:var(--t1)">📊 IRR 시뮬레이션 결과</div>
      <div style="font-size:10px;color:var(--t3)">시트 원본 + 계산기 조정값 기준</div>
    </div>
    <div class="irr-res-body">
      ${irrErr?`<div class="irr-res-warn">⚠️ ${irrErr}</div>`:''}
      <div class="irr-res-big">
        <div class="irr-res-big-lbl">예상 IRR</div>
        <div class="irr-res-big-num" style="color:${irrColor}">${irr?((irr*100).toFixed(2)+'%'):'계산 불가'}</div>
        <div style="font-size:11px;color:var(--t3);margin-top:4px">분석 기간 ${S.totalYrs}년 기준</div>
      </div>
      <div class="irr-res-grid">
        ${resRow('총 자기자본 투자',fmtBig(totalInvest)+'원','red')}
        ${resRow('└ 매입 자기자본',fmtBig(equity)+'원','red')}
        ${resRow('└ 취득세',fmtBig(acqTaxAmt)+'원 ('+((S.acqTax*100).toFixed(1))+'%)','yellow')}
        ${resRow('└ 신축 자기자본',fmtBig(equityConst)+'원','red')}
        ${resRow('신축 PF 대출',fmtBig(pfLoan)+'원','blue')}
        ${resRow('예상 종료가치',fmtBig(exitVal)+'원','green')}
        ${resRow('누적 임대수익',fmtBig(Math.max(0,cumRent))+'원','green')}
        ${resRow('총 비용(추정)',fmtBig(totalCost)+'원','yellow')}
        ${resRow('순 수익(추정)',fmtBig(netProfit)+'원',netProfit>=0?'green':'red')}
        ${payback!==null?resRow('회수기간 참고',payback+'년차'):''}
      </div>
      <div class="irr-res-assumptions">
        <div style="font-size:10px;color:var(--t3);margin-bottom:6px;font-weight:600;letter-spacing:.5px">사용된 주요 가정</div>
        <div class="irr-assum-tags">
          <span>시세상승 ${(S.priceUp*100).toFixed(1)}%/년</span>
          <span>임대인상 ${(S.rentUp*100).toFixed(1)}%/년</span>
          <span>임대보유 공실 ${(S.vacancy*100).toFixed(0)}%</span>
          <span>신축 후 공실 ${(S.newVacancy*100).toFixed(0)}%</span>
          <span>취득세 ${(S.acqTax*100).toFixed(1)}%</span>
          <span>평균금리 ${(avgRate*100).toFixed(1)}%</span>
          <span>시공비 ${(S.constCost/10000).toFixed(0)}만/㎡</span>
          <span>가치배수 ${S.valueMult.toFixed(1)}x</span>
          <span>PF ${(S.pfRatio*100).toFixed(0)}%</span>
          <span>임대보유 ${S.holdYrs}년</span>
        </div>
      </div>
    </div>
  </div>`;
}

/* 결과 행 빌더 */
function resRow(lbl,val,color){
  const c={red:'var(--red)',green:'var(--green)',blue:'var(--blue)',yellow:'var(--yellow)'}[color]||'var(--t1)';
  return`<div class="irr-res-row"><span class="irr-res-key">${lbl}</span><span class="irr-res-val" style="color:${c}">${val}</span></div>`;
}
/* 에러 박스 */
function irrErrBox(msg){
  return`<div class="irr-res-card" style="border-color:rgba(240,56,96,.25)">
    <div class="irr-res-body"><div class="irr-res-warn">⚠️ ${msg}</div></div></div>`;
}

/* ════════════════════════════════════════════════════════════
   3. LEASE — 표 기반 · 건물별 그룹화
   ★ 구글 시트 데이터 100% 실시간 반영 / 하드코딩 없음
════════════════════════════════════════════════════════════ */
function renderLease(rows){
  const sec=document.getElementById('sec-lease');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}

  /* ══ [데이터 레이어] 시트 원본 파싱 ════════════════════════════
     ★ 구글 시트 fetch → parseCSV → rows 그대로 유지
     ★ 하드코딩 없음, 컬럼 탐색 헤더 기반
  ════════════════════════════════════════════════════════════ */
  const hi=findHdrRow(rows);
  const hdr=rows[hi];

  /* 컬럼 자동 탐색 */
  const addrIdx    =hdr.findIndex(h=>/주소|소재지|위치|물건|건물|부동산/i.test(h));
  const floorIdx   =hdr.findIndex(h=>/층|floor/i.test(h));
  const nameIdx    =hdr.findIndex(h=>/임차인|사용자|회사|성명|이름|name|tenant/i.test(h));
  const rentIdx    =hdr.findIndex(h=>/월세|월임대료|임대료(?!보)/i.test(h));
  const depositIdx =hdr.findIndex(h=>/보증금|deposit/i.test(h));
  const mgmtIdx    =hdr.findIndex(h=>/관리비|관리료|maintenance/i.test(h));
  const landRentIdx=hdr.findIndex(h=>/토지임대료|토지료|지대/i.test(h));
  const statusIdx  =hdr.findIndex(h=>/상태|계약상태|현황|status/i.test(h));
  const startIdx   =hdr.findIndex(h=>/시작|계약시작|임대시작|from|start/i.test(h));
  const endIdx     =hdr.findIndex(h=>/종료|만료|계약종료|to|end/i.test(h));
  const areaIdx    =hdr.findIndex(h=>/면적|평수|㎡|평/i.test(h));

  function amt(r,idx){return idx>=0?parseAmt(r[idx]):0;}
  function str(r,idx){return idx>=0?((r[idx]||'').toString().trim()):'';} 

  /* ══ [유효 행 판별] ════════════════════════════════════════════
     아래 조건 중 하나라도 만족해야 "실제 계약 데이터 행"으로 인정:
     1. 임차인명이 존재 (합계/소계/헤더 반복 제외)
     2. 계약 시작일 또는 종료일이 존재
     3. 보증금 / 월임대료 / 관리비 / 토지임대료 중 실제 금액이 있음
     + 반드시 제외: 합계·소계·헤더반복·구분·빈값 행
  ════════════════════════════════════════════════════════════ */
  /* 제외 패턴: 임차인 또는 첫 셀이 아래 키워드면 데이터 행에서 제거 */
  const EXCLUDE_PAT=/^(합계|소계|계|subtotal|total|sum|항목|임차인|구분|건물|주소|\-|—|\s*)$/i;

  function isValidRow(r){
    const name=str(r,nameIdx);
    const start=str(r,startIdx);
    const end  =str(r,endIdx);
    const moneySum=amt(r,depositIdx)+amt(r,rentIdx)+amt(r,mgmtIdx)+amt(r,landRentIdx);

    /* 임차인명이 있어도 합계/소계/헤더 키워드면 제외 */
    if(name&&EXCLUDE_PAT.test(name)) return false;
    /* 첫 번째 셀도 합계류면 제외 */
    const cell0=(r[0]||'').toString().trim();
    if(EXCLUDE_PAT.test(cell0)&&!name&&!moneySum) return false;
    /* 유효 조건: 임차인 OR 날짜 OR 금액 중 하나 이상 */
    return !!(name||start||end||moneySum>0);
  }

  /* 전체 데이터 행 — 헤더 이후, 유효 행만 */
  const allRows=rows.slice(hi+1);
  const data=allRows.filter(r=>isValidRow(r));

  /* ══ [그룹핑] — 건물/주소 기준, 중복 없이 ═════════════════════
     우선순위:
     1. addrIdx 컬럼에 실제 주소값이 있으면 그것을 그룹명으로 사용
     2. 없으면 임차인명 / 금액 패턴으로 추정
     + 그룹명은 반드시 실제 건물/자산명이어야 함
     + 합계·빈값·구분 텍스트는 절대 그룹명 불가
  ════════════════════════════════════════════════════════════ */
  /* 무효 그룹명 패턴 */
  const INVALID_ADDR=/^(합계|소계|계|total|sum|건물|주소|항목|—|\-|\s*)$/i;

  /* 주소 정규화: 공백 제거 후 비교 */
  function normAddr(a){return String(a||'').replace(/\s/g,'');}

  const groupMap=new Map();
  data.forEach(r=>{
    let addr=str(r,addrIdx).trim();

    /* addrIdx가 없거나 값이 무효 그룹명이면 추정 */
    if(!addr||INVALID_ADDR.test(addr)){
      const name=str(r,nameIdx);
      const lrent=amt(r,landRentIdx);
      const rent =amt(r,rentIdx);
      /* 토지임대 성격: 토지 키워드 or 토지임대료만 있고 월세 0 */
      if(/토지/.test(name)||(lrent>0&&rent===0)) addr='토지임대';
      else if(/디파이넘버|defynumber/i.test(name)) addr='압구정로8길 3';
      else if(/블루피카/i.test(name))              addr='압구정로8길 3';
      else if(name)                                 addr='압구정로 112';
      else                                          return; /* 이름도 없으면 스킵 */
    }

    /* 최종 무효 그룹명 방어 */
    if(INVALID_ADDR.test(addr)) return;

    /* 기존 그룹과 정규화 비교해서 같은 건물이면 합치기 (중복 방지) */
    let matchedKey=null;
    for(const [k] of groupMap){
      if(normAddr(k)===normAddr(addr)){matchedKey=k;break;}
    }
    const key=matchedKey||addr;
    if(!groupMap.has(key))groupMap.set(key,[]);
    groupMap.get(key).push(r);
  });

  /* ══ [섹션 순서 정렬] ═══════════════════════════════════════ */
  const SECTION_ORDER=['압구정로112','압구정로8길3','토지임대'];
  const validEntries=[...groupMap.entries()];

  const ordered=[];
  SECTION_ORDER.forEach(key=>{
    const found=validEntries.find(([a])=>
      normAddr(a).includes(normAddr(key))||normAddr(key).includes(normAddr(a))
    );
    if(found&&!ordered.includes(found))ordered.push(found);
  });
  validEntries.forEach(e=>{if(!ordered.includes(e))ordered.push(e);});

  /* ══ [UI 레이어] 만료 배지 ══════════════════════════════════ */
  function expBadge(r){
    const stTxt=str(r,statusIdx);
    if(stTxt){
      if(/만료|종료|해지/i.test(stTxt))return`<span class="exp-badge exp-done">${stTxt}</span>`;
      if(/예정|임박|주의/i.test(stTxt))return`<span class="exp-badge exp-near">${stTxt}</span>`;
      if(/유효|활성|계약중|진행/i.test(stTxt))return`<span class="exp-badge exp-ok">${stTxt}</span>`;
    }
    const endTxt=str(r,endIdx);
    if(!endTxt)return`<span class="exp-badge exp-none">—</span>`;
    const m=endTxt.match(/(\d{4})/);
    if(!m)return`<span class="exp-badge exp-none">${endTxt}</span>`;
    const yr=parseInt(m[1]),diff=yr-new Date().getFullYear();
    if(diff<0) return`<span class="exp-badge exp-done">만료 (${yr})</span>`;
    if(diff===0)return`<span class="exp-badge exp-near">올해 만료</span>`;
    if(diff===1)return`<span class="exp-badge exp-warn">내년 만료 (${yr})</span>`;
    return`<span class="exp-badge exp-ok">${yr}</span>`;
  }
  function amtCell(v,cls){
    if(!v||v===0)return`<span class="amt-muted">—</span>`;
    return`<span class="${cls||''}">${fmtBig(v)}원</span>`;
  }

  /* ══ [섹션 렌더러] ══════════════════════════════════════════
     gRows: 이미 isValidRow() 필터 통과한 행들만 들어옴
     → tbody에는 실제 계약 데이터만 렌더링
     → 합계행은 코드로 계산해서 맨 아래에만 추가
  ════════════════════════════════════════════════════════════ */
  function groupSection(addr,gRows){
    /* 금액 합산 */
    const sumRent =gRows.reduce((a,r)=>a+amt(r,rentIdx),0);
    const sumDep  =gRows.reduce((a,r)=>a+amt(r,depositIdx),0);
    const sumMgmt =gRows.reduce((a,r)=>a+amt(r,mgmtIdx),0);
    const sumLrent=gRows.reduce((a,r)=>a+amt(r,landRentIdx),0);
    const sumMonth=sumRent+sumMgmt+sumLrent;

    /* 행 렌더링 */
    const tbody=gRows.map(r=>{
      const rent=amt(r,rentIdx),dep=amt(r,depositIdx);
      const mgmt=amt(r,mgmtIdx),lrent=amt(r,landRentIdx);
      const monthly=rent+mgmt+lrent;
      return`<tr>
        <td class="name">${str(r,nameIdx)||'—'}</td>
        <td class="floor">${str(r,floorIdx)||'—'}</td>
        ${areaIdx>=0?`<td>${str(r,areaIdx)||'—'}</td>`:''}
        <td>${str(r,startIdx)||'—'}</td>
        <td>${str(r,endIdx)||'—'}</td>
        <td>${expBadge(r)}</td>
        <td class="r">${amtCell(dep,'amt-blue')}</td>
        <td class="r">${amtCell(rent,'amt-green')}</td>
        <td class="r">${amtCell(mgmt,'')}</td>
        <td class="r">${amtCell(lrent,'amt-purple')}</td>
        <td class="r">${monthly>0?`<span class="amt-total">${fmtBig(monthly)}원</span>`:`<span class="amt-muted">—</span>`}</td>
      </tr>`;
    }).join('');

    /* 합계 행 — 금액이 있을 때만 */
    const colSpanBase=areaIdx>=0?6:5;
    const sumRow=(sumDep||sumRent||sumMgmt||sumLrent)?`<tr class="sum-row">
      <td colspan="${colSpanBase}">합 계</td>
      <td class="r">${amtCell(sumDep,'amt-blue')}</td>
      <td class="r">${amtCell(sumRent,'amt-green')}</td>
      <td class="r">${amtCell(sumMgmt,'')}</td>
      <td class="r">${amtCell(sumLrent,'amt-purple')}</td>
      <td class="r">${sumMonth>0?`<span class="amt-total">${fmtBig(sumMonth)}원</span>`:`<span class="amt-muted">—</span>`}</td>
    </tr>`:'';

    /* 요약 카드 */
    const summaryItems=[
      sumRent ?`<div class="ls-summary-item"><span class="ls-si-lbl">월 임대료</span><span class="ls-si-val green">${fmtBig(sumRent)}원</span></div>`:'',
      sumLrent?`<div class="ls-summary-item"><span class="ls-si-lbl">토지임대료</span><span class="ls-si-val purple">${fmtBig(sumLrent)}원</span></div>`:'',
      sumMgmt ?`<div class="ls-summary-item"><span class="ls-si-lbl">관리비</span><span class="ls-si-val">${fmtBig(sumMgmt)}원</span></div>`:'',
      sumDep  ?`<div class="ls-summary-item"><span class="ls-si-lbl">보증금</span><span class="ls-si-val blue">${fmtBig(sumDep)}원</span></div>`:'',
      sumMonth?`<div class="ls-summary-item ls-si-total"><span class="ls-si-lbl">월 합계</span><span class="ls-si-val white">${fmtBig(sumMonth)}원</span></div>`:'',
    ].filter(Boolean).join('');

    return`<div class="ls-section">
      <div class="ls-group-head">
        <div class="ls-group-bar"></div>
        <div class="ls-group-title">${addr}</div>
        <div class="ls-group-meta">${gRows.length}건</div>
      </div>
      ${summaryItems?`<div class="ls-summary-row">${summaryItems}</div>`:''}
      <div class="ls-table-wrap"><div style="overflow-x:auto">
        <table class="ls-table">
          <thead><tr>
            <th>임차인</th><th>층</th>${areaIdx>=0?'<th>면적</th>':''}
            <th>계약 시작</th><th>계약 종료</th><th>만료 상태</th>
            <th class="r">보증금</th><th class="r">월 임대료</th>
            <th class="r">관리비</th><th class="r">토지임대료</th><th class="r">월 합계</th>
          </tr></thead>
          <tbody>${tbody}${sumRow}</tbody>
        </table>
      </div></div>
    </div>`;
  }

  /* ══ [KPI 집계] — 유효 행(data)만 사용, 중복 없음 ═════════ */
  const totalRent =data.reduce((a,r)=>a+amt(r,rentIdx),0);
  const totalLrent=data.reduce((a,r)=>a+amt(r,landRentIdx),0);
  const totalMgmt =data.reduce((a,r)=>a+amt(r,mgmtIdx),0);
  const totalDep  =data.reduce((a,r)=>a+amt(r,depositIdx),0);
  const totalMonth=totalRent+totalMgmt+totalLrent;
  let aC=0,eC=0,wC=0;
  data.forEach(r=>{
    const stTxt=str(r,statusIdx),endTxt=str(r,endIdx);
    if(/만료|종료|해지/i.test(stTxt)){eC++;return;}
    if(/예정|임박|주의/i.test(stTxt)){wC++;return;}
    if(/유효|활성|계약중|진행/i.test(stTxt)){aC++;return;}
    if(endTxt){
      const m=endTxt.match(/(\d{4})/);
      if(m){
        const diff=parseInt(m[1])-new Date().getFullYear();
        if(diff<0){eC++;return;}
        if(diff<=1){wC++;return;}
      }
      aC++;
    }
  });

  /* ══ 섹션 HTML 조립 ══════════════════════════════════════ */
  const sections=ordered.map(([a,r])=>groupSection(a,r)).join('');

  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 임대차계약현황</div>
    <div class="kpi-row" style="grid-template-columns:repeat(auto-fit,minmax(0,140px));justify-content:start;">
      <div class="kpi b"><div class="kpi-lbl">총 계약</div><div class="kpi-val">${data.length}</div><div class="kpi-sub">유효 계약 건수</div></div>
      ${aC?`<div class="kpi g"><div class="kpi-lbl">계약 유효</div><div class="kpi-val" style="color:var(--green)">${aC}</div><div class="kpi-sub">진행중</div></div>`:''}
      ${eC?`<div class="kpi r"><div class="kpi-lbl">만료·종료</div><div class="kpi-val" style="color:var(--red)">${eC}</div><div class="kpi-sub">종료</div></div>`:''}
      ${wC?`<div class="kpi y"><div class="kpi-lbl">주의</div><div class="kpi-val" style="color:var(--yellow)">${wC}</div><div class="kpi-sub">곧 만료</div></div>`:''}
      ${totalRent?`<div class="kpi p"><div class="kpi-lbl">월 임대료</div><div class="kpi-val" style="color:var(--purple)">${fmtBig(totalRent)}원</div><div class="kpi-sub">전체 합산</div></div>`:''}
      ${totalMgmt?`<div class="kpi b"><div class="kpi-lbl">관리비</div><div class="kpi-val">${fmtBig(totalMgmt)}원</div><div class="kpi-sub">월 기준</div></div>`:''}
      ${totalDep?`<div class="kpi b"><div class="kpi-lbl">보증금</div><div class="kpi-val">${fmtBig(totalDep)}원</div><div class="kpi-sub">전체 합산</div></div>`:''}
      ${totalLrent?`<div class="kpi b"><div class="kpi-lbl">토지임대료</div><div class="kpi-val">${fmtBig(totalLrent)}원</div><div class="kpi-sub">월 기준</div></div>`:''}
    </div>
    ${sections||`<div class="empty"><div class="empty-i">📭</div>임차인 데이터가 없습니다</div>`}`;
}
/* ════════════════════════════════════════════════════════════
   4. PERSONAL COST — 개인 Cash Flow 분석
   ★ 구글 시트 구조: 가로형 매트릭스 (열=항목, 행=속성)
     - "1. 개인 수입 항목" 섹션: 각 열이 하나의 수입 항목
     - "2. 개인 지출 항목" 섹션: 각 열이 하나의 지출 항목
     - 첫 번째 열 = 속성명 (항목 / 금액 / 수입기간 / 납부기간)
   ★ fetch 구조 및 전체 앱 흐름 무수정
════════════════════════════════════════════════════════════ */
function renderPersonal(rows){
  const sec=document.getElementById('sec-personal');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}

  /* ══ [가로형 매트릭스 파서] ═══════════════════════════════════
     실제 시트 구조:
       행0: "1. 개인 수입 항목" (섹션 제목)
       행1: 항목  | 월임대료(112) | 월관리비(112) | ...
       행2: 금액  | 44730000      | 4138700       | ...
       행3: 수입기간 | 2026-05~2028-12 | ...
       (빈 행)
       행N: "2. 개인 지출 항목" (섹션 제목)
       행N+1: 항목  | 대출(112) | 고정비(112) | ...
       행N+2: 금액  | 37000000  | 12000000    | ...
       행N+3: 납부기간 | 2026-05~2028-12 | ...
  ═════════════════════════════════════════════════════════════ */

  /* ════════════════════════════════════════════════════════════
     [가로형 매트릭스 파서] 핵심 로직
     ★ 제목 탐지: 행 전체 셀 순회 + 초광범위 정규식
     ★ 속성명 탐지: 행의 모든 셀에서 검색
     ★ 병합 셀 forward-fill 적용
     ★ fetch 연동 구조 무수정
  ═══════════════════════════════════════════════════════════ */

  /* ── 문자열 정규화: 공백/줄바꿈/NBSP/특수공백 모두 제거 ── */
  function nc(s){
    return String(s||'')
      .replace(/\u00a0|\u3000|\u200b/g,' ')  /* NBSP·전각공백·ZWSP */
      .replace(/[\r\n\t]+/g,' ')              /* 줄바꿈·탭 */
      .replace(/\s+/g,' ')                    /* 연속 공백 */
      .trim();
  }
  function norm(s){return nc(s).toLowerCase();}

  /* ── 행 전체에서 특정 패턴을 가진 셀 찾기 ── */
  function rowHas(r, pat){
    return r.some(c=>pat.test(norm(c)));
  }

  /* ── 디버그: rows 원본 구조 출력 (F12 콘솔에서 확인) ── */
  console.log('[개인비용 raw rows]', {
    총행수: rows.length,
    첫10행: rows.slice(0,10).map((r,i)=>`[${i}] `+r.map(c=>nc(c)).filter(c=>c).join(' | ')),
    전체행라벨: rows.map((r,i)=>[i, nc(r[0]||''), nc(r[1]||'')])
  });

  /* ── 속성명 행 판별 ── */
  function getLabelType(r){
    /* 행에서 첫 번째 비어있지 않은 셀 추출 */
    const first=norm(r.find(c=>nc(c))||'');
    if(first==='항목')                    return 'item';
    if(first==='금액')                    return 'amount';
    if(/수입.*기간|기간.*수입/.test(first)) return 'income_period';
    if(/납부.*기간|기간.*납부/.test(first)) return 'expense_period';
    if(/기간/.test(first))                return 'period';
    return null;
  }

  /* ── 제목 행 판별 ─────────────────────────────────────────
     실제 시트: "1. 개인 수입 항목", "2. 개인 지출 항목"
     ★ 중요: 속성명 행(항목/금액/기간)과 절대 혼동 안 되도록
       → getLabelType이 null인 행에서만 제목 탐지
       → 숫자+점 패턴 ("1." "2.") 또는 "개인+수입+항목" 동시 포함
  ─────────────────────────────────────────────────────────── */
  function isSectionTitle(r){
    /* 속성명 행이면 제목이 아님 */
    if(getLabelType(r)!==null) return false;
    /* 행 전체 셀을 합쳐서 검사 */
    const joined=r.map(c=>norm(c)).join(' ');
    /* "1." 또는 "2." 로 시작하는 섹션 제목 패턴 */
    if(/^\s*[12]\.\s*(개인)/.test(r.map(c=>nc(c)).join(' '))) return true;
    /* 또는 "개인" + ("수입"|"지출") + "항목" 모두 포함 */
    if(/개인/.test(joined)&&/수입|지출/.test(joined)&&/항목/.test(joined)) return true;
    return false;
  }
  function isIncomeTitle(r){
    if(!isSectionTitle(r)) return false;
    const joined=r.map(c=>norm(c)).join(' ');
    return /수입/.test(joined)&&!/지출/.test(joined);
  }
  function isExpenseTitle(r){
    if(!isSectionTitle(r)) return false;
    const joined=r.map(c=>norm(c)).join(' ');
    return /지출/.test(joined);
  }

  /* ── 디버그 로그 (F12 콘솔) ── */
  console.log('[개인비용 rows]',{
    총행수:rows.length,
    첫10행:rows.slice(0,10).map((r,i)=>`[${i}] `+r.filter(c=>nc(c)).map(c=>nc(c)).join(' | ')),
    labelTypes:rows.slice(0,10).map((r,i)=>`[${i}] lt=${getLabelType(r)} inc=${isIncomeTitle(r)} exp=${isExpenseTitle(r)}`)
  });

  /* ── 섹션 블록 분리 ────────────────────────────────────────
     1단계: 제목 행 기반 분리 (가장 정확)
     2단계: "수입기간"→"납부기간" 경계 탐지
     3단계: "항목" 행 2개 기준 분리
     4단계: 전체를 수입으로 (최후 fallback)
  ─────────────────────────────────────────────────────────── */
  let incomeBlock=[], expenseBlock=[];

  /* 1단계 */
  let inIncome=false, inExpense=false;
  rows.forEach(r=>{
    if(isIncomeTitle(r)){ inIncome=true; inExpense=false; return; }
    if(isExpenseTitle(r)){ inExpense=true; inIncome=false; return; }
    if(inIncome)  incomeBlock.push(r);
    if(inExpense) expenseBlock.push(r);
  });
  console.log('[개인비용 1단계]',{수입:incomeBlock.length,지출:expenseBlock.length});

  /* 2단계: 납부기간 행 직전 항목 행을 경계로 분리 */
  if(!incomeBlock.length&&!expenseBlock.length){
    const all=rows.filter(r=>r.some(c=>nc(c)));
    for(let i=0;i<all.length;i++){
      const lt=getLabelType(all[i]);
      if(lt==='expense_period'){
        /* 직전 "항목" 행 찾기 */
        let b=i;
        for(let j=i-1;j>=0;j--){
          if(getLabelType(all[j])==='item'){b=j;break;}
        }
        incomeBlock=all.slice(0,b);
        expenseBlock=all.slice(b);
        break;
      }
    }
    console.log('[개인비용 2단계]',{수입:incomeBlock.length,지출:expenseBlock.length});
  }

  /* 3단계: "항목" 행이 2개인 경우 */
  if(!incomeBlock.length&&!expenseBlock.length){
    const all=rows.filter(r=>r.some(c=>nc(c)));
    const itemIdxs=all.map((r,i)=>getLabelType(r)==='item'?i:-1).filter(i=>i>=0);
    if(itemIdxs.length>=2){
      incomeBlock=all.slice(itemIdxs[0],itemIdxs[1]);
      expenseBlock=all.slice(itemIdxs[1]);
    } else {
      incomeBlock=all; /* 4단계 fallback */
    }
    console.log('[개인비용 3/4단계]',{itemIdxs,수입:incomeBlock.length,지출:expenseBlock.length});
  }

  /* ── 블록 → 항목 객체 배열 변환 ─────────────────────────────
     각 열(1번 이상)을 독립 항목으로 변환
     병합 셀 forward-fill: 빈 기간 셀 → 직전 열 기간값 사용
  ─────────────────────────────────────────────────────────── */
  function blockToItems(block, type){
    /* 속성명 행 찾기 — 행 전체 셀 기반 */
    let itemRow=null, amountRow=null, periodRow=null;
    block.forEach(r=>{
      /* 빈 행 스킵 */
      if(!r.some(c=>nc(c))) return;
      const lt=getLabelType(r);
      if((lt==='item')                            &&!itemRow)   itemRow=r;
      if(lt==='amount'                            &&!amountRow) amountRow=r;
      if((lt==='period'||lt==='income_period'||lt==='expense_period')&&!periodRow) periodRow=r;
    });

    console.log(`[blockToItems ${type}]`,{
      itemRow:  itemRow  ?itemRow.slice(0,6).map(c=>nc(c)):null,
      amountRow:amountRow?amountRow.slice(0,6).map(c=>nc(c)):null,
      periodRow:periodRow?periodRow.slice(0,6).map(c=>nc(c)):null
    });

    if(!itemRow&&!amountRow) return [];

    const maxCols=Math.max(
      itemRow  ?itemRow.length  :0,
      amountRow?amountRow.length:0,
      periodRow?periodRow.length:0
    );

    /* 기간 행 forward-fill: 병합 셀 대응
       ★ period는 원본(raw) 값을 보존 — nc()로 정규화하면
         "2026-05~2028-12" 같은 날짜 구분자가 뭉개져 parsePeriod 실패.
         nc()는 label 판별용으로만 쓰고, period 문자열은 raw 유지. */
    const filledPeriod=[];
    let lastPer='';
    for(let col=1;col<maxCols;col++){
      /* 원본 raw 그대로 trim만 */
      const raw=String(periodRow&&periodRow[col]!=null?periodRow[col]:'').trim();
      if(raw) lastPer=raw;
      filledPeriod[col]=lastPer;
    }

    const items=[];
    for(let col=1;col<maxCols;col++){
      const itemName=nc(itemRow  ?itemRow[col]  :'');
      const amtRaw  =nc(amountRow?amountRow[col]:'');
      const perStr  =filledPeriod[col]||'';
      /* 항목명이 라벨 키워드 자체면 스킵 (헤더 행 오탐 방지) */
      if(/^(항목|금액|수입기간|납부기간|기간)$/.test(itemName.replace(/\s/g,''))) continue;
      if(!itemName&&!amtRaw) continue;
      items.push({type, item:itemName||'(항목없음)', amount:parseAmt(amtRaw)||0, period:perStr});
    }
    return items;
  }

    const incomeItems =blockToItems(incomeBlock,  '수입');
  const expenseItems=blockToItems(expenseBlock, '지출');
  const allItems=[...incomeItems,...expenseItems];

  /* ══ 총합 계산 (항목 원본값 그대로) ══════════════════════ */
  const totalIncome =incomeItems .reduce((a,o)=>a+o.amount,0);
  const totalExpense=expenseItems.reduce((a,o)=>a+o.amount,0);
  const netCF=totalIncome-totalExpense;

  /* ══ 기간 파싱 → {sy,sm,ey,em} ═══════════════════════════
     "YYYY-MM-DD ~ YYYY-MM-DD" 형식 우선 처리
     Day 부분(DD)이 패턴을 오탐하지 않도록 분리 정규식 사용
  ════════════════════════════════════════════════════════ */
  function parsePeriod(s){
    /* ★ 구글 시트에서 나올 수 있는 기간 형식 전부 커버
       - YYYY-MM ~ YYYY-MM  (하이픈 구분자)
       - YYYY-MM-DD ~ YYYY-MM-DD (날짜 포함)
       - YYYY.MM ~ YYYY.MM  (점 구분자)
       - YYYY/MM ~ YYYY/MM
       - 붙어있는 하이픈: 2026-05~2028-12 (공백 없이)
       구분자: ~ – — (앞뒤 공백 선택적) */
    const str=String(s||'').trim();
    if(!str) return null;
    /* 범위형: YYYY[-./]MM[-./DD]? [SEP] YYYY[-./]MM */
    const m=str.match(/(\d{4})[-./](\d{1,2})(?:[-./]\d{1,2})?\s*[~\u2013\u2014]\s*(\d{4})[-./](\d{1,2})/);
    if(m)return{sy:+m[1],sm:+m[2],ey:+m[3],em:+m[4]};
    /* 범위형 (구분자가 하이픈인 경우 — 오탐 방지 위해 4자리-2자리-4자리-2자리 패턴으로 체크) */
    const m2=str.match(/(\d{4})[-.](\d{2})\s*-\s*(\d{4})[-.](\d{2})/);
    if(m2)return{sy:+m2[1],sm:+m2[2],ey:+m2[3],em:+m2[4]};
    /* 단일 연월 */
    const m3=str.match(/(\d{4})[-./](\d{1,2})/);
    if(m3)return{sy:+m3[1],sm:+m3[2],ey:+m3[1],em:+m3[2]};
    return null;
  }

  /* ══ [항목 분해 캐시플로우 생성] ════════════════════════════
     각 항목의 기간(시작월~종료월)을 월 단위로 펼쳐서
     항목별 컬럼으로 분해 표시
  ════════════════════════════════════════════════════════ */
  /* 기간 범위 자동 탐지 */
  let minY=9999,maxY=0;
  [...incomeItems,...expenseItems].forEach(o=>{
    const p=parsePeriod(o.period);
    if(!p)return;
    if(p.sy<minY)minY=p.sy;
    if(p.ey>maxY)maxY=p.ey;
  });
  if(minY===9999){minY=new Date().getFullYear();maxY=minY+4;}
  maxY=Math.min(maxY,minY+9); /* 최대 10년 */

  /* ── 항목명 → UI 컬럼명 변환 ── */
  function toColName(itemName){
    const n=String(itemName||'').trim();
    if(/월임대료.*112|임대.*112/i.test(n))    return '임대(112)';
    if(/월관리비.*112|관리비.*112/i.test(n))   return '관리비(112)';
    if(/월임대료.*8길3|임대.*8길3/i.test(n))   return '임대(8길3)';
    if(/월관리비.*8길3|관리비.*8길3/i.test(n)) return '관리비(8길3)';
    if(/토지임대료/i.test(n))                  return '토지임대료';
    if(/대출.*112/i.test(n))                   return '대출(112)';
    if(/고정비.*112/i.test(n))                 return '고정비(112)';
    if(/대출.*8길3/i.test(n))                  return '대출(8길3)';
    if(/고정비.*8길3/i.test(n))                return '고정비(8길3)';
    return n||'기타';
  }

  /* 컬럼 순서 정의 */
  const COL_ORDER_INC=['임대(112)','관리비(112)','임대(8길3)','관리비(8길3)','토지임대료'];
  const COL_ORDER_EXP=['대출(112)','고정비(112)','대출(8길3)','고정비(8길3)'];

  /* 각 항목에 컬럼명 부여 */
  incomeItems.forEach(o=>{ o.col=toColName(o.item); });
  expenseItems.forEach(o=>{ o.col=toColName(o.item); });

  /* 실제 데이터에 존재하는 컬럼만 추출 (순서 유지) */
  const activeIncCols=COL_ORDER_INC.filter(c=>incomeItems.some(o=>o.col===c));
  const activeExpCols=COL_ORDER_EXP.filter(c=>expenseItems.some(o=>o.col===c));
  /* 정의에 없는 항목도 포함 */
  incomeItems.forEach(o=>{ if(!activeIncCols.includes(o.col))activeIncCols.push(o.col); });
  expenseItems.forEach(o=>{ if(!activeExpCols.includes(o.col))activeExpCols.push(o.col); });
  const allCols=[...activeIncCols,...activeExpCols];

  /* 월별 맵 생성 — 항목별 */
  function cfKey(y,m){return `${y}-${String(m).padStart(2,'0')}`;}
  const cfMap={};

  function addMonthsByCol(items){
    items.forEach(o=>{
      if(!o.amount) return;
      const p=parsePeriod(o.period);
      /* ★ 기간 파싱 디버그: 콘솔에서 period 값 확인 가능 */
      console.log(`[CF 기간파싱] col=${o.col} period="${o.period}"`, p);
      if(!p){
        /* 기간 미입력 항목 — minY 1월 단일 행으로 fallback 표시 */
        const k=cfKey(minY,1);
        if(!cfMap[k]){cfMap[k]={y:minY,m:1}; allCols.forEach(c=>{cfMap[k][c]=0;});}
        cfMap[k][o.col]=(cfMap[k][o.col]||0)+o.amount;
        return;
      }
      let cy=p.sy,cm=p.sm;
      while(cy<p.ey||(cy===p.ey&&cm<=p.em)){
        if(cy>=minY&&cy<=maxY){
          const k=cfKey(cy,cm);
          if(!cfMap[k]){cfMap[k]={y:cy,m:cm}; allCols.forEach(c=>{cfMap[k][c]=0;});}
          cfMap[k][o.col]=(cfMap[k][o.col]||0)+o.amount;
        }
        cm++;if(cm>12){cm=1;cy++;}
      }
    });
  }
  addMonthsByCol(incomeItems);
  addMonthsByCol(expenseItems);

  /* 정렬된 월별 배열 + 순현금흐름 계산 */
  const cfRows=Object.keys(cfMap).sort().map(k=>{
    const r=cfMap[k];
    const incSum=activeIncCols.reduce((a,c)=>a+(r[c]||0),0);
    const expSum=activeExpCols.reduce((a,c)=>a+(r[c]||0),0);
    return{...r, incSum, expSum, net:incSum-expSum};
  });

  /* 누적 계산 */
  let cumNet=0;
  cfRows.forEach(r=>{r.cum=cumNet+=r.net;});

  /* 기존 호환용 inc/exp 필드 (KPI 등에서 사용) */
  cfRows.forEach(r=>{r.inc=r.incSum;r.exp=r.expSum;});

  /* ══ [KPI] 색상 강화 ══════════════════════════════════════
     총수입→green / 총지출→red / 순현금흐름→blue강조 / 총항목→purple
  ════════════════════════════════════════════════════════ */
  const kpiHTML=`<div class="kpi-row">
    <div class="kpi g">
      <div class="kpi-lbl">총 수입</div>
      <div class="kpi-val" style="color:var(--green)">${fmtBig(totalIncome)}원</div>

    <div class="kpi r">

      <div class="kpi-val" style="color:var(--red)">${fmtBig(totalExpense)}원</div>
      <div class="kpi-sub">${expenseItems.length}건 · 월 기준</div>
    </div>
    <div class="kpi b" style="border:1.5px solid rgba(59,127,255,.35)">
      <div class="kpi-lbl">순 현금흐름</div>
      <div class="kpi-val" style="color:${netCF>=0?'var(--blue)':'var(--red)'};font-size:17px;font-weight:700">
        ${netCF>=0?'+':''}${fmtBig(netCF)}원
      </div>
      <div class="kpi-sub">수입 − 지출</div>
    </div>
    <div class="kpi p">
      <div class="kpi-lbl">총 항목</div>
      <div class="kpi-val" style="color:var(--purple)">${incomeItems.length+expenseItems.length}</div>
      <div class="kpi-sub">수입 ${incomeItems.length} · 지출 ${expenseItems.length}</div>
    </div>
  </div>`;

  /* ══ [요약 테이블] 항목별 월 금액 + 기간 ══════════════════ */
  function summaryRow(o){
    const badge=o.type==='수입'
      ?`<span class="type-badge type-in">수입</span>`
      :`<span class="type-badge type-out">지출</span>`;
    const cls=o.type==='수입'?'inc':'exp';
    /* 기간 개월 수 계산 */
    const p=parsePeriod(o.period);
    const months=p?(p.ey-p.sy)*12+(p.em-p.sm)+1:null;
    const totalAmt=months?o.amount*months:null;
    return`<tr class="${o.type==='수입'?'income-row':'expense-row'}">
      <td class="label">${o.item}</td>
      <td>${badge}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--t3)">${o.period||'—'}</td>
      <td class="r"><span class="${cls}">${fmtBig(o.amount)}원</span></td>
      <td class="r"><span class="${cls}" style="font-weight:600">${totalAmt?fmtBig(totalAmt)+'원':'—'}</span></td>
    </tr>`;
  }

  const summaryHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:#4F7CFF"></div>
      <div class="cf-section-title">수입 · 지출 요약</div>
      <div class="cf-section-sub">${incomeItems.length+expenseItems.length}건</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>항목</th><th>구분</th><th>기간</th>
          <th class="r">월 금액</th><th class="r">기간 합계</th>
        </tr></thead>
        <tbody>
          ${incomeItems.length?`
            <tr class="section-head inc-head">
              <td colspan="5">📥 수입 항목 <span style="font-weight:400;font-size:10px;color:var(--t3);margin-left:6px">${incomeItems.length}건</span></td>
            </tr>
            ${incomeItems.map(o=>summaryRow(o)).join('')}
            <tr class="subtotal-row">
              <td colspan="3">소계 — 수입</td>

          :`<tr><td colspan="5" style="text-align:center;padding:16px;color:var(--t4)">수입 항목 없음</td></tr>`}
          ${expenseItems.length?`
            <tr class="section-head exp-head">
              <td colspan="5">📤 지출 항목 <span style="font-weight:400;font-size:10px;color:var(--t3);margin-left:6px">${expenseItems.length}건</span></td>
            </tr>
            ${expenseItems.map(o=>summaryRow(o)).join('')}
