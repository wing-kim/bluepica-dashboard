<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLUEPIKA Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08090d; --s1:#0f1118; --s2:#151821; --s3:#1c2030;
  --border:#222636; --border2:#2a3050;
  --blue:#3b7fff; --blue-g:linear-gradient(135deg,#3b7fff,#6c48f5);
  --green:#22d186; --yellow:#f5bc30; --orange:#f07830;
  --red:#f03860; --purple:#9060f0;
  --t1:#eef0f8; --t2:#8890aa; --t3:#4a5270; --t4:#2a3050;
  --mono:'DM Mono',monospace; --sans:'Noto Sans KR',sans-serif;
  --display:'Bebas Neue',sans-serif;
  --r:10px; --r2:6px; --sh:0 4px 32px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(59,127,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,127,255,.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:1520px;margin:0 auto;padding:0 28px 80px}

header{display:flex;align-items:center;justify-content:space-between;
  padding:24px 0 20px;border-bottom:1px solid var(--border);margin-bottom:28px}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-name{font-family:var(--display);font-size:28px;letter-spacing:2px;
  background:var(--blue-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:11px;color:var(--t3);letter-spacing:3px;text-transform:uppercase}
.header-r{display:flex;align-items:center;gap:12px}
.sync-badge{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--t3)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:blink 2.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-ref{display:flex;align-items:center;gap:6px;background:var(--s2);
  border:1px solid var(--border2);color:var(--t2);padding:7px 14px;
  border-radius:var(--r2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .18s}
.btn-ref:hover{background:var(--s3);color:var(--t1);border-color:var(--blue)}
.btn-ref .ico{display:inline-block}
.btn-ref.spin .ico{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.tabs{display:flex;gap:2px;margin-bottom:26px;padding:4px;
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow-x:auto}
.tab{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:9px 20px;
  border-radius:7px;border:none;background:transparent;color:var(--t3);
  font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .18s;white-space:nowrap}
.tab:hover{color:var(--t2);background:var(--s2)}
.tab.on{color:var(--t1);background:var(--s3);box-shadow:0 1px 8px rgba(0,0,0,.4)}
.pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.sec{display:none}.sec.on{display:block}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;gap:14px;color:var(--t3)}
.ring{width:38px;height:38px;border:3px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.loader p{font-size:12px}
.err{background:rgba(240,56,96,.07);border:1px solid rgba(240,56,96,.2);
  border-radius:var(--r);padding:18px 22px;color:var(--red);font-size:13px}
.err small{color:var(--t3);display:block;margin-top:6px}

.notice{display:flex;align-items:center;gap:8px;
  background:rgba(59,127,255,.06);border:1px solid rgba(59,127,255,.15);
  border-radius:var(--r2);padding:10px 14px;
  font-size:11px;color:var(--t3);margin-bottom:20px}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s}
.kpi:hover{border-color:var(--border2);transform:translateY(-2px)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.b::after{background:var(--blue-g)}
.kpi.g::after{background:linear-gradient(90deg,var(--green),var(--blue))}
.kpi.y::after{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.kpi.p::after{background:linear-gradient(90deg,var(--purple),#f03860)}
.kpi.r::after{background:linear-gradient(90deg,var(--red),var(--orange))}
.kpi-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:9px}
.kpi-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--t1)}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:4px}

.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px}
.chip{background:var(--s3);border:1px solid var(--border2);color:var(--t3);
  font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px}

.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--s2);border-bottom:1px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s}
th:hover{color:var(--t2)}
th.sorted{color:var(--blue)}
td{padding:9px 14px;border-bottom:1px solid rgba(34,38,54,.7);color:var(--t2);
  white-space:nowrap;max-width:240px;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--s2);color:var(--t1)}
td:first-child{color:var(--t1);font-weight:500}
.npos{color:var(--green)!important;font-family:var(--mono)}
.nneg{color:var(--red)!important;font-family:var(--mono)}
.nnum{color:var(--blue)!important;font-family:var(--mono)}
.npct{color:var(--yellow)!important;font-family:var(--mono)}
.ndash{color:var(--t4)!important}

.sbadge{display:inline-flex;align-items:center;gap:4px;
  padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.sb-active{background:rgba(34,209,134,.12);color:var(--green);border:1px solid rgba(34,209,134,.25)}
.sb-expire{background:rgba(240,56,96,.12);color:var(--red);border:1px solid rgba(240,56,96,.25)}
.sb-warn{background:rgba(245,188,48,.12);color:var(--yellow);border:1px solid rgba(245,188,48,.25)}
.sb-neutral{background:rgba(59,127,255,.12);color:var(--blue);border:1px solid rgba(59,127,255,.25)}

.empty{text-align:center;padding:60px;color:var(--t3);font-size:13px}
.empty-i{font-size:36px;margin-bottom:12px}

/* ═══════════════════════════════════════════════════
   TIMELINE — 간트 차트 스타일 (단색 바 + 여유 행간)
═══════════════════════════════════════════════════ */
.tl-wrap{padding:0 24px 24px}
.tl-ruler-row{display:flex;align-items:stretch;padding-bottom:10px;
  border-bottom:1px solid var(--border2);margin-bottom:0}
.tl-ruler-lbl{width:220px;flex-shrink:0;display:flex;align-items:flex-end;
  font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;
  padding-right:16px;padding-bottom:4px}
.tl-ruler-track{flex:1;position:relative;height:30px}
.tl-ruler-years{display:flex;height:100%;position:absolute;inset:0}
.tl-year-seg{flex:1;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;color:var(--t3);
  border-left:1px solid var(--border);position:relative}
.tl-year-seg:first-child{border-left:none}
.tl-year-seg.cur-y{color:var(--blue);font-weight:700}
.tl-dur-head{width:76px;flex-shrink:0;display:flex;align-items:flex-end;
  justify-content:flex-end;font-size:9px;color:var(--t4);text-transform:uppercase;
  letter-spacing:1px;padding-left:10px;padding-bottom:4px}
.tl-now-line{position:absolute;top:0;bottom:-1px;width:2px;
  background:var(--blue);box-shadow:0 0 6px rgba(59,127,255,.5);z-index:10;border-radius:1px}
.tl-now-tag{position:absolute;top:3px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:8px;color:var(--blue);
  background:rgba(8,9,13,.95);padding:1px 5px;border-radius:3px;
  white-space:nowrap;letter-spacing:.5px}
.g-row{display:flex;align-items:center;padding:14px 0;
  border-bottom:1px solid rgba(34,38,54,.5);transition:background .12s}
.g-row:last-child{border-bottom:none}
.g-row:hover{background:rgba(59,127,255,.03)}
.g-info{width:220px;flex-shrink:0;padding-right:16px}
.g-name{font-size:13px;font-weight:500;color:var(--t1);line-height:1.4}
.g-period-txt{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:3px}
.g-bar-area{flex:1;position:relative;height:32px;display:flex;align-items:center}
.g-vline{position:absolute;top:0;bottom:0;width:1px;
  background:rgba(42,48,80,.35);pointer-events:none}
.g-now-line{position:absolute;top:0;bottom:0;width:2px;
  background:rgba(59,127,255,.22);z-index:4;pointer-events:none;border-radius:1px}
.g-track{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  height:10px;background:rgba(26,31,46,.9);border-radius:3px;
  border:1px solid rgba(42,48,80,.6)}
.g-fill{height:100%;border-radius:3px;position:absolute;
  transition:width .8s cubic-bezier(.4,0,.2,1)}
.g-dur{width:76px;flex-shrink:0;text-align:right;padding-left:10px;
  font-family:var(--mono);font-size:11.5px;color:var(--t2)}
/* 단색 팔레트 */
.gc0{background:#4a7eff}.gc1{background:#6c5ce7}.gc2{background:#00b894}
.gc3{background:#e17055}.gc4{background:#6c5ce7}.gc5{background:#0984e3}
.gc6{background:#00b894}.gc7{background:#d63031}.gc8{background:#74b9ff}

/* ═══════════════════════════════════════════════════
   IRR
═══════════════════════════════════════════════════ */
.irr-addr-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
.irr-addr-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative}
.irr-addr-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.irr-addr-card:first-child::before{background:linear-gradient(90deg,#3b7fff,#6c48f5)}
.irr-addr-card:last-child::before{background:linear-gradient(90deg,#22d186,#3b7fff)}
.irr-addr-head{padding:16px 20px 14px;border-bottom:1px solid var(--border)}
.irr-addr-title{font-size:14px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px}
.irr-addr-tag{font-size:9px;padding:2px 8px;border-radius:20px;border:1px solid;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.tag-a{color:#6c48f5;border-color:rgba(108,72,245,.3);background:rgba(108,72,245,.1)}
.tag-b{color:var(--green);border-color:rgba(34,209,134,.3);background:rgba(34,209,134,.1)}
.irr-addr-sub{font-size:11px;color:var(--t3);margin-top:4px}
.irr-addr-body{padding:18px 20px}
.irr-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.irr-metric{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:13px 15px}
.irr-metric-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.irr-metric-val{font-family:var(--mono);font-size:20px;font-weight:500}
.irr-metric-val.pos{color:var(--green)} .irr-metric-val.neg{color:var(--red)}
.irr-metric-val.neu{color:var(--blue)} .irr-metric-val.ylw{color:var(--yellow)}
.irr-metric-sub{font-size:10px;color:var(--t3);margin-top:3px}
.land-price-box{background:rgba(245,188,48,.05);border:1px solid rgba(245,188,48,.15);
  border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.land-price-lbl{font-size:11px;color:var(--yellow)}
.land-price-val{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--yellow)}
.irr-divider{height:1px;background:var(--border);margin:13px 0}
.irr-rows-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.irr-row-item{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid rgba(34,38,54,.5);font-size:12px}
.irr-row-item:last-child{border-bottom:none}

/* ═══════════════════════════════════════════════════
   LEASE — 표 기반 레이아웃 (건물별 그룹화)
═══════════════════════════════════════════════════ */
.ls-section{margin-bottom:28px}
.ls-group-head{display:flex;align-items:center;gap:12px;padding:12px 18px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r) var(--r) 0 0;border-bottom:none}
.ls-group-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.ls-group-title{font-size:13px;font-weight:600;color:var(--t1)}
.ls-group-meta{font-size:11px;color:var(--t3);margin-left:4px}
.ls-group-sum{margin-left:auto;display:flex;gap:16px;align-items:center}
.ls-sum-item{font-size:11px;color:var(--t3)}
.ls-sum-item strong{font-family:var(--mono);font-size:12px;font-weight:500}
.ls-sum-item strong.green{color:var(--green)}
.ls-sum-item strong.blue{color:var(--blue)}
.ls-sum-item strong.purple{color:var(--purple)}
.ls-table-wrap{border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--r) var(--r);overflow:hidden}
.ls-table{width:100%;border-collapse:collapse;font-size:12.5px}
.ls-table thead tr{background:var(--s2);border-bottom:2px solid var(--border2)}
.ls-table th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;
  color:var(--t3);text-transform:uppercase;letter-spacing:.9px;white-space:nowrap}
.ls-table th.r{text-align:right}
.ls-table td{padding:11px 14px;border-bottom:1px solid rgba(34,38,54,.55);
  color:var(--t2);white-space:nowrap;vertical-align:middle}
.ls-table tbody tr:last-child td{border-bottom:none}
.ls-table tbody tr:hover td{background:rgba(59,127,255,.035);color:var(--t1)}
.ls-table tr.sum-row td{background:rgba(26,31,46,.7);border-top:1px solid var(--border2);
  font-weight:600;color:var(--t1)}
.ls-table td.r{text-align:right;font-family:var(--mono)}
.ls-table td.name{color:var(--t1);font-weight:500;font-size:13px}
.ls-table td.floor{color:var(--t2);font-size:12px}
.exp-badge{display:inline-block;padding:2px 8px;border-radius:4px;
  font-size:10.5px;font-weight:600;letter-spacing:.3px;white-space:nowrap;border:1px solid}
.exp-ok   {background:rgba(0,184,148,.09);color:#00b894;border-color:rgba(0,184,148,.2)}
.exp-warn {background:rgba(245,188,48,.09);color:#c49a00;border-color:rgba(245,188,48,.2)}
.exp-near {background:rgba(240,112,48,.09);color:#e05a00;border-color:rgba(240,112,48,.2)}
.exp-done {background:rgba(180,60,60,.09);color:#c05050;border-color:rgba(180,60,60,.2)}
.exp-none {background:rgba(74,82,112,.09);color:var(--t3);border-color:rgba(74,82,112,.2)}
.amt-green{color:var(--green)!important}.amt-blue{color:var(--blue)!important}
.amt-purple{color:var(--purple)!important}.amt-muted{color:var(--t4)!important}
.amt-total{color:var(--t1)!important;font-weight:600}

/* ═══════════════════════════════════════════════════
   PERSONAL COST — Cash Flow 분석
═══════════════════════════════════════════════════ */
/* 섹션 구분 헤더 */
.cf-section{margin-bottom:28px}
.cf-section-head{display:flex;align-items:center;gap:10px;
  padding:11px 18px;background:var(--s2);
  border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;border-bottom:none}
.cf-section-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.cf-section-title{font-size:13px;font-weight:600;color:var(--t1)}
.cf-section-sub{font-size:11px;color:var(--t3);margin-left:auto}

/* 공통 테이블 래퍼 */
.cf-table-wrap{border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--r) var(--r);overflow:hidden}
.cf-table{width:100%;border-collapse:collapse;font-size:12.5px}
.cf-table thead tr{background:var(--s2);border-bottom:2px solid var(--border2)}
.cf-table th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;
  color:var(--t3);text-transform:uppercase;letter-spacing:.9px;white-space:nowrap}
.cf-table th.r{text-align:right}
.cf-table td{padding:9px 14px;border-bottom:1px solid rgba(34,38,54,.5);
  color:var(--t2);white-space:nowrap;vertical-align:middle}
.cf-table tbody tr:last-child td{border-bottom:none}
.cf-table tbody tr:hover td{background:rgba(59,127,255,.03);color:var(--t1)}
.cf-table td.r{text-align:right;font-family:var(--mono);font-size:12px}
.cf-table td.label{color:var(--t1);font-weight:500}
.cf-table td.ym{font-family:var(--mono);font-size:11.5px;color:var(--t2)}

/* 행 종류별 스타일 */
.cf-table tr.income-row td{color:var(--t2)}
.cf-table tr.expense-row td{color:var(--t2)}
.cf-table tr.subtotal-row td{background:rgba(26,31,46,.6);
  border-top:1px solid var(--border2);font-weight:600;color:var(--t1)}
.cf-table tr.net-row td{background:rgba(59,127,255,.07);
  border-top:2px solid var(--blue);font-weight:700}
.cf-table tr.yr-group td{background:var(--s2);font-size:11px;font-weight:600;
  color:var(--t3);letter-spacing:.5px;border-top:1px solid var(--border2)}
.cf-table tr.yr-total td{background:rgba(26,31,46,.8);font-weight:600;
  border-top:1px solid var(--border2);color:var(--t1)}

/* 금액 색상 */
.inc{color:var(--green)!important}
.exp{color:var(--red)!important}
.neu{color:var(--blue)!important}
.dim{color:var(--t4)!important}

/* 구분 태그 */
.type-badge{display:inline-block;padding:1px 7px;border-radius:3px;
  font-size:10px;font-weight:600;letter-spacing:.4px;border:1px solid}
.type-in {background:rgba(0,184,148,.08);color:#00b894;border-color:rgba(0,184,148,.18)}
.type-out{background:rgba(240,56,96,.08);color:#e04060;border-color:rgba(240,56,96,.18)}
.type-etc{background:rgba(59,127,255,.08);color:var(--blue);border-color:rgba(59,127,255,.18)}

.pg{background:var(--s2);border:1px solid var(--border);color:var(--t2);
  padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;
  transition:all .15s;font-family:var(--sans)}
.pg:hover:not([disabled]){border-color:var(--blue);color:var(--blue)}
.pg[disabled]{opacity:.3;cursor:default}
.pg.on{background:var(--blue);border-color:var(--blue);color:#fff}

@media(max-width:900px){
  .irr-addr-grid{grid-template-columns:1fr}
  .g-row{flex-wrap:wrap}.g-info{width:100%}
  .ls-group-sum{display:none}
}
@media(max-width:600px){
  .page{padding:0 14px 60px}.kpi-row{grid-template-columns:1fr 1fr}
  .brand-name{font-size:22px}.irr-metrics{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="page">

<header>
  <div class="brand">
    <span class="brand-name">BLUEPIKA</span>
    <span class="brand-sub">Dashboard</span>
  </div>
  <div class="header-r">
    <div class="sync-badge"><div class="dot"></div><span id="syncTime">—</span></div>
    <button class="btn-ref" id="btnRef" onclick="refreshCurrent()">
      <span class="ico">↻</span> 새로고침
    </button>
  </div>
</header>

<div class="tabs">
  <button class="tab on"  onclick="go('timeline',this)"><span class="pip" style="background:#3b7fff"></span>프로젝트 타임라인</button>
  <button class="tab"     onclick="go('irr',this)">     <span class="pip" style="background:#22d186"></span>신축 IRR</button>
  <button class="tab"     onclick="go('lease',this)">   <span class="pip" style="background:#f5bc30"></span>임대차계약현황</button>
  <button class="tab"     onclick="go('personal',this)"><span class="pip" style="background:#9060f0"></span>개인비용</button>
  <button class="tab"     onclick="go('corp',this)">    <span class="pip" style="background:#f03860"></span>법인비용</button>
</div>

<div id="sec-timeline" class="sec on"></div>
<div id="sec-irr"      class="sec"></div>
<div id="sec-lease"    class="sec"></div>
<div id="sec-personal" class="sec"></div>
<div id="sec-corp"     class="sec"></div>

</div>

<script>
/* ══ CONFIG ═══════════════════════════════════════════════ */
const SID='17lL6O55R56PGODOu-iM5EBH4a6ZbWEJfkypcdWzlGHA';
const TABS={
  timeline:{gid:'835667947', label:'프로젝트 타임라인'},
  irr:     {gid:'1343029023',label:'신축 IRR'},
  lease:   {gid:'0',         label:'임대차계약현황'},
  personal:{gid:'662143448', label:'개인비용'},
  corp:    {gid:'551803703', label:'법인비용'},
};
const PG=50;
const CACHE={},LOADED=new Set(),TS={};
let CUR='timeline';

/* ══ CSV ══════════════════════════════════════════════════ */
async function fetchSheet(k){
  const r=await fetch(`https://docs.google.com/spreadsheets/d/${SID}/export?format=csv&gid=${TABS[k].gid}`);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return parseCSV(await r.text());
}
function parseCSV(txt){
  const rows=[];let inQ=false,row=[],cell='';
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){inQ=!inQ;continue;}
    if(!inQ&&c===','){row.push(cell.trim());cell='';continue;}
    if(!inQ&&(c==='\n'||(c==='\r'&&txt[i+1]==='\n'))){
      if(c==='\r')i++;
      row.push(cell.trim());cell='';
      if(row.some(x=>x))rows.push(row);
      row=[];continue;
    }
    cell+=c;
  }
  if(cell||row.length){row.push(cell.trim());if(row.some(x=>x))rows.push(row);}
  return rows;
}

/* ══ FORMAT / UTILS ═══════════════════════════════════════ */
function fc(v){
  if(v===null||v===undefined||v==='') return '<span class="ndash">—</span>';
  const s=String(v).trim();
  if(!s) return '<span class="ndash">—</span>';
  if(s.endsWith('%')){const n=parseFloat(s);if(!isNaN(n)) return `<span class="${n<0?'nneg':'npct'}">${s}</span>`;}
  const clean=s.replace(/[,\s₩원]/g,'');
  if(!isNaN(Number(clean))&&clean!==''&&/^[\d,.\-\+]+$/.test(clean)){
    const n=Number(clean);return `<span class="${n<0?'nneg':n>0?'npos':'nnum'}">${s}</span>`;
  }
  return s;
}
function fmtBig(n){
  if(isNaN(n))return '—';
  if(Math.abs(n)>=1e8)return (n/1e8).toFixed(1)+'억';
  if(Math.abs(n)>=1e4)return Math.round(n/1e4).toLocaleString()+'만';
  if(Math.abs(n)>=1000)return n.toLocaleString();
  return Number(n.toFixed(1)).toString();
}
function findHdrRow(rows){
  for(let i=0;i<Math.min(rows.length,6);i++){if(rows[i].filter(c=>c).length>=2)return i;}
  return 0;
}
function numCols(hdr,data){
  return hdr.map((h,i)=>({h,i})).filter(({h,i})=>{
    if(!h)return false;
    return data.map(r=>parseFloat((r[i]||'').replace(/[,\s₩원%]/g,''))).filter(x=>!isNaN(x)).length>0;
  });
}
function errHTML(msg){return `<div class="err">⚠️ ${msg}<small>구글 시트 공유를 "링크 있는 모든 사용자 · 뷰어"로 설정해주세요.</small></div>`;}
function parseAmt(v){return parseFloat(String(v||'').replace(/[,\s₩원]/g,''))||0;}

/* ══ TABLE ════════════════════════════════════════════════ */
function initTS(k){if(!TS[k])TS[k]={search:'',sortCol:-1,sortAsc:true,page:1};}
function drawTable(k,rows,cid,customCell){
  const el=document.getElementById(cid);if(!el)return;
  if(!rows||rows.length<2){el.innerHTML=`<div class="empty"><div class="empty-i">📭</div>데이터 없음</div>`;return;}
  initTS(k);
  const hdr=rows[0];let data=rows.slice(1).filter(r=>r.some(c=>c));
  const q=(TS[k].search||'').toLowerCase();
  if(q)data=data.filter(r=>r.some(c=>(c||'').toLowerCase().includes(q)));
  const{sortCol:sc,sortAsc:sa}=TS[k];
  if(sc>=0){data=[...data].sort((a,b)=>{
    const av=(a[sc]||'').replace(/__SB_\w+__/g,''),bv=(b[sc]||'').replace(/__SB_\w+__/g,'');
    const an=parseFloat(av.replace(/[,%\s₩원]/g,'')),bn=parseFloat(bv.replace(/[,%\s₩원]/g,''));
    if(!isNaN(an)&&!isNaN(bn))return sa?an-bn:bn-an;
    return sa?av.localeCompare(bv,'ko'):bv.localeCompare(av,'ko');
  });}
  const total=data.length,p=Math.max(1,Math.min(TS[k].page,Math.ceil(total/PG)||1));
  TS[k].page=p;const totalP=Math.max(1,Math.ceil(total/PG));
  const slice=data.slice((p-1)*PG,p*PG);
  const cfn=customCell||fc;
  const ths=hdr.map((h,i)=>`<th onclick="tSort('${k}','${cid}',${i})" ${sc===i?'class="sorted"':''}>${h||'—'}${sc===i?(sa?' ↑':' ↓'):''}</th>`).join('');
  const tbs=slice.map(r=>`<tr>${hdr.map((_,i)=>`<td>${cfn(r[i])}</td>`).join('')}</tr>`).join('');
  let pgH='';
  if(totalP>1){
    const s=Math.max(1,Math.min(p-2,totalP-4)),e=Math.min(totalP,s+4);
    let btns='';for(let i=s;i<=e;i++)btns+=`<button class="pg${i===p?' on':''}" onclick="tPage('${k}','${cid}',${i})">${i}</button>`;
    pgH=`<div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:10px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--t3)">
      <span>${total}건</span><button class="pg" onclick="tPage('${k}','${cid}',${p-1})" ${p<=1?'disabled':''}>‹</button>${btns}
      <button class="pg" onclick="tPage('${k}','${cid}',${p+1})" ${p>=totalP?'disabled':''}>›</button></div>`;
  }else pgH=`<div style="padding:8px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--t3)">${total}건</div>`;
  el.innerHTML=`<div class="card"><div class="tscroll"><table><thead><tr>${ths}</tr></thead><tbody>${tbs}</tbody></table></div>${pgH}</div>`;
}
function tSort(k,cid,col){initTS(k);if(TS[k].sortCol===col)TS[k].sortAsc=!TS[k].sortAsc;else{TS[k].sortCol=col;TS[k].sortAsc=true;}TS[k].page=1;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}
function tSearch(k,cid,val){initTS(k);TS[k].search=val;TS[k].page=1;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}
function tPage(k,cid,p){initTS(k);TS[k].page=p;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}

/* ════════════════════════════════════════════════════════════
   1. TIMELINE — 컴팩트 + 현재시점 마커
   ★ 구글 시트 데이터 100% 실시간 반영
════════════════════════════════════════════════════════════ */
function renderTimeline(rows){
  const sec=document.getElementById('sec-timeline');
  const hi=findHdrRow(rows);
  const data=rows.slice(hi+1).filter(r=>r.some(c=>c));

  // 컬럼: col1=항목, col2=기간, col3=소요, col4=기타
  const ni=1,pi=2,di=3,oi=4;
  const YEAR_START=2026,YEAR_END=2030;
  const TOTAL_MONTHS=(YEAR_END-YEAR_START+1)*12; // 60개월

  // 현재 시점 계산
  const now=new Date();
  const nowOff=(now.getFullYear()-YEAR_START)*12+now.getMonth();
  const nowPct=Math.max(0,Math.min(100,(nowOff/TOTAL_MONTHS)*100)).toFixed(2);
  const curYear=now.getFullYear();

  function parsePeriod(s){
    if(!s)return null; s=String(s).trim();
    let m=s.match(/(\d{4})[.\s년]?\s*(\d{1,2})[월]?\s*[~\-～–]\s*(\d{4})[.\s년]?\s*(\d{1,2})/);
    if(m)return{sy:+m[1],sm:+m[2],ey:+m[3],em:+m[4]};
    m=s.match(/(\d{4})[.\s년]?\s*(\d{1,2})/);
    if(m)return{sy:+m[1],sm:+m[2],ey:+m[1],em:+m[2]+1};
    return null;
  }
  function parseDur(s){const n=parseInt(String(s||'').replace(/[^0-9]/g,''));return isNaN(n)?0:n;}

  const items=[];
  data.forEach((r,idx)=>{
    const name=r[ni]||'—';
    const period=r[pi]||'';
    const durRaw=r[di]||'';
    const parsed=parsePeriod(period);
    const durMo=parseDur(durRaw);
    let startOff=0,barWidth=0,startLabel='',endLabel='';
    if(parsed){
      startOff=(parsed.sy-YEAR_START)*12+(parsed.sm-1);
      const endOff=(parsed.ey-YEAR_START)*12+(parsed.em-1);
      barWidth=Math.max(endOff-startOff,1);
      startLabel=`${parsed.sy}.${String(parsed.sm).padStart(2,'0')}`;
      endLabel=`${parsed.ey}.${String(parsed.em).padStart(2,'0')}`;
    }else if(durMo>0){
      const prev=idx>0?items[idx-1]:null;
      startOff=prev?(prev.startOff+prev.barWidth):0;
      barWidth=durMo;
    }
    startOff=Math.max(0,Math.min(startOff,TOTAL_MONTHS-1));
    barWidth=Math.max(1,Math.min(barWidth,TOTAL_MONTHS-startOff));
    const leftPct=(startOff/TOTAL_MONTHS*100).toFixed(2);
    const widthPct=(barWidth/TOTAL_MONTHS*100).toFixed(2);
    const durLabel=durMo?`${durMo}개월`:(barWidth?`${barWidth}개월`:durRaw||'—');
    const periodTxt=startLabel?`${startLabel} → ${endLabel}`:period;
    items.push({name,periodTxt,durLabel,startOff,barWidth,leftPct,widthPct,colorIdx:idx});
  });

  const totalM=items.reduce((a,b)=>a+(b.barWidth||0),0);

  // 연도 세그먼트
  const yearSegs=[];
  for(let y=YEAR_START;y<=YEAR_END;y++)
    yearSegs.push(`<div class="tl-year-seg${y===curYear?' cur-y':''}">${y}</div>`);

  // 연도별 세로선 위치 (2027~2030 시작점)
  const vLinePcts=[];
  for(let y=YEAR_START+1;y<=YEAR_END;y++)
    vLinePcts.push(((y-YEAR_START)*12/TOTAL_MONTHS*100).toFixed(2));

  function makeOverlays(){
    return vLinePcts.map(p=>`<div class="g-vline" style="left:${p}%"></div>`).join('')
      +`<div class="g-now-line" style="left:${nowPct}%"></div>`;
  }

  // 눈금 헤더
  const rulerHTML=`<div class="tl-ruler-row">
    <div class="tl-ruler-lbl">연도</div>
    <div class="tl-ruler-track">
      <div class="tl-ruler-years">${yearSegs.join('')}</div>
      <div class="tl-now-line" style="left:${nowPct}%">
        <div class="tl-now-tag">NOW</div>
      </div>
    </div>
    <div class="tl-dur-head">기간</div>
  </div>`;

  // Gantt rows
  const gRows=items.map(it=>`<div class="g-row">
    <div class="g-info">
      <div class="g-name">${it.name}</div>
      ${it.periodTxt?`<div class="g-period-txt">${it.periodTxt}</div>`:''}
    </div>
    <div class="g-bar-area">
      ${makeOverlays()}
      <div class="g-track">
        <div class="g-fill gc${it.colorIdx%9}" style="left:${it.leftPct}%;width:0" data-w="${it.widthPct}"></div>
      </div>
    </div>
    <div class="g-dur">${it.durLabel}</div>
  </div>`).join('');

  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 프로젝트 타임라인</div>
    <div class="kpi-row">
      <div class="kpi b"><div class="kpi-lbl">총 단계</div><div class="kpi-val">${data.length}</div><div class="kpi-sub">프로젝트 항목</div></div>
      <div class="kpi g"><div class="kpi-lbl">총 소요 기간</div><div class="kpi-val">${totalM}개월</div><div class="kpi-sub">예상 전체 기간</div></div>
      <div class="kpi y"><div class="kpi-lbl">타임라인 범위</div><div class="kpi-val">${YEAR_START}–${YEAR_END}</div><div class="kpi-sub">5개년 계획</div></div>
      <div class="kpi p"><div class="kpi-lbl">착공 예정</div><div class="kpi-val">2029</div><div class="kpi-sub">공사 시작 연도</div></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">프로젝트 타임라인 <span class="chip">${data.length}단계</span></div>
        <span style="font-size:10px;color:var(--t3);display:flex;align-items:center;gap:5px">
          <span style="display:inline-block;width:12px;height:2px;background:var(--blue);border-radius:1px;box-shadow:0 0 4px rgba(59,127,255,.8)"></span>현재 시점 (${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')})
        </span>
      </div>
      <div class="tl-wrap">
        ${rulerHTML}
        ${gRows}
      </div>
    </div>`;

  requestAnimationFrame(()=>{
    sec.querySelectorAll('[data-w]').forEach(el=>{
      setTimeout(()=>{el.style.width=el.dataset.w+'%';},60);
    });
  });
}

/* ════════════════════════════════════════════════════════════
   2. IRR — 두 주소 카드 + 공시지가
   ★ 구글 시트 데이터 100% 실시간 반영
════════════════════════════════════════════════════════════ */
function renderIRR(rows){
  const sec=document.getElementById('sec-irr');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}
  const hi=findHdrRow(rows);
  const hdr=rows[hi];
  const data=rows.slice(hi+1).filter(r=>r.some(c=>c));

  const addrIdx=hdr.findIndex(h=>/주소|소재지|위치|address|물건|대지/i.test(h));
  const pctCols=hdr.map((h,i)=>({h,i})).filter(({h})=>/irr|수익률|yield|return|rate/i.test(h));
  const amtCols=hdr.map((h,i)=>({h,i})).filter(({h})=>/금액|비용|투자|매출|revenue|cost|수입|지출|분양|매각/i.test(h));
  const landPriceIdx=hdr.findIndex(h=>/공시지가|토지가|공시가/i.test(h));

  let groups=[];
  if(addrIdx>=0){
    const map={};
    data.forEach(r=>{const a=(r[addrIdx]||'').trim()||'기타';if(!map[a])map[a]=[];map[a].push(r);});
    groups=Object.entries(map).slice(0,2).map(([addr,rows])=>({addr,rows}));
  }
  if(!groups.length){
    groups=[{addr:'압구정로 112',rows:data.slice(0,Math.ceil(data.length/2))},
             {addr:'압구정로8길 3',rows:data.slice(Math.ceil(data.length/2))}];
  }
  if(groups.length===1)groups.push({addr:'(데이터 없음)',rows:[]});

  function buildCard(g,idx){
    const{addr,rows:gd}=g;
    let irrHtml='<div class="irr-metric-val neu">—</div>';
    if(pctCols.length){
      const c0=pctCols[0];
      const vals=gd.map(r=>parseFloat((r[c0.i]||'').replace(/[,%]/g,''))).filter(x=>!isNaN(x));
      if(vals.length){
        const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
        const mx=Math.max(...vals),mn=Math.min(...vals);
        irrHtml=`<div class="irr-metric-val ${avg>0?'pos':avg<0?'neg':'neu'}">${avg.toFixed(2)}%</div>
          <div class="irr-metric-sub">최고 ${mx.toFixed(2)}% · 최저 ${mn.toFixed(2)}%</div>`;
      }
    }
    const metricBoxes=pctCols.slice(1,3).map((c,j)=>{
      const vals=gd.map(r=>parseFloat((r[c.i]||'').replace(/[,%]/g,''))).filter(x=>!isNaN(x));
      const av=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2):null;
      return `<div class="irr-metric"><div class="irr-metric-lbl">${c.h}</div>
        <div class="irr-metric-val ${['ylw','neu'][j]}">${av!==null?av+'%':'—'}</div>
        <div class="irr-metric-sub">${vals.length}건 평균</div></div>`;
    }).join('');
    const amtBoxes=amtCols.slice(0,2).map((c,j)=>{
      const vals=gd.map(r=>parseAmt(r[c.i])).filter(x=>x>0);
      const s=vals.reduce((a,b)=>a+b,0);
      return `<div class="irr-metric"><div class="irr-metric-lbl">${c.h}</div>
        <div class="irr-metric-val ${['pos','neu'][j]}">${s?fmtBig(s):'—'}</div>
        <div class="irr-metric-sub">${vals.length}건 합계</div></div>`;
    }).join('');
    let landHtml='';
    if(landPriceIdx>=0){
      const lv=gd.map(r=>parseAmt(r[landPriceIdx])).filter(x=>x>0);
      const ls=lv.reduce((a,b)=>a+b,0);
      landHtml=`<div class="land-price-box"><div class="land-price-lbl">🏛️ 공시지가 반영 현재 토지 가격</div>
        <div class="land-price-val">${ls?fmtBig(ls)+'원':'—'}</div></div>`;
    }else{
      landHtml=`<div class="land-price-box"><div class="land-price-lbl">🏛️ 공시지가 반영 현재 토지 가격</div>
        <div class="land-price-val" style="color:var(--t3);font-size:12px">시트에 공시지가 컬럼 추가 필요</div></div>`;
    }
    const showCols=hdr.map((h,i)=>({h,i})).filter(({h,i})=>i!==addrIdx&&h).slice(0,4);
    const detailRows=gd.slice(0,5).map(r=>{
      const pairs=showCols.slice(0,2).map(c=>`<span style="color:var(--t3);font-size:10px;flex:1">${c.h}</span>
        <span style="font-family:var(--mono);font-size:11px;text-align:right;flex:1">${r[c.i]||'—'}</span>`);
      return `<div class="irr-row-item">${pairs.join('<span style="color:var(--border2);margin:0 6px">|</span>')}</div>`;
    }).join('');

    return `<div class="irr-addr-card">
      <div class="irr-addr-head">
        <div class="irr-addr-title">${addr}
          <span class="irr-addr-tag ${['tag-a','tag-b'][idx]}">${['A동','B동'][idx]}</span>
        </div>
        <div class="irr-addr-sub">${gd.length}건 데이터</div>
      </div>
      <div class="irr-addr-body">
        <div class="irr-metrics">
          <div class="irr-metric"><div class="irr-metric-lbl">${pctCols[0]?.h||'IRR'}</div>${irrHtml}</div>
          ${metricBoxes}${amtBoxes}
        </div>
        ${landHtml}
        ${gd.length?`<div class="irr-divider"></div><div class="irr-rows-title">주요 항목 요약</div>${detailRows}`:''}
      </div>
    </div>`;
  }

  CACHE['irr_cfn']=null;initTS('irr');TS['irr']={search:'',sortCol:-1,sortAsc:true,page:1};
  CACHE['irr']=[hdr,...data];
  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 신축 IRR</div>
    <div class="irr-addr-grid">${groups.slice(0,2).map((g,i)=>buildCard(g,i)).join('')}</div>
    <div style="margin-top:4px">
      <div style="padding:12px 18px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;border-bottom:none;font-size:12px;font-weight:600;color:var(--t2)">📋 전체 데이터 테이블</div>
      <div id="irr-tbl"></div>
    </div>`;
  drawTable('irr',[hdr,...data],'irr-tbl');
}

/* ════════════════════════════════════════════════════════════
   3. LEASE — 표 기반 · 건물별 그룹화
   ★ 구글 시트 데이터 100% 실시간 반영 / 하드코딩 없음
════════════════════════════════════════════════════════════ */
function renderLease(rows){
  const sec=document.getElementById('sec-lease');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}
  const hi=findHdrRow(rows);
  const hdr=rows[hi];
  const data=rows.slice(hi+1).filter(r=>r.some(c=>c));

  /* 컬럼 자동 탐색 */
  const addrIdx    =hdr.findIndex(h=>/주소|소재지|위치|물건|건물|부동산/i.test(h));
  const floorIdx   =hdr.findIndex(h=>/층|floor/i.test(h));
  const nameIdx    =hdr.findIndex(h=>/임차인|사용자|회사|성명|이름|name|tenant/i.test(h));
  const rentIdx    =hdr.findIndex(h=>/월세|월임대료|임대료(?!보)/i.test(h));
  const depositIdx =hdr.findIndex(h=>/보증금|deposit/i.test(h));
  const mgmtIdx    =hdr.findIndex(h=>/관리비|관리료|maintenance/i.test(h));
  const landRentIdx=hdr.findIndex(h=>/토지임대료|토지료|지대/i.test(h));
  const statusIdx  =hdr.findIndex(h=>/상태|계약상태|현황|status/i.test(h));
  const startIdx   =hdr.findIndex(h=>/시작|계약시작|임대시작|from|start/i.test(h));
  const endIdx     =hdr.findIndex(h=>/종료|만료|계약종료|to|end/i.test(h));
  const areaIdx    =hdr.findIndex(h=>/면적|평수|㎡|평/i.test(h));
  const useIdx     =hdr.findIndex(h=>/용도|업종|업무/i.test(h));

  function amt(r,idx){return idx>=0?parseAmt(r[idx]):0;}
  function str(r,idx){return idx>=0?(r[idx]||''):'';} 

  function expBadge(r){
    const stTxt=str(r,statusIdx).trim();
    if(stTxt){
      if(/만료|종료|해지/i.test(stTxt))return`<span class="exp-badge exp-done">${stTxt}</span>`;
      if(/예정|임박|주의/i.test(stTxt))return`<span class="exp-badge exp-near">${stTxt}</span>`;
      if(/유효|활성|계약중|진행/i.test(stTxt))return`<span class="exp-badge exp-ok">${stTxt}</span>`;
    }
    const endTxt=str(r,endIdx).trim();
    if(!endTxt)return`<span class="exp-badge exp-none">—</span>`;
    const m=endTxt.match(/(\d{4})/);
    if(!m)return`<span class="exp-badge exp-none">${endTxt}</span>`;
    const yr=parseInt(m[1]),diff=yr-new Date().getFullYear();
    if(diff<0) return`<span class="exp-badge exp-done">만료 (${yr})</span>`;
    if(diff===0)return`<span class="exp-badge exp-near">올해 만료</span>`;
    if(diff===1)return`<span class="exp-badge exp-warn">내년 만료 (${yr})</span>`;
    return`<span class="exp-badge exp-ok">${yr}</span>`;
  }
  function amtCell(v,cls){
    if(!v||v===0)return`<span class="amt-muted">—</span>`;
    return`<span class="${cls||''}">${fmtBig(v)}원</span>`;
  }

  /* 건물별 그룹화 */
  const groupMap=new Map();
  data.forEach(r=>{
    let addr=str(r,addrIdx).trim();
    if(!addr){
      const name=str(r,nameIdx),lrent=amt(r,landRentIdx),rent=amt(r,rentIdx);
      if(/토지/.test(name)||(lrent>0&&rent===0))addr='토지임대';
      else if(/디파이넘버|defynumber/i.test(name))addr='압구정로8길 3';
      else if(/블루피카/i.test(name)&&lrent===0)addr='압구정로8길 3';
      else addr='압구정로 112';
    }
    if(!groupMap.has(addr))groupMap.set(addr,[]);
    groupMap.get(addr).push(r);
  });

  const GRP_COLORS=['#4a7eff','#00b894','#6c5ce7','#e17055','#0984e3'];

  function groupSection(addr,gRows,colorIdx){
    const color=GRP_COLORS[colorIdx%GRP_COLORS.length];
    const sumRent=gRows.map(r=>amt(r,rentIdx)).reduce((a,b)=>a+b,0);
    const sumDep=gRows.map(r=>amt(r,depositIdx)).reduce((a,b)=>a+b,0);
    const sumMgmt=gRows.map(r=>amt(r,mgmtIdx)).reduce((a,b)=>a+b,0);
    const sumLrent=gRows.map(r=>amt(r,landRentIdx)).reduce((a,b)=>a+b,0);
    const sumMonth=sumRent+sumMgmt+sumLrent;
    const sumHTML=[
      sumRent?`<div class="ls-sum-item">월임대료 <strong class="green">${fmtBig(sumRent)}원</strong></div>`:'',
      sumLrent?`<div class="ls-sum-item">토지임대료 <strong class="purple">${fmtBig(sumLrent)}원</strong></div>`:'',
      sumDep?`<div class="ls-sum-item">보증금 <strong class="blue">${fmtBig(sumDep)}원</strong></div>`:'',
    ].filter(Boolean).join('');
    const tbody=gRows.map(r=>{
      const rent=amt(r,rentIdx),dep=amt(r,depositIdx),mgmt=amt(r,mgmtIdx),lrent=amt(r,landRentIdx);
      const monthly=rent+mgmt+lrent;
      return`<tr>
        <td class="name">${str(r,nameIdx)||'—'}</td>
        <td class="floor">${str(r,floorIdx)||'—'}</td>
        <td>${str(r,areaIdx)||'—'}</td>
        <td>${str(r,useIdx)||'—'}</td>
        <td>${str(r,startIdx)||'—'}</td>
        <td>${str(r,endIdx)||'—'}</td>
        <td>${expBadge(r)}</td>
        <td class="r">${amtCell(dep,'amt-blue')}</td>
        <td class="r">${amtCell(rent,'amt-green')}</td>
        <td class="r">${amtCell(mgmt,'')}</td>
        <td class="r">${amtCell(lrent,'amt-purple')}</td>
        <td class="r">${monthly>0?`<span class="amt-total">${fmtBig(monthly)}원</span>`:`<span class="amt-muted">—</span>`}</td>
      </tr>`;
    }).join('');
    const sumRow=`<tr class="sum-row">
      <td colspan="7">합 계</td>
      <td class="r">${amtCell(sumDep,'amt-blue')}</td>
      <td class="r">${amtCell(sumRent,'amt-green')}</td>
      <td class="r">${amtCell(sumMgmt,'')}</td>
      <td class="r">${amtCell(sumLrent,'amt-purple')}</td>
      <td class="r">${sumMonth>0?`<span class="amt-total">${fmtBig(sumMonth)}원</span>`:`<span class="amt-muted">—</span>`}</td>
    </tr>`;
    return`<div class="ls-section">
      <div class="ls-group-head">
        <div class="ls-group-bar" style="background:${color}"></div>
        <div class="ls-group-title">${addr}</div>
        <div class="ls-group-meta">${gRows.length}건</div>
        <div class="ls-group-sum">${sumHTML}</div>
      </div>
      <div class="ls-table-wrap"><div style="overflow-x:auto">
        <table class="ls-table">
          <thead><tr>
            <th>임차인</th><th>층</th><th>면적</th><th>용도</th>
            <th>계약 시작</th><th>계약 종료</th><th>만료 상태</th>
            <th class="r">보증금</th><th class="r">월 임대료</th>
            <th class="r">관리비</th><th class="r">토지임대료</th><th class="r">월 합계</th>
          </tr></thead>
          <tbody>${tbody}${sumRow}</tbody>
        </table>
      </div></div>
    </div>`;
  }

  const totalRent=data.map(r=>amt(r,rentIdx)).reduce((a,b)=>a+b,0);
  const totalLrent=data.map(r=>amt(r,landRentIdx)).reduce((a,b)=>a+b,0);
  let aC=0,eC=0,wC=0;
  data.forEach(r=>{
    const stTxt=str(r,statusIdx).trim(),endTxt=str(r,endIdx).trim();
    if(/만료|종료|해지/i.test(stTxt)){eC++;return;}
    if(/예정|임박|주의/i.test(stTxt)){wC++;return;}
    if(/유효|활성|계약중|진행/i.test(stTxt)){aC++;return;}
    if(endTxt){const m=endTxt.match(/(\d{4})/);
      if(m){const diff=parseInt(m[1])-new Date().getFullYear();
        if(diff<0){eC++;return;}if(diff<=1){wC++;return;}}aC++;}
  });
  const sections=[...groupMap.entries()].map(([a,r],i)=>groupSection(a,r,i)).join('');
  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 임대차계약현황</div>
    <div class="kpi-row">
      <div class="kpi b"><div class="kpi-lbl">총 계약</div><div class="kpi-val">${data.length}</div><div class="kpi-sub">임대차 건수</div></div>
      ${aC?`<div class="kpi g"><div class="kpi-lbl">계약 유효</div><div class="kpi-val">${aC}</div><div class="kpi-sub">진행중</div></div>`:''}
      ${eC?`<div class="kpi r"><div class="kpi-lbl">만료·종료</div><div class="kpi-val">${eC}</div><div class="kpi-sub">종료</div></div>`:''}
      ${wC?`<div class="kpi y"><div class="kpi-lbl">주의</div><div class="kpi-val">${wC}</div><div class="kpi-sub">곧 만료</div></div>`:''}
      ${totalRent?`<div class="kpi g"><div class="kpi-lbl">월임대료 합계</div><div class="kpi-val">${fmtBig(totalRent)}원</div><div class="kpi-sub">전체 건물</div></div>`:''}
      ${totalLrent?`<div class="kpi p"><div class="kpi-lbl">토지임대료</div><div class="kpi-val">${fmtBig(totalLrent)}원</div><div class="kpi-sub">월 기준</div></div>`:''}
    </div>
    ${sections||`<div class="empty"><div class="empty-i">📭</div>임차인 데이터가 없습니다</div>`}`;
}

/* ════════════════════════════════════════════════════════════
   4. PERSONAL COST — 개인 Cash Flow 분석
   ★ 구글 시트 데이터 100% 실시간 반영
   ★ 수입/지출 요약 + 월별 상세 자동 계산
════════════════════════════════════════════════════════════ */
function renderPersonal(rows){
  const sec=document.getElementById('sec-personal');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}
  const hi=findHdrRow(rows);
  const hdr=rows[hi];
  const data=rows.slice(hi+1).filter(r=>r.some(c=>c));

  /* ── 컬럼 자동 탐색 ── */
  const itemIdx   =hdr.findIndex(h=>/항목|내용|구분명|name|item/i.test(h));
  const typeIdx   =hdr.findIndex(h=>/^구분$|type|수입지출|분류/i.test(h));
  const amtIdx    =hdr.findIndex(h=>/금액|월금액|월액|amount|monthly/i.test(h));
  const totalIdx  =hdr.findIndex(h=>/총액|합계|total|sum/i.test(h));
  const startIdx  =hdr.findIndex(h=>/시작|start|from|계약시작/i.test(h));
  const endIdx    =hdr.findIndex(h=>/종료|end|to|만료/i.test(h));
  const periodIdx =hdr.findIndex(h=>/기간|period|개월/i.test(h));
  const noteIdx   =hdr.findIndex(h=>/비고|메모|note|remark/i.test(h));
  const catIdx    =hdr.findIndex(h=>/카테고리|category|분류|대분류/i.test(h));

  /* ── 헬퍼 ── */
  function sv(r,idx){return idx>=0?(r[idx]||''):'';} 
  function av(r,idx){return idx>=0?parseAmt(r[idx]):0;}

  /* ── 각 행의 타입 판별 (수입/지출) ── */
  function getType(r){
    const t=sv(r,typeIdx).trim();
    if(/수입|income|in|임대료|관리비|토지|임대수입/i.test(t))return'in';
    if(/지출|expense|out|비용|대출|상환|납부|환급/i.test(t))return'out';
    // 항목명으로 추정
    const item=sv(r,itemIdx).trim();
    if(/수입|임대료|관리비|토지임대|이자수입/i.test(item))return'in';
    if(/지출|비용|대출|상환|납부|환급|세금|보험|관리|수선/i.test(item))return'out';
    return'etc';
  }

  /* ── 기간(개월) 추출 ── */
  function getPeriod(r){
    if(periodIdx>=0){
      const p=parseInt(String(sv(r,periodIdx)).replace(/[^0-9]/g,''));
      if(!isNaN(p)&&p>0)return p;
    }
    // 시작/종료일로 계산
    if(startIdx>=0&&endIdx>=0){
      const s=sv(r,startIdx).trim(),e=sv(r,endIdx).trim();
      const ms=s.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/),me=e.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
      if(ms&&me){
        const diff=(parseInt(me[1])-parseInt(ms[1]))*12+(parseInt(me[2])-parseInt(ms[2]));
        if(diff>0)return diff;
      }
    }
    return 1;
  }

  /* ── 총 금액 계산 ── */
  function getTotal(r){
    if(totalIdx>=0){const t=av(r,totalIdx);if(t)return t;}
    const m=av(r,amtIdx),p=getPeriod(r);
    return m*p;
  }

  /* ── 행 분류 ── */
  const incomeRows=data.filter(r=>getType(r)==='in');
  const expenseRows=data.filter(r=>getType(r)==='out');
  const etcRows=data.filter(r=>getType(r)==='etc');

  const totalIncome =incomeRows.reduce((a,r)=>a+getTotal(r),0);
  const totalExpense=expenseRows.reduce((a,r)=>a+getTotal(r),0);
  const netCF=totalIncome-totalExpense;

  /* ── KPI ── */
  const kpiHTML=`<div class="kpi-row">
    <div class="kpi g"><div class="kpi-lbl">총 수입</div><div class="kpi-val" style="color:var(--green)">${fmtBig(totalIncome)}원</div><div class="kpi-sub">${incomeRows.length}건</div></div>
    <div class="kpi r"><div class="kpi-lbl">총 지출</div><div class="kpi-val" style="color:var(--red)">${fmtBig(totalExpense)}원</div><div class="kpi-sub">${expenseRows.length}건</div></div>
    <div class="kpi ${netCF>=0?'b':'p'}"><div class="kpi-lbl">순 현금흐름</div><div class="kpi-val" style="color:${netCF>=0?'var(--blue)':'var(--red)'}">${netCF>=0?'+':''}${fmtBig(netCF)}원</div><div class="kpi-sub">수입 − 지출</div></div>
    <div class="kpi b"><div class="kpi-lbl">총 항목</div><div class="kpi-val">${data.length}</div><div class="kpi-sub">전체</div></div>
  </div>`;

  /* ─────────────────────────────────────────────────
     섹션 1: 수입 · 지출 요약 테이블
  ───────────────────────────────────────────────── */
  function summaryRow(r,type){
    const item=sv(r,itemIdx)||sv(r,catIdx)||'(항목없음)';
    const note=sv(r,noteIdx);
    const period=getPeriod(r);
    const monthly=av(r,amtIdx);
    const total=getTotal(r);
    const periodStr=period>1?`${period}개월`:(sv(r,startIdx)&&sv(r,endIdx)?`${sv(r,startIdx)} ~ ${sv(r,endIdx)}`:'—');
    const badge=type==='in'
      ?`<span class="type-badge type-in">수입</span>`
      :`<span class="type-badge type-out">지출</span>`;
    const amtCls=type==='in'?'inc':'exp';
    return`<tr class="${type==='in'?'income-row':'expense-row'}">
      <td class="label">${item}${note?`<span style="color:var(--t4);font-size:10px;margin-left:6px">${note}</span>`:''}</td>
      <td>${badge}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--t3)">${periodStr}</td>
      <td class="r">${monthly?`<span class="${amtCls}">${fmtBig(monthly)}원</span>`:`<span class="dim">—</span>`}</td>
      <td class="r"><span class="${amtCls} " style="font-weight:600">${fmtBig(total)}원</span></td>
    </tr>`;
  }

  const summaryHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:#00b894"></div>
      <div class="cf-section-title">수입 · 지출 요약</div>
      <div class="cf-section-sub">${data.length}건</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>항목</th><th>구분</th><th>기간</th>
          <th class="r">월 금액</th><th class="r">총 금액</th>
        </tr></thead>
        <tbody>
          ${incomeRows.length?`<tr class="yr-group"><td colspan="5">▸ 수입 항목</td></tr>${incomeRows.map(r=>summaryRow(r,'in')).join('')}`:''}
          ${incomeRows.length?`<tr class="subtotal-row"><td colspan="4">소계 — 수입</td><td class="r"><span class="inc">${fmtBig(totalIncome)}원</span></td></tr>`:''}
          ${expenseRows.length?`<tr class="yr-group"><td colspan="5">▸ 지출 항목</td></tr>${expenseRows.map(r=>summaryRow(r,'out')).join('')}`:''}
          ${expenseRows.length?`<tr class="subtotal-row"><td colspan="4">소계 — 지출</td><td class="r"><span class="exp">${fmtBig(totalExpense)}원</span></td></tr>`:''}
          ${etcRows.length?`<tr class="yr-group"><td colspan="5">▸ 기타</td></tr>${etcRows.map(r=>summaryRow(r,'etc')).join('')}`:''}
          <tr class="net-row">
            <td colspan="4" style="font-size:13px">순 현금흐름 (수입 − 지출)</td>
            <td class="r" style="font-size:14px;color:${netCF>=0?'var(--blue)':'var(--red)'}">
              ${netCF>=0?'+':''}${fmtBig(netCF)}원
            </td>
          </tr>
        </tbody>
      </table>
    </div></div>
  </div>`;

  /* ─────────────────────────────────────────────────
     섹션 2 & 3: 월별 상세 (수입/지출 분리)
     — 각 행의 시작/종료 또는 기간으로 월별 배분
  ───────────────────────────────────────────────── */

  /* 전체 기간 범위 파악 (데이터 기반 자동) */
  let minYear=9999,maxYear=0;
  data.forEach(r=>{
    const sy=sv(r,startIdx).match(/(\d{4})/),ey=sv(r,endIdx).match(/(\d{4})/);
    if(sy){const y=parseInt(sy[1]);if(y<minYear)minYear=y;if(y>maxYear)maxYear=y;}
    if(ey){const y=parseInt(ey[1]);if(y>maxYear)maxYear=y;}
  });
  if(minYear===9999||maxYear===0){minYear=new Date().getFullYear();maxYear=minYear+1;}
  maxYear=Math.min(maxYear,minYear+10); // 최대 10년

  /* 월별 배열 생성: [{y,m}] */
  const months=[];
  for(let y=minYear;y<=maxYear;y++)
    for(let m=1;m<=12;m++)months.push({y,m});

  /* 특정 행이 특정 연월에 해당하는지 판별 */
  function inMonth(r,y,m){
    const sy=sv(r,startIdx).trim(),ey=sv(r,endIdx).trim();
    const msy=sy.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
    const mey=ey.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
    if(msy&&mey){
      const s=parseInt(msy[1])*100+parseInt(msy[2]);
      const e=parseInt(mey[1])*100+parseInt(mey[2]);
      const cur=y*100+m;
      return cur>=s&&cur<=e;
    }
    // 시작일만 있을 때
    if(msy){
      const s=parseInt(msy[1])*100+parseInt(msy[2]);
      const cur=y*100+m;
      const p=getPeriod(r);
      const ey2=parseInt(msy[1])*12+parseInt(msy[2])+p-1;
      const eYear=Math.floor(ey2/12),eMon=ey2%12||12;
      return cur>=s&&cur<=eYear*100+eMon;
    }
    // 기간만 있으면 첫 해부터 배분
    if(getPeriod(r)>0&&y===minYear)return true;
    return false;
  }

  /* 월별 수입 계산 */
  function monthIncome(y,m){
    return incomeRows.reduce((sum,r)=>{
      if(inMonth(r,y,m)){const mv=av(r,amtIdx);return sum+(mv||getTotal(r)/getPeriod(r)||0);}
      return sum;
    },0);
  }
  /* 월별 지출 계산 */
  function monthExpense(y,m){
    return expenseRows.reduce((sum,r)=>{
      if(inMonth(r,y,m)){const mv=av(r,amtIdx);return sum+(mv||getTotal(r)/getPeriod(r)||0);}
      return sum;
    },0);
  }

  /* 수입 월별 테이블 생성 */
  let cumInc=0;
  const incomeMonthRows=[];
  const incomeYrTotals={};
  months.forEach(({y,m})=>{
    const v=monthIncome(y,m);
    cumInc+=v;
    if(!incomeYrTotals[y])incomeYrTotals[y]={sum:0,months:0};
    if(v>0){incomeYrTotals[y].sum+=v;incomeYrTotals[y].months++;}
    incomeMonthRows.push({y,m,v,cum:cumInc});
  });

  /* 연도별로 그룹핑해서 표시 — 값이 0인 달은 흐리게 */
  function buildMonthTable(mRows,ytotals,type){
    let html='',lastY=null,curYrSum=0;
    mRows.forEach(({y,m,v,cum},idx)=>{
      if(y!==lastY){
        if(lastY!==null&&curYrSum>0){
          html+=`<tr class="yr-total">
            <td colspan="3">${lastY}년 소계</td>
            <td class="r"><span class="${type==='in'?'inc':'exp'}">${fmtBig(curYrSum)}원</span></td>
            <td class="r"></td>
          </tr>`;
        }
        html+=`<tr class="yr-group"><td colspan="5">${y}년</td></tr>`;
        lastY=y;curYrSum=0;
      }
      curYrSum+=v;
      const amtCls=type==='in'?'inc':'exp';
      const dimCls=v===0?'dim':'';
      html+=`<tr>
        <td class="ym">${y}.${String(m).padStart(2,'0')}</td>
        <td class="r ${dimCls}">${v>0?`<span class="${amtCls}">${fmtBig(v)}원</span>`:`<span class="dim">—</span>`}</td>
        <td class="r ${dimCls}">${cum>0?`<span class="neu">${fmtBig(cum)}원</span>`:`<span class="dim">—</span>`}</td>
      </tr>`;
    });
    // 마지막 연도 소계
    if(lastY&&curYrSum>0)
      html+=`<tr class="yr-total"><td colspan="2">${lastY}년 소계</td>
        <td class="r"><span class="${type==='in'?'inc':'exp'}">${fmtBig(curYrSum)}원</span></td>
        </tr>`;
    return html;
  }

  /* 지출 월별 계산 */
  let cumExp=0;
  const expenseMonthRows=[];
  months.forEach(({y,m})=>{
    const v=monthExpense(y,m);
    cumExp+=v;
    expenseMonthRows.push({y,m,v,cum:cumExp});
  });

  /* 수입이 있는 달만 추려서 표시 */
  const incFiltered=incomeMonthRows.filter(r=>r.v>0);
  const expFiltered=expenseMonthRows.filter(r=>r.v>0);

  /* 월별 수입 섹션 */
  const incMonthHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:#00b894"></div>
      <div class="cf-section-title">수입 월별 상세</div>
      <div class="cf-section-sub">총 ${fmtBig(totalIncome)}원</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>연월</th>
          <th class="r">월 수입</th>
          <th class="r">누적 수입</th>
        </tr></thead>
        <tbody>
          ${incFiltered.length?buildMonthTable(incFiltered,incomeYrTotals,'in')
            :`<tr><td colspan="3" class="empty" style="text-align:center;padding:40px;color:var(--t4)">시트에 시작일/종료일 또는 기간 데이터를 입력해주세요</td></tr>`}
        </tbody>
      </table>
    </div></div>
  </div>`;

  /* 월별 지출 섹션 */
  const expMonthHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:#f03860"></div>
      <div class="cf-section-title">지출 월별 상세</div>
      <div class="cf-section-sub">총 ${fmtBig(totalExpense)}원</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>연월</th>
          <th class="r">월 지출</th>
          <th class="r">누적 지출</th>
        </tr></thead>
        <tbody>
          ${expFiltered.length?buildMonthTable(expFiltered,{},'out')
            :`<tr><td colspan="3" class="empty" style="text-align:center;padding:40px;color:var(--t4)">시트에 시작일/종료일 또는 기간 데이터를 입력해주세요</td></tr>`}
        </tbody>
      </table>
    </div></div>
  </div>`;

  /* ── 전체 원본 데이터 테이블 ── */
  CACHE['personal_cfn']=null;
  initTS('personal');TS['personal']={search:'',sortCol:-1,sortAsc:true,page:1};
  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 개인비용 Cash Flow</div>
    ${kpiHTML}
    ${summaryHTML}
    ${incMonthHTML}
    ${expMonthHTML}
    <div class="cf-section">
      <div class="cf-section-head">
        <div class="cf-section-bar" style="background:#6c5ce7"></div>
        <div class="cf-section-title">전체 원본 데이터</div>
        <div class="cf-section-sub">${data.length}건</div>
      </div>
      <div id="personal-tbl" style="border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r)"></div>
    </div>`;
  drawTable('personal',rows,'personal-tbl');
}

/* ════════════════════════════════════════════════════════════
   5. CORP — 법인비용 (기존 renderCost 구조 유지)
════════════════════════════════════════════════════════════ */
function renderCost(k,rows){
  /* personal 은 renderPersonal 로 분기 */
  if(k==='personal'){renderPersonal(rows);return;}
  const sec=document.getElementById(`sec-${k}`);
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}
  const hi=findHdrRow(rows);const hdr=rows[hi];const data=rows.slice(hi+1).filter(r=>r.some(c=>c));
  const pc=hdr.map((h,i)=>({h,i})).filter(({h})=>/금액|비용|합계|총액|cost|amount|total/i.test(h));
  const nc=(pc.length?pc:numCols(hdr,data)).slice(0,4);
  const cards=nc.map((c,i)=>{
    const vals=data.map(r=>parseFloat((r[c.i]||'').replace(/[,\s₩원]/g,''))).filter(x=>!isNaN(x));
    if(!vals.length)return'';
    const s=vals.reduce((a,b)=>a+b,0),avg=s/vals.length;
    return`<div class="kpi ${['b','g','y','p'][i]}"><div class="kpi-lbl">${c.h}</div><div class="kpi-val">${fmtBig(s)}</div><div class="kpi-sub">평균 ${fmtBig(avg)} · ${vals.length}건</div></div>`;
  }).filter(Boolean).join('');
  CACHE[k+'_cfn']=null;initTS(k);TS[k]={search:'',sortCol:-1,sortAsc:true,page:1};
  sec.innerHTML=`<div class="notice">📡 구글 시트 실시간 연동 · ${TABS[k].label}</div>${cards?`<div class="kpi-row">${cards}</div>`:''}<div id="${k}-tbl"></div>`;
  drawTable(k,rows,`${k}-tbl`);
}


/* ══ LOAD / ROUTE ══════════════════════════════════════════ */
function showLoader(id){document.getElementById(id).innerHTML=`<div class="loader"><div class="ring"></div><p>데이터 불러오는 중…</p></div>`;}
function stamp(){document.getElementById('syncTime').textContent=new Date().toLocaleTimeString('ko-KR');}

async function load(k){
  showLoader(`sec-${k}`);
  try{
    const rows=await fetchSheet(k);  /* ← 매번 구글 시트에서 새로 fetch */
    CACHE[k]=rows;
    if(k==='timeline')renderTimeline(rows);
    else if(k==='irr')renderIRR(rows);
    else if(k==='lease')renderLease(rows);
    else renderCost(k,rows);
    stamp();
  }catch(e){document.getElementById(`sec-${k}`).innerHTML=errHTML(e.message);}
}

function go(k,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById(`sec-${k}`).classList.add('on');
  CUR=k;
  if(!LOADED.has(k)){LOADED.add(k);load(k);}
}

async function refreshCurrent(){
  const btn=document.getElementById('btnRef');
  btn.classList.add('spin');
  LOADED.delete(CUR);
  await load(CUR);
  LOADED.add(CUR);
  btn.classList.remove('spin');
}

/* ══ INIT ══════════════════════════════════════════════════ */
LOADED.add('timeline');
load('timeline');
/* 5분마다 현재 탭 자동 갱신 — 구글 시트 변경사항 자동 반영 */
setInterval(()=>{LOADED.delete(CUR);load(CUR);},5*60*1000);
</script>
