/* ════════════════════════════════════════════════════════════
   3. LEASE — 표 기반 · 건물별 그룹화
   ★ 구글 시트 데이터 100% 실시간 반영 / 하드코딩 없음
════════════════════════════════════════════════════════════ */
function renderLease(rows){
  const sec=document.getElementById('sec-lease');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}

  /* ══ [데이터 레이어] 시트 원본 파싱 ════════════════════════════
     ★ 구글 시트 fetch → parseCSV → rows 그대로 유지
     ★ 하드코딩 없음, 컬럼 탐색 헤더 기반
  ════════════════════════════════════════════════════════════ */
  const hi=findHdrRow(rows);
  const hdr=rows[hi];

  /* 컬럼 자동 탐색 */
  const addrIdx    =hdr.findIndex(h=>/주소|소재지|위치|물건|건물|부동산/i.test(h));
  const floorIdx   =hdr.findIndex(h=>/층|floor/i.test(h));
  const nameIdx    =hdr.findIndex(h=>/임차인|사용자|회사|성명|이름|name|tenant/i.test(h));
  const rentIdx    =hdr.findIndex(h=>/월세|월임대료|임대료(?!보)/i.test(h));
  const depositIdx =hdr.findIndex(h=>/보증금|deposit/i.test(h));
  const mgmtIdx    =hdr.findIndex(h=>/관리비|관리료|maintenance/i.test(h));
  const landRentIdx=hdr.findIndex(h=>/토지임대료|토지료|지대/i.test(h));
  const statusIdx  =hdr.findIndex(h=>/상태|계약상태|현황|status/i.test(h));
  const startIdx   =hdr.findIndex(h=>/시작|계약시작|임대시작|from|start/i.test(h));
  const endIdx     =hdr.findIndex(h=>/종료|만료|계약종료|to|end/i.test(h));
  const areaIdx    =hdr.findIndex(h=>/면적|평수|㎡|평/i.test(h));

  function amt(r,idx){return idx>=0?parseAmt(r[idx]):0;}
  function str(r,idx){return idx>=0?((r[idx]||'').toString().trim()):'';} 

  /* ══ [유효 행 판별] ════════════════════════════════════════════
     아래 조건 중 하나라도 만족해야 "실제 계약 데이터 행"으로 인정:
     1. 임차인명이 존재 (합계/소계/헤더 반복 제외)
     2. 계약 시작일 또는 종료일이 존재
     3. 보증금 / 월임대료 / 관리비 / 토지임대료 중 실제 금액이 있음
     + 반드시 제외: 합계·소계·헤더반복·구분·빈값 행
  ════════════════════════════════════════════════════════════ */
  /* 제외 패턴: 임차인 또는 첫 셀이 아래 키워드면 데이터 행에서 제거 */
  const EXCLUDE_PAT=/^(합계|소계|계|subtotal|total|sum|항목|임차인|구분|건물|주소|\-|—|\s*)$/i;

  function isValidRow(r){
    const name=str(r,nameIdx);
    const start=str(r,startIdx);
    const end  =str(r,endIdx);
    const moneySum=amt(r,depositIdx)+amt(r,rentIdx)+amt(r,mgmtIdx)+amt(r,landRentIdx);

    /* 임차인명이 있어도 합계/소계/헤더 키워드면 제외 */
    if(name&&EXCLUDE_PAT.test(name)) return false;
    /* 첫 번째 셀도 합계류면 제외 */
    const cell0=(r[0]||'').toString().trim();
    if(EXCLUDE_PAT.test(cell0)&&!name&&!moneySum) return false;
    /* 유효 조건: 임차인 OR 날짜 OR 금액 중 하나 이상 */
    return !!(name||start||end||moneySum>0);
  }

  /* 전체 데이터 행 — 헤더 이후, 유효 행만 */
  const allRows=rows.slice(hi+1);
  const data=allRows.filter(r=>isValidRow(r));

  /* ══ [그룹핑] — 건물/주소 기준, 중복 없이 ═════════════════════
     우선순위:
     1. addrIdx 컬럼에 실제 주소값이 있으면 그것을 그룹명으로 사용
     2. 없으면 임차인명 / 금액 패턴으로 추정
     + 그룹명은 반드시 실제 건물/자산명이어야 함
     + 합계·빈값·구분 텍스트는 절대 그룹명 불가
  ════════════════════════════════════════════════════════════ */
  /* 무효 그룹명 패턴 */
  const INVALID_ADDR=/^(합계|소계|계|total|sum|건물|주소|항목|—|\-|\s*)$/i;

  /* 주소 정규화: 공백 제거 후 비교 */
  function normAddr(a){return String(a||'').replace(/\s/g,'');}

  const groupMap=new Map();
  data.forEach(r=>{
    let addr=str(r,addrIdx).trim();

    /* addrIdx가 없거나 값이 무효 그룹명이면 추정 */
    if(!addr||INVALID_ADDR.test(addr)){
      const name=str(r,nameIdx);
      const lrent=amt(r,landRentIdx);
      const rent =amt(r,rentIdx);
      /* 토지임대 성격: 토지 키워드 or 토지임대료만 있고 월세 0 */
      if(/토지/.test(name)||(lrent>0&&rent===0)) addr='토지임대';
      else if(/디파이넘버|defynumber/i.test(name)) addr='압구정로8길 3';
      else if(/블루피카/i.test(name))              addr='압구정로8길 3';
      else if(name)                                 addr='압구정로 112';
      else                                          return; /* 이름도 없으면 스킵 */
    }

    /* 최종 무효 그룹명 방어 */
    if(INVALID_ADDR.test(addr)) return;

    /* 기존 그룹과 정규화 비교해서 같은 건물이면 합치기 (중복 방지) */
    let matchedKey=null;
    for(const [k] of groupMap){
      if(normAddr(k)===normAddr(addr)){matchedKey=k;break;}
    }
    const key=matchedKey||addr;
    if(!groupMap.has(key))groupMap.set(key,[]);
    groupMap.get(key).push(r);
  });

  /* ══ [섹션 순서 정렬] ═══════════════════════════════════════ */
  const SECTION_ORDER=['압구정로112','압구정로8길3','토지임대'];
  const validEntries=[...groupMap.entries()];

  const ordered=[];
  SECTION_ORDER.forEach(key=>{
    const found=validEntries.find(([a])=>
      normAddr(a).includes(normAddr(key))||normAddr(key).includes(normAddr(a))
    );
    if(found&&!ordered.includes(found))ordered.push(found);
  });
  validEntries.forEach(e=>{if(!ordered.includes(e))ordered.push(e);});

  /* ══ [UI 레이어] 만료 배지 ══════════════════════════════════ */
  function expBadge(r){
    const stTxt=str(r,statusIdx);
    if(stTxt){
      if(/만료|종료|해지/i.test(stTxt))return`<span class="exp-badge exp-done">${stTxt}</span>`;
      if(/예정|임박|주의/i.test(stTxt))return`<span class="exp-badge exp-near">${stTxt}</span>`;
      if(/유효|활성|계약중|진행/i.test(stTxt))return`<span class="exp-badge exp-ok">${stTxt}</span>`;
    }
    const endTxt=str(r,endIdx);
    if(!endTxt)return`<span class="exp-badge exp-none">—</span>`;
    const m=endTxt.match(/(\d{4})/);
    if(!m)return`<span class="exp-badge exp-none">${endTxt}</span>`;
    const yr=parseInt(m[1]),diff=yr-new Date().getFullYear();
    if(diff<0) return`<span class="exp-badge exp-done">만료 (${yr})</span>`;
    if(diff===0)return`<span class="exp-badge exp-near">올해 만료</span>`;
    if(diff===1)return`<span class="exp-badge exp-warn">내년 만료 (${yr})</span>`;
    return`<span class="exp-badge exp-ok">${yr}</span>`;
  }
  function amtCell(v,cls){
    if(!v||v===0)return`<span class="amt-muted">—</span>`;
    return`<span class="${cls||''}">${fmtBig(v)}원</span>`;
  }

  /* ══ [섹션 렌더러] ══════════════════════════════════════════
     gRows: 이미 isValidRow() 필터 통과한 행들만 들어옴
     → tbody에는 실제 계약 데이터만 렌더링
     → 합계행은 코드로 계산해서 맨 아래에만 추가
  ════════════════════════════════════════════════════════════ */
  function groupSection(addr,gRows){
    /* 금액 합산 */
    const sumRent =gRows.reduce((a,r)=>a+amt(r,rentIdx),0);
    const sumDep  =gRows.reduce((a,r)=>a+amt(r,depositIdx),0);
    const sumMgmt =gRows.reduce((a,r)=>a+amt(r,mgmtIdx),0);
    const sumLrent=gRows.reduce((a,r)=>a+amt(r,landRentIdx),0);
    const sumMonth=sumRent+sumMgmt;

    /* 행 렌더링 */
      const tbody=gRows.map(r=>{
      const rent=amt(r,rentIdx),dep=amt(r,depositIdx);
      const mgmt=amt(r,mgmtIdx);
      const monthly=rent+mgmt;
      return`<tr>
        <td class="name">${str(r,nameIdx)||'—'}</td>
        <td class="floor">${str(r,floorIdx)||'—'}</td>
        ${areaIdx>=0?`<td>${str(r,areaIdx)||'—'}</td>`:''}
        <td>${str(r,startIdx)||'—'}</td>
        <td>${str(r,endIdx)||'—'}</td>
        <td>${expBadge(r)}</td>
        <td class="r">${amtCell(dep,'amt-blue')}</td>
        <td class="r">${amtCell(rent,'amt-green')}</td>
        <td class="r">${amtCell(mgmt,'')}</td>
        <td class="r">${monthly>0?`<span class="amt-total">${fmtBig(monthly)}원</span>`:`<span class="amt-muted">—</span>`}</td>
      </tr>`;
    }).join('');

    /* 합계 행 — 금액이 있을 때만 */
    const colSpanBase=areaIdx>=0?6:5;
    const sumRow=(sumDep||sumRent||sumMgmt)?`<tr class="sum-row">
      <td colspan="${colSpanBase}">합 계</td>
      <td class="r">${amtCell(sumDep,'amt-blue')}</td>
      <td class="r">${amtCell(sumRent,'amt-green')}</td>
      <td class="r">${amtCell(sumMgmt,'')}</td>
      <td class="r">${sumMonth>0?`<span class="amt-total">${fmtBig(sumMonth)}원</span>`:`<span class="amt-muted">—</span>`}</td>
    </tr>`:'';

    /* 요약 카드 */
    const summaryItems=[
      sumRent ?`<div class="ls-summary-item"><span class="ls-si-lbl">월 임대료</span><span class="ls-si-val green">${fmtBig(sumRent)}원</span></div>`:'',
      sumMgmt ?`<div class="ls-summary-item"><span class="ls-si-lbl">관리비</span><span class="ls-si-val">${fmtBig(sumMgmt)}원</span></div>`:'',
      sumDep  ?`<div class="ls-summary-item"><span class="ls-si-lbl">보증금</span><span class="ls-si-val blue">${fmtBig(sumDep)}원</span></div>`:'',
      sumMonth?`<div class="ls-summary-item ls-si-total"><span class="ls-si-lbl">월 합계</span><span class="ls-si-val white">${fmtBig(sumMonth)}원</span></div>`:'',
    ].filter(Boolean).join('');

    return`<div class="ls-section">
      <div class="ls-group-head">
        <div class="ls-group-bar"></div>
        <div class="ls-group-title">${addr}</div>
        <div class="ls-group-meta">${gRows.length}건</div>
      </div>
      ${summaryItems?`<div class="ls-summary-row">${summaryItems}</div>`:''}
      <div class="ls-table-wrap"><div style="overflow-x:auto">
        <table class="ls-table">
          <thead><tr>
            <th>임차인</th><th>층</th>${areaIdx>=0?'<th>면적 (m²)</th>':''}
            <th>계약 시작</th><th>계약 종료</th><th>만료 상태</th>
            <th class="r">보증금</th><th class="r">월 임대료</th>
            <th class="r">관리비</th><th class="r">월 합계</th>
          </tr></thead>
          <tbody>${tbody}${sumRow}</tbody>
        </table>
      </div></div>
    </div>`;
  }

  /* ══ [KPI 집계] — 유효 행(data)만 사용, 중복 없음 ═════════ */
  const totalRent =data.reduce((a,r)=>a+amt(r,rentIdx),0);
  const totalLrent=data.reduce((a,r)=>a+amt(r,landRentIdx),0);
  const totalMgmt =data.reduce((a,r)=>a+amt(r,mgmtIdx),0);
  const totalDep  =data.reduce((a,r)=>a+amt(r,depositIdx),0);
  const totalMonth=totalRent+totalMgmt+totalLrent;
  let aC=0,eC=0,wC=0;
  data.forEach(r=>{
    const stTxt=str(r,statusIdx),endTxt=str(r,endIdx);
    if(/만료|종료|해지/i.test(stTxt)){eC++;return;}
    if(/예정|임박|주의/i.test(stTxt)){wC++;return;}
    if(/유효|활성|계약중|진행/i.test(stTxt)){aC++;return;}
    if(endTxt){
      const m=endTxt.match(/(\d{4})/);
      if(m){
        const diff=parseInt(m[1])-new Date().getFullYear();
        if(diff<0){eC++;return;}
        if(diff<=1){wC++;return;}
      }
      aC++;
    }
  });

  /* ══ 섹션 HTML 조립 ══════════════════════════════════════ */
  const sections=ordered.map(([a,r])=>groupSection(a,r)).join('');

  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 임대차계약현황</div>
    <div class="kpi-row" style="grid-template-columns:repeat(auto-fit,minmax(0,140px));justify-content:start;">
      <div class="kpi b"><div class="kpi-lbl">총 계약</div><div class="kpi-val">${data.length}</div><div class="kpi-sub">유효 계약 건수</div></div>
      ${aC?`<div class="kpi g"><div class="kpi-lbl">계약 유효</div><div class="kpi-val" style="color:var(--green)">${aC}</div><div class="kpi-sub">진행중</div></div>`:''}
      ${eC?`<div class="kpi r"><div class="kpi-lbl">만료·종료</div><div class="kpi-val" style="color:var(--red)">${eC}</div><div class="kpi-sub">종료</div></div>`:''}
      ${wC?`<div class="kpi y"><div class="kpi-lbl">주의</div><div class="kpi-val" style="color:var(--yellow)">${wC}</div><div class="kpi-sub">곧 만료</div></div>`:''}
      ${totalRent?`<div class="kpi p"><div class="kpi-lbl">월 임대료</div><div class="kpi-val" style="color:var(--purple)">${fmtBig(totalRent)}원</div><div class="kpi-sub">전체 합산</div></div>`:''}
      ${totalMgmt?`<div class="kpi b"><div class="kpi-lbl">관리비</div><div class="kpi-val">${fmtBig(totalMgmt)}원</div><div class="kpi-sub">월 기준</div></div>`:''}
      ${totalDep?`<div class="kpi b"><div class="kpi-lbl">보증금</div><div class="kpi-val">${fmtBig(totalDep)}원</div><div class="kpi-sub">전체 합산</div></div>`:''}
    </div>
    ${sections||`<div class="empty"><div class="empty-i">📭</div>임차인 데이터가 없습니다</div>`}`;
}
/* ════════════════════════════════════════════════════════════
   4. PERSONAL COST — 개인 Cash Flow 분석
   ★ 구글 시트 구조: 가로형 매트릭스 (열=항목, 행=속성)
     - "1. 개인 수입 항목" 섹션: 각 열이 하나의 수입 항목
     - "2. 개인 지출 항목" 섹션: 각 열이 하나의 지출 항목
     - 첫 번째 열 = 속성명 (항목 / 금액 / 수입기간 / 납부기간)
   ★ fetch 구조 및 전체 앱 흐름 무수정
════════════════════════════════════════════════════════════ */
function renderPersonal(rows){
  const sec=document.getElementById('sec-personal');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}

  /* ── 문자열 정규화 ── */
  function nc(s){
    return String(s||'')
      .replace(/\u00a0|\u3000|\u200b/g,' ')
      .replace(/[\r\n\t]+/g,' ')
      .replace(/\s+/g,' ')
      .trim();
  }
  function norm(s){return nc(s).toLowerCase();}

  /* ── 디버그 로그 ── */
  console.log('[개인비용 raw rows]',{
    총행수:rows.length,
    첫15행:rows.slice(0,15).map((r,i)=>`[${i}] `+r.map(c=>nc(c)).filter(c=>c).join(' | ')),
    전체행라벨:rows.map((r,i)=>[i,nc(r[0]||''),nc(r[1]||'')])
  });

  /* ══════════════════════════════════════════════════════════
     [A] 세로형 상세 섹션 파서
     1-1 개인 수입 항목 상세 → incDetailRows[]
     2-2 개인 지출 항목 상세 → expDetailRows[]
     각 행: {building, name, startDate, endDate, rent, mgmt, ...}
  ══════════════════════════════════════════════════════════ */

  /* 섹션 제목 판별 */
  function isSec11(r){ const j=r.map(c=>norm(c)).join(' '); return /1-1|1\.1/.test(j)&&/수입|임대/.test(j); }
  function isSec22(r){ const j=r.map(c=>norm(c)).join(' '); return /2-2|2\.2/.test(j)&&/지출/.test(j); }
  /* 구분선 / 빈 구분 행 */
  function isDivider(r){ return !r.some(c=>nc(c)); }

  /* 섹션별 행 분리 */
  let sec11Rows=[], sec22Rows=[];
  let inSec11=false, inSec22=false;
  rows.forEach(r=>{
    if(isSec11(r)){ inSec11=true; inSec22=false; return; }
    if(isSec22(r)){ inSec22=true; inSec11=false; return; }
    /* 다른 섹션 제목이 나오면 중단 (1., 2. 숫자로 시작하고 현재 섹션 아님) */
    const j=r.map(c=>norm(c)).join(' ');
    if(inSec11&&/^\s*[12]\s*[.\-]/.test(nc(r[0]||''))&&!isSec11(r)){inSec11=false;}
    if(inSec22&&/^\s*[12]\s*[.\-]/.test(nc(r[0]||''))&&!isSec22(r)){inSec22=false;}
    if(inSec11) sec11Rows.push(r);
    if(inSec22) sec22Rows.push(r);
  });

  console.log('[상세 섹션]',{sec11:sec11Rows.length, sec22:sec22Rows.length});
  console.log('[1-1 첫5행]', sec11Rows.slice(0,5).map((r,i)=>`[${i}] `+r.map(c=>nc(c)).join(' | ')));
  console.log('[2-2 첫5행]', sec22Rows.slice(0,5).map((r,i)=>`[${i}] `+r.map(c=>nc(c)).join(' | ')));

  /* ── 헤더 행 탐색 (컬럼 인덱스 찾기) ── */
  function findHdrIdx(sRows, patterns){
    for(let i=0;i<Math.min(sRows.length,5);i++){
      const matched=patterns.filter(p=>sRows[i].some(c=>p.test(norm(c))));
      if(matched.length>=2) return i;
    }
    return 0;
  }

  /* 1-1 수입 상세 파싱 */
  function parseIncDetail(sRows){
    if(!sRows.length) return [];
    const hi=findHdrIdx(sRows,[/건물|building/,/임차인|tenant/,/임대.*시작|start/,/임대.*종료|end/,/임대료|rent/,/관리비|mgmt/]);
    const hdr=sRows[hi];
    const bIdx=hdr.findIndex(h=>/건물|building/i.test(nc(h)));
    const nIdx=hdr.findIndex(h=>/임차인|tenant|이름|name/i.test(nc(h)));
    const sIdx=hdr.findIndex(h=>/임대.*시작|시작.*임대|start|from/i.test(nc(h)));
    const eIdx=hdr.findIndex(h=>/임대.*종료|종료.*임대|end|to/i.test(nc(h)));
    const rIdx=hdr.findIndex(h=>/임대료|월임대|rent/i.test(nc(h)));
    const mIdx=hdr.findIndex(h=>/관리비|mgmt|management/i.test(nc(h)));

    console.log('[1-1 헤더]',{hi,hdr:hdr.map((h,i)=>`[${i}]${nc(h)}`).join(' '),bIdx,nIdx,sIdx,eIdx,rIdx,mIdx});

    const result=[];
    let lastBuilding='';
    sRows.slice(hi+1).forEach((r,ri)=>{
      if(!r.some(c=>nc(c))) return; /* 빈 행 스킵 */
      /* 건물명 forward-fill */
      const rawB=bIdx>=0?nc(r[bIdx]||''):'';
      if(rawB) lastBuilding=rawB;
      const building=lastBuilding;
      const name=nIdx>=0?nc(r[nIdx]||''):'';
      const startRaw=sIdx>=0?nc(r[sIdx]||''):'';
      const endRaw=eIdx>=0?nc(r[eIdx]||''):'';
      const rent=rIdx>=0?parseAmt(r[rIdx]||''):0;
      const mgmt=mIdx>=0?parseAmt(r[mIdx]||''):0;

      /* 헤더행 재탐지 방지 */
      if(/건물|임차인|임대시작|임대료/.test(name)) return;
      if(!name&&!rent&&!mgmt) return;

      result.push({building, name, startRaw, endRaw, rent, mgmt});
    });
    return result;
  }

  /* 2-2 지출 상세 파싱 */
  function parseExpDetail(sRows){
    if(!sRows.length) return [];
    const hi=findHdrIdx(sRows,[/건물|building/,/항목|item/,/금액|amount/,/기간|period/]);
    const hdr=sRows[hi];
    const bIdx=hdr.findIndex(h=>/건물|building/i.test(nc(h)));
    const iIdx=hdr.findIndex(h=>/항목|item|내용|내역/i.test(nc(h)));
    const aIdx=hdr.findIndex(h=>/금액|amount|cost/i.test(nc(h)));
    const pIdx=hdr.findIndex(h=>/기간|period|날짜|date/i.test(nc(h)));

    console.log('[2-2 헤더]',{hi,hdr:hdr.map((h,i)=>`[${i}]${nc(h)}`).join(' '),bIdx,iIdx,aIdx,pIdx});

    const result=[];
    let lastBuilding='';
    sRows.slice(hi+1).forEach(r=>{
      if(!r.some(c=>nc(c))) return;
      const rawB=bIdx>=0?nc(r[bIdx]||''):'';
      if(rawB&&!/항목|금액|기간/.test(rawB)) lastBuilding=rawB;
      const building=lastBuilding;
      const item=iIdx>=0?nc(r[iIdx]||''):'';
      const amount=aIdx>=0?parseAmt(r[aIdx]||''):0;
      const period=pIdx>=0?nc(r[pIdx]||''):'';

      if(/항목|금액|기간/.test(item)) return;
      if(!item&&!amount) return;

      result.push({building, item, amount, period});
    });
    return result;
  }

  const incDetail=parseIncDetail(sec11Rows);
  const expDetail=parseExpDetail(sec22Rows);

  console.log('[수입 상세]', incDetail.length, '건', incDetail.slice(0,3));
  console.log('[지출 상세]', expDetail.length, '건', expDetail.slice(0,3));

  /* ══════════════════════════════════════════════════════════
     [B] 가로형 요약 파서 (기존 로직 — 상단 요약용)
     상세 파싱 실패 시 fallback으로 사용
  ══════════════════════════════════════════════════════════ */
  function getLabelType(r){
    const first=norm(r.find(c=>nc(c))||'');
    if(first==='항목')                    return 'item';
    if(first==='금액')                    return 'amount';
    if(/수입.*기간|기간.*수입/.test(first)) return 'income_period';
    if(/납부.*기간|기간.*납부/.test(first)) return 'expense_period';
    if(/기간/.test(first))                return 'period';
    return null;
  }
  function isSectionTitle(r){
    if(getLabelType(r)!==null) return false;
    const joined=r.map(c=>norm(c)).join(' ');
    if(/^\s*[12]\.\s*(개인)/.test(r.map(c=>nc(c)).join(' '))) return true;
    if(/개인/.test(joined)&&/수입|지출/.test(joined)&&/항목/.test(joined)) return true;
    return false;
  }
  function isIncomeTitle(r){ if(!isSectionTitle(r))return false; const j=r.map(c=>norm(c)).join(' '); return /수입/.test(j)&&!/지출/.test(j); }
  function isExpenseTitle(r){ if(!isSectionTitle(r))return false; const j=r.map(c=>norm(c)).join(' '); return /지출/.test(j); }

  let incomeBlock=[], expenseBlock=[];
  let inIncome=false, inExpense=false;
  rows.forEach(r=>{
    if(isIncomeTitle(r)){ inIncome=true; inExpense=false; return; }
    if(isExpenseTitle(r)){ inExpense=true; inIncome=false; return; }
    if(inIncome)  incomeBlock.push(r);
    if(inExpense) expenseBlock.push(r);
  });

  function blockToItems(block,type){
    let itemRow=null,amountRow=null,periodRow=null;
    block.forEach(r=>{
      if(!r.some(c=>nc(c)))return;
      const lt=getLabelType(r);
      if(lt==='item'&&!itemRow)itemRow=r;
      if(lt==='amount'&&!amountRow)amountRow=r;
      if((lt==='period'||lt==='income_period'||lt==='expense_period')&&!periodRow)periodRow=r;
    });
    if(!itemRow&&!amountRow)return[];
    const maxCols=Math.max(itemRow?itemRow.length:0,amountRow?amountRow.length:0,periodRow?periodRow.length:0);
    const filledPeriod=[];let lastPer='';
    for(let col=1;col<maxCols;col++){
      const raw=String(periodRow&&periodRow[col]!=null?periodRow[col]:'').trim();
      if(raw)lastPer=raw;
      filledPeriod[col]=lastPer;
    }
    const items=[];
    for(let col=1;col<maxCols;col++){
      const itemName=nc(itemRow?itemRow[col]:'');
      const amtRaw=nc(amountRow?amountRow[col]:'');
      const perStr=filledPeriod[col]||'';
      if(/^(항목|금액|수입기간|납부기간|기간)$/.test(itemName.replace(/\s/g,'')))continue;
      if(!itemName&&!amtRaw)continue;
      items.push({type,item:itemName||'(항목없음)',amount:parseAmt(amtRaw)||0,period:perStr});
    }
    return items;
  }

  const summaryIncItems=blockToItems(incomeBlock,'수입');
  const summaryExpItems=blockToItems(expenseBlock,'지출');

  /* ══════════════════════════════════════════════════════════
     [C] 기간 파싱
  ══════════════════════════════════════════════════════════ */
  function parsePeriod(s){
    const str=String(s||'').trim();
    if(!str)return null;
    /* 범위형: YYYY-MM-DD ~ YYYY-MM-DD 또는 YYYY-MM ~ YYYY-MM */
    const mR=str.match(/(\d{4})[-.\/](\d{1,2})(?:[-.\/]\d{1,2})?\s*[~\u2013\u2014]\s*(\d{4})[-.\/](\d{1,2})/);
    if(mR)return{sy:+mR[1],sm:+mR[2],ey:+mR[3],em:+mR[4],single:false};
    const mR2=str.match(/(\d{4})[-](\d{2})\s*-\s*(\d{4})[-](\d{2})(?!\d)/);
    if(mR2)return{sy:+mR2[1],sm:+mR2[2],ey:+mR2[3],em:+mR2[4],single:false};
    /* 단일 날짜형 */
    const mS=str.match(/(\d{4})[-.\/](\d{1,2})(?:[-.\/](\d{1,2}))?/);
    if(mS)return{sy:+mS[1],sm:+mS[2],ey:+mS[1],em:+mS[2],single:true};
    return null;
  }

  /* 날짜 문자열 → {y,m} */
  function parseDate(s){
    const str=String(s||'').trim();
    const m=str.match(/(\d{4})[-.\/](\d{1,2})/);
    if(m)return{y:+m[1],m:+m[2]};
    return null;
  }

  /* ══════════════════════════════════════════════════════════
     [D] 월별 캐시플로우 맵 생성
     상세 파싱 성공 시: incDetail / expDetail 기반
     상세 파싱 실패 시: summaryIncItems / summaryExpItems fallback
  ══════════════════════════════════════════════════════════ */

  /* 건물 분류 */
  function classifyBuilding(s){
    const v=norm(s||'');
    if(/케이프혼/.test(v)||/cape/.test(v)) return 'cape';
    if(/8길|8-3|8길3/.test(v))             return '8gil';
    return '112';
  }

  /* 컬럼명 매핑 (수입) */
  function incColName(building, type){
    const b=classifyBuilding(building);
    if(b==='cape') return type==='rent'?'임대(케이프혼)':'관리비(케이프혼)';
    if(b==='8gil') return type==='rent'?'임대(8길3)':'관리비(8길3)';
    return type==='rent'?'임대(112)':'관리비(112)';
  }

  /* 컬럼명 매핑 (지출) */
  function expColName(building, item){
    const b=classifyBuilding(building);
    const it=norm(item||'');
    if(/환급|보증금|반환/.test(it)) return '보증금환급';
    if(/대출/.test(it)){
      if(b==='8gil') return '대출(8길3)';
      return '대출(112)';
    }
    if(/고정비/.test(it)){
      if(b==='8gil') return '고정비(8길3)';
      return '고정비(112)';
    }
    /* 그 외 기타 지출 */
    return `기타지출(${building||'기타'})`;
  }

  const cfMap={};
  function cfKey(y,m){return `${y}-${String(m).padStart(2,'0')}`;}
  function ensureKey(y,m,cols){
    const k=cfKey(y,m);
    if(!cfMap[k]){cfMap[k]={y,m};cols.forEach(c=>{cfMap[k][c]=0;});}
    return k;
  }

  /* 전체 기간 자동 탐지용 */
  let minY=9999, maxY=0;
  function trackRange(p){
    if(!p)return;
    if(p.sy&&p.sy<minY)minY=p.sy;
    if(p.ey&&p.ey>maxY)maxY=p.ey;
  }

  /* 상세 수입 컬럼 */
  const INC_COLS_ORDER=['임대(112)','관리비(112)','임대(8길3)','관리비(8길3)','임대(케이프혼)','관리비(케이프혼)'];
  /* 상세 지출 컬럼 */
  const EXP_COLS_ORDER=['대출(112)','고정비(112)','대출(8길3)','고정비(8길3)','보증금환급'];

  const useDetail=(incDetail.length>0||expDetail.length>0);
  let activeIncCols=[], activeExpCols=[];

  if(useDetail){
    /* ── 수입 상세 → cfMap ── */
    incDetail.forEach(o=>{
      const p1=parseDate(o.startRaw);
      const p2=parseDate(o.endRaw);
      if(!p1)return;
      const ey=p2?p2.y:(p1.y+5);
      const em=p2?p2.m:12;
      trackRange({sy:p1.y,sm:p1.m,ey,em});
    });
    expDetail.forEach(o=>{
      const p=parsePeriod(o.period);
      trackRange(p);
    });
    if(minY===9999){minY=new Date().getFullYear();maxY=minY+4;}
    maxY=Math.min(maxY,minY+9);

    /* 사용 컬럼 결정 */
    const usedInc=new Set();
    incDetail.forEach(o=>{
      if(o.rent) usedInc.add(incColName(o.building,'rent'));
      if(o.mgmt) usedInc.add(incColName(o.building,'mgmt'));
    });
    activeIncCols=INC_COLS_ORDER.filter(c=>usedInc.has(c));

    const usedExp=new Set();
    expDetail.forEach(o=>{
      if(o.amount) usedExp.add(expColName(o.building,o.item));
    });
    activeExpCols=EXP_COLS_ORDER.filter(c=>usedExp.has(c));
    /* 정의에 없는 기타 컬럼 추가 */
    [...usedExp].forEach(c=>{if(!activeExpCols.includes(c))activeExpCols.push(c);});

    const allCols=[...activeIncCols,...activeExpCols];

    /* cfMap에 수입 반영 */
    incDetail.forEach(o=>{
      const p1=parseDate(o.startRaw);
      const p2=parseDate(o.endRaw);
      if(!p1)return;
      let cy=p1.y, cm=p1.m;
      const ey=p2?p2.y:(p1.y+5);
      const em=p2?p2.m:12;
      while(cy<ey||(cy===ey&&cm<=em)){
        if(cy>=minY&&cy<=maxY){
          const k=ensureKey(cy,cm,allCols);
          if(o.rent) cfMap[k][incColName(o.building,'rent')]=(cfMap[k][incColName(o.building,'rent')]||0)+o.rent;
          if(o.mgmt) cfMap[k][incColName(o.building,'mgmt')]=(cfMap[k][incColName(o.building,'mgmt')]||0)+o.mgmt;
        }
        cm++;if(cm>12){cm=1;cy++;}
      }
    });

    /* cfMap에 지출 반영 */
    expDetail.forEach(o=>{
      if(!o.amount)return;
      const p=parsePeriod(o.period);
      const colName=expColName(o.building,o.item);
      console.log(`[지출] "${o.item}" | building="${o.building}" | col="${colName}" | period="${o.period}" | parsed=`,p);
      if(!p)return;
      if(p.single){
        /* 단일 날짜: 해당 월 1회 (보증금 환급 등) */
        if(p.sy>=minY&&p.sy<=maxY){
          const k=ensureKey(p.sy,p.sm,allCols);
          cfMap[k][colName]=(cfMap[k][colName]||0)+o.amount;
        }
      } else {
        /* 기간형: 매월 반복 */
        let cy=p.sy,cm=p.sm;
        while(cy<p.ey||(cy===p.ey&&cm<=p.em)){
          if(cy>=minY&&cy<=maxY){
            const k=ensureKey(cy,cm,allCols);
            cfMap[k][colName]=(cfMap[k][colName]||0)+o.amount;
          }
          cm++;if(cm>12){cm=1;cy++;}
        }
      }
    });

  } else {
    /* ── Fallback: 가로형 요약 기반 (기존 로직) ── */
    console.warn('[개인비용] 상세 섹션 파싱 실패 → 요약 항목 기반 fallback');
    function toColName(n){
      if(/월임대료.*112|임대.*112/i.test(n))    return '임대(112)';
      if(/월관리비.*112|관리비.*112/i.test(n))   return '관리비(112)';
      if(/월임대료.*8길3|임대.*8길3/i.test(n))   return '임대(8길3)';
      if(/월관리비.*8길3|관리비.*8길3/i.test(n)) return '관리비(8길3)';
      if(/대출.*112/i.test(n))                   return '대출(112)';
      if(/고정비.*112/i.test(n))                 return '고정비(112)';
      if(/대출.*8길3/i.test(n))                  return '대출(8길3)';
      if(/고정비.*8길3/i.test(n))                return '고정비(8길3)';
      return n||'기타';
    }
    summaryIncItems.forEach(o=>{o.col=toColName(o.item);});
    summaryExpItems.forEach(o=>{o.col=toColName(o.item);});
    [...summaryIncItems,...summaryExpItems].forEach(o=>{
      const p=parsePeriod(o.period);
      trackRange(p);
    });
    if(minY===9999){minY=new Date().getFullYear();maxY=minY+4;}
    maxY=Math.min(maxY,minY+9);

    const usedInc=new Set(summaryIncItems.map(o=>o.col));
    const usedExp=new Set(summaryExpItems.filter(o=>!/보증금/.test(o.item)).map(o=>o.col));
    activeIncCols=INC_COLS_ORDER.filter(c=>usedInc.has(c));
    [...usedInc].forEach(c=>{if(!activeIncCols.includes(c))activeIncCols.push(c);});
    activeExpCols=EXP_COLS_ORDER.filter(c=>usedExp.has(c));
    [...usedExp].forEach(c=>{if(!activeExpCols.includes(c))activeExpCols.push(c);});

    const allCols=[...activeIncCols,...activeExpCols];
    function addItems(items){
      items.forEach(o=>{
        if(!o.amount)return;
        const p=parsePeriod(o.period);
        if(!p){
          const k=ensureKey(minY,1,allCols);
          cfMap[k][o.col]=(cfMap[k][o.col]||0)+o.amount;
          return;
        }
        if(p.single){
          if(p.sy>=minY&&p.sy<=maxY){
            const k=ensureKey(p.sy,p.sm,allCols);
            cfMap[k][o.col]=(cfMap[k][o.col]||0)+o.amount;
          }
        } else {
          let cy=p.sy,cm=p.sm;
          while(cy<p.ey||(cy===p.ey&&cm<=p.em)){
            if(cy>=minY&&cy<=maxY){
              const k=ensureKey(cy,cm,allCols);
              cfMap[k][o.col]=(cfMap[k][o.col]||0)+o.amount;
            }
            cm++;if(cm>12){cm=1;cy++;}
          }
        }
      });
    }
    addItems(summaryIncItems);
    /* 지출 중 보증금(요약값) 제외 */
    addItems(summaryExpItems.filter(o=>!/보증금/.test(o.item)));
  }

  /* ══════════════════════════════════════════════════════════
     [E] cfRows 생성 + 누적
  ══════════════════════════════════════════════════════════ */
  const allCols=[...activeIncCols,...activeExpCols];

  const cfRows=Object.keys(cfMap).sort().map(k=>{
    const r=cfMap[k];
    const incSum=activeIncCols.reduce((a,c)=>a+(r[c]||0),0);
    const expSum=activeExpCols.reduce((a,c)=>a+(r[c]||0),0);
    return{...r,incSum,expSum,net:incSum-expSum};
  });
  let cumNet=0;
  cfRows.forEach(r=>{r.cum=cumNet+=r.net;});

  /* ══════════════════════════════════════════════════════════
     [F] KPI — 상세 기반 월 기준 수입/지출 (보증금 제외)
  ══════════════════════════════════════════════════════════ */
  /* 월 정상 수입: 임대+관리비 합산 (1개월치) */
  const now=new Date();
  const nowKey=cfKey(now.getFullYear(),now.getMonth()+1);
  const nowRow=cfMap[nowKey];
  const curMonthInc=nowRow?activeIncCols.reduce((a,c)=>a+(nowRow[c]||0),0):0;
  const curMonthExp=nowRow?activeExpCols.reduce((a,c)=>a+(nowRow[c]||0),0):0;
  const curMonthNet=curMonthInc-curMonthExp;

  /* 보증금 환급 총액 (참고용) */
  const totalDeposit=useDetail
    ? expDetail.filter(o=>/환급|보증금|반환/.test(norm(o.item))).reduce((a,o)=>a+o.amount,0)
    : 0;

  /* KPI */
  const kpiHTML=`<div class="kpi-row">
    <div class="kpi g">
      <div class="kpi-lbl" style="color:#e5e7eb">이번 달 수입</div>
      <div class="kpi-val" style="color:#22c55e">${fmtBig(curMonthInc)}원</div>
      <div class="kpi-sub" style="color:#9ca3af">${now.getFullYear()}년 ${now.getMonth()+1}월 기준</div>
    </div>
    <div class="kpi r">
      <div class="kpi-lbl" style="color:#e5e7eb">이번 달 지출</div>
      <div class="kpi-val" style="color:#ef4444">${fmtBig(curMonthExp)}원</div>
      <div class="kpi-sub" style="color:#9ca3af">대출+고정비 기준</div>
    </div>
    <div class="kpi b" style="border:1.5px solid rgba(59,127,255,.35)">
      <div class="kpi-lbl" style="color:#e5e7eb">이번 달 순현금흐름</div>
      <div class="kpi-val" style="color:${curMonthNet>=0?'#22c55e':'#ef4444'};font-size:17px;font-weight:700">
        ${curMonthNet>=0?'+':''}${fmtBig(curMonthNet)}원
      </div>
      <div class="kpi-sub" style="color:#9ca3af">수입 − 지출</div>
    </div>
    ${totalDeposit?`<div class="kpi y">
      <div class="kpi-lbl" style="color:#e5e7eb">향후 보증금 환급</div>
      <div class="kpi-val" style="color:var(--yellow)">${fmtBig(totalDeposit)}원</div>
      <div class="kpi-sub" style="color:#9ca3af">계약 종료 시 반환 예정</div>
    </div>`:''}
    <div class="kpi p">
      <div class="kpi-lbl" style="color:#e5e7eb">분석 기간</div>
      <div class="kpi-val" style="color:var(--purple)">${minY}–${maxY}</div>
      <div class="kpi-sub" style="color:#9ca3af">${cfRows.length}개월 데이터</div>
    </div>
  </div>`;

  /* ══════════════════════════════════════════════════════════
     [G] 수입/지출 요약 테이블
  ══════════════════════════════════════════════════════════ */
  const incSummaryRows=useDetail
    ? incDetail.map(o=>`<tr><td class="label">${o.building?`<span style="font-size:9px;color:var(--t3);margin-right:4px">${o.building}</span>`:''}${o.name}</td><td class="r">${fmtBig(o.rent)}원</td><td class="r">${o.mgmt?fmtBig(o.mgmt)+'원':'—'}</td></tr>`).join('')
    : summaryIncItems.map(o=>`<tr><td class="label">${o.item}</td><td class="r" colspan="2"><span class="inc">${fmtBig(o.amount)}원</span></td></tr>`).join('');

  const expSummaryRows=useDetail
    ? expDetail.map(o=>`<tr><td class="label">${o.building?`<span style="font-size:9px;color:var(--t3);margin-right:4px">${o.building}</span>`:''}${o.item}</td><td class="r">${fmtBig(o.amount)}원</td><td class="r" style="font-size:9.5px;color:var(--t3)">${o.period||'—'}</td></tr>`).join('')
    : summaryExpItems.map(o=>`<tr><td class="label">${o.item}</td><td class="r" colspan="2"><span class="exp">${fmtBig(o.amount)}원</span></td></tr>`).join('');

  const summaryHTML=`<div class="cf-section">

      <div class="cf-section-title">수입 · 지출 상세</div>

  function buildAllTable(){

  if(!document.getElementById('cf-tab-style')){

    document.head.appendChild(st);

  const cfHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:var(--blue)"></div>
      <div class="cf-section-title">월별 캐시플로우 · 항목 분해</div>
      <div class="cf-section-sub">${cfRows.length}개월 · 만원 단위 · ${useDetail?'상세 기반':'요약 기반'}</div>
    </div>
    <div style="background:var(--s1);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r)">
      <div class="cf-tab-bar" id="cf-tabs">
        <button class="cf-tab-btn active" onclick="cfTab('all',this)">항목 분해</button>
        <button class="cf-tab-btn"        onclick="cfTab('inc',this)">수입</button>

      </div>
      <div class="cf-tab-pane active" id="cf-pane-all" style="overflow-x:auto">
        <table class="cf-table">
          <thead>
            <tr>
              <th rowspan="2">연월</th>
              ${activeIncCols.length?`<th colspan="${activeIncCols.length}" style="text-align:center;color:var(--green);border-bottom:2px solid var(--green);background:rgba(34,209,134,.05)">📥 수입</th>`:''}
              ${activeExpCols.length?`<th colspan="${activeExpCols.length}" style="text-align:center;color:var(--red);border-bottom:2px solid var(--red);background:rgba(240,56,96,.05)">📤 지출</th>`:''}
              <th rowspan="2" class="r" style="color:var(--blue)">순현금흐름</th>

  /* 파싱 안내 */

    ?`<div class="notice" style="background:rgba(245,188,48,.06);border-color:rgba(245,188,48,.2);color:var(--yellow)">
        ⚠️ 시트에서 "1-1 개인 수입 항목 상세" 또는 "2-2 개인 지출 항목 상세" 섹션을 찾지 못했습니다.
        F12 콘솔에서 [상세 섹션] 로그를 확인하세요.
      </div>`
    :'';

  CACHE['personal_cfn']=null;
  initTS('personal');TS['personal']={search:'',sortCol:-1,sortAsc:true,page:1};

  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 개인비용 Cash Flow</div>
    ${parseNote}
    ${kpiHTML}
    ${summaryHTML}
    ${cfHTML}`;
}

function renderCost(k,rows){
  /* personal 은 renderPersonal 로 분기 */
  if(k==='personal'){renderPersonal(rows);return;}
  /* corp 는 renderCorp 로 분기 */
  if(k==='corp'){renderCorp(rows);return;}

  /* 그 외 탭 — 기존 범용 로직 유지 */
  const sec=document.getElementById(`sec-${k}`);
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}
  const hi=findHdrRow(rows);const hdr=rows[hi];const data=rows.slice(hi+1).filter(r=>r.some(c=>c));
  const pc=hdr.map((h,i)=>({h,i})).filter(({h})=>/금액|비용|합계|총액|cost|amount|total/i.test(h));
  const nc=(pc.length?pc:numCols(hdr,data)).slice(0,4);
  const cards=nc.map((c,i)=>{
    const vals=data.map(r=>parseFloat((r[c.i]||'').replace(/[,\s₩원]/g,''))).filter(x=>!isNaN(x));
    if(!vals.length)return'';
    const s=vals.reduce((a,b)=>a+b,0),avg=s/vals.length;
    return`<div class="kpi b"><div class="kpi-lbl">${c.h}</div><div class="kpi-val">${fmtBig(s)}</div><div class="kpi-sub">평균 ${fmtBig(avg)} · ${vals.length}건</div></div>`;
  }).filter(Boolean).join('');
  CACHE[k+'_cfn']=null;initTS(k);TS[k]={search:'',sortCol:-1,sortAsc:true,page:1};
  sec.innerHTML=`<div class="notice">📡 구글 시트 실시간 연동 · ${TABS[k].label}</div>${cards?`<div class="kpi-row">${cards}</div>`:''}<div id="${k}-tbl"></div>`;
  drawTable(k,rows,`${k}-tbl`);
}

/* ════════════════════════════════════════════════════════════
   renderCorp — 법인비용 Cash Flow 전용 렌더러 (v3)
   ★ 시트 컬럼 자동 탐색 (하드코딩 없음)
   ★ Leaf Node 기준 총액 합산 (부모+자식 중복 방지)
   ★ 납부방법 상세 파싱 (특정 월 분할 / 일시납 / 매월 / 기간)
   ★ monthly 케이스: 총액÷기간 = 월금액 (getBestAmt 오용 제거)
   ★ 기간 파싱: 숫자만 추출 방식 → 정규식 개월수 파싱으로 교체
   ★ 개인비용 탭과 동일한 UX 구조 (KPI + 요약 + 월별 캐시플로우)
════════════════════════════════════════════════════════════ */
function renderCorp(rows){
  const sec=document.getElementById('sec-corp');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}
  const hi=findHdrRow(rows);
  const hdr=rows[hi];
  const data=rows.slice(hi+1).filter(r=>r.some(c=>c));

  /* ══ [컬럼 자동 탐색] ════════════════════════════════════
     ★ 시트 헤더 기반 자동 탐색 — 절대 하드코딩 없음
     ★ 납부방법 상세 컬럼 추가 탐색
  ════════════════════════════════════════════════════════ */
  const itemIdx    =hdr.findIndex(h=>/항목|내용|내역|name|item|비목/i.test(h));
  const catIdx     =hdr.findIndex(h=>/카테고리|category|구분|분류|대분류|유형/i.test(h));
  const amtIdx     =hdr.findIndex(h=>/금액(?!합)|월금액|단가|amount|cost(?!total)/i.test(h));
  const totalIdx   =hdr.findIndex(h=>/총액|합계|total|sum|총계/i.test(h));
  const startIdx   =hdr.findIndex(h=>/시작|start|from|착공|착수|계약시작/i.test(h));
  const endIdx     =hdr.findIndex(h=>/종료|end|to|완료|계약종료|납부종료/i.test(h));
  const periodIdx  =hdr.findIndex(h=>/기간|period|개월|months/i.test(h));
  /* 납부방법 — "납부방법 상세"를 먼저 찾고, "납부방법"은 별도로 */
  const methodDetIdx =hdr.findIndex(h=>/납부.*방법.*상세|납부.*상세|상세.*납부|payment.*detail/i.test(h));
  const methodIdx    =hdr.findIndex((h,i)=>i!==methodDetIdx&&/납부.*방법|지급.*방법|납부방법|payment(?!.*detail)/i.test(h));
  const countIdx   =hdr.findIndex(h=>/횟수|회차|분할수|count|times/i.test(h));
  const noteIdx    =hdr.findIndex(h=>/비고|메모|note|remark/i.test(h));
  const stageIdx   =hdr.findIndex(h=>/단계|phase|stage|공정/i.test(h));

  console.log('[법인비용] 헤더 탐색 결과:', {
    hdr: hdr.slice(0,15),
    itemIdx, catIdx, amtIdx, totalIdx,
    startIdx, endIdx, periodIdx,
    methodIdx, methodDetIdx, countIdx, noteIdx
  });

  /* ══ 헬퍼 ════════════════════════════════════════════════ */
  function sv(r,i){return i>=0?(r[i]||''):'';} 
  function av(r,i){return i>=0?parseAmt(r[i]):0;}

  /* 날짜 패턴 방어 */
  const DATE_LIKE=/^\d{8}$|^\d{4}[.\-\/]\d{2}/;
  /* getBestAmt: 주로 금액 존재 여부 확인용 — totalIdx 포함하지 않음 */
  function getBestAmt(r){
    if(amtIdx>=0){const v=av(r,amtIdx);if(v)return v;}
    /* totalIdx는 여기서 사용하지 않음 — getMonthlyAmt/getTotal에서만 처리 */
    const skipIdx=new Set([catIdx,itemIdx,startIdx,endIdx,periodIdx,
      methodIdx,methodDetIdx,stageIdx,noteIdx,totalIdx].filter(i=>i>=0));
    for(let i=0;i<r.length;i++){
      if(skipIdx.has(i))continue;
      const raw=String(r[i]||'').trim();
      if(!raw||DATE_LIKE.test(raw))continue;
      const v=parseAmt(raw);
      if(v>=1000&&v<1e12)return v;
    }
    return 0;
  }

  /* ══ [Leaf Node 판별] ════════════════════════════════════
     규칙:
     1. "합계", "소계", "계", "합산" 등 합계성 키워드 행 → 제외
     2. 금액이 0인 행 → 제외
     3. 자식 항목이 존재하는 부모 행 → 제외
        (부모 = 다음 행들이 같은 카테고리 하위 항목인 경우)
     4. 금액이 같은 값이 하위 항목 합산과 일치하는 경우 → 제외

     ★ 핵심 전략:
       - 합계성 행 키워드 필터 우선 적용
       - 나머지는 "금액이 없거나 0인 행" 필터
       - 중복 방지: 같은 카테고리 내 totalIdx 행과 세부 행이 함께 있으면
         totalIdx값이 세부합산과 일치하는 행을 부모로 간주하여 제외
  ════════════════════════════════════════════════════════ */
  const SUMMARY_KW=/^(합계|소계|계$|합산|total|sum|subtotal|grand|전체|총계)/i;

  function isSummaryRow(r){
    /* 항목명/카테고리 컬럼에 합계성 키워드가 있으면 합계 행 */
    const name=(sv(r,itemIdx)||sv(r,catIdx)||'').trim();
    if(SUMMARY_KW.test(name)) return true;
    /* 모든 셀 검사 — 첫 번째 텍스트 셀이 합계 키워드인 경우 */
    for(let i=0;i<Math.min(r.length,5);i++){
      const v=String(r[i]||'').trim();
      if(v&&SUMMARY_KW.test(v)) return true;
    }
    return false;
  }

  /* 카테고리별 그룹핑 후 Leaf Node 식별
     같은 카테고리(getCat 기준) 내에서
     totalIdx 행의 금액이 다른 행들의 금액 합계와 근사하면 부모로 간주 */
  function getCat(r){
    const raw=(sv(r,catIdx)||sv(r,itemIdx)||sv(r,stageIdx)||'').trim();
    const c=raw.toLowerCase();
    /* 세부 분류 → 요청 그룹명으로 통합 */
    if(/토지.*임대|토지료|지대/.test(c))          return '토지임대료';
    if(/신축.*공사|공사비|시공/.test(c))           return '공사비';
    if(/해체.*공사/.test(c))                       return '공사비';
    if(/감리/.test(c))                             return '감리비';
    if(/설계|측량|지반|굴토|해체.*심의|해체.*허가|해체.*신고|지하.*안전/.test(c)) return '설계비';
    if(/면허세|채권|경계복원/.test(c))             return '설계비'; /* 요약에서 설계비 그룹으로 */
    if(/대출|이자|금융/.test(c))                   return '금융비용';
    if(/세금|취득|등록|인지/.test(c))              return '세금·공과금';
    return raw||'기타';
  }

  /* 요약 표시 대상 핵심 항목 — 항목명 기반 분류 */
  function getSummaryGroup(r){
    const item=(sv(r,itemIdx)||sv(r,catIdx)||'').trim().toLowerCase();
    if(/건축.*설계/.test(item))                         return '건축설계비';
    if(/토목.*설계|흙막이/.test(item))                  return '토목설계비';
    if(/해체.*심의|해체.*허가|해체.*신고/.test(item))   return '해체심의·허가·신고';
    if(/상주.*감리|건축.*감리/.test(item))               return '상주 감리비';
    if(/해체.*감리|지상.*감리/.test(item))               return '해체 감리비';
    if(/면허세|채권/.test(item))                        return '면허세·채권매입';
    if(/경계복원/.test(item))                           return '경계복원측량';
    if(/토지.*임대|토지료/.test(item))                  return '토지임대료';
    if(/신축.*공사/.test(item))                         return '신축공사비';
    if(/해체.*공사/.test(item))                         return '해체공사비';
    return null; /* 요약에서 제외 */
  }

  /* 요약용 그룹 집계 */
  const summaryGroupOrder=['건축설계비','토목설계비','해체심의·허가·신고','상주 감리비','해체 감리비','면허세·채권매입','경계복원측량','토지임대료','해체공사비','신축공사비'];
  const summaryGroupMap=new Map();
  summaryGroupOrder.forEach(g=>summaryGroupMap.set(g,{total:0,rows:[]}));

  leafData.forEach(r=>{
    const g=getSummaryGroup(r);
    if(!g) return;
    if(!summaryGroupMap.has(g)) summaryGroupMap.set(g,{total:0,rows:[]});
    summaryGroupMap.get(g).total+=getTotal(r);
    summaryGroupMap.get(g).rows.push(r);
  });

  /* 요약표 행 — 존재하는 그룹만 */
  const summaryRows=summaryGroupOrder
    .filter(g=>summaryGroupMap.get(g)&&summaryGroupMap.get(g).total>0)
    .map(g=>{
      const {total,rows}=summaryGroupMap.get(g);
      /* 기간 요약 */
      const drs=rows.map(r=>getDateRange(r)).filter(d=>d.hasStart);
      let periodSummary='—';
      if(drs.length>0){
        const minS=drs.reduce((a,d)=>d.sy*100+d.sm<a.sy*100+a.sm?d:a,drs[0]);
        const maxE=drs.filter(d=>d.hasEnd).reduce((a,d)=>d.ey*100+d.em>a.ey*100+a.em?d:a,{ey:0,em:0});
        periodSummary=`${minS.sy}.${String(minS.sm).padStart(2,'0')}${maxE.ey>0?' ~ '+maxE.ey+'.'+String(maxE.em).padStart(2,'0'):'~'}`;
      }
      return`<tr>
        <td class="label" style="color:#c9d1e8">${g}</td>
        <td style="font-family:var(--mono);font-size:11px;color:#8890aa">${periodSummary}</td>
        <td class="r"><span class="exp" style="font-weight:600">${fmtBig(total)}원</span></td>
      </tr>`;
    }).join('');

  /* 요약 합계 (핵심 항목만) */
  const summaryTotal=[...summaryGroupMap.values()].reduce((a,v)=>a+v.total,0);

  /* ══ [납부방법 상세 파싱] ══════════════════════════════════
     납부방법 상세 컬럼 우선 → 납부방법 컬럼 → 기본값

     지원 형식:
     - "26-05 / 26-09 / 27-03 / 27-08"  → 4회 분할, 해당 월
     - "매월"                             → 기간 동안 월할
     - "2030-12-31"                       → 해당 월 일시납
     - "2026-05-01 ~ 2027-08-31 (16개월)"→ 기간 파싱
     - "2029.07~2030.12"                  → 기간 파싱
     - 기본값: 납부방법 컬럼 기반 판별
  ════════════════════════════════════════════════════════ */

  /* YY-MM 또는 YYYY-MM 형식 → {y, m} */
  function parseShortYM(s){
    s=s.trim();
    /* YYYY-MM-DD or YYYY-MM */
    const m1=s.match(/^(\d{4})[.\-\/](\d{1,2})/);
    if(m1)return{y:parseInt(m1[1]),m:parseInt(m1[2])};
    /* YY-MM (2자리 연도: 26-05 → 2026) */
    const m2=s.match(/^(\d{2})[.\-\/](\d{2})$/);
    if(m2){
      const yr=parseInt(m2[1]);
      return{y:yr<50?2000+yr:1900+yr,m:parseInt(m2[2])};
    }
    return null;
  }

  /* 납부방법 상세 문자열 → 납부 스케줄 객체 반환
     반환 타입:
       {type:'monthly'}                       — 매월
       {type:'lump', ym:{y,m}}               — 일시납 특정월
       {type:'dates', dates:[{y,m},...]}      — 분할 특정 월 목록
       {type:'range', sy,sm,ey,em}           — 기간 범위 (월할)
       null                                   — 파싱 불가
  */
  function parseMethodDetail(detStr){
    const s=String(detStr||'').trim();
    if(!s||s==='—'||s==='-') return null;

    /* "매월" */
    if(/^매월$|^monthly$/i.test(s)) return{type:'monthly'};

    /* "YY-MM / YY-MM / ..." 또는 "YYYY-MM / YYYY-MM / ..." 다중 날짜 */
    if(/\//.test(s)){
      const parts=s.split('/').map(p=>p.trim()).filter(Boolean);
      const dates=parts.map(parseShortYM).filter(Boolean);
      if(dates.length>=2) return{type:'dates',dates};
    }

    /* 기간 범위: "YYYY.MM~YYYY.MM" 또는 "YYYY-MM-DD ~ YYYY-MM-DD" */
    const rng=s.match(/(\d{4})[.\-\/](\d{1,2})[^\d]*[~～–\-]{1,2}[^\d]*(\d{4})[.\-\/](\d{1,2})/);
    if(rng) return{type:'range',sy:parseInt(rng[1]),sm:parseInt(rng[2]),ey:parseInt(rng[3]),em:parseInt(rng[4])};

    /* 단일 날짜 "2030-12-31" 또는 "2030.12" → 일시납 */
    const single=parseShortYM(s);
    if(single) return{type:'lump',ym:single};

    return null;
  }

  /* 납부방법(기본) 컬럼 파싱 */
  function parseMethodBase(r){
    const m=String(sv(r,methodIdx)||'').trim().toLowerCase();
    if(/매월|monthly|month|월납/.test(m)) return'monthly';
    const n=parseInt(m.replace(/[^0-9]/g,''));
    if(!isNaN(n)&&n>1) return{type:'installment',count:n};
    if(/일시|lump|once|전액/.test(m)) return'lump';
    if(countIdx>=0){
      const cnt=parseInt(String(sv(r,countIdx)).replace(/[^0-9]/g,''));
      if(!isNaN(cnt)&&cnt>1) return{type:'installment',count:cnt};
      if(cnt===1) return'lump';
    }
    return'monthly';
  }

  /* 최종 납부 스케줄 반환 — 상세 우선, 없으면 기본 */
  function getPaySchedule(r){
    const detStr=sv(r,methodDetIdx);
    const det=parseMethodDetail(detStr);
    if(det) return det;
    /* 납부방법 컬럼 기반 */
    const base=parseMethodBase(r);
    if(base==='lump') return{type:'lump',ym:null}; /* 특정월 미지정 */
    if(typeof base==='object'&&base.type==='installment') return{type:'installment',count:base.count};
    return{type:'monthly'};
  }

  /* ══ [기간(개월수) 파싱] ════════════════════════════════════
     ★ 중요: "replace(/[^0-9]/g,'')" 방식 절대 금지
       → "2026-09-01 ~ 2027-02-28 (6개월)" 에서 숫자 전체 추출 시
          202609012027022826 같은 쓰레기 값 발생
     ★ 개월수는 반드시 "(N개월)" 패턴 또는 시작/종료 차이로만 계산
  ════════════════════════════════════════════════════════ */
  function getPeriod(r){
    /* 1순위: 기간 컬럼에서 "(N개월)" 또는 "N개월" 또는 단독 숫자(1~240) */
    if(periodIdx>=0){
      const raw=String(sv(r,periodIdx)||'').trim();
      /* "(6개월)", "6개월", "6 개월" */
      const mMo=raw.match(/(\d+)\s*개월/);
      if(mMo){const p=parseInt(mMo[1]);if(p>0&&p<=240)return p;}
      /* 단독 숫자(순수 개월 수) — 날짜 패턴이 아닌 경우만 */
      if(/^\d{1,3}$/.test(raw)){const p=parseInt(raw);if(p>0&&p<=240)return p;}
    }
    /* 2순위: 시작+종료 모두 있을 때 월 차이 계산 */
    if(startIdx>=0&&endIdx>=0){
      const s=sv(r,startIdx).trim(),e=sv(r,endIdx).trim();
      const ms=s.match(/(\d{4})[.\-\/](\d{1,2})/);
      const me=e.match(/(\d{4})[.\-\/](\d{1,2})/);
      if(ms&&me){
        const diff=(parseInt(me[1])-parseInt(ms[1]))*12+(parseInt(me[2])-parseInt(ms[2]));
        if(diff>=0&&diff<=240) return diff+1;
      }
    }
    return 1; /* 기본 1개월 */
  }

  function getDateRange(r){
    const s=sv(r,startIdx).trim();
    const e=sv(r,endIdx).trim();
    const ms=s.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
    const me=e.match(/(\d{4})[.\-\/년\s]*(\d{1,2})/);
    return{
      hasStart:!!ms, hasEnd:!!me,
      sy:ms?parseInt(ms[1]):0, sm:ms?parseInt(ms[2]):1,
      ey:me?parseInt(me[1]):0, em:me?parseInt(me[2]):12,
    };
  }

  /* ══ [총액 계산] ═════════════════════════════════════════════
     ★ totalIdx 컬럼이 있고 값이 있으면 → 그 값이 총액
     ★ totalIdx 없고 amtIdx(월금액) 있으면 → 월금액 × 기간 = 총액
     ★ amtIdx도 없으면 → fallback (다른 숫자 컬럼 탐색) × 기간
  ═════════════════════════════════════════════════════════ */
  function getTotal(r){
    /* totalIdx 컬럼이 명시적으로 있으면 최우선 */
    if(totalIdx>=0){const t=av(r,totalIdx);if(t&&t<1e13)return t;}
    /* 월금액 × 기간 */
    const mv=getMonthlyAmt(r);
    if(!mv) return 0;
    const p=getPeriod(r);
    const result=mv*p;
    return result<1e13?result:mv;
  }

  /* ── 월 단가 전용 함수 (총액 컬럼은 절대 사용하지 않음) ── */
  function getMonthlyAmt(r){
    /* amtIdx: 월금액/단가 컬럼 우선 */
    if(amtIdx>=0){const v=av(r,amtIdx);if(v)return v;}
    /* amtIdx가 없을 때만 fallback — 날짜·총액·비고 열 제외 */
    const skipIdx=new Set([catIdx,itemIdx,startIdx,endIdx,periodIdx,
      methodIdx,methodDetIdx,stageIdx,noteIdx,totalIdx].filter(i=>i>=0));
    for(let i=0;i<r.length;i++){
      if(skipIdx.has(i))continue;
      const raw=String(r[i]||'').trim();
      if(!raw||/^\d{8}$|^\d{4}[.\-\/]\d{2}/.test(raw))continue;
      const v=parseAmt(raw);
      if(v>=1000&&v<1e12)return v; /* 1,000원 이상 1조 미만 */
    }
    return 0;
  }

  /* ══ [Leaf Node 필터링] ══════════════════════════════════
     핵심: 합계 행 제거 → 금액 없는 행 제거
     부모+자식 중복 합산 방지:
     같은 카테고리 내에서 총액이 하위 항목 합과 일치하면 부모로 간주
  ════════════════════════════════════════════════════════ */
  /* 1차: 합계성 행 + 금액 없는 행 제거 */
  const nonSummaryData=data.filter(r=>{
    if(isSummaryRow(r)) return false;
    const t=getTotal(r);
    return t>0;
  });

  /* 2차: 같은 카테고리 그룹 내 중복 감지
     카테고리별로 그룹화 후, 총액이 나머지 합과 근사(±5%)한 행은 부모로 제거 */
  const catGroups=new Map();
  nonSummaryData.forEach((r,idx)=>{
    const cat=getCat(r);
    if(!catGroups.has(cat)) catGroups.set(cat,[]);
    catGroups.get(cat).push({r,idx,total:getTotal(r)});
  });

  const parentIndices=new Set();
  catGroups.forEach((items)=>{
    if(items.length<=1) return; /* 단독 항목 — 중복 없음 */
    const totals=items.map(x=>x.total);
    const sumAll=totals.reduce((a,b)=>a+b,0);
    items.forEach(({r,idx,total})=>{
      /* 이 항목의 금액이 나머지 합과 근사하면 부모(중복) */
      const rest=sumAll-total;
      if(rest>0&&Math.abs(total-rest)/Math.max(total,rest)<0.05){
        /* 부모 후보 — 항목명에 합계성 단어가 있거나 totalIdx 컬럼값인 경우 우선 */
        const name=(sv(r,itemIdx)||sv(r,catIdx)||'').trim();
        if(/합계|소계|계$|합산|total|sum/i.test(name)||totalIdx>=0&&av(r,totalIdx)>0){
          parentIndices.add(idx);
          console.log('[법인비용][부모 제외]', name, '금액:', total, '나머지합:', rest);
        }
      }
    });
  });

  /* Leaf Node 최종 목록 */
  const leafData=nonSummaryData.filter((_,idx)=>!parentIndices.has(idx));

  console.log('[법인비용] Leaf Node 필터링:', {
    전체행수: data.length,
    합계제거후: nonSummaryData.length,
    부모제거후: leafData.length
  });
  leafData.forEach(r=>{
    const name=sv(r,itemIdx)||sv(r,catIdx)||'(항목없음)';
    console.log('[합산 포함]', name, getTotal(r));
  });

  /* ══ 기간 범위 파악 (Leaf Node 기반) ═══════════════════ */
  let minYear=9999,maxYear=0;
  leafData.forEach(r=>{
    const dr=getDateRange(r);
    if(dr.hasStart){if(dr.sy<minYear)minYear=dr.sy;if(dr.sy>maxYear)maxYear=dr.sy;}
    if(dr.hasEnd&&dr.ey>maxYear)maxYear=dr.ey;
    /* 납부 상세에서 날짜 범위 추출 */
    const sched=getPaySchedule(r);
    if(sched.type==='dates'&&sched.dates.length){
      const dys=sched.dates.map(d=>d.y);
      const mn=Math.min(...dys),mx=Math.max(...dys);
      if(mn<minYear)minYear=mn;
      if(mx>maxYear)maxYear=mx;
    }
    if(sched.type==='lump'&&sched.ym){
      if(sched.ym.y<minYear)minYear=sched.ym.y;
      if(sched.ym.y>maxYear)maxYear=sched.ym.y;
    }
    if(sched.type==='range'){
      if(sched.sy<minYear)minYear=sched.sy;
      if(sched.ey>maxYear)maxYear=sched.ey;
    }
  });
  if(minYear===9999||maxYear===0){minYear=new Date().getFullYear();maxYear=minYear+5;}
  maxYear=Math.min(maxYear,minYear+10);

  /* ══ 월별 배열 ════════════════════════════════════════════ */
  const months=[];
  for(let y=minYear;y<=maxYear;y++)
    for(let m=1;m<=12;m++)months.push({y,m});

  /* ══ [월별 배분 계산] — 납부방법 상세 우선 적용 ══════════
     우선순위: 납부방법 상세 → 납부방법 → 계약기간
  ════════════════════════════════════════════════════════ */
  function amtInMonth(r,y,m){
    const dr=getDateRange(r);
    const total=getTotal(r);
    const period=getPeriod(r);
    const sched=getPaySchedule(r);
    const cur=y*100+m;

    /* 시작/종료 YM 계산 */
    let startYM=dr.hasStart?dr.sy*100+dr.sm:minYear*100+1;
    let endYM;
    if(dr.hasEnd){
      endYM=dr.ey*100+dr.em;
    } else if(dr.hasStart){
      /* 시작은 있고 종료는 없음 → 시작 + (period-1)개월 */
      const base0=dr.sy*12+(dr.sm-1); /* 0-based 월 인덱스 */
      const end0=base0+(period-1);
      endYM=Math.floor(end0/12)*100+(end0%12+1);
    } else {
      /* 시작/종료 모두 없음 → minYear.01 ~ minYear.01+period */
      startYM=minYear*100+1;
      const end0=(minYear*12)+(period-1);
      endYM=Math.floor(end0/12)*100+(end0%12+1);
    }

    switch(sched.type){

      /* ── 특정 월 목록 분할납부 (26-05 / 26-09 / ...) ── */
      case'dates':{
        const found=sched.dates.find(d=>d.y===y&&d.m===m);
        if(!found) return 0;
        return total/sched.dates.length; /* 균등 분할 */
      }

      /* ── 일시납 ── */
      case'lump':{
        /* 상세에 특정월 지정된 경우 */
        if(sched.ym){
          return(sched.ym.y===y&&sched.ym.m===m)?total:0;
        }
        /* 미지정 → 시작월에 일시납 */
        return cur===startYM?total:0;
      }

      /* ── 분할납부(횟수만 지정, 특정 월 없음) ── */
      case'installment':{
        const cnt=sched.count;
        const perPay=total/cnt;
        const base=dr.hasStart?dr.sy*12+dr.sm-1:minYear*12;
        for(let i=0;i<cnt;i++){
          const pm=base+i;
          const py=Math.floor(pm/12),pmo=(pm%12)+1;
          if(py===y&&pmo===m) return perPay;
        }
        return 0;
      }

      /* ── 범위(기간) 납부 ── */
      case'range':{
        const rStartYM=sched.sy*100+sched.sm;
        const rEndYM=sched.ey*100+sched.em;
        if(cur<rStartYM||cur>rEndYM) return 0;
        const moCnt=(sched.ey-sched.sy)*12+(sched.em-sched.sm)+1;
        const mv=getMonthlyAmt(r);
        return mv>0?mv:moCnt>0?total/moCnt:total;
      }

      /* ── 매월 납부 (기본) ── */
      case'monthly':
      default:{
        if(cur<startYM||cur>endYM) return 0;
        /* 월 단가 컬럼이 있으면 그 값 사용 */
        const mv=getMonthlyAmt(r);
        if(mv>0) return mv;
        /* 월 단가 없으면 총액÷기간 */
        const p=getPeriod(r);
        return p>0?total/p:total;
      }
    }
  }

  /* ══ 카테고리 목록 수집 (Leaf Node 기반) ════════════════ */
  const catOrder=[];
  const catMap=new Map();
  leafData.forEach(r=>{
    const cat=getCat(r);
    if(!catMap.has(cat)){catMap.set(cat,[]);catOrder.push(cat);}
    catMap.get(cat).push(r);
  });

  /* ══ 카테고리별 총액 (Leaf Node 합산) ═══════════════════ */
  const catTotals=new Map();
  catOrder.forEach(cat=>{
    const t=catMap.get(cat).reduce((a,r)=>a+getTotal(r),0);
    catTotals.set(cat,t);
  });
  /* grandTotal = Leaf Node만 합산 → 중복 없음 */
  const grandTotal=[...catTotals.values()].reduce((a,b)=>a+b,0);

  console.log('[법인비용] 카테고리별 총액:', Object.fromEntries(catTotals));
  console.log('[법인비용] 총 법인비용(Leaf Node):', grandTotal);

  /* ══ 월별 합계 계산 ══════════════════════════════════════ */
  const monthlyData=months.map(({y,m})=>{
    const bycat={};
    catOrder.forEach(cat=>{
      bycat[cat]=catMap.get(cat).reduce((s,r)=>s+amtInMonth(r,y,m),0);
    });
    const total=Object.values(bycat).reduce((a,b)=>a+b,0);
    return{y,m,bycat,total};
  });
  const monthlyFiltered=monthlyData.filter(d=>d.total>0);

  /* ══ [KPI 카드] — 개인비용 탭 스타일 통일 ══════════════ */
  const totalItems=leafData.length;
  const nonZeroMonths=monthlyFiltered.length;
  const avgMonthly=nonZeroMonths>0
    ?monthlyFiltered.reduce((a,d)=>a+d.total,0)/nonZeroMonths:0;
  const maxMonth=monthlyFiltered.reduce((best,d)=>d.total>best.total?d:best,{total:0,y:0,m:0});

  /* 상위 카테고리 KPI (최대 3개) */
  const topCats=catOrder.slice(0,3);
  const catKpiHTML=topCats.map((cat,i)=>{
    const colors=['r','p','o'];
    return`<div class="kpi ${colors[i]||'b'}">
      <div class="kpi-lbl" style="color:#e5e7eb">${cat}</div>
      <div class="kpi-val" style="color:var(--red)">${fmtBig(catTotals.get(cat))}원</div>
      <div class="kpi-sub" style="color:#9ca3af">${catMap.get(cat).length}건</div>
    </div>`;
  }).join('');

  const kpiHTML=`<div class="kpi-row">
    <div class="kpi b">
      <div class="kpi-lbl" style="color:#e5e7eb">총 법인비용</div>
      <div class="kpi-val" style="color:var(--red)">${fmtBig(grandTotal)}원</div>
      <div class="kpi-sub" style="color:#9ca3af">${totalItems}건 · ${catOrder.length}개 카테고리</div>
    </div>
    <div class="kpi g">
      <div class="kpi-lbl" style="color:#e5e7eb">평균 월 지출</div>
      <div class="kpi-val">${fmtBig(avgMonthly)}원</div>
      <div class="kpi-sub" style="color:#9ca3af">지출 발생 ${nonZeroMonths}개월 기준</div>
    </div>
    ${maxMonth.total>0?`<div class="kpi y">
      <div class="kpi-lbl" style="color:#e5e7eb">최대 지출 월</div>
      <div class="kpi-val">${maxMonth.y}.${String(maxMonth.m).padStart(2,'0')}</div>
      <div class="kpi-sub" style="color:#9ca3af">${fmtBig(maxMonth.total)}원</div>
    </div>`:''}
    ${catKpiHTML}
  </div>`;

  /* ══ [섹션 1] 카테고리별 요약표 — 개인비용 탭 스타일 ════ */
  const summaryRows=catOrder.map(cat=>{
    const crows=catMap.get(cat);
    const total=catTotals.get(cat);
    /* 기간 요약 — 파싱된 날짜 사용 */
    let periodSummary='—';
    const drs=crows.map(r=>getDateRange(r)).filter(d=>d.hasStart);
    if(drs.length>0){
      const minS=drs.reduce((a,d)=>d.sy*100+d.sm<a.sy*100+a.sm?d:a,drs[0]);
      const maxE=drs.filter(d=>d.hasEnd).reduce((a,d)=>d.ey*100+d.em>a.ey*100+a.em?d:a,{ey:0,em:0});
      const sLabel=`${minS.sy}.${String(minS.sm).padStart(2,'0')}`;
      const eLabel=maxE.ey>0?`${maxE.ey}.${String(maxE.em).padStart(2,'0')}`:'진행중';
      periodSummary=`${sLabel} ~ ${eLabel}`;
    }
    /* 납부방법 요약 */
    const scheds=crows.map(r=>getPaySchedule(r));
    const methodLabels=[...new Set(scheds.map(s=>{
      if(s.type==='dates')   return`${s.dates.length}회 분할`;
      if(s.type==='lump')    return'일시납';
      if(s.type==='installment') return`${s.count}회 분할`;
      if(s.type==='range')   return'기간납부';
      return'매월';
    }))].join(' / ');
    return`<tr>
      <td class="label">${cat}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--t3)">${periodSummary}</td>
      <td style="font-size:11px;color:var(--t3)">${methodLabels||'—'}</td>
      <td class="r" style="font-family:var(--mono);font-size:11px;color:var(--t3)">${crows.length}건</td>
      <td class="r"><span class="exp" style="font-weight:600">${fmtBig(total)}원</span></td>
    </tr>`;
  }).join('');

  const summaryHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:#4F7CFF"></div>
      <div class="cf-section-title">카테고리별 요약</div>
      <div class="cf-section-sub">핵심 항목 · 총 ${fmtBig(grandTotal)}원</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>항목</th>
          <th>기간</th>
          <th class="r">금액</th>
        </tr></thead>
        <tbody>
          ${summaryRows||'<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--t4)">데이터 없음</td></tr>'}
          <tr class="subtotal-row">
            <td colspan="2" style="font-weight:700">합 계</td>
            <td class="r"><span class="exp" style="font-weight:700">${fmtBig(grandTotal)}원</span></td>
          </tr>
        </tbody>
      </table>
    </div></div>
  </div>`;

  /* 상세 그룹 정의 */
  const DETAIL_GROUPS=[
    {label:'🏗️ 건축 & 토목 설계비', test:r=>{
      const it=(sv(r,itemIdx)||sv(r,catIdx)||'').toLowerCase();
      return /설계|측량|지반|굴토|해체.*심의|해체.*허가|해체.*신고|지하.*안전|면허세|채권|경계복원/.test(it);
    }},
    {label:'👷 감리비', test:r=>{
      const it=(sv(r,itemIdx)||sv(r,catIdx)||'').toLowerCase();
      return /감리/.test(it);
    }},
    {label:'🏢 공사비', test:r=>{
      const it=(sv(r,itemIdx)||sv(r,catIdx)||'').toLowerCase();
      return /공사|시공/.test(it);
    }},
    {label:'🏛️ 토지임대료', test:r=>{
      const it=(sv(r,itemIdx)||sv(r,catIdx)||'').toLowerCase();
      return /토지.*임대|토지료|지대/.test(it);
    }},
  ];

  function buildDetailGroup(groupLabel, groupRows){
    if(!groupRows.length) return '';
    const rows=groupRows.map(r=>{
      const item=sv(r,itemIdx)||sv(r,catIdx)||'(항목없음)';
      const total=getTotal(r);
      const dr=getDateRange(r);
      const period=getPeriod(r);
      let periodStr='—';
      if(dr.hasStart&&dr.hasEnd){
        periodStr=`${dr.sy}.${String(dr.sm).padStart(2,'0')} ~ ${dr.ey}.${String(dr.em).padStart(2,'0')}`;
      } else if(dr.hasStart){
        periodStr=`${dr.sy}.${String(dr.sm).padStart(2,'0')} ~`;
      }
      const soyo=period>1?`${period}개월`:'—';
      return`<tr>
        <td class="label" style="padding-left:20px;color:#c9d1e8">${item}</td>
        <td style="font-family:var(--mono);font-size:11px;color:#8890aa">${periodStr}</td>
        <td style="font-size:11px;color:#8890aa;text-align:center">${soyo}</td>
        <td class="r"><span class="exp">${total?fmtBig(total)+'원':'—'}</span></td>
      </tr>`;
    }).join('');
    const groupTotal=groupRows.reduce((a,r)=>a+getTotal(r),0);
    return`<tr class="yr-group"><td colspan="4" style="font-weight:700;letter-spacing:.3px">${groupLabel}</td></tr>
      ${rows}
      <tr class="yr-total">
        <td colspan="3" style="font-size:11px">소 계</td>
        <td class="r"><span class="exp" style="font-size:11px">${fmtBig(groupTotal)}원</span></td>
      </tr>`;
  }

  /* 그룹별 분류 */
  const assignedIdx=new Set();
  const groupedRows=DETAIL_GROUPS.map(g=>{
    const matched=leafData.filter((r,i)=>!assignedIdx.has(i)&&g.test(r));
    matched.forEach(r=>assignedIdx.add(leafData.indexOf(r)));
    return{label:g.label,rows:matched};
  });
  /* 미분류 항목 */
  const unassigned=leafData.filter((_,i)=>!assignedIdx.has(i));

  const itemBodyHTML=groupedRows.map(g=>buildDetailGroup(g.label,g.rows)).join('')
    +(unassigned.length?buildDetailGroup('기타',unassigned):'');

  const itemHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:var(--red)"></div>
      <div class="cf-section-title">항목별 상세</div>
      <div class="cf-section-sub">${leafData.length}건 · 그룹별 구성</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead><tr>
          <th>항목</th><th>계약기간</th><th style="text-align:center">소요기간</th>
          <th class="r">금액</th>
        </tr></thead>
        <tbody>
          ${itemBodyHTML||'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--t4)">항목 없음</td></tr>'}
          <tr class="subtotal-row">
            <td colspan="3" style="font-weight:700">합 계</td>
            <td class="r"><span class="exp" style="font-weight:700">${fmtBig(grandTotal)}원</span></td>
          </tr>
        </tbody>
      </table>
    </div></div>
  </div>`;

  /* ══ [섹션 3] 월별 캐시플로우 — 개인비용 탭 스타일 ═══════
     열: 연월 | 카테고리별 분해 | 월 합계 | 누적
     연도 구분행 + 연도 소계 + 전체 합계 강조
  ════════════════════════════════════════════════════════ */
  const activeCats=catOrder.filter(cat=>
    monthlyData.some(d=>d.bycat[cat]>0)
  );

  let cumTotal=0;
  let monthTableHTML='',lastY=null,yrSum=0;
  const yrByCat={};

  monthlyData.forEach(({y,m,bycat,total})=>{
    if(y!==lastY){
      /* 연도 소계 행 출력 */
      if(lastY!==null&&yrSum>0){
        monthTableHTML+=`<tr class="yr-total">
          <td>${lastY}년 소계</td>
          ${activeCats.map(cat=>`<td class="r">${(yrByCat[cat]||0)>0?`<span class="exp" style="font-size:11px">${fmtBig(yrByCat[cat])}원</span>`:`<span class="dim">—</span>`}</td>`).join('')}
          <td class="r"><span class="exp">${fmtBig(yrSum)}원</span></td>
          <td class="r"></td>
        </tr>`;
      }
      /* 연도 구분 행 */
      monthTableHTML+=`<tr class="yr-group"><td colspan="${activeCats.length+3}">${y}년</td></tr>`;
      lastY=y; yrSum=0;
      activeCats.forEach(c=>{yrByCat[c]=0;});
    }
    if(total===0) return; /* 지출 없는 달 생략 */
    yrSum+=total;
    cumTotal+=total;
    activeCats.forEach(c=>{yrByCat[c]=(yrByCat[c]||0)+(bycat[c]||0);});
    monthTableHTML+=`<tr>
      <td class="ym">${y}.${String(m).padStart(2,'0')}</td>
      ${activeCats.map(cat=>`<td class="r">${(bycat[cat]||0)>0?`<span class="exp">${fmtBig(bycat[cat])}원</span>`:`<span class="dim">—</span>`}</td>`).join('')}
      <td class="r"><span class="exp" style="font-weight:600">${fmtBig(total)}원</span></td>
      <td class="r"><span class="neu" style="font-size:11px">${fmtBig(cumTotal)}원</span></td>
    </tr>`;
  });
  /* 마지막 연도 소계 */
  if(lastY&&yrSum>0){
    monthTableHTML+=`<tr class="yr-total">
      <td>${lastY}년 소계</td>
      ${activeCats.map(cat=>`<td class="r">${(yrByCat[cat]||0)>0?`<span class="exp" style="font-size:11px">${fmtBig(yrByCat[cat])}원</span>`:`<span class="dim">—</span>`}</td>`).join('')}
      <td class="r"><span class="exp">${fmtBig(yrSum)}원</span></td>
      <td class="r"></td>
    </tr>`;
  }
  /* 전체 합계 행 */
  if(cumTotal>0){
    monthTableHTML+=`<tr class="subtotal-row">
      <td style="font-weight:700">전체 합계</td>
      ${activeCats.map(cat=>`<td class="r"><span class="exp" style="font-weight:600">${fmtBig(catTotals.get(cat)||0)}원</span></td>`).join('')}
      <td class="r"><span class="exp" style="font-weight:700">${fmtBig(cumTotal)}원</span></td>
      <td class="r"></td>
    </tr>`;
  }

  const monthHTML=monthlyFiltered.length>0?`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:var(--orange)"></div>
      <div class="cf-section-title">월별 비용 캐시플로우</div>
      <div class="cf-section-sub">${minYear}–${maxYear} · 총 ${fmtBig(cumTotal)}원</div>
    </div>
    <div class="cf-table-wrap"><div style="overflow-x:auto">
      <table class="cf-table">
        <thead>
          <tr>
            <th rowspan="2" style="color:#8890aa">연월</th>
            ${activeCats.length?`<th colspan="${activeCats.length}" style="text-align:center;color:var(--red);border-bottom:2px solid var(--red);background:rgba(240,56,96,.05)">📤 비용 항목별</th>`:''}
            <th rowspan="2" class="r" style="color:var(--red)">월 합계</th>
            <th rowspan="2" class="r" style="color:var(--blue)">누적</th>
          </tr>
          <tr>
            ${activeCats.map(cat=>`<th class="r" style="color:#e5e7eb;font-size:9.5px;background:rgba(240,56,96,.04)">${cat}</th>`).join('')}
          </tr>
        </thead>
        <tbody>${monthTableHTML||'<tr><td colspan="10" style="text-align:center;padding:30px;color:var(--t4)">월별 배분 데이터 없음 — 시트에 시작일/종료일 또는 기간을 입력해주세요</td></tr>'}</tbody>
      </table>
    </div></div>
  </div>`
  :`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:var(--t4)"></div>
      <div class="cf-section-title">월별 비용 캐시플로우</div>
    </div>
    <div class="cf-table-wrap" style="padding:30px;text-align:center;color:var(--t4)">
      시트에 시작일/종료일 또는 기간 컬럼을 입력하면 월별 상세가 자동으로 표시됩니다
    </div>
  </div>`;

  /* ══ [원본 데이터] 숨김 처리 (내부 연동 유지, UI 비노출) ══ */
  CACHE['corp_cfn']=null;
  initTS('corp');TS['corp']={search:'',sortCol:-1,sortAsc:true,page:1};

  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 법인비용 Cash Flow</div>
    ${kpiHTML}
    ${summaryHTML}
    ${itemHTML}
    ${monthHTML}
    <div id="corp-raw" style="display:none"><div id="corp-tbl"></div></div>`;
  drawTable('corp',rows,'corp-tbl');
}


/* ══ 개인비용 캐시플로우 탭 전환 ══════════════════════════ */
function cfTab(id,btn){
  document.querySelectorAll('.cf-tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.cf-tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const pane=document.getElementById('cf-pane-'+id);
  if(pane)pane.classList.add('active');
}

/* ══ LOAD / ROUTE ══════════════════════════════════════════ */
function showLoader(id){document.getElementById(id).innerHTML=`<div class="loader"><div class="ring"></div><p>데이터 불러오는 중…</p></div>`;}
function stamp(){document.getElementById('syncTime').textContent=new Date().toLocaleTimeString('ko-KR');}

async function load(k){
  showLoader(`sec-${k}`);
  try{
    const rows=await fetchSheet(k);  /* ← 매번 구글 시트에서 새로 fetch */
    CACHE[k]=rows;
    if(k==='timeline')renderTimeline(rows);
    else if(k==='irr')renderIRR(rows);
    else if(k==='lease')renderLease(rows);
    else renderCost(k,rows);
    stamp();
  }catch(e){document.getElementById(`sec-${k}`).innerHTML=errHTML(e.message);}
}

function go(k,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById(`sec-${k}`).classList.add('on');
  CUR=k;
  if(!LOADED.has(k)){LOADED.add(k);load(k);}
}

async function refreshCurrent(){
  const btn=document.getElementById('btnRef');
  btn.classList.add('spin');
  LOADED.delete(CUR);
  await load(CUR);
  LOADED.add(CUR);
  btn.classList.remove('spin');
}
