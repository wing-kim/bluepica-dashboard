     시트 상세 섹션 컬럼 순서: 구분 | 항목 | 금액 | 계약기간 | 소요기간 | 납부방법 | 납부방법 상세
     시트 요약/토지 섹션 컬럼 순서: 항목 | 금액 | 계약기간 | 소요기간 | 납부방법 | 비고
  */
  function getColIdx(hdr){
    const idx={amt:undefined,item:undefined,cat:undefined,
               contract:undefined,period:undefined,
               method:undefined,methodDet:undefined,note:undefined};
    hdr.forEach((h,i)=>{
      const s=String(h||'').trim();
      if(!s) return;
      if(/^항목$|^구분명$|^내역$|^비목$/i.test(s))               idx.item=i;
      else if(/^구분$|^대분류$/i.test(s))                         idx.cat=i;
      else if(/^금액$/i.test(s))                                  idx.amt=i;
      else if(/^계약기간$/i.test(s))                              idx.contract=i;
      else if(/^소요기간$/i.test(s))                              idx.period=i;
      else if(/납부방법.*상세|납부.*상세|납부방법\s상세/i.test(s)) idx.methodDet=i;
      else if(/^납부방법$|^납부\s*방법$/i.test(s))                idx.method=i;
      else if(/^비고$|^메모$/i.test(s))                           idx.note=i;
    });
    /* fallback — item이 없으면 위치 기반: 구분 다음 텍스트 컬럼 */
    if(idx.item===undefined){
      const catI=idx.cat!==undefined?idx.cat:-1;
      for(let i=0;i<Math.min(hdr.length,5);i++){
        if(i===catI) continue; /* 구분 컬럼 건너뜀 */
        const s=String(hdr[i]||'').trim();
        if(s && !/^\d/.test(s) && !/합계|sum|total|금액|기간|납부|비고/i.test(s)){
          idx.item=i; break;
        }
      }
    }
    console.log('[컬럼탐색] hdr:', hdr.map((h,i)=>`[${i}]"${h}"`).join('|'));
    console.log('[컬럼탐색] 결과:', JSON.stringify(idx));
    return idx;
  }

  /* 금액 파싱: 해당 컬럼이 명확하면 사용, 없으면 행에서 유효 숫자 찾기 */
  function getAmt(r, idx){
    /* amt 컬럼이 있으면 최우선 */
    if(idx.amt>=0){
      const v=numVal(r[idx.amt]);
      if(v>0) return v;
    }
    /* 없으면 숫자 컬럼 탐색 (날짜, 텍스트, 기간 제외) */
    const skip=new Set(Object.values(idx).filter(x=>x>=0));
    for(let i=0;i<r.length;i++){
      if(skip.has(i)) continue;
      const raw=String(r[i]||'').trim();
      if(!raw||DATE_LIKE.test(raw)) continue;
      const v=numVal(raw);
      /* 최소 10만원 이상, 100조 미만 (일반 비용 범위) */
      if(v>=100000 && v<1e14) return v;
    }
    return 0;
  }

  /* 계약기간 파싱
     ★ [수정] YYYY-MM-DD ~ YYYY-MM-DD 형식 지원 (일 포함)
        기존 정규식은 "2026-05-01 ~ 2027-08-31" 같은 형식을 null 반환함
        → 일(DD) 포함 패턴을 먼저 시도, 이후 월까지만 있는 패턴 시도 */
  function parseContract(s){
    s=String(s||'').trim();
    if(!s||s==='-'||s==='—') return null;
    /* 1순위: YYYY-MM-DD ~ YYYY-MM-DD (일 포함) */
    let m=s.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/]\d{1,2}\s*[~～–]+\s*(\d{4})[.\-\/](\d{1,2})[.\-\/]\d{1,2}/);
    if(m) return{sy:+m[1],sm:+m[2],ey:+m[3],em:+m[4]};
    /* 2순위: YYYY-MM ~ YYYY-MM (일 없음) */
    m=s.match(/(\d{4})[.\-\/](\d{1,2})\s*[~～–]+\s*(\d{4})[.\-\/](\d{1,2})(?!\d)/);
    if(m) return{sy:+m[1],sm:+m[2],ey:+m[3],em:+m[4]};
    return null;
  }

  /* 소요기간(개월수) 파싱 */
  function parsePeriodMo(s){
    s=String(s||'').trim();
    const m=s.match(/(\d+)\s*개월/);
    if(m){const p=+m[1];if(p>0&&p<=240)return p;}
    if(/^\d{1,3}$/.test(s)){const p=+s;if(p>0&&p<=240)return p;}
    return 0;
  }

  /* 계약기간 문자열 생성 */
  function contractStr(r, idx){
    if(idx.contract!==undefined&&idx.contract>=0){
      const s=sv(r,idx.contract);
      if(s&&s!=='-'&&s!='—') return s;
    }
    return '—';
  }

  /* 소요기간 문자열 */
  function periodStr(r, idx){
    if(idx.period!==undefined&&idx.period>=0){
      const s=sv(r,idx.period);
      if(s&&s!=='-'&&s!='—') return s;
    }
    /* 계약기간에서 계산 */
    const cp=parseContract(contractStr(r,idx));
    if(cp){const d=(cp.ey-cp.sy)*12+(cp.em-cp.sm)+1;if(d>0)return d+'개월';}
    return '—';
  }

  /* 소요기간(숫자) */
  function periodMonths(r, idx){
    if(idx.period!==undefined&&idx.period>=0){
      const p=parsePeriodMo(sv(r,idx.period));
      if(p>0) return p;
    }
    const cp=parseContract(contractStr(r,idx));
    if(cp){const d=(cp.ey-cp.sy)*12+(cp.em-cp.sm)+1;if(d>0&&d<=240)return d;}
    return 1;
  }

  /* 납부방법 */
  function methodStr(r, idx){
    if(idx.method!==undefined&&idx.method>=0){const s=sv(r,idx.method);if(s&&s!=='-'&&s!=='—')return s;}
    return '—';
  }

  /* 납부방법 상세 */
  function methodDetStr(r, idx){
    if(idx.methodDet!==undefined&&idx.methodDet>=0){const s=sv(r,idx.methodDet);if(s&&s!=='-'&&s!=='—')return s;}
    return '';
  }

  /* 합계행 여부 */
  function isSumRow(r, idx){
    const name=(sv(r,idx.item)||sv(r,idx.cat)||r.slice(0,4).map(c=>String(c||'')).join('')).trim();
    if(SUMMARY_KW.test(name)) return true;
    for(let i=0;i<Math.min(r.length,5);i++){
      if(SUMMARY_KW.test(String(r[i]||'').trim())) return true;
    }
    return false;
  }

  /* ══════════════════════════════════════════════════════════
     [STEP 3] 납부 스케줄 파싱 (YY-MM / YYYY-MM / 매월 / 일시납)
  ══════════════════════════════════════════════════════════ */
  function parseYM(s){
    s=String(s||'').trim();
    const m1=s.match(/^(\d{4})[.\-\/](\d{1,2})/);
    if(m1)return{y:+m1[1],m:+m1[2]};
    const m2=s.match(/^(\d{2})[.\-\/](\d{2})$/);
    if(m2){const y=+m2[1];return{y:y<50?2000+y:1900+y,m:+m2[2]};}
    return null;
  }

  function parseSchedule(r, idx){
    /* 납부방법 상세 우선 */
    const det=methodDetStr(r,idx);
    if(det){
      /* "YY-MM / YY-MM / ..." 형식 — 특정 날짜 목록 */
      if(/\//.test(det)){
        const parts=det.split('/').map(p=>p.trim()).filter(Boolean);
        const dates=parts.map(parseYM).filter(Boolean);
        if(dates.length>=2) return{type:'dates',dates};
      }
      /* 기간 범위 */
      const rng=det.match(/(\d{4})[.\-\/](\d{1,2})[^\d]*[~～–\-]+[^\d]*(\d{4})[.\-\/](\d{1,2})/);
      if(rng) return{type:'range',sy:+rng[1],sm:+rng[2],ey:+rng[3],em:+rng[4]};
      /* 단일 날짜 (일시납) — YYYY-MM-DD 또는 YYYY-MM */
      const ym=parseYM(det.replace(/\d{4}-\d{2}-(\d{2})/,(_,dd)=>'').trim()||det);
      const ymFull=det.match(/(\d{4})[.\-\/](\d{1,2})/);
      if(ymFull&&!/\//.test(det)) return{type:'lump',ym:{y:+ymFull[1],m:+ymFull[2]}};
      if(/매월/i.test(det)) return{type:'monthly'};
    }
    /* 납부방법 컬럼 기반 */
    const meth=String(sv(r,idx.method)||'').trim();
    const ml=meth.toLowerCase();
    /* N회 분할 — 숫자가 명시된 경우 */
    const nMatch=meth.match(/(\d+)\s*회/);
    if(nMatch){const n=+nMatch[1];if(n>1) return{type:'installment',count:n};}
    /* 매월 납부 */
    if(/매월|monthly|월납/i.test(ml)) return{type:'monthly'};
    /* 일시납 */
    if(/일시납|lump|once|전액/i.test(ml)) return{type:'lump',ym:null};
    /* 분할 납부 (N 미지정) → monthly 로 처리 (계약기간 균등 분배) */
    if(/분할/i.test(ml)) return{type:'monthly'};
    return{type:'monthly'}; /* 기본: 매월 균등 */
  }

  /* ══════════════════════════════════════════════════════════
     [STEP 4] 구역별 항목 파싱
  ══════════════════════════════════════════════════════════ */
  function parseSec(secRows, secName){
    if(!secRows.length) return [];
    const hi=findHdr(secRows);
    const hdr=secRows[hi];
    const idx=getColIdx(hdr);
    const data=secRows.slice(hi+1).filter(r=>r.some(c=>String(c||'').trim()));

    const items=[];
    data.forEach(r=>{
      if(isSumRow(r,idx)) return;
      /* 항목명: item 컬럼 우선, 없으면 cat 컬럼 사용 */
      const itemVal = (idx.item!==undefined ? sv(r,idx.item) : '') ||
                      (idx.cat!==undefined  ? sv(r,idx.cat)  : '');
      if(!itemVal) return;
      const amt=getAmt(r,idx);
      if(amt<=0) return;
      const cp=parseContract(contractStr(r,idx));
      const sch=parseSchedule(r,idx);
      items.push({
        item: itemVal,
        cat: idx.cat!==undefined ? sv(r,idx.cat) : '',
        amt,
        contractRaw: contractStr(r,idx),
        periodRaw:   periodStr(r,idx),
        periodMo:    periodMonths(r,idx),
        methodRaw:   methodStr(r,idx),
        methodDetRaw:methodDetStr(r,idx),
        cp, sch,
      });
      console.log(`[${secName}] "${itemVal}" amt=${amt} contract=${contractStr(r,idx)} period=${periodStr(r,idx)} method=${methodStr(r,idx)} det=${methodDetStr(r,idx)}`);
    });
    return items;
  }

  let summaryItems=[], detailItems=[], landItems=[];

  if(fallbackMode){
    /* 구역 구분 없는 경우 전체를 상세로 처리 */
    const hi=findHdrRow(rows);
    const hdr=rows[hi];
    const idx=getColIdx(hdr);
    const data=rows.slice(hi+1).filter(r=>r.some(c=>c));
    data.forEach(r=>{
      if(isSumRow(r,idx)) return;
      const itemVal=(idx.item!==undefined?sv(r,idx.item):'')||(idx.cat!==undefined?sv(r,idx.cat):'');
      if(!itemVal) return;
      const amt=getAmt(r,idx);
      if(amt<=0) return;
      const cp=parseContract(contractStr(r,idx));
      const sch=parseSchedule(r,idx);
      detailItems.push({item:itemVal,cat:idx.cat!==undefined?sv(r,idx.cat):'',amt,
        contractRaw:contractStr(r,idx),periodRaw:periodStr(r,idx),
        periodMo:periodMonths(r,idx),methodRaw:methodStr(r,idx),
        methodDetRaw:methodDetStr(r,idx),cp,sch});
    });
  } else {
    summaryItems = parseSec(summaryRows_raw, '요약');
    detailItems  = parseSec(detailRows_raw, '상세');
    landItems    = parseSec(landRows_raw, '토지임대료');
  }

  console.log('[법인비용 v5] 파싱완료:', {요약:summaryItems.length, 상세:detailItems.length, 토지임대료:landItems.length});

  /* ══════════════════════════════════════════════════════════
     [STEP 5] 카테고리 분류
  ══════════════════════════════════════════════════════════ */
  /* 상세 섹션의 구분(cat) 컬럼 → 그룹 매핑 */
  function getGroup(o){
    const c=String(o.cat||'').toLowerCase();
    const name=String(o.item||'').toLowerCase();

    /* ★ 항목명 기반 우선 체크 — cat보다 먼저 실행
       경계복원측량, 면허세/채권은 cat이 설계비/감리비여도 기타비용으로 분류 */
    if(/경계복원|면허세|채권/.test(name)) return '기타비용';

    /* 구분(cat) 컬럼 기반 */
    if(/건축설계비/i.test(c)) return '설계비';
    if(/토목설계비/i.test(c)) return '설계비';
    if(/해체설계비/i.test(c)) return '설계비';
    if(/상주감리비/i.test(c)) return '감리비';
    if(/해체감리비/i.test(c)) return '감리비';
    if(/기타.*비용|기타비/i.test(c)) return '기타비용';
    if(/공사비/i.test(c)) return '공사비';

    /* 항목명 기반 추가 분류 */
    if(/설계|측량(?!경계)|지반|굴토|해체.*심의|해체.*허가|해체.*신고|지하.*안전|흙막이/i.test(name)) return '설계비';
    if(/감리/i.test(name)) return '감리비';
    if(/기타.*비용|기타비/i.test(name)) return '기타비용';
    if(/공사|시공/i.test(name)) return '공사비';
    if(/토지.*임대|토지료|지대/i.test(name)) return '토지임대료';
    return '기타비용';
  }

  /* ══════════════════════════════════════════════════════════
     [STEP 6] 총액 계산
  ══════════════════════════════════════════════════════════ */
  const detailGrand=detailItems.reduce((a,o)=>a+o.amt,0);
  const landGrand  =landItems.reduce((a,o)=>a+o.amt,0);
  const grandTotal =detailGrand+landGrand;

  /* 그룹별 합계 (상세 기반) */
  const grpMap=new Map();
  [...detailItems,...landItems].forEach(o=>{
    const g=o===landItems[0]&&landItems.includes(o)?'토지임대료':getGroup(o);
    grpMap.set(g,(grpMap.get(g)||0)+o.amt);
  });
  /* 토지임대료 별도 */
  if(landGrand>0) grpMap.set('토지임대료',(grpMap.get('토지임대료')||0)+landGrand);

  /* ══════════════════════════════════════════════════════════
     [STEP 7] 월별 캐시플로우 — 2026.01 ~ 2030.12 고정
  ══════════════════════════════════════════════════════════ */
  const CF_START_Y=2026, CF_END_Y=2030;
  const months=[];
  for(let y=CF_START_Y;y<=CF_END_Y;y++) for(let m=1;m<=12;m++) months.push({y,m});

  /* 토지임대료 항목 빠른 조회용 Set — amtInMonth보다 먼저 선언 */
  const landItemSet=new Set(landItems);

  /* 항목별 월 배분
     ★ [캐시플로우 수정] 계약기간(cp) 기준 엄격 적용
        - cp 있으면 계약기간 외 월에는 반드시 0
        - installment: base 월 계산 버그 수정 (12진법 연산)
        - monthly/분할납부: 계약기간 개월수로 나눔 (periodMo 아닌 cp 기반)
        - 일시납: 계약기간 시작 월 1회
  */
  function amtInMonth(o, y, m){
    const{amt,cp,sch}=o;
    const cur=y*100+m;

    /* ★ [토지임대료 예외] landItems에 속한 항목은 계약기간 동안 amt를 매월 그대로 반영
       총액을 개월수로 나누지 않고 월 고정 금액으로 처리 */
    if(landItemSet.has(o)){
      if(!cp) return 0;
      const sYM=cp.sy*100+cp.sm;
      const eYM=cp.ey*100+cp.em;
      return(cur>=sYM&&cur<=eYM)?amt:0;
    }

    /* 계약기간 시작/종료 결정 */
    let sY,sM,eY,eM;
    if(cp){
      sY=cp.sy; sM=cp.sm; eY=cp.ey; eM=cp.em;
    } else {
      /* cp 없으면 계산 불가 → 0 반환 (계약기간 외) */
      return 0;
    }
    const sYM=sY*100+sM;
    const eYM=eY*100+eM;

    /* 계약기간 내 개월 수 */
    const totalMo=(eY-sY)*12+(eM-sM)+1;

    switch(sch.type){

      /* 특정 날짜 목록 (26-05/26-09/…) */
      case'dates':{
        /* 날짜가 계약기간 내에 있는 경우만 */
        const f=sch.dates.find(d=>d.y===y&&d.m===m);
        if(!f) return 0;
        return amt/sch.dates.length;
      }

      /* 일시납 */
      case'lump':{
        if(sch.ym) return(sch.ym.y===y&&sch.ym.m===m)?amt:0;
        /* 납부 날짜 미지정 → 계약 시작 월 */
        return(cur===sYM)?amt:0;
      }

      /* N회 분할 납부 — 계약기간 시작월부터 N개월 간격 없이 순차 배분 */
      case'installment':{
        if(cur<sYM||cur>eYM) return 0;
        const n=sch.count;
        /* 계약기간을 n등분: 각 구간 첫 달에 지급 */
        const interval=Math.max(1,Math.floor(totalMo/n));
        for(let i=0;i<n;i++){
          /* i번째 납부 월 계산 */
          const absM=(sY*12+sM-1)+(i*interval);
          const py=Math.floor(absM/12);
          const pm=(absM%12)+1;
          if(py===y&&pm===m) return amt/n;
        }
        return 0;
      }

      /* 기간 범위 지정 */
      case'range':{
        const rS=sch.sy*100+sch.sm, rE=sch.ey*100+sch.em;
        if(cur<rS||cur>rE) return 0;
        const mc=(sch.ey-sch.sy)*12+(sch.em-sch.sm)+1;
        return mc>0?amt/mc:amt;
      }

      /* 매월 / 분할납부 (N 미지정) → 계약기간 내 균등 분배 */
      case'monthly':
      default:{
        if(cur<sYM||cur>eYM) return 0;
        return totalMo>0?amt/totalMo:amt;
      }
    }
  }

  /* 캐시플로우에 사용할 항목 목록 (상세 + 토지임대료) */
  const cfItems=[...detailItems,...landItems];

  /* 월별 합계 계산 */
  const monthlyData=months.map(({y,m})=>{
    const byItem={};
    cfItems.forEach((o,i)=>{
      byItem[i]=amtInMonth(o,y,m);
    });
    const total=Object.values(byItem).reduce((a,b)=>a+b,0);
    return{y,m,byItem,total};
  });

  /* ══════════════════════════════════════════════════════════
     [STEP 8] KPI 생성
  ══════════════════════════════════════════════════════════ */
  const nonZeroMo=monthlyData.filter(d=>d.total>0).length;
  const totalCfSum=monthlyData.reduce((a,d)=>a+d.total,0);
  const avgMonthly=nonZeroMo>0?totalCfSum/nonZeroMo:0;
  const maxMo=monthlyData.reduce((b,d)=>d.total>b.total?d:b,{total:0,y:0,m:0});

  /* 그룹별 KPI (설계비/감리비/공사비/토지임대료) */
  const KPI_GROUPS=['설계비','감리비','기타비용','공사비','토지임대료'];
  const KPI_COLORS=[['r','#ef4444'],['p','#a78bfa'],['b','#60a5fa'],['o','#fb923c'],['y','#fbbf24']];
  const kpiGrpHTML=KPI_GROUPS.map((g,i)=>{
    const v=(()=>{
      if(g==='토지임대료') return landGrand;
      return [...detailItems].filter(o=>getGroup(o)===g).reduce((a,o)=>a+o.amt,0);
    })();
    if(!v) return '';
    const[cls,color]=KPI_COLORS[i];
    const cnt=g==='토지임대료'?landItems.length:detailItems.filter(o=>getGroup(o)===g).length;
    const lbl={설계비:'🏗️ 설계비',감리비:'👷 감리비',기타비용:'📋 기타비용',공사비:'🏢 공사비',토지임대료:'🏛️ 토지임대료'}[g]||g;
    return`<div class="kpi ${cls}">
      <div class="kpi-lbl" style="color:#e5e7eb">${lbl}</div>
      <div class="kpi-val" style="color:${color}">${fmtBig(v)}원</div>
      <div class="kpi-sub" style="color:#9ca3af">${cnt}건</div>
    </div>`;
  }).filter(Boolean).join('');

  const kpiHTML=`<div class="kpi-row">
    <div class="kpi b">
      <div class="kpi-lbl" style="color:#e5e7eb">총 법인비용</div>
      <div class="kpi-val" style="color:#ef4444">${fmtBig(grandTotal)}원</div>
      <div class="kpi-sub" style="color:#9ca3af">신축비 ${fmtBig(detailGrand)}원 + 임대료 ${fmtBig(landGrand)}원</div>
    </div>
    <div class="kpi g">
      <div class="kpi-lbl" style="color:#e5e7eb">평균 월 지출</div>
      <div class="kpi-val" style="color:#34d399">${fmtBig(avgMonthly)}원</div>
      <div class="kpi-sub" style="color:#9ca3af">지출 발생 ${nonZeroMo}개월 기준</div>
    </div>
    ${maxMo.total>0?`<div class="kpi y">
      <div class="kpi-lbl" style="color:#e5e7eb">최대 지출 월</div>
      <div class="kpi-val" style="color:#fbbf24">${maxMo.y}.${String(maxMo.m).padStart(2,'0')}</div>
      <div class="kpi-sub" style="color:#9ca3af">${fmtBig(maxMo.total)}원</div>
    </div>`:''}
    ${kpiGrpHTML}
  </div>`;

  /* ══════════════════════════════════════════════════════════
     [STEP 9] 신축 전체 비용 요약 HTML
     — 요약 섹션 데이터 기반, 없으면 상세 그룹 집계
       표시 컬럼: 항목 / 계약기간 / 소요기간 / 납부방법 / 금액
     ★ [수정1] 컬럼 width 공통 기준 (3개 표 동일 적용)
  ══════════════════════════════════════════════════════════ */
  /* ── 공통 colgroup — 3개 표에 동일 적용
       table-layout:fixed + % 비율로 전체 너비 균등 분배
       항목: 25%, 계약기간: 28%, 소요기간: 10%, 납부방법: 15%, 금액: 12% ── */
  const CORP_TABLE_STYLE='style="width:100%;table-layout:fixed"';
  const CORP_COLGROUP=`<colgroup>
    <col style="width:25%">
    <col style="width:28%">
    <col style="width:10%">
    <col style="width:15%">
    <col style="width:12%">
  </colgroup>`;
  /* 공통 th 스타일 */
  const TH_CONTRACT='style="text-align:left"';
  const TH_PERIOD  ='style="text-align:center"';
  const TH_METHOD  ='style="text-align:center"';
  const TH_AMT     ='class="r"';
  /* 공통 td 스타일 */
  const TD_CONTRACT='style="font-family:var(--mono);font-size:11px;color:#8890aa"';
  const TD_PERIOD  ='style="font-size:11px;color:#a0a8c0;text-align:center"';
  const TD_METHOD  ='style="font-size:10.5px;color:#8890aa;text-align:center"';

  function buildSummaryHTML(){
    const src = summaryItems.length>0 ? summaryItems : detailItems;
    const useSummaryData = summaryItems.length>0;
    let rowsHTML='', sTotal=0;

    src.forEach(o=>{
      sTotal+=o.amt;
      rowsHTML+=`<tr>
        <td class="label" style="color:#c9d1e8">${o.item}</td>
        <td ${TD_CONTRACT}>${o.contractRaw||'—'}</td>
        <td ${TD_PERIOD}>${o.periodRaw||'—'}</td>
        <td ${TD_METHOD}>${o.methodRaw||'—'}</td>
        <td class="r"><span class="exp" style="font-weight:600">${fmtBig(o.amt)}원</span></td>
      </tr>`;
    });

    return`<div class="cf-section">
      <div class="cf-section-head">
        <div class="cf-section-bar" style="background:#4F7CFF"></div>
        <div class="cf-section-title">신축 전체 비용 요약</div>
        <div class="cf-section-sub">${useSummaryData?'요약 섹션 기반':'상세 데이터 기반'} · 총 ${fmtBig(grandTotal)}원</div>
      </div>
      <div class="cf-table-wrap"><div style="overflow-x:auto">
        <table class="cf-table">
          ${CORP_COLGROUP}
          <thead><tr>
            <th>항목</th>
            <th ${TH_CONTRACT}>계약기간</th>
            <th ${TH_PERIOD}>소요기간</th>
            <th ${TH_METHOD}>납부방법</th>
            <th ${TH_AMT}>금액</th>
          </tr></thead>
          <tbody>
            ${rowsHTML||'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--t4)">데이터 없음</td></tr>'}
            <tr class="subtotal-row">
              <td colspan="4" style="font-weight:700">합 계</td>
              <td class="r"><span class="exp" style="font-weight:700">${fmtBig(grandTotal)}원</span></td>
            </tr>
          </tbody>
        </table>
      </div></div>
    </div>`;
  }

  /* ══════════════════════════════════════════════════════════
     [STEP 10] 신축 전체 비용 상세 HTML
     그룹: 설계비 / 감리비·인허가 / 공사비
     ★ [수정1] CORP_COLGROUP 및 공통 TD/TH 스타일 재사용
  ══════════════════════════════════════════════════════════ */
  function buildDetailHTML(){
    const GROUPS=[
      {label:'🏗️ 건축 & 토목 설계비', filter:o=>getGroup(o)==='설계비'},
      {label:'👷 감리비', filter:o=>getGroup(o)==='감리비'},
      {label:'📋 기타비용', filter:o=>getGroup(o)==='기타비용'},
      {label:'🏢 공사비', filter:o=>getGroup(o)==='공사비'},
    ];

    let bodyHTML='';
    const assigned=new Set();

    GROUPS.forEach(g=>{
      const matched=detailItems.filter((o,i)=>!assigned.has(i)&&g.filter(o));
      matched.forEach(o=>assigned.add(detailItems.indexOf(o)));
      if(!matched.length) return;
      const gTot=matched.reduce((a,o)=>a+o.amt,0);
      bodyHTML+=`<tr class="yr-group"><td colspan="5" style="font-weight:700;letter-spacing:.3px">${g.label}</td></tr>`;
      matched.forEach(o=>{
        bodyHTML+=`<tr>
          <td class="label" style="padding-left:20px;color:#d6daf0;font-weight:500">${o.item}</td>
          <td ${TD_CONTRACT}>${o.contractRaw||'—'}</td>
          <td ${TD_PERIOD}>${o.periodRaw||'—'}</td>
          <td ${TD_METHOD}>${o.methodRaw||'—'}</td>
          <td class="r"><span class="exp">${fmtBig(o.amt)}원</span></td>
        </tr>`;
      });
      bodyHTML+=`<tr class="yr-total">
        <td colspan="4" style="font-size:11px">소 계</td>
        <td class="r"><span class="exp" style="font-size:11px">${fmtBig(gTot)}원</span></td>
      </tr>`;
    });

    /* 미분류 */
    const unassigned=detailItems.filter((_,i)=>!assigned.has(i));
    if(unassigned.length){
      const uTot=unassigned.reduce((a,o)=>a+o.amt,0);
      bodyHTML+=`<tr class="yr-group"><td colspan="5">기타</td></tr>`;
      unassigned.forEach(o=>{
        bodyHTML+=`<tr>
          <td class="label" style="padding-left:20px;color:#d6daf0">${o.item}</td>
          <td ${TD_CONTRACT}>${o.contractRaw||'—'}</td>
          <td ${TD_PERIOD}>${o.periodRaw||'—'}</td>
          <td ${TD_METHOD}>${o.methodRaw||'—'}</td>
          <td class="r"><span class="exp">${fmtBig(o.amt)}원</span></td>
        </tr>`;
      });
      bodyHTML+=`<tr class="yr-total"><td colspan="4" style="font-size:11px">소 계</td><td class="r"><span class="exp" style="font-size:11px">${fmtBig(uTot)}원</span></td></tr>`;
    }

    return`<div class="cf-section">
      <div class="cf-section-head">
        <div class="cf-section-bar" style="background:var(--red)"></div>
        <div class="cf-section-title">신축 전체 비용 상세</div>
        <div class="cf-section-sub">${detailItems.length}건 · 그룹별 구성</div>
      </div>
      <div class="cf-table-wrap"><div style="overflow-x:auto">
        <table class="cf-table">
          ${CORP_COLGROUP}
          <thead><tr>
            <th>항목</th>
            <th ${TH_CONTRACT}>계약기간</th>
            <th ${TH_PERIOD}>소요기간</th>
            <th ${TH_METHOD}>납부방법</th>
            <th ${TH_AMT}>금액</th>
          </tr></thead>
          <tbody>
            ${bodyHTML||'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--t4)">항목 없음</td></tr>'}
            <tr class="subtotal-row">
              <td colspan="4" style="font-weight:700">신축비 합계</td>
              <td class="r"><span class="exp" style="font-weight:700">${fmtBig(detailGrand)}원</span></td>
            </tr>
          </tbody>
        </table>
      </div></div>
    </div>`;
  }

  /* ══════════════════════════════════════════════════════════
     [STEP 11] 법인 토지임대료 HTML
     ★ [수정1] CORP_COLGROUP 및 공통 TD/TH 스타일 재사용
  ══════════════════════════════════════════════════════════ */
  function buildLandHTML(){
    if(!landItems.length) return '';
    const rowsHTML=landItems.map(o=>`<tr>
      <td class="label" style="color:#fbbf24;font-weight:600">${o.item}</td>
      <td ${TD_CONTRACT}>${o.contractRaw||'—'}</td>
      <td ${TD_PERIOD}>${o.periodRaw||'—'}</td>
      <td ${TD_METHOD}>${o.methodRaw||'매월 납부'}</td>
      <td class="r"><span style="color:#fbbf24;font-family:var(--mono);font-weight:600">${fmtBig(o.amt)}원</span></td>
    </tr>`).join('');

    return`<div class="cf-section">
      <div class="cf-section-head">
        <div class="cf-section-bar" style="background:#fbbf24"></div>
        <div class="cf-section-title">🏛️ 법인 토지임대료</div>
        <div class="cf-section-sub">신축비와 별도 구분 · ${landItems.length}건 · 총 ${fmtBig(landGrand)}원</div>
      </div>
      <div class="cf-table-wrap"><div style="overflow-x:auto">
        <table class="cf-table">
          ${CORP_COLGROUP}
          <thead><tr>
            <th>항목</th>
            <th ${TH_CONTRACT}>계약기간</th>
            <th ${TH_PERIOD}>소요기간</th>
            <th ${TH_METHOD}>납부방법</th>
            <th ${TH_AMT}>금액</th>
          </tr></thead>
          <tbody>
            ${rowsHTML}
            <tr class="subtotal-row">
              <td colspan="4" style="font-weight:700">토지임대료 합계</td>
              <td class="r"><span style="color:#fbbf24;font-family:var(--mono);font-weight:700">${fmtBig(landGrand)}원</span></td>
            </tr>
          </tbody>
        </table>
      </div></div>
    </div>`;
  }

  /* ══════════════════════════════════════════════════════════
     [STEP 12] 월별 캐시플로우 HTML
     ★ 항목명 전체 표시 + 금액 원 단위 전체 표시 + 가로 스크롤 허용
  ══════════════════════════════════════════════════════════ */
  function buildMonthlyHTML(){
    /* 활성 항목: 실제 지출 발생 항목만 */
    const activeItems=cfItems.filter((_,i)=>monthlyData.some(d=>(d.byItem[i]||0)>0));

    if(!activeItems.length){
      return`<div class="cf-section">
        <div class="cf-section-head">
          <div class="cf-section-bar" style="background:var(--t4)"></div>
          <div class="cf-section-title">월별 비용 캐시플로우</div>
        </div>
        <div class="cf-table-wrap" style="padding:30px;text-align:center;color:var(--t4)">
          시트에 계약기간/소요기간/납부방법 컬럼을 입력하면 월별 상세가 자동으로 표시됩니다
        </div>
      </div>`;
    }

    /* 항목 컬럼 그룹 색상 */
    function itemColor(o){
      const g=getGroup(o);
      if(g==='설계비') return '#60a5fa';
      if(g==='감리비') return '#a78bfa';
      if(g==='기타비용') return '#60a5fa';
      if(g==='공사비') return '#fb923c';
      if(g==='토지임대료') return '#fbbf24';
      return '#8890aa';
    }

    /* 금액 한국식 축약 표기 (억/만 단위, 화면 표시 전용 — 계산은 원 단위 유지) */
    function fmtFull(n){
      if(!n||isNaN(n)) return '—';
      const abs=Math.abs(n);
      const sign=n<0?'-':'';
      if(abs>=1e8){
        const ok=Math.floor(abs/1e8);
        const man=Math.round((abs%1e8)/1e4);
        return sign+(man>0?ok+'억 '+man.toLocaleString('ko-KR')+'만':ok+'억')+'원';
      }
      if(abs>=1e4){
        return sign+Math.round(abs/1e4).toLocaleString('ko-KR')+'만원';
      }
      return sign+Math.round(abs).toLocaleString('ko-KR')+'원';
    }

    /* 항목별 전체 합계 */
    const itemTotals=activeItems.map((_,ai)=>{
      const oi=cfItems.indexOf(activeItems[ai]);
      return monthlyData.reduce((s,d)=>s+(d.byItem[oi]||0),0);
    });

    let bodyHTML='',lastY=null,yrSum=0,cumTotal=0;
    const yrByItem=new Array(activeItems.length).fill(0);

    monthlyData.forEach(({y,m,byItem,total})=>{
      if(y!==lastY){
        if(lastY!==null&&yrSum>0){
          bodyHTML+=`<tr class="yr-total">
            <td>${lastY}년 소계</td>
            ${activeItems.map((_,ai)=>{
              const v=yrByItem[ai];
              return`<td class="r">${v>0?`<span class="exp">${fmtFull(v)}</span>`:`<span class="dim">—</span>`}</td>`;
            }).join('')}
            <td class="r"><span class="exp">${fmtFull(yrSum)}</span></td>
            <td class="r"></td>
          </tr>`;
        }
        bodyHTML+=`<tr class="yr-group"><td colspan="${activeItems.length+3}">${y}년</td></tr>`;
        lastY=y; yrSum=0;
        yrByItem.fill(0);
      }
      if(total===0) return;
      yrSum+=total; cumTotal+=total;
      activeItems.forEach((_,ai)=>{
        const oi=cfItems.indexOf(activeItems[ai]);
        yrByItem[ai]=(yrByItem[ai]||0)+(byItem[oi]||0);
      });
      bodyHTML+=`<tr>
        <td class="ym" style="min-width:70px">${y}.${String(m).padStart(2,'0')}</td>
        ${activeItems.map((_,ai)=>{
          const oi=cfItems.indexOf(activeItems[ai]);
          const v=byItem[oi]||0;
          return`<td class="r" style="min-width:90px">${v>0?`<span class="exp">${fmtFull(v)}</span>`:`<span class="dim">—</span>`}</td>`;
        }).join('')}
        <td class="r" style="min-width:100px"><span class="exp" style="font-weight:600">${fmtFull(total)}</span></td>
        <td class="r" style="min-width:100px"><span class="neu">${fmtFull(cumTotal)}</span></td>
      </tr>`;
    });

    /* 마지막 연도 소계 */
    if(lastY&&yrSum>0){
      bodyHTML+=`<tr class="yr-total">
        <td>${lastY}년 소계</td>
        ${activeItems.map((_,ai)=>{
          const v=yrByItem[ai];
          return`<td class="r">${v>0?`<span class="exp">${fmtFull(v)}</span>`:`<span class="dim">—</span>`}</td>`;
        }).join('')}
        <td class="r"><span class="exp">${fmtFull(yrSum)}</span></td>
        <td class="r"></td>
      </tr>`;
    }

    /* 전체 합계 행 */
    bodyHTML+=`<tr class="subtotal-row">
      <td style="font-weight:700">전체 합계</td>
      ${activeItems.map((_,ai)=>`<td class="r"><span class="exp" style="font-weight:600">${fmtFull(itemTotals[ai])}</span></td>`).join('')}
      <td class="r"><span class="exp" style="font-weight:700">${fmtFull(cumTotal)}</span></td>
      <td class="r"></td>
    </tr>`;

    /* 헤더: 항목명 전체 표시, 그룹 색상 구분 */
    const theadCols=activeItems.map(o=>{
      const color=itemColor(o);
      const fullName=String(o.item||'');
      return`<th class="r" style="color:${color};font-size:11px;min-width:90px;padding:10px 12px">${fullName}</th>`;
    }).join('');

    return`<div class="cf-section cf-section-monthly">
      <div class="cf-section-head">
        <div class="cf-section-bar" style="background:var(--orange)"></div>
        <div class="cf-section-title">월별 비용 캐시플로우</div>
        <div class="cf-section-sub">${CF_START_Y}–${CF_END_Y} · 총 ${fmtFull(cumTotal)}</div>
      </div>
      <div class="cf-table-wrap">
        <div class="corp-cf-scroll" id="corpCfScroll">
        <table class="cf-table" style="width:max-content;min-width:100%">
          <thead>
            <tr>
              <th class="ym" style="color:#9ca3af;font-weight:700;min-width:80px;position:sticky;left:0;z-index:2;background:var(--s2)">연월</th>
              ${theadCols}
              <th class="r" style="color:#ef4444;font-weight:700;min-width:100px">월 합계</th>
              <th class="r" style="color:#60a5fa;font-weight:700;min-width:100px">누적</th>
            </tr>
          </thead>
          <tbody>${bodyHTML}</tbody>
        </table>
        </div>
      </div>
    </div>`;
  }

  /* ══════════════════════════════════════════════════════════
     [STEP 13] 최종 렌더링
  ══════════════════════════════════════════════════════════ */
  CACHE['corp_cfn']=null;
  initTS('corp');TS['corp']={search:'',sortCol:-1,sortAsc:true,page:1};

  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 법인비용 Cash Flow (v5)</div>
    ${kpiHTML}
    ${buildSummaryHTML()}
    ${buildDetailHTML()}
    ${buildLandHTML()}
    ${buildMonthlyHTML()}
    <div id="corp-raw" style="display:none"><div id="corp-tbl"></div></div>`;
  drawTable('corp',rows,'corp-tbl');

  /* ★ [수정3] 법인비용 월별 캐시플로우 드래그 스크롤 초기화
     — 법인비용 탭 내부 #corpCfScroll 요소에만 적용, 전역 영향 없음 */
  (function initCorpDragScroll(){
    const el=document.getElementById('corpCfScroll');
    if(!el) return;
    let isDown=false, startX=0, scrollLeft=0, moved=false;
    el.addEventListener('mousedown',e=>{
      /* 버튼 클릭(좌클릭만) */
      if(e.button!==0) return;
      isDown=true; moved=false;
      startX=e.pageX-el.offsetLeft;
      scrollLeft=el.scrollLeft;
      el.classList.add('dragging');
    });
    window.addEventListener('mouseup',()=>{
      if(!isDown) return;
      isDown=false;
      el.classList.remove('dragging');
    });
    window.addEventListener('mousemove',e=>{
      if(!isDown) return;
      e.preventDefault();
      const x=e.pageX-el.offsetLeft;
      const walk=(x-startX)*1.2;
      if(Math.abs(walk)>3) moved=true;
      el.scrollLeft=scrollLeft-walk;
    });
    /* 드래그 중 click 이벤트 억제 (텍스트 선택 방지) */
    el.addEventListener('click',e=>{if(moved){e.stopPropagation();moved=false;}});
    /* 터치 지원 */
    let touchStartX=0, touchScrollLeft=0;
    el.addEventListener('touchstart',e=>{
      touchStartX=e.touches[0].pageX;
      touchScrollLeft=el.scrollLeft;
    },{passive:true});
    el.addEventListener('touchmove',e=>{
      const dx=touchStartX-e.touches[0].pageX;
      el.scrollLeft=touchScrollLeft+dx;
    },{passive:true});
  })();
}




/* ══ 개인비용 캐시플로우 탭 전환 ══════════════════════════ */
function cfTab(id,btn){
  document.querySelectorAll('.cf-tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.cf-tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const pane=document.getElementById('cf-pane-'+id);
  if(pane)pane.classList.add('active');
}

/* ══ LOAD / ROUTE ══════════════════════════════════════════ */
function showLoader(id){document.getElementById(id).innerHTML=`<div class="loader"><div class="ring"></div><p>데이터 불러오는 중…</p></div>`;}
function stamp(){document.getElementById('syncTime').textContent=new Date().toLocaleTimeString('ko-KR');}

async function load(k){
  showLoader(`sec-${k}`);
  try{
    const rows=await fetchSheet(k);  /* ← 매번 구글 시트에서 새로 fetch */
    CACHE[k]=rows;
    if(k==='timeline')renderTimeline(rows);
    else if(k==='irr')renderIRR(rows);
    else if(k==='lease')renderLease(rows);
    else renderCost(k,rows);
    stamp();
  }catch(e){document.getElementById(`sec-${k}`).innerHTML=errHTML(e.message);}
}

function go(k,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById(`sec-${k}`).classList.add('on');
  CUR=k;
  if(!LOADED.has(k)){LOADED.add(k);load(k);}
}

async function refreshCurrent(){
  const btn=document.getElementById('btnRef');
  btn.classList.add('spin');
  LOADED.delete(CUR);
  await load(CUR);
  LOADED.add(CUR);
  btn.classList.remove('spin');
}

/* ══ [수정] 전체 탭 데이터 일괄 새로고침 ══════════════════
   새로고침 버튼 클릭 시 모든 탭 fetch → cache 업데이트 → 현재 탭 render
══════════════════════════════════════════════════════════ */
async function reloadAll(){
  const btn=document.getElementById('btnRef');
  btn.classList.add('spin');
  /* 모든 탭 LOADED 캐시 초기화 */
  Object.keys(TABS).forEach(k=>LOADED.delete(k));
  /* 전체 탭 병렬 fetch */
  const keys=Object.keys(TABS);
  await Promise.allSettled(keys.map(k=>load(k)));
  /* 현재 탭 다시 render (load에서 이미 처리되지만 CUR이 확실히 on 상태인지 보장) */
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById(`sec-${CUR}`).classList.add('on');
  btn.classList.remove('spin');
}

/* ══ [수정] 브랜드 클릭 — 홈(타임라인) 이동 + 전체 새로고침 ══
   1. 타임라인 탭 활성화
   2. 전체 데이터 새로고침
══════════════════════════════════════════════════════════ */
async function goHome(){
  /* 타임라인 탭 버튼 찾아 활성화 */
  const tabBtns=document.querySelectorAll('.tab');
  tabBtns.forEach(b=>b.classList.remove('on'));
  tabBtns[0].classList.add('on'); /* 첫 번째 탭 = 프로젝트 타임라인 */
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-timeline').classList.add('on');
  CUR='timeline';
  /* 전체 데이터 새로고침 */
  await reloadAll();
}

/* ══ INIT ══════════════════════════════════════════════════ */
LOADED.add('timeline');
load('timeline');
/* 15분마다 현재 탭 자동 갱신 — 구글 시트 변경사항 자동 반영 */
setInterval(()=>{LOADED.delete(CUR);load(CUR);},15*60*1000);
</script>
