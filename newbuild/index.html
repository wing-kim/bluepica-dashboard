<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신축대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08090d; --s1:#0f1118; --s2:#151821; --s3:#1c2030;
  --border:#222636; --border2:#2a3050;
  --blue:#3b7fff; --blue-g:linear-gradient(135deg,#3b7fff,#6c48f5);
  --green:#22d186; --yellow:#f5bc30; --orange:#f07830;
  --red:#f03860; --purple:#9060f0;
  --t1:#eef0f8; --t2:#8890aa; --t3:#4a5270; --t4:#2a3050;
  --mono:'DM Mono',monospace; --sans:'Noto Sans KR',sans-serif;
  --display:'Bebas Neue',sans-serif;
  --r:10px; --r2:6px; --sh:0 4px 32px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(59,127,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,127,255,.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:1520px;margin:0 auto;padding:0 28px 80px}

header{display:flex;align-items:center;justify-content:space-between;
  padding:24px 0 20px;border-bottom:1px solid var(--border);margin-bottom:28px}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-name{font-family:var(--display);font-size:28px;letter-spacing:2px;
  background:var(--blue-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:11px;color:var(--t3);letter-spacing:3px;text-transform:uppercase}
.header-r{display:flex;align-items:center;gap:12px}
.sync-badge{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--t3)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:blink 2.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-ref{display:flex;align-items:center;gap:6px;background:var(--s2);
  border:1px solid var(--border2);color:var(--t2);padding:7px 14px;
  border-radius:var(--r2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .18s}
.btn-ref:hover{background:var(--s3);color:var(--t1);border-color:var(--blue)}
.btn-ref .ico{display:inline-block}
.btn-ref.spin .ico{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.tabs{display:flex;gap:2px;margin-bottom:26px;padding:4px;
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow-x:auto}
.tab{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:9px 20px;
  border-radius:7px;border:none;background:transparent;color:var(--t3);
  font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .18s;white-space:nowrap}
.tab:hover{color:var(--t2);background:var(--s2)}
.tab.on{color:var(--t1);background:var(--s3);box-shadow:0 1px 8px rgba(0,0,0,.4)}
.pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.sec{display:none}.sec.on{display:block}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;gap:14px;color:var(--t3)}
.ring{width:38px;height:38px;border:3px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.loader p{font-size:12px}
.err{background:rgba(240,56,96,.07);border:1px solid rgba(240,56,96,.2);
  border-radius:var(--r);padding:18px 22px;color:var(--red);font-size:13px}
.err small{color:var(--t3);display:block;margin-top:6px}

.notice{display:flex;align-items:center;gap:8px;
  background:rgba(59,127,255,.06);border:1px solid rgba(59,127,255,.15);
  border-radius:var(--r2);padding:10px 14px;
  font-size:11px;color:var(--t3);margin-bottom:20px}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:16px}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 18px;position:relative;overflow:hidden;transition:border-color .2s,transform .18s;
  min-height:80px}
.kpi:hover{transform:translateY(-2px)}
/* 상단 컬러 바: 클래스별 단색 구분 — 그라데이션/형광 없음 */
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.b::after{background:#4F7CFF}   /* 블루 */
.kpi.g::after{background:#22c98a}   /* 그린 */
.kpi.y::after{background:#e8a020}   /* 앰버 */
.kpi.p::after{background:#8b5cf6}   /* 퍼플 */
.kpi.r::after{background:#e84040}   /* 레드 */
.kpi.o::after{background:#d97706}   /* 오렌지 */
/* hover시 테두리는 해당 색조 */
.kpi.b:hover{border-color:rgba(79,124,255,.35)}
.kpi.g:hover{border-color:rgba(34,201,138,.35)}
.kpi.y:hover{border-color:rgba(232,160,32,.35)}
.kpi.p:hover{border-color:rgba(139,92,246,.35)}
.kpi.r:hover{border-color:rgba(232,64,64,.35)}
.kpi-lbl{font-size:10px;color:#e5e7eb;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.kpi-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-.3px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-sub{font-size:10px;color:#9ca3af;margin-top:5px;font-weight:400}

.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px}
.chip{background:var(--s3);border:1px solid var(--border2);color:var(--t3);
  font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px}

.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--s2);border-bottom:1px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s}
th:hover{color:var(--t2)}
th.sorted{color:var(--blue)}
td{padding:9px 14px;border-bottom:1px solid rgba(34,38,54,.7);color:var(--t2);
  white-space:nowrap;max-width:240px;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--s2);color:var(--t1)}
td:first-child{color:var(--t1);font-weight:500}
.npos{color:var(--green)!important;font-family:var(--mono)}
.nneg{color:var(--red)!important;font-family:var(--mono)}
.nnum{color:var(--blue)!important;font-family:var(--mono)}
.npct{color:var(--yellow)!important;font-family:var(--mono)}
.ndash{color:var(--t4)!important}

.sbadge{display:inline-flex;align-items:center;gap:4px;
  padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.sb-active{background:rgba(34,209,134,.12);color:var(--green);border:1px solid rgba(34,209,134,.25)}
.sb-expire{background:rgba(240,56,96,.12);color:var(--red);border:1px solid rgba(240,56,96,.25)}
.sb-warn{background:rgba(245,188,48,.12);color:var(--yellow);border:1px solid rgba(245,188,48,.25)}
.sb-neutral{background:rgba(59,127,255,.12);color:var(--blue);border:1px solid rgba(59,127,255,.25)}

.empty{text-align:center;padding:60px;color:var(--t3);font-size:13px}
.empty-i{font-size:36px;margin-bottom:12px}

/* ═══════════════════════════════════════════════════
   TIMELINE — 간트 차트 스타일 (단색 바 + 여유 행간)
═══════════════════════════════════════════════════ */
.tl-wrap{padding:0 24px 24px}
.tl-ruler-row{display:flex;align-items:stretch;padding-bottom:22px;
  border-bottom:1px solid var(--border2);margin-bottom:0}
.tl-ruler-lbl{width:260px;flex-shrink:0;display:flex;align-items:flex-end;
  font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;
  padding-right:14px;padding-bottom:4px}
.tl-ruler-track{flex:1;position:relative;height:30px}
.tl-ruler-years{display:flex;height:100%;position:absolute;inset:0}
.tl-year-seg{flex:1;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;color:var(--t3);
  border-left:1px solid var(--border);position:relative}
.tl-year-seg:first-child{border-left:none}
.tl-year-seg.cur-y{color:var(--blue);font-weight:700}
.tl-dur-head{width:72px;flex-shrink:0;display:flex;align-items:flex-end;
  justify-content:flex-end;font-size:9px;color:var(--t4);text-transform:uppercase;
  letter-spacing:1px;padding-left:10px;padding-bottom:4px}
.tl-now-line{position:absolute;top:0;bottom:-1px;width:2px;
  background:var(--blue);box-shadow:0 0 6px rgba(59,127,255,.5);z-index:10;border-radius:1px}
.tl-now-tag{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:8px;color:var(--blue);
  background:rgba(8,9,13,.95);padding:2px 6px;border-radius:3px;
  white-space:nowrap;letter-spacing:.3px;font-weight:600;
  border:1px solid rgba(59,127,255,.25)}
.g-row{display:flex;align-items:center;padding:10px 0;
  border-bottom:1px solid rgba(34,38,54,.5);transition:background .12s;min-height:44px}
.g-row:last-child{border-bottom:none}
.g-row:hover{background:rgba(59,127,255,.03)}
/* [수정4] 항목명 영역 확장 — 긴 이름 한 줄 유지 */
.g-info{width:260px;flex-shrink:0;padding-right:14px;min-width:0}
.g-name{font-size:12.5px;font-weight:500;color:var(--t1);line-height:1.35;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:-.01em}
.g-name[title]{cursor:default}
.g-period-txt{font-family:var(--mono);font-size:9.5px;color:var(--t3);margin-top:2px;
  white-space:nowrap}
/* [수정1] 바 영역 높이 유지 (track 두께로 제어) */
.g-bar-area{flex:1;position:relative;height:38px;display:flex;align-items:center}
.g-vline{position:absolute;top:0;bottom:0;width:1px;
  background:rgba(42,48,80,.32);pointer-events:none}
.g-now-line{position:absolute;top:0;bottom:0;width:2px;
  background:rgba(59,127,255,.2);z-index:4;pointer-events:none;border-radius:1px}
/* [수정1] track 높이 14→16px (+14%) — 둔탁하지 않게 */
.g-track{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  height:16px;background:rgba(18,22,36,.95);border-radius:4px;
  border:1px solid rgba(42,48,80,.5)}
.g-fill{height:100%;border-radius:4px;position:absolute;
  transition:width .8s cubic-bezier(.4,0,.2,1)}
.g-dur{width:72px;flex-shrink:0;text-align:right;padding-left:10px;
  font-family:var(--mono);font-size:11px;color:#8890aa;white-space:nowrap;font-weight:500}
/* 단계별 구별 색상 — 절제된 톤, 형광/그라데이션 없음 */
.gc0{background:#4F7CFF}  /* 블루 */
.gc1{background:#22c98a}  /* 에메랄드 */
.gc2{background:#e8a020}  /* 앰버 */
.gc3{background:#8b5cf6}  /* 퍼플 */
.gc4{background:#e84040}  /* 레드 */
.gc5{background:#0ea5e9}  /* 스카이 */
.gc6{background:#d97706}  /* 오렌지 */
.gc7{background:#10b981}  /* 틸 */
.gc8{background:#6366f1}  /* 인디고 */

/* ═══════════════════════════════════════════════════
   TIMELINE 툴팁 — 마우스 호버 날짜 표시
═══════════════════════════════════════════════════ */
.tl-tooltip{position:fixed;pointer-events:none;z-index:9999;
  background:rgba(8,9,13,.95);border:1px solid #2a3050;
  border-radius:5px;padding:5px 10px;
  font-family:var(--mono);font-size:11px;color:#eef0f8;
  white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.5);
  transition:opacity .1s;opacity:0;letter-spacing:.3px}
.tl-tooltip.show{opacity:1}
.g-bar-area{cursor:crosshair}

/* ═══════════════════════════════════════════════════
   TIMELINE HOVER GUIDE LINE — 마우스 hover 세로 기준선
═══════════════════════════════════════════════════ */
.tl-hover-line{
  position:absolute;
  top:0;bottom:0;
  width:1px;
  /* NOW 라인(파란색)과 구분: 청록/시안 계열, 은은하게 */
  background:rgba(34,211,238,.45);
  box-shadow:0 0 5px rgba(34,211,238,.25);
  pointer-events:none;
  z-index:20;
  border-radius:1px;
  opacity:0;
  transition:opacity .12s;
  will-change:left;
}
.tl-hover-line.show{opacity:1}
/* hover line을 담는 컨테이너: 타임라인 전체 rows 높이를 관통 */
.tl-gantt-body{position:relative}

/* ═══════════════════════════════════════════════════
   IRR
═══════════════════════════════════════════════════ */
.irr-addr-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
.irr-addr-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative}
.irr-addr-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.irr-addr-card:first-child::before{background:linear-gradient(90deg,#3b7fff,#6c48f5)}
.irr-addr-card:last-child::before{background:linear-gradient(90deg,#22d186,#3b7fff)}
.irr-addr-head{padding:16px 20px 14px;border-bottom:1px solid var(--border)}
.irr-addr-title{font-size:14px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px}
.irr-addr-tag{font-size:9px;padding:2px 8px;border-radius:20px;border:1px solid;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.tag-a{color:#6c48f5;border-color:rgba(108,72,245,.3);background:rgba(108,72,245,.1)}
.tag-b{color:var(--green);border-color:rgba(34,209,134,.3);background:rgba(34,209,134,.1)}
.irr-addr-sub{font-size:11px;color:var(--t3);margin-top:4px}
.irr-addr-body{padding:18px 20px}
.irr-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.irr-metric{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:13px 15px}
.irr-metric-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.irr-metric-val{font-family:var(--mono);font-size:20px;font-weight:500}
.irr-metric-val.pos{color:var(--green)} .irr-metric-val.neg{color:var(--red)}
.irr-metric-val.neu{color:var(--blue)} .irr-metric-val.ylw{color:var(--yellow)}
.irr-metric-sub{font-size:10px;color:var(--t3);margin-top:3px}
.land-price-box{background:rgba(245,188,48,.05);border:1px solid rgba(245,188,48,.15);
  border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.land-price-lbl{font-size:11px;color:var(--yellow)}
.land-price-val{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--yellow)}
.irr-divider{height:1px;background:var(--border);margin:13px 0}
.irr-rows-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.irr-row-item{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid rgba(34,38,54,.5);font-size:12px}
.irr-row-item:last-child{border-bottom:none}

/* ═══════════════════════════════════════════════════
   IRR 결과 영역 — 위 필지카드/계산기와 동일 디자인 시스템
═══════════════════════════════════════════════════ */
.irr-res-wrap{display:flex;flex-direction:column;gap:14px;margin-top:20px}

/* KPI 4개 행 */
.irr-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:900px){.irr-kpi-row{grid-template-columns:repeat(2,1fr)}}
.irr-kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;text-align:center;position:relative;overflow:hidden}
.irr-kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.irr-kpi.kc1::before{background:linear-gradient(90deg,var(--blue),#6c48f5)}
.irr-kpi.kc2::before{background:linear-gradient(90deg,var(--green),#059669)}
.irr-kpi.kc3::before{background:linear-gradient(90deg,var(--yellow),#d97706)}
.irr-kpi.kc4::before{background:linear-gradient(90deg,var(--purple),#7c3aed)}
.irr-kpi .kpi-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.irr-kpi .kpi-num{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1.1}
.irr-kpi .kpi-num.pos{color:var(--green)}.irr-kpi .kpi-num.neg{color:var(--red)}
.irr-kpi .kpi-num.neu{color:var(--blue)}
.irr-kpi .kpi-sub{font-size:10px;color:var(--t3);margin-top:4px}

/* 섹션 공통 패널 */
.irr-sec{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.irr-sec-head{padding:11px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;color:var(--t1)}
.irr-sec-ic{width:22px;height:22px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.irr-sec-body{padding:16px}

/* 투자구조/EXIT 2컬럼 */
.irr-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.irr-detail-grid{grid-template-columns:1fr}}
.irr-detail-box{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.irr-detail-title{font-size:10px;color:var(--t3);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:10px;font-weight:600}

/* 행 아이템 */
.irr-item{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid rgba(34,38,54,.45);font-size:12px}
.irr-item:last-child{border-bottom:none}
.irr-item .ik{color:var(--t3)}
.irr-item .iv{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--t1)}
.irr-item .iv.pos{color:var(--green)}.irr-item .iv.neg{color:var(--red)}
.irr-item .iv.neu{color:var(--blue)}
.irr-item-sub{padding-left:12px}
.irr-item-sub .ik{font-size:10.5px;color:var(--t4)}
.irr-item-sub .iv{font-size:10.5px;color:var(--t3)}
.irr-item-bold .ik{color:var(--t2);font-weight:700}
.irr-item-bold .iv{font-size:13px}
.irr-divider{height:1px;background:var(--border);margin:7px 0}
.irr-total-box{display:flex;justify-content:space-between;align-items:center;
  padding:9px 12px;border-radius:6px;margin-top:6px}
.irr-total-box .ik{font-weight:700;color:var(--t1);font-size:13px}
.irr-total-box .iv{font-family:var(--mono);font-weight:700;font-size:14px}

/* 탭 */
.irr-tabs{display:flex;gap:2px;background:var(--s2);border-radius:var(--r2);
  padding:3px;margin-bottom:12px}
.irr-tab{flex:1;padding:7px 10px;border:none;background:transparent;
  color:var(--t3);font-family:var(--sans);font-size:11px;font-weight:500;
  border-radius:5px;cursor:pointer;transition:.15s}
.irr-tab.on{background:var(--s1);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.irr-tc{display:none}.irr-tc.on{display:block}

/* 캐시플로우 테이블 */
.irr-cf-wrap{overflow-x:auto}
.irr-cf-tbl{width:100%;border-collapse:collapse;font-size:11px}
.irr-cf-tbl th{padding:8px 10px;text-align:right;font-size:9.5px;font-weight:600;
  color:var(--t3);border-bottom:2px solid var(--border2);text-transform:uppercase;
  letter-spacing:.4px;white-space:nowrap;background:var(--s2)}
.irr-cf-tbl th:first-child{text-align:center}
.irr-cf-tbl th:nth-child(2){text-align:left}
.irr-cf-tbl td{padding:8px 10px;text-align:right;font-family:var(--mono);
  font-size:11px;border-bottom:1px solid rgba(34,38,54,.4);white-space:nowrap}
.irr-cf-tbl td:first-child{text-align:center;font-weight:700;color:var(--blue)}
.irr-cf-tbl td:nth-child(2){text-align:left;font-family:var(--sans);font-size:10px;color:var(--t2)}
.irr-cf-tbl tr:hover{background:rgba(59,127,255,.04)}
.irr-cf-tbl .cf-init{background:var(--s2);font-weight:700}

/* 민감도 셀 */
.irr-sens-grid{display:grid;gap:2px;font-size:11px;margin-bottom:6px}
.irr-sens-cell{padding:8px 4px;text-align:center;border-radius:3px;
  font-family:var(--mono);font-weight:700;font-size:11px}
.irr-sens-hdr{background:var(--s2);font-weight:700;color:var(--t2);
  font-family:var(--sans);font-size:10px}
.irr-sens-row-hdr{background:var(--s2);font-size:10px;color:var(--t2);
  text-align:right;padding-right:8px;font-family:var(--sans)}
.irr-sens-hi{color:#22d186;background:rgba(34,209,134,.2)}
.irr-sens-mid{color:var(--t2);background:rgba(34,209,134,.07)}
.irr-sens-lo{color:var(--red);background:rgba(240,56,96,.12)}
.irr-sens-hl{outline:2px solid var(--blue);outline-offset:-2px}

/* 차트 */
.irr-chart-area{height:200px;display:flex;align-items:flex-end;gap:6px;padding:16px 8px 0}
.irr-chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.irr-chart-bwrap{width:100%;height:180px;display:flex;align-items:flex-end;
  justify-content:center;position:relative}
.irr-chart-bar{width:65%;border-radius:3px 3px 0 0;transition:height .4s;position:relative;min-height:2px}
.irr-chart-bar.pos{background:linear-gradient(180deg,var(--green),#15803d)}
.irr-chart-bar.neg{background:linear-gradient(180deg,var(--red),#be123c)}
.irr-chart-val{position:absolute;top:-16px;white-space:nowrap;left:50%;
  transform:translateX(-50%);font-family:var(--mono);font-size:9px;color:var(--t3)}
.irr-chart-lbl{font-size:10px;color:var(--t3)}

/* ═══════════════════════════════════════════════════
   LEASE — 슬림 레이아웃 (건물별 그룹화)
   UI 슬림화 + 색상 강화 / 데이터 로직 무수정
═══════════════════════════════════════════════════ */
.ls-section{margin-bottom:18px}

/* 섹션 헤더 — 패딩 축소 */
.ls-group-head{display:flex;align-items:center;gap:10px;padding:9px 16px;
  background:var(--s3);border:1px solid var(--border);
  border-radius:var(--r) var(--r) 0 0;border-bottom:1px solid var(--border2)}
.ls-group-bar{width:3px;height:16px;border-radius:2px;flex-shrink:0;background:#4F7CFF}
.ls-group-title{font-size:12.5px;font-weight:600;color:var(--t1)}
.ls-group-meta{font-size:10.5px;color:var(--t3);margin-left:2px}
.ls-group-sum{margin-left:auto;display:flex;gap:14px;align-items:center}
.ls-sum-item{font-size:10.5px;color:var(--t3)}
.ls-sum-item strong{font-family:var(--mono);font-size:11.5px;font-weight:600}
.ls-sum-item strong.green{color:var(--green)}
.ls-sum-item strong.blue{color:var(--blue)}
.ls-sum-item strong.purple{color:var(--purple)}

/* 테이블 래퍼 */
.ls-table-wrap{border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--r) var(--r);overflow:hidden}

/* 테이블 — row 높이 축소, 정보 밀도 증가 */
.ls-table{width:100%;border-collapse:collapse;font-size:12px}
.ls-table thead tr{background:var(--s2);border-bottom:1px solid var(--border2)}
.ls-table th{padding:7px 12px;text-align:left;font-size:9.5px;font-weight:600;
  color:var(--t3);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
.ls-table th.r{text-align:right}
/* td 패딩 축소 — 정보 밀도 핵심 */
.ls-table td{padding:7px 12px;border-bottom:1px solid rgba(34,38,54,.45);
  color:var(--t2);white-space:nowrap;vertical-align:middle}
.ls-table tbody tr:last-child td{border-bottom:none}
.ls-table tbody tr:hover td{background:rgba(59,127,255,.03);color:var(--t1)}
.ls-table tr.sum-row td{background:rgba(22,26,40,.8);border-top:1px solid var(--border2);
  font-weight:600;color:var(--t1);padding:6px 12px}
.ls-table td.r{text-align:right;font-family:var(--mono)}
.ls-table td.name{color:var(--t1);font-weight:500;font-size:12.5px}
.ls-table td.floor{color:var(--t2);font-size:11.5px}

/* 만료 배지 — 컴팩트 */
.exp-badge{display:inline-block;padding:1px 7px;border-radius:3px;
  font-size:10px;font-weight:600;letter-spacing:.2px;white-space:nowrap;border:1px solid}
.exp-ok  {background:rgba(0,184,148,.08);color:#00b894;border-color:rgba(0,184,148,.18)}
.exp-warn{background:rgba(245,188,48,.08);color:#c49a00;border-color:rgba(245,188,48,.18)}
.exp-near{background:rgba(240,112,48,.08);color:#e05a00;border-color:rgba(240,112,48,.18)}
.exp-done{background:rgba(180,60,60,.08);color:#c05050;border-color:rgba(180,60,60,.18)}
.exp-none{background:rgba(74,82,112,.07);color:var(--t3);border-color:rgba(74,82,112,.18)}

/* 금액 색상 */
.amt-green {color:var(--green)!important}
.amt-blue  {color:var(--blue)!important}
.amt-purple{color:var(--purple)!important}
.amt-muted {color:var(--t4)!important}
.amt-total {color:var(--t1)!important;font-weight:600}

/* ═══ LEASE 요약 바 — 슬림화 ═════════════════════════════ */
.ls-summary-row{display:flex;flex-wrap:wrap;gap:0;
  border:1px solid var(--border);border-top:none;border-bottom:1px solid var(--border);
  background:var(--s1)}
/* 패딩 축소: 12px→8px, 폰트 축소 */
.ls-summary-item{display:flex;flex-direction:row;align-items:center;gap:8px;
  padding:5px 14px;border-right:1px solid var(--border);flex:1}
.ls-summary-item:last-child{border-right:none}
.ls-si-total{background:rgba(79,124,255,.04);border-left:2px solid #4F7CFF}
.ls-si-lbl{font-size:8.5px;color:#6b7899;text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;font-weight:600}
.ls-si-val{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--t1);white-space:nowrap}
.ls-si-val.green {color:var(--green)}
.ls-si-val.blue  {color:var(--blue)}
.ls-si-val.purple{color:var(--purple)}
.ls-si-val.white {color:var(--t1)}

/* ═══════════════════════════════════════════════════
   PERSONAL COST — Cash Flow 분석
═══════════════════════════════════════════════════ */
/* 섹션 구분 헤더 */
.cf-section{margin-bottom:28px}
.cf-section-head{display:flex;align-items:center;gap:10px;
  padding:11px 18px;background:var(--s2);
  border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;border-bottom:none}
.cf-section-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.cf-section-title{font-size:13px;font-weight:600;color:var(--t1)}
.cf-section-sub{font-size:11px;color:var(--t3);margin-left:auto}

/* ═══ 법인비용 월별 캐시플로우 — 드래그 스크롤 래퍼 ════════ */
.corp-cf-scroll{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  cursor:grab;
  user-select:none;
}
.corp-cf-scroll.dragging{cursor:grabbing;}

/* 공통 테이블 래퍼 */
.cf-table-wrap{border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--r) var(--r);overflow:hidden}
.cf-table{width:100%;border-collapse:collapse;font-size:12.5px}
.cf-table thead tr{background:var(--s2);border-bottom:2px solid var(--border2)}
.cf-table thead tr:last-child th{border-bottom:none}
.cf-table thead tr:first-child th{border-bottom:1px solid var(--border)}
.cf-table th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;
  color:var(--t3);text-transform:uppercase;letter-spacing:.9px;white-space:nowrap}
.cf-table th.r{text-align:right}
.cf-table td{padding:9px 14px;border-bottom:1px solid rgba(34,38,54,.5);
  color:var(--t2);white-space:nowrap;vertical-align:middle}
.cf-table tbody tr:last-child td{border-bottom:none}
.cf-table tbody tr:hover td{background:rgba(59,127,255,.03);color:var(--t1)}
.cf-table td.r{text-align:right;font-family:var(--mono);font-size:12px}
.cf-table td.label{color:var(--t1);font-weight:500}
.cf-table td.ym{font-family:var(--mono);font-size:11.5px;color:var(--t2)}

/* 행 종류별 스타일 */
.cf-table tr.income-row td{color:var(--t2)}
.cf-table tr.expense-row td{color:var(--t2)}

/* 섹션 구분 헤더 — 수입/지출 그룹명 */
.cf-table tr.section-head td{
  background:var(--s3);
  border-top:2px solid var(--border2);
  border-bottom:1px solid var(--border2);
  padding:7px 14px;
  font-size:11px;font-weight:700;
  letter-spacing:.6px;color:var(--t1);
}
.cf-table tr.section-head.inc-head td{border-left:3px solid var(--green)}
.cf-table tr.section-head.exp-head td{border-left:3px solid var(--red)}

/* 소계 행 */
.cf-table tr.subtotal-row td{
  background:rgba(26,31,46,.5);
  border-top:1px solid var(--border);
  font-weight:600;color:var(--t1);
  padding:8px 14px;
}
/* 순현금흐름 행 */
.cf-table tr.net-row td{
  background:rgba(59,127,255,.07);
  border-top:2px solid rgba(59,127,255,.4);
  font-weight:700;
  padding:10px 14px;
}
/* 캐시플로우 연도 그룹 */
.cf-table tr.yr-group td{background:var(--s2);font-size:11px;font-weight:600;
  color:var(--t3);letter-spacing:.5px;border-top:1px solid var(--border2)}
.cf-table tr.yr-total td{background:rgba(26,31,46,.8);font-weight:600;
  border-top:1px solid var(--border2);color:var(--t1)}

/* 금액 색상 */
.inc{color:var(--green)!important}
.exp{color:var(--red)!important}
.neu{color:var(--blue)!important}
.dim{color:var(--t4)!important}

/* 구분 태그 */
.type-badge{display:inline-block;padding:1px 7px;border-radius:3px;
  font-size:10px;font-weight:600;letter-spacing:.4px;border:1px solid}
.type-in {background:rgba(0,184,148,.08);color:#00b894;border-color:rgba(0,184,148,.18)}
.type-out{background:rgba(240,56,96,.08);color:#e04060;border-color:rgba(240,56,96,.18)}
.type-etc{background:rgba(59,127,255,.08);color:var(--blue);border-color:rgba(59,127,255,.18)}

/* ═══ 수입·지출 좌우 분리 요약 ═══════════════════════════ */
.cf-summary-split{display:grid;grid-template-columns:1fr 1fr;
  border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--r) var(--r);overflow:hidden}
.cf-split-panel{overflow-x:auto}
.cf-split-panel.inc-panel{border-right:1px solid var(--border2)}
.cf-split-title{display:flex;align-items:center;gap:8px;padding:8px 14px;
  font-size:11px;font-weight:700;letter-spacing:.5px;border-bottom:1px solid var(--border2)}
.cf-split-title.inc{background:rgba(34,209,134,.07);color:#22c55e;border-left:3px solid #22c55e}
.cf-split-title.exp{background:rgba(240,56,96,.07);color:#ef4444;border-left:3px solid #ef4444}
.cf-split-table{width:100%;border-collapse:collapse;font-size:12.5px}
.cf-split-table th{padding:7px 14px;text-align:left;font-size:9.5px;font-weight:600;
  color:#e5e7eb;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;
  background:var(--s2);border-bottom:1px solid var(--border)}
.cf-split-table th.r{text-align:right}
.cf-split-table td{padding:8px 14px;border-bottom:1px solid rgba(34,38,54,.5);
  color:var(--t2);white-space:nowrap;vertical-align:middle}
.cf-split-table tbody tr:last-child td{border-bottom:none}
.cf-split-table tbody tr:hover td{background:rgba(59,127,255,.03);color:var(--t1)}
.cf-split-table td.label{color:var(--t1);font-weight:500}
.cf-split-table td.r{text-align:right;font-family:var(--mono);font-size:12px}
.cf-split-table tr.split-subtotal td{background:rgba(26,31,46,.6);
  border-top:1px solid var(--border2);font-weight:700;padding:8px 14px;color:var(--t1)}
/* 지출 그룹 헤더 행 */
.cf-split-table tr.exp-group-head td{
  background:rgba(22,26,40,.9);
  border-top:2px solid var(--border2);
  padding:6px 14px;
  font-size:10px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;color:var(--t3);
}
.cf-split-table tr.exp-group-head.loan-head td{
  border-left:3px solid #4F7CFF;color:#7aa4ff;
}
.cf-split-table tr.exp-group-head.dep-head td{
  border-left:3px solid #f5bc30;color:#e8a020;
}
.cf-net-row{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;background:rgba(59,127,255,.07);
  border-top:2px solid rgba(59,127,255,.35);font-size:13px;font-weight:700;color:var(--t1)}
.cf-net-val{font-family:var(--mono);font-size:15px;font-weight:700}

.pg{background:var(--s2);border:1px solid var(--border);color:var(--t2);
  padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;
  transition:all .15s;font-family:var(--sans)}
.pg:hover:not([disabled]){border-color:var(--blue);color:var(--blue)}
.pg[disabled]{opacity:.3;cursor:default}
.pg.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ═══════════════════════════════════════════════════
   IRR 계산기 — 필지 카드 + 계산기 UI 스타일
═══════════════════════════════════════════════════ */
.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:24px}
.prop-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative}
.prop-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--blue-g))}
.prop-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  padding:14px 18px 12px;border-bottom:1px solid var(--border);background:var(--s2)}
.prop-addr{font-size:15px;font-weight:700;color:var(--t1)}
.prop-meta{font-size:11px;color:var(--t3);margin-top:3px}
.prop-body{padding:14px 18px}
.prop-row{display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid rgba(34,38,54,.5);font-size:12.5px}
.prop-row:last-child{border-bottom:none}
.prop-key{color:var(--t3)}
.prop-val{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--t1)}
.pv-red{color:var(--red)!important}.pv-blue{color:var(--blue)!important}
.pv-green{color:var(--green)!important}.pv-yellow{color:var(--yellow)!important}
.prop-land-box{margin-top:12px;padding:10px 14px;
  background:rgba(245,188,48,.06);border:1px solid rgba(245,188,48,.18);
  border-radius:7px;display:flex;align-items:center;justify-content:space-between}
.prop-land-lbl{font-size:11px;color:var(--yellow)}
.prop-land-val{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--yellow)}

.irr-calc-section{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.irr-calc-section-head{display:flex;align-items:center;gap:10px;
  padding:12px 18px;background:var(--s2);border-bottom:1px solid var(--border)}
.irr-calc-wrap{padding:20px}

.calc-scenario-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.calc-scen-btn{padding:7px 18px;border-radius:var(--r2);border:1px solid var(--border2);
  background:var(--s2);color:var(--t3);font-family:var(--sans);font-size:12px;
  font-weight:500;cursor:pointer;transition:all .15s}
.calc-scen-btn:hover{background:var(--s3);color:var(--t2)}
.calc-scen-btn.active{background:rgba(34,209,134,.12);border-color:rgba(34,209,134,.3);color:var(--green)}

.calc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:4px}
.calc-block{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.calc-block-title{font-size:11px;font-weight:600;color:var(--t2);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.calc-field{margin-bottom:12px}
.calc-field:last-child{margin-bottom:0}
.calc-field label{display:flex;justify-content:space-between;align-items:center;
  font-size:11px;color:var(--t3);margin-bottom:5px}
/* 직접입력(calc-num-input)이 값을 표시하므로 label 내 뱃지는 숨김 */
.calc-field label .calc-val-badge{display:none}
.calc-val-badge{font-family:var(--mono);font-size:11px;color:var(--blue);
  background:rgba(59,127,255,.1);border:1px solid rgba(59,127,255,.2);
  padding:1px 7px;border-radius:3px;white-space:nowrap}
.calc-field input[type=range]{width:100%;height:4px;border-radius:2px;
  -webkit-appearance:none;appearance:none;
  background:var(--border2);outline:none;cursor:pointer}
.calc-field input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--blue);box-shadow:0 0 6px rgba(59,127,255,.4);
  border:2px solid var(--bg);cursor:pointer}
.calc-field input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
  background:var(--blue);border:2px solid var(--bg);cursor:pointer}

/* 슬라이더 + 직접입력 래퍼 */
.calc-slider-row{display:flex;align-items:center;gap:7px;margin-top:2px}
.calc-slider-row input[type=range]{flex:1;height:4px;border-radius:2px;
  -webkit-appearance:none;appearance:none;
  background:var(--border2);outline:none;cursor:pointer}
.calc-slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--blue);box-shadow:0 0 6px rgba(59,127,255,.4);
  border:2px solid var(--bg);cursor:pointer}
.calc-num-input{width:72px;flex-shrink:0;background:var(--s3);
  border:1px solid var(--border2);border-radius:5px;
  color:var(--blue);font-family:var(--mono);font-size:11px;font-weight:600;
  padding:3px 7px;text-align:right;outline:none;transition:border-color .15s}
.calc-num-input:focus{border-color:var(--blue);background:var(--s2)}


.irr-run-btn{display:inline-flex;align-items:center;gap:8px;
  padding:12px 36px;border-radius:var(--r);border:none;
  background:linear-gradient(135deg,var(--green),#3b7fff);
  color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;
  cursor:pointer;letter-spacing:.3px;transition:opacity .2s,transform .15s;
  box-shadow:0 4px 20px rgba(34,209,134,.25)}
.irr-run-btn:hover{opacity:.9;transform:translateY(-1px)}
.irr-run-btn:active{transform:translateY(0)}

.irr-result-card{margin-top:20px;background:var(--s2);

<script>
/* ══ CONFIG ═══════════════════════════════════════════════ */
const SID='17lL6O55R56PGODOu-iM5EBH4a6ZbWEJfkypcdWzlGHA';
const TABS={
  timeline:{gid:'835667947', label:'프로젝트 타임라인'},
  irr:     {gid:'1343029023',label:'신축 IRR'},
  lease:   {gid:'0',         label:'임대차계약현황'},
  personal:{gid:'662143448', label:'개인비용'},
  corp:    {gid:'551803703', label:'법인비용'},
};
const PG=50;
const CACHE={},LOADED=new Set(),TS={};
let CUR='timeline';

/* ══ CSV ══════════════════════════════════════════════════ */
async function fetchSheet(k){
  /* ── Google Sheets CSV export
     구글 시트는 export 요청 시 리디렉션이 발생합니다.
     redirect:'follow' + credentials:'omit' 으로 CORS 우회
     시트가 "링크 있는 모든 사용자 · 뷰어" 공유 상태여야 합니다. */
  const url=`https://docs.google.com/spreadsheets/d/${SID}/export?format=csv&gid=${TABS[k].gid}`;
  let r;
  try{
    r=await fetch(url,{redirect:'follow',credentials:'omit'});
  }catch(e){
    /* CORS 차단 시 JSONP-style 우회: exportLinks 엔드포인트 시도 */
    throw new Error(`fetch 실패: ${e.message} — 시트 공유 설정을 확인하세요 (링크 있는 모든 사용자·뷰어)`);
  }
  if(!r.ok) throw new Error(`HTTP ${r.status} — 시트 공유 설정 확인 필요`);
  const txt=await r.text();
  if(!txt||txt.trim().startsWith('<')){
    /* HTML 응답 = 로그인 페이지 → 공유 설정 문제 */
    throw new Error('시트 응답이 HTML입니다 — "링크 있는 모든 사용자" 공유로 설정해주세요');
  }
  return parseCSV(txt);
}
function parseCSV(txt){
  const rows=[];let inQ=false,row=[],cell='';
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){inQ=!inQ;continue;}
    if(!inQ&&c===','){row.push(cell.trim());cell='';continue;}
    if(!inQ&&(c==='\n'||(c==='\r'&&txt[i+1]==='\n'))){
      if(c==='\r')i++;
      row.push(cell.trim());cell='';
      if(row.some(x=>x))rows.push(row);
      row=[];continue;
    }
    cell+=c;
  }
  if(cell||row.length){row.push(cell.trim());if(row.some(x=>x))rows.push(row);}
  return rows;
}

/* ══ FORMAT / UTILS ═══════════════════════════════════════ */
function fc(v){
  if(v===null||v===undefined||v==='') return '<span class="ndash">—</span>';
  const s=String(v).trim();
  if(!s) return '<span class="ndash">—</span>';
  if(s.endsWith('%')){const n=parseFloat(s);if(!isNaN(n)) return `<span class="${n<0?'nneg':'npct'}">${s}</span>`;}
  const clean=s.replace(/[,\s₩원]/g,'');
  if(!isNaN(Number(clean))&&clean!==''&&/^[\d,.\-\+]+$/.test(clean)){
    const n=Number(clean);return `<span class="${n<0?'nneg':n>0?'npos':'nnum'}">${s}</span>`;
  }
  return s;
}
function fmtBig(n){
  if(isNaN(n))return '—';
  if(Math.abs(n)>=1e8)return (n/1e8).toFixed(1)+'억';
  if(Math.abs(n)>=1e4)return Math.round(n/1e4).toLocaleString()+'만';
  if(Math.abs(n)>=1000)return n.toLocaleString();
  return Number(n.toFixed(1)).toString();
}
function findHdrRow(rows){
  for(let i=0;i<Math.min(rows.length,6);i++){if(rows[i].filter(c=>c).length>=2)return i;}
  return 0;
}
function numCols(hdr,data){
  return hdr.map((h,i)=>({h,i})).filter(({h,i})=>{
    if(!h)return false;
    return data.map(r=>parseFloat((r[i]||'').replace(/[,\s₩원%]/g,''))).filter(x=>!isNaN(x)).length>0;
  });
}
function errHTML(msg){return `<div class="err">
  ⚠️ ${msg}
  <small style="display:block;margin-top:8px;line-height:1.6">
    <strong>체크리스트:</strong><br>
    1. 구글 시트 → 공유 → "링크 있는 모든 사용자" → 뷰어 설정<br>
    2. F12 콘솔에서 실제 오류 메시지 확인<br>
    3. CORS 오류라면: 시트를 "파일 → 공유 → 웹에 게시"도 추가로 설정
  </small>
</div>`;}
function parseAmt(v){return parseFloat(String(v||'').replace(/[,\s₩원]/g,''))||0;}

/* ══ TABLE ════════════════════════════════════════════════ */
function initTS(k){if(!TS[k])TS[k]={search:'',sortCol:-1,sortAsc:true,page:1};}
function drawTable(k,rows,cid,customCell){
  const el=document.getElementById(cid);if(!el)return;
  if(!rows||rows.length<2){el.innerHTML=`<div class="empty"><div class="empty-i">📭</div>데이터 없음</div>`;return;}
  initTS(k);
  const hdr=rows[0];let data=rows.slice(1).filter(r=>r.some(c=>c));
  const q=(TS[k].search||'').toLowerCase();
  if(q)data=data.filter(r=>r.some(c=>(c||'').toLowerCase().includes(q)));
  const{sortCol:sc,sortAsc:sa}=TS[k];
  if(sc>=0){data=[...data].sort((a,b)=>{
    const av=(a[sc]||'').replace(/__SB_\w+__/g,''),bv=(b[sc]||'').replace(/__SB_\w+__/g,'');
    const an=parseFloat(av.replace(/[,%\s₩원]/g,'')),bn=parseFloat(bv.replace(/[,%\s₩원]/g,''));
    if(!isNaN(an)&&!isNaN(bn))return sa?an-bn:bn-an;
    return sa?av.localeCompare(bv,'ko'):bv.localeCompare(av,'ko');
  });}
  const total=data.length,p=Math.max(1,Math.min(TS[k].page,Math.ceil(total/PG)||1));
  TS[k].page=p;const totalP=Math.max(1,Math.ceil(total/PG));
  const slice=data.slice((p-1)*PG,p*PG);
  const cfn=customCell||fc;
  const ths=hdr.map((h,i)=>`<th onclick="tSort('${k}','${cid}',${i})" ${sc===i?'class="sorted"':''}>${h||'—'}${sc===i?(sa?' ↑':' ↓'):''}</th>`).join('');
  const tbs=slice.map(r=>`<tr>${hdr.map((_,i)=>`<td>${cfn(r[i])}</td>`).join('')}</tr>`).join('');
  let pgH='';
  if(totalP>1){
    const s=Math.max(1,Math.min(p-2,totalP-4)),e=Math.min(totalP,s+4);
    let btns='';for(let i=s;i<=e;i++)btns+=`<button class="pg${i===p?' on':''}" onclick="tPage('${k}','${cid}',${i})">${i}</button>`;
    pgH=`<div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:10px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--t3)">
      <span>${total}건</span><button class="pg" onclick="tPage('${k}','${cid}',${p-1})" ${p<=1?'disabled':''}>‹</button>${btns}
      <button class="pg" onclick="tPage('${k}','${cid}',${p+1})" ${p>=totalP?'disabled':''}>›</button></div>`;
  }else pgH=`<div style="padding:8px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--t3)">${total}건</div>`;
  el.innerHTML=`<div class="card"><div class="tscroll"><table><thead><tr>${ths}</tr></thead><tbody>${tbs}</tbody></table></div>${pgH}</div>`;
}
function tSort(k,cid,col){initTS(k);if(TS[k].sortCol===col)TS[k].sortAsc=!TS[k].sortAsc;else{TS[k].sortCol=col;TS[k].sortAsc=true;}TS[k].page=1;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}
function tSearch(k,cid,val){initTS(k);TS[k].search=val;TS[k].page=1;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}
function tPage(k,cid,p){initTS(k);TS[k].page=p;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}

/* ════════════════════════════════════════════════════════════
   1. TIMELINE — 컴팩트 + 현재시점 마커
   ★ 구글 시트 데이터 100% 실시간 반영
════════════════════════════════════════════════════════════ */
function renderTimeline(rows){
  const sec=document.getElementById('sec-timeline');
  const hi=findHdrRow(rows);
  const data=rows.slice(hi+1).filter(r=>r.some(c=>c));

  // 컬럼: col1=항목, col2=기간, col3=소요, col4=기타
  const ni=1,pi=2,di=3,oi=4;
  const YEAR_START=2026,YEAR_END=2030;
  const TOTAL_MONTHS=(YEAR_END-YEAR_START+1)*12; // 60개월

  // 현재 시점 계산 — 일(day) 단위까지 정밀 계산
  const now=new Date();
  const curYear=now.getFullYear();
  // 타임라인 전체 시작/종료를 Date 객체로 정의
  const tlStart=new Date(YEAR_START,0,1);          // 2026-01-01
  const tlEnd=new Date(YEAR_END+1,0,1);            // 2031-01-01 (exclusive)
  const tlTotalMs=tlEnd.getTime()-tlStart.getTime();
  const nowElapsedMs=now.getTime()-tlStart.getTime();
  // 타임라인 범위 내인지 확인
  const nowInRange=now>=tlStart && now<tlEnd;
  // 정밀 비율 계산 (범위 밖이면 0으로 설정, 표시는 숨김)
  const nowPctRaw=nowInRange?(nowElapsedMs/tlTotalMs*100):0;
  const nowPct=nowPctRaw.toFixed(4);

  function parsePeriod(s){
    if(!s)return null; s=String(s).trim();
    let m=s.match(/(\d{4})[.\s년]?\s*(\d{1,2})[월]?\s*[~\-～–]\s*(\d{4})[.\s년]?\s*(\d{1,2})/);
    if(m)return{sy:+m[1],sm:+m[2],ey:+m[3],em:+m[4]};
    m=s.match(/(\d{4})[.\s년]?\s*(\d{1,2})/);
    if(m)return{sy:+m[1],sm:+m[2],ey:+m[1],em:+m[2]+1};
    return null;
  }
  function parseDur(s){const n=parseInt(String(s||'').replace(/[^0-9]/g,''));return isNaN(n)?0:n;}

  const items=[];
  data.forEach((r,idx)=>{
    const name=r[ni]||'—';
    const period=r[pi]||'';
    const durRaw=r[di]||'';
    const parsed=parsePeriod(period);
    const durMo=parseDur(durRaw);
    let startOff=0,barWidth=0,startLabel='',endLabel='';
    if(parsed){
      startOff=(parsed.sy-YEAR_START)*12+(parsed.sm-1);
      const endOff=(parsed.ey-YEAR_START)*12+(parsed.em-1);
      barWidth=Math.max(endOff-startOff,1);
      startLabel=`${parsed.sy}.${String(parsed.sm).padStart(2,'0')}`;
      endLabel=`${parsed.ey}.${String(parsed.em).padStart(2,'0')}`;
    }else if(durMo>0){
      const prev=idx>0?items[idx-1]:null;
      startOff=prev?(prev.startOff+prev.barWidth):0;
      barWidth=durMo;
    }
    startOff=Math.max(0,Math.min(startOff,TOTAL_MONTHS-1));
    barWidth=Math.max(1,Math.min(barWidth,TOTAL_MONTHS-startOff));
    const leftPct=(startOff/TOTAL_MONTHS*100).toFixed(2);
    const widthPct=(barWidth/TOTAL_MONTHS*100).toFixed(2);
    const durLabel=durMo?`${durMo}개월`:(barWidth?`${barWidth}개월`:durRaw||'—');
    const periodTxt=startLabel?`${startLabel} → ${endLabel}`:period;
    items.push({name,periodTxt,durLabel,startOff,barWidth,leftPct,widthPct,colorIdx:idx});
  });

  const totalM=items.reduce((a,b)=>a+(b.barWidth||0),0);

  // 연도 세그먼트
  const yearSegs=[];
  for(let y=YEAR_START;y<=YEAR_END;y++)
    yearSegs.push(`<div class="tl-year-seg${y===curYear?' cur-y':''}">${y}</div>`);

  // 연도별 세로선 위치 (2027~2030 시작점)
  const vLinePcts=[];
  for(let y=YEAR_START+1;y<=YEAR_END;y++)
    vLinePcts.push(((y-YEAR_START)*12/TOTAL_MONTHS*100).toFixed(2));

  function makeOverlays(){
    const nowLineHTML=nowInRange
      ?`<div class="g-now-line" style="left:${nowPct}%"></div>`
      :'';
    return vLinePcts.map(p=>`<div class="g-vline" style="left:${p}%"></div>`).join('')
      +nowLineHTML;
  }

  // 눈금 헤더 — NOW 라인: tl-ruler-track 내부, % 좌표 동일 기준
  const nowLineRuler=nowInRange
    ?`<div class="tl-now-line" style="left:${nowPct}%">
        <div class="tl-now-tag">NOW · ${now.getFullYear()}년 ${now.getMonth()+1}월</div>
      </div>`
    :'';
  const rulerHTML=`<div class="tl-ruler-row">
    <div class="tl-ruler-lbl">연도</div>
    <div class="tl-ruler-track">
      <div class="tl-ruler-years">${yearSegs.join('')}</div>
      ${nowLineRuler}
    </div>
    <div class="tl-dur-head">기간</div>
  </div>`;

  // Gantt rows
  const gRows=items.map(it=>`<div class="g-row">
    <div class="g-info">
      <div class="g-name" title="${it.name}">${it.name}</div>
      ${it.periodTxt?`<div class="g-period-txt">${it.periodTxt}</div>`:''}
    </div>
    <div class="g-bar-area">
      ${makeOverlays()}
      <div class="g-track">
        <div class="g-fill gc${it.colorIdx%9}" style="left:${it.leftPct}%;width:0" data-w="${it.widthPct}"></div>
      </div>
    </div>
    <div class="g-dur">${it.durLabel}</div>
  </div>`).join('');

  sec.innerHTML=`
    <div class="notice">📡 구글 시트 실시간 연동 · 프로젝트 타임라인</div>
    <div class="kpi-row">
      <div class="kpi b"><div class="kpi-lbl" style="color:#e5e7eb">총 단계</div><div class="kpi-val" style="color:#60a5fa">${data.length}</div><div class="kpi-sub" style="color:#9ca3af">프로젝트 항목</div></div>
      <div class="kpi g"><div class="kpi-lbl" style="color:#e5e7eb">총 소요 기간</div><div class="kpi-val" style="color:#34d399">${totalM}개월</div><div class="kpi-sub" style="color:#9ca3af">예상 전체 기간</div></div>
      <div class="kpi y"><div class="kpi-lbl" style="color:#e5e7eb">타임라인 범위</div><div class="kpi-val" style="color:#fbbf24">${YEAR_START}–${YEAR_END}</div><div class="kpi-sub" style="color:#9ca3af">5개년 계획</div></div>
      <div class="kpi p"><div class="kpi-lbl" style="color:#e5e7eb">착공 예정</div><div class="kpi-val" style="color:#a78bfa">2029</div><div class="kpi-sub" style="color:#9ca3af">공사 시작 연도</div></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">프로젝트 타임라인 <span class="chip">${data.length}단계</span></div>
        <span style="font-size:10px;color:var(--t3);display:flex;align-items:center;gap:5px">
          <span style="display:inline-block;width:12px;height:2px;background:var(--blue);border-radius:1px;box-shadow:0 0 4px rgba(59,127,255,.8)"></span>현재 시점 (${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')})
        </span>
      </div>
      <div class="tl-wrap">
        ${rulerHTML}
        <div class="tl-gantt-body" id="tl-gantt-body">
          <div class="tl-hover-line" id="tl-hover-line"></div>
          ${gRows}
        </div>
      </div>
    </div>`;

  requestAnimationFrame(()=>{
    sec.querySelectorAll('[data-w]').forEach(el=>{
      setTimeout(()=>{el.style.width=el.dataset.w+'%';},60);
    });
  });

  /* ── [UI 전용] 타임라인 바 마우스 호버 날짜 툴팁 ──────────────
     ★ 데이터 로직(YEAR_START, TOTAL_MONTHS 등) 읽기 전용 참조
     ★ 날짜 계산: 마우스 X 위치 비율 → 연도/월 변환
  ─────────────────────────────────────────────────────────── */
  (()=>{
    /* 툴팁 엘리먼트 (전역 1개, 재사용) */
    let tip=document.getElementById('tl-tip-global');
    if(!tip){
      tip=document.createElement('div');
      tip.id='tl-tip-global';
      tip.className='tl-tooltip';
      document.body.appendChild(tip);
    }

    /* hover 가이드라인 엘리먼트 (tl-gantt-body 내부, 1개 재사용) */
    const ganttBody=sec.querySelector('#tl-gantt-body');
    const hoverLine=sec.querySelector('#tl-hover-line');

    /* 바 영역에서 비율 → 날짜 문자열 */
    function pctToDate(pct){
      const totalMonths=TOTAL_MONTHS;
      const mOff=Math.round(pct/100*totalMonths);
      const y=YEAR_START+Math.floor(mOff/12);
      const m=(mOff%12)+1;
      return y+'년 '+m+'월';
    }

    sec.querySelectorAll('.g-bar-area').forEach((area,rowIdx)=>{
      const item=items[rowIdx];

      area.addEventListener('mousemove',e=>{
        const rect=area.getBoundingClientRect();
        const pct=Math.max(0,Math.min(100,(e.clientX-rect.left)/rect.width*100));
        const dateStr=pctToDate(pct);

        /* 항목 기간 정보도 같이 표시 — 기존 tooltip 유지 */
        const periodInfo=item&&item.periodTxt?` (${item.periodTxt})`:'';
        tip.textContent=dateStr+periodInfo;
        tip.classList.add('show');
        tip.style.left=(e.clientX+14)+'px';
        tip.style.top =(e.clientY-32)+'px';

        /* hover 가이드라인: g-bar-area 기준 X → ganttBody 기준 X로 변환
           모든 행의 bar-area는 동일한 left offset을 가지므로
           첫 번째 bar-area rect를 기준으로 삼아 일관된 좌표 유지 */
        if(hoverLine&&ganttBody){
          const bodyRect=ganttBody.getBoundingClientRect();
          const lineLeft=e.clientX-bodyRect.left;
          hoverLine.style.left=lineLeft+'px';
          hoverLine.classList.add('show');
        }
      });

      area.addEventListener('mouseleave',()=>{
        tip.classList.remove('show');
        if(hoverLine) hoverLine.classList.remove('show');
      });
    });

    /* 스크롤 시 툴팁·가이드라인 숨김 */
    window.addEventListener('scroll',()=>{
      tip.classList.remove('show');
      if(hoverLine) hoverLine.classList.remove('show');
    },{passive:true});
  })();
}

/* ════════════════════════════════════════════════════════════
   2. IRR — 상단: 구글 시트 기반 필지 정보 카드 (자동연동)
             하단: 시나리오 IRR 계산기 (UI state, 하드코딩 없음)
   ★ 데이터 레이어: 절대 수정 금지 (fetch/parse 그대로)
   ★ 계산기 상태는 별도 변수로 관리 (원본 시트 불변)
════════════════════════════════════════════════════════════ */
function renderIRR(rows){
  const sec=document.getElementById('sec-irr');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('데이터 없음');return;}

  /* ════════════════════════════════════════════════════════════
     [데이터 레이어] IRR 시트 파싱
     ★ 시트 구조: 행=항목명, 열=필지별값 (매트릭스형)
       헤더: 항목 | 압구정로 112 | 압구정로 8길 3 | 비고
       데이터: 매입연도 | 2021 | 2025 | ...
     ★ 헤더 탐색 실패 시 전체 행 스캔으로 보완
     ★ 절대 하드코딩 없음
  ════════════════════════════════════════════════════════════ */

  const sv=(r,i)=>i>=0?(r[i]||''):'';
  const av=(r,i)=>i>=0?parseAmt(r[i]):0;

  /* ── 공백·괄호 제거 소문자 정규화 ── */
  /* 정규화: 공백·괄호·슬래시·특수문자 제거 + 소문자 */
  function nc(s){return String(s||'').replace(/[\s　\t\(\)（）\-·\/㎡]/g,'').toLowerCase();}

  /* ── 압구정로 112 / 압구정로 8길 3 판별 함수 ── */
  function is112(s){const v=nc(s);return /압구정.*112/.test(v)||/112.*압구정/.test(v);}
  function is8gil(s){const v=nc(s);return /압구정.*8길/.test(v)||/8길.*압구정/.test(v);}

  /* ── rows 전체 스캔으로 헤더 행 찾기 ──────────────────────────
     findHdrRow는 "가장 많은 셀이 채워진 행"을 찾는데
     IRR 시트는 헤더에 필지명이 있으므로 직접 탐색
  ─────────────────────────────────────────────────────────── */
  let irrHdrIdx=-1, irrCol112=-1, irrCol8=-1;

  /* 먼저 각 행을 검사해서 112/8길 컬럼이 있는 행을 헤더로 특정 */
  for(let ri=0;ri<Math.min(rows.length,10);ri++){
    const r=rows[ri];
    const c112=r.findIndex(c=>is112(c));
    const c8  =r.findIndex(c=>is8gil(c));
    if(c112>=0||c8>=0){
      irrHdrIdx=ri;
      irrCol112=c112;
      irrCol8  =c8;
      break;
    }
  }

  /* 헤더를 못 찾으면 findHdrRow 결과로 fallback */
  if(irrHdrIdx<0){
    irrHdrIdx=findHdrRow(rows);
  }

  const irrHdr =rows[irrHdrIdx];
  /* 헤더 이후 실제 데이터 행만 추출
     — 빈 행 제거 + 단일 제목 행(합계/소계/주석 등) 제거 */
  const irrData=rows.slice(irrHdrIdx+1).filter(r=>{
    const filled=r.filter(c=>String(c||'').trim());
    if(filled.length<2) return false; // 유효 셀이 2개 미만이면 제목/빈행
    return true;
  });

  /* 헤더 탐색 이후에도 컬럼을 못 찾았으면 헤더 재스캔 */
  if(irrCol112<0) irrCol112=irrHdr.findIndex(h=>is112(h));
  if(irrCol8  <0) irrCol8  =irrHdr.findIndex(h=>is8gil(h));

  /* 항목명 열: 필지 열이 아닌 첫 번째 유효 열 */
  const irrLabelCol=[0,1,2,3,4].find(i=>
    i!==irrCol112 && i!==irrCol8 &&
    irrHdr[i]!==undefined && irrHdr[i]!==''
  )??0;

  /* 비고 열 */
  const irrNoteCol=irrHdr.findIndex((h,i)=>
    i!==irrCol112&&i!==irrCol8&&i!==irrLabelCol&&
    /비고|메모|note|remark/i.test(h)
  );

  /* 진단 로그 — F12 콘솔에서 확인 */
  console.log('[IRR 시트 파싱]',{
    irrHdrIdx,
    irrCol112,irrCol8,irrLabelCol,irrNoteCol,
    headerRow : irrHdr.map((h,i)=>`[${i}]"${h}"`).join(' | '),
    totalRows : irrData.length,
    sample3   : irrData.slice(0,3).map(r=>r.map((c,i)=>`[${i}]${c}`).join(' | '))
  });

  /* ── 행 라벨 + 열 인덱스로 값 추출 ──────────────────────────
     propPats: 항목명 정규식 배열
     colIdx:   irrCol112 또는 irrCol8
  ─────────────────────────────────────────────────────────── */
  function irrGetVal(propPats, colIdx){
    if(colIdx<0) return '';
    /* irrData에서 항목명이 일치하는 행 탐색
       labelCol과 열0 둘 다 확인 (labelCol 오탐 방지) */
    const row=irrData.find(r=>{
      const lbl0=nc(r[0]||'');
      const lblN=irrLabelCol!==0?nc(r[irrLabelCol]||''):'';
      return propPats.some(p=>p.test(lbl0)||p.test(lblN));
    });
    if(!row) return '';
    return (row[colIdx]||'').toString().trim();
  }
  function irrGetNum(propPats, colIdx){
    const raw=irrGetVal(propPats,colIdx);
    if(!raw||raw==='-'||raw==='') return 0;
    return parseAmt(raw);
  }

  /* ── 필지별 전체 값 추출 ── */
  function irrExtract(colIdx){
    if(colIdx<0) return null;
    return{
      year    : irrGetVal([/매입연도|매입년|취득년|취득일|매입일/],colIdx),
      area    : irrGetVal([/면적/],colIdx),
      buyP    : irrGetNum([/매입총액|매입가|취득가|매매가|매입금액/],colIdx),
      loan    : irrGetNum([/대출(?!금리|이율)/],colIdx),
      deposit : irrGetNum([/보증금/],colIdx),
      rent    : irrGetNum([/월세|월임대료|임대료(?!보)/],colIdx),
      landPr  : irrGetNum([/공시지가(?!기준|합|총|현재)/],colIdx),
      landTot : irrGetNum([/현재가치|공시지가기준|토지가격|공시총액/],colIdx),
      loanRate: irrGetVal([/금리|이율|대출금리/],colIdx),
    };
  }

  const propA=irrExtract(irrCol112);
  const propB=irrExtract(irrCol8);

  console.log('[IRR 필지 추출값]',{
    A:propA, B:propB,
    hint: irrCol112<0||irrCol8<0
      ? '⚠️ 열을 못 찾음 — 헤더 행에 "압구정로 112", "압구정로 8길 3"이 있는지 확인하세요'
      : '✅ 열 탐색 성공'
  });

  /* ── 필지 카드 HTML 빌더 ── */
  function irrBuildCard(addr,p,tagLabel,tagCls,accent){
    if(!p){
      return`<div class="prop-card" style="--accent:${accent}">
        <div class="prop-head">
          <div><div class="prop-addr">${addr}</div></div>
          <span class="irr-addr-tag ${tagCls}">${tagLabel}</span>
        </div>
        <div class="prop-body">
          <div style="padding:18px 0;text-align:center;font-size:12px;color:var(--t4)">
            열 탐색 실패 — 헤더에 필지명 없음<br>
            <span style="font-size:10px">F12 → [IRR 시트 파싱] 확인</span>
          </div>
        </div>
      </div>`;
    }

    const areaNum=parseFloat(String(p.area||'').replace(/[^0-9.]/g,''))||0;
    const landCalc=p.landTot||(p.landPr&&areaNum?p.landPr*areaNum:0);
    const hasData =p.buyP||p.loan||p.deposit||p.rent||p.landPr||landCalc;

    const metaParts=[
      p.year ? `${p.year}년 매입` : '',
      areaNum ? `${areaNum.toLocaleString()}㎡` : (p.area?p.area+'㎡':'')
    ].filter(Boolean);

    const row=(lbl,val,cls='')=>val
      ?`<div class="prop-row"><span class="prop-key">${lbl}</span><span class="prop-val${cls?' '+cls:''}">${val}</span></div>`
      :'';

    return`<div class="prop-card" style="--accent:${accent}">
      <div class="prop-head">
        <div>
          <div class="prop-addr">${addr}</div>
          ${metaParts.length?`<div class="prop-meta">${metaParts.join(' · ')}</div>`:''}

      </div>
      <div class="prop-body">
        ${hasData?`
          ${row('매입 총액', p.buyP   ?fmtBig(p.buyP)+'원'    :'','pv-red')}
          ${row('대출',      p.loan   ?fmtBig(p.loan)+'원'    :'','pv-blue')}

          ${p.loanRate?row('대출 금리',p.loanRate):''}
          ${row('공시지가',  p.landPr ?fmtBig(p.landPr)+'원/㎡':'')}
          ${landCalc?`<div class="prop-land-box">
            <span class="prop-land-lbl">🏛️ 현재 토지 가치</span>
            <span class="prop-land-val">${fmtBig(landCalc)}원</span>
          </div>`:''}
        `:`<div style="padding:18px 0;text-align:center;font-size:12px;color:var(--t4)">
          시트에서 값을 읽지 못했습니다<br>
          <span style="font-size:10px">F12 → [IRR 시트 파싱] → sample3 확인</span>
        </div>`}
      </div>
    </div>`;
  }

  const propCardsHTML=[
    irrBuildCard('압구정로 112',  propA,'A필지','tag-a','#4F7CFF'),
    irrBuildCard('압구정로 8길 3',propB,'B필지','tag-b','#3a6ee8')
  ].join('');

  /* ── groups + irrSheetData (irrCalcRun 계산기용) ── */
  const groups=[
    {addr:'압구정로 112',  rows:irrData},
    {addr:'압구정로 8길 3',rows:irrData}

  const _aNum=(p)=>parseFloat(String(p?.area||'').replace(/[^0-9.]/g,''))||0;

  const _loanRateA=parseFloat(String(propA?.loanRate||'').replace(/[^0-9.]/g,''))||0;
  const _loanRateB=parseFloat(String(propB?.loanRate||'').replace(/[^0-9.]/g,''))||0;

  window._irrSheetData={
    groups, hdr:irrHdr,
    _isStructureB:true,
    _totalBuy, _totalLoan, _totalDep, _totalRent, _totalAreaNum, _totalLandVal,
    _loanRateA, _loanRateB,
    /* 필지별 대출/토지가치 (이자 분리 계산용) */
    _loanA : propA?.loan    ||0,
    _loanB : propB?.loan    ||0,
    _landValA: (propA?.landTot||0)||((propA?.landPr||0)*(_aNum(propA))),
    _landValB: (propB?.landTot||0)||((propB?.landPr||0)*(_aNum(propB))),
    addrIdx:-1,areaIdx:-1,buyPriceIdx:-1,loanIdx:-1,
    depositIdx:-1,rentIdx:-1,landPrIdx:-1,landTotIdx:-1
  };
  /* 필지별 매입가 — 장특공 가중치 계산용 */
  window._irrProps = { A: propA, B: propB };

  const CARD_ACCENTS=['#4F7CFF','#3a6ee8'];

  /* ── 슬라이더 초기값: 대출금리 시트값 반영 ── */

    const slA=document.getElementById('sl_rateA');

    /* ── [계산기 UI] 슬라이더/입력 패널 HTML ── */
